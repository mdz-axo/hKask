apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hkask

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Override image tag per environment
images:
  - name: ghcr.io/mdz-axo/hkask
    newTag: kask-main
