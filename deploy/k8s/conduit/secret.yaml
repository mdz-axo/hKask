apiVersion: v1
kind: Secret
metadata:
  name: conduit-secrets
  namespace: hkask-conduit
type: Opaque
stringData:
  CONDUIT_SERVER_NAME: "hkask.example.com"
  CONDUIT_SIGNING_KEY: "replace-with-generated-key"
  CONDUIT_PORT: "8008"
  CONDUIT_DATABASE_PATH: "/data/conduit.db"
  CONDUIT_ALLOW_REGISTRATION: "false"
