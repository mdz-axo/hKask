apiVersion: v1
kind: Secret
metadata:
  name: hkask-secrets
  namespace: hkask
type: Opaque
stringData:
  # OAuth — set these before applying
  oauth-github-client-id: "your-github-client-id"
  oauth-github-client-secret: "your-github-client-secret"

  # Litestream S3 backup — set these before applying
  litestream-access-key-id: "your-s3-access-key"
  litestream-secret-access-key: "your-s3-secret-key"

  # Master passphrase for SQLCipher encryption
  master-passphrase: "change-me-to-a-strong-passphrase"
