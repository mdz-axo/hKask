[package]
name = "hkask-mcp-replica"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Style replica MCP server — embed author corpora, compose prose, list styles"

[dependencies]
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-services = { path = "../../crates/hkask-services" }
hkask-services-core = { path = "../../crates/hkask-services-core" }
hkask-services-corpus = { path = "../../crates/hkask-services-corpus" }
hkask-storage = { path = "../../crates/hkask-storage" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
anyhow.workspace = true
tracing.workspace = true
chrono.workspace = true
dotenvy.workspace = true
hkask-bridge-pko = { path = "../../crates/hkask-bridge-pko" }
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }

[lib]
name = "hkask_mcp_replica"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-replica"
path = "src/main.rs"

[dev-dependencies]
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
proptest = "1"
rand = "0.9"
tempfile.workspace = true
