[package]
name = "hkask-mcp-research"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Web search, extraction, and feed-based research MCP server"

[lib]
name = "hkask_mcp_research"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-research"
path = "src/main.rs"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[dependencies]

hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-storage = { path = "../../crates/hkask-storage" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
reqwest.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
anyhow.workspace = true
base64.workspace = true
dotenvy.workspace = true
rusqlite.workspace = true
r2d2.workspace = true
r2d2_sqlite.workspace = true

# Research engine dependencies (merged from hkask-services-research)
chrono.workspace = true
schemars.workspace = true
thiserror.workspace = true
async-trait.workspace = true
blake3.workspace = true
futures-util.workspace = true
regex.workspace = true
feed-rs = "2.4"
url.workspace = true