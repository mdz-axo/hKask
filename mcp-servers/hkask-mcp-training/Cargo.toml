[package]
name = "hkask-mcp-training"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Model training MCP server — ingests QA pairs and training data for future fine-tuning pipelines"

[lib]
name = "hkask_mcp_training"
path = "src/lib.rs"

[dependencies]
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-adapter = { path = "../../crates/hkask-adapter" }
rusqlite.workspace = true
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
chrono.workspace = true
dotenvy.workspace = true
uuid.workspace = true
thiserror.workspace = true
async-trait.workspace = true
blake3.workspace = true
reqwest = { workspace = true, features = ["multipart"] }
base64.workspace = true

[dev-dependencies]
tempfile.workspace = true
