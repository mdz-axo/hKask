[package]
name = "hkask-mcp-spec"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Specification authoring, curation, and validation MCP server"

[dependencies]
hkask-types = { path = "../../crates/hkask-types" }
hkask-capability = { path = "../../crates/hkask-capability" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-services = { path = "../../crates/hkask-services" }
hkask-services-core = { path = "../../crates/hkask-services-core" }
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-cns = { path = "../../crates/hkask-cns" }
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
hkask-bridge-pko = { path = "../../crates/hkask-bridge-pko" }
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
rusqlite.workspace = true
hex.workspace = true
chrono.workspace = true
dotenvy.workspace = true
ed25519-dalek.workspace = true

# F-SYN-020: the `lib` target exists so that integration tests in
# `tests/` can `use hkask_mcp_spec::types::...`. Without this,
# tests for a pure `bin` target cannot import the binary's
# modules.
[lib]
name = "hkask_mcp_spec"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-spec"
path = "src/main.rs"

[dev-dependencies]
hkask-types = { path = "../../crates/hkask-types" }
rmcp = { workspace = true, features = ["client", "transport-child-process"] }
tokio-util.workspace = true
proptest = "1"
