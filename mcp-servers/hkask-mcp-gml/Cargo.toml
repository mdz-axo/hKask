[package]
name = "hkask-mcp-gml"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GML (Allosteric Thinking) MCP server — MWC computations and capability enforcement"

[[bin]]
name = "hkask-mcp-gml"
path = "src/main.rs"

[dependencies]
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }

ed25519-dalek = { workspace = true, features = ["rand_core"] }
sha2 = { workspace = true }
hex = { workspace = true }
rand = "0.8"
chrono = { workspace = true }
hkask-types = { path = "../../crates/hkask-types" }

hkask-mcp = { path = "../../crates/hkask-mcp" }
anyhow = { workspace = true }
