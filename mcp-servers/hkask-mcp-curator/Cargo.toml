[package]
name = "hkask-mcp-curator"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Curator MCP server — system observability, escalation management, and regulatory memory access"

[dependencies]
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-agents = { path = "../../crates/hkask-agents" }
hkask-cns = { path = "../../crates/hkask-cns" }
hkask-services = { path = "../../crates/hkask-services" }
hkask-services-context = { path = "../../crates/hkask-services-context" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
rusqlite.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
anyhow.workspace = true
tracing.workspace = true
chrono.workspace = true
dotenvy.workspace = true

[lib]
name = "hkask_mcp_curator"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-curator"
path = "src/main.rs"
