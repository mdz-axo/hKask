# Web Synthesis — Manifest
# Status: draft — not yet executable by hkask-templates cascade engine

id: web-synthesis
version: "0.1.0"
status: draft
description: Broad web search with synthesis across multiple providers

tools:
  - web_search

steps:
  - id: step1
    tool: web_search
    arguments:
      query: "{{query}}"
      strategy: web
      num_results: 20
    output_var: search_results

output:
  type: synthesis
  source: search_results
