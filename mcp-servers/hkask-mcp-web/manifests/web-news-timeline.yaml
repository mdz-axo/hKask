# Web News Timeline — Manifest
# Status: draft — not yet executable by hkask-templates cascade engine

id: web-news-timeline
version: "0.1.0"
status: draft
description: News-oriented search with timeline grouping

tools:
  - web_search

steps:
  - id: step1
    tool: web_search
    arguments:
      query: "{{query}}"
      strategy: news
      num_results: 20
    output_var: search_results

output:
  type: timeline
  source: search_results
  group_by: published
