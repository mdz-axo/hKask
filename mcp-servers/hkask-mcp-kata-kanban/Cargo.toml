description = "Kata-Kanban workflow coordination MCP server"

[dependencies]
hkask-mcp-server = { path = "../../crates/hkask-mcp-server" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-services-kata-kanban = { path = "../../crates/hkask-services-kata-kanban" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
rusqlite.workspace = true
r2d2.workspace = true
r2d2_sqlite.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
dotenvy.workspace = true
chrono.workspace = true

[lib]
name = "hkask_mcp_kata_kanban"
