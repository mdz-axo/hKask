[package]
name = "hkask-mcp-media"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Media generation MCP server (image, video, audio, 3D via fal.ai and other providers)"

[features]
default = []
face-recognition = ["dep:face_id"]

[dependencies]
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-agents = { path = "../../crates/hkask-agents" }
hkask-ports = { path = "../../crates/hkask-ports" }
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-templates = { path = "../../crates/hkask-templates" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-database = { path = "../../crates/hkask-database" }
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }
hkask-bridge-pko = { path = "../../crates/hkask-bridge-pko" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
minijinja = "2"
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml_neo.workspace = true
schemars.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
chrono.workspace = true
dotenvy.workspace = true
walkdir.workspace = true
sha2.workspace = true
base64.workspace = true
image.workspace = true
imageproc.workspace = true
ab_glyph = "0.2"
uuid.workspace = true
nom-exif = "3"
face_id = { version = "0.4", optional = true }

[lib]
name = "hkask_mcp_media"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-media"
path = "src/main.rs"

[dev-dependencies]
tempfile.workspace = true
rusqlite.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
