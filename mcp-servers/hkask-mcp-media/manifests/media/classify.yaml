# Media Gallery — Image Classification Manifest
# Classifies an image into categories using a vision LLM.

template_type: WordAct
name: media_classify
version: "1.0.0"
description: "Classify an image into categories"
model: "DI/meta-llama/Llama-3.2-11B-Vision-Instruct"
parameters:
  - name: categories
    type: string
    required: false
    description: "Comma-separated category names. If empty, auto-discover."
---
Analyze this image and classify it.

{% if categories %}
Classify into these categories (an image can belong to multiple): {{ categories }}
{% else %}
Suggest 2-5 appropriate categories for this image. Categories should be broad but meaningful (e.g., "landscape", "portrait", "street photography", "macro", "architecture").
{% endif %}

For each matching category, provide:
- category: string
- confidence: number (0.0 to 1.0)

Return ONLY a JSON array. No markdown, no preamble. Each element must have:
- category: string
- confidence: number
