[package]
name = "hkask-mcp-kanban-fuzz"
version = "0.0.0"
publish = false
edition.workspace = true

[package.metadata]
cargo-fuzz = true

[[test]]
name = "kanban_fuzz"
path = "fuzz_targets/kanban_fuzz.rs"

[dependencies]
bolero = { workspace = true }
hkask-mcp-kanban = { path = ".." }
hkask-mcp = { path = "../../../crates/hkask-mcp" }
hkask-types = { path = "../../../crates/hkask-types" }
hkask-storage = { path = "../../../crates/hkask-storage" }
hkask-services = { path = "../../../crates/hkask-services" }
hkask-services-kanban = { path = "../../../crates/hkask-services-kanban" }
hkask-test-harness = { path = "../../../crates/hkask-test-harness" }
rmcp = { workspace = true, features = ["server", "macros"] }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
rusqlite = { workspace = true }
