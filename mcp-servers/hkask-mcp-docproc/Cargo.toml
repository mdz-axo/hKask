[package]
name = "hkask-mcp-docproc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Unified document processing MCP server: format conversion, OCR, chunking, parsing, and QA generation"

[dependencies]
# Shared infrastructure
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-ports = { path = "../../crates/hkask-ports" }

# OCR pipeline (from markitdown)
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-templates = { path = "../../crates/hkask-templates" }
pdf-extract = "0.7"
image.workspace = true
imageproc.workspace = true
base64.workspace = true
reqwest.workspace = true

# Knowledge pipeline (from doc-knowledge)
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-storage = { path = "../../crates/hkask-storage" }

# Kindle-Zip dependencies
headless_chrome = "1"
zip = "2"
md5 = "0.7"
uuid.workspace = true

# Protocol + utilities
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
async-trait.workspace = true
chrono.workspace = true
dotenvy.workspace = true
tempfile.workspace = true
dirs = "6"

[lib]
name = "hkask_mcp_docproc"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-docproc"
path = "src/main.rs"

[dev-dependencies]
rand.workspace = true
