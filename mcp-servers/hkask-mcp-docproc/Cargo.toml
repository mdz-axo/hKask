[package]
name = "hkask-mcp-docproc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Unified document processing MCP server: format conversion, OCR, chunking, parsing, and QA generation"

[dependencies]
# Shared infrastructure
hkask-mcp-server = { path = "../../crates/hkask-mcp-server" }
hkask-types = { path = "../../crates/hkask-types" }

# Ontology bridges — vocabulary constants for metadata, provenance, and domain predicates
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }

# OCR pipeline (from markitdown)
hkask-inference = { path = "../../crates/hkask-inference" }


image.workspace = true

base64.workspace = true
reqwest.workspace = true

# Office format backends (S2: backend/pipeline separation)
# docx-rs: DOCX reader (paragraphs, tables, lists, headings)
docx-rs = "0.4"
# calamine: XLSX/XLS/ODS reader (pure Rust, MIT)
calamine = "0.36"
# pptx-to-md: PPTX/ODP reader (extracts slide text to markdown)
pptx-to-md = "0.1"

# Knowledge pipeline (from doc-knowledge)
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-guard = { path = "../../crates/hkask-guard" }

# Protocol + utilities

rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true

thiserror.workspace = true
async-trait.workspace = true

dotenvy.workspace = true
tempfile.workspace = true
dirs = "6"
regex.workspace = true
minijinja.workspace = true

# Service layer (shared settings, models, paths)
hkask-services-core = { path = "../../crates/hkask-services-core" }

[lib]
name = "hkask_mcp_docproc"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-docproc"
path = "src/main.rs"

[dev-dependencies]
rand.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
