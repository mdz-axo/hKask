[package]
name = "hkask-mcp-docproc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Unified document processing MCP server: format conversion, OCR, chunking, parsing, and QA generation"

[dependencies]
# Shared infrastructure
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-ports = { path = "../../crates/hkask-ports" }

# Ontology bridges — vocabulary constants for metadata, provenance, and domain predicates
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }
hkask-bridge-pko = { path = "../../crates/hkask-bridge-pko" }
hkask-bridge-golem = { path = "../../crates/hkask-bridge-golem" }
hkask-bridge-fibo = { path = "../../crates/hkask-bridge-fibo" }
hkask-bridge-eso = { path = "../../crates/hkask-bridge-eso" }

# OCR pipeline (from markitdown)
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-templates = { path = "../../crates/hkask-templates" }

image.workspace = true
imageproc.workspace = true
base64.workspace = true
reqwest.workspace = true

# Knowledge pipeline (from doc-knowledge)
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-guard = { path = "../../crates/hkask-guard" }

# Protocol + utilities
uuid.workspace = true
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
thiserror.workspace = true
async-trait.workspace = true
chrono.workspace = true
dotenvy.workspace = true
tempfile.workspace = true
dirs = "6"
regex.workspace = true
minijinja.workspace = true

# Service layer (shared settings, models, paths)
hkask-services-core = { path = "../../crates/hkask-services-core" }

[lib]
name = "hkask_mcp_docproc"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-docproc"
path = "src/main.rs"

[dev-dependencies]
rand.workspace = true
