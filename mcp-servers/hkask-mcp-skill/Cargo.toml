[package]
name = "hkask-mcp-skill"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Skill invocation MCP server — exposes registered skills as callable tools"

[dependencies]
hkask-mcp = { path = "../../crates/hkask-mcp" }
hkask-templates = { path = "../../crates/hkask-templates" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-ports = { path = "../../crates/hkask-ports" }
hkask-inference = { path = "../../crates/hkask-inference" }
hkask-bridge-pko = { path = "../../crates/hkask-bridge-pko" }
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
dotenvy.workspace = true
minijinja.workspace = true

[lib]
name = "hkask_mcp_skill"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-skill"
path = "src/main.rs"

[dev-dependencies]
