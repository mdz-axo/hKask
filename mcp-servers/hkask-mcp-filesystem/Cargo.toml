[package]
name = "hkask-mcp-filesystem"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Filesystem and shell access MCP server — OCAP-governed agent tools"

[[bin]]
name = "hkask-mcp-filesystem"
path = "src/main.rs"

[lib]
name = "hkask_mcp_filesystem"
path = "src/lib.rs"

[dependencies]
hkask-mcp-server = { path = "../../crates/hkask-mcp-server" }
hkask-types = { path = "../../crates/hkask-types" }
rmcp = { workspace = true, features = ["server", "macros"] } # no transport-io: server invoked by runtime, doesn't serve stdio/SSE directly
tokio = { workspace = true, features = ["process", "time", "fs"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
dotenvy = { workspace = true }
regex = { workspace = true }
walkdir = { workspace = true }
schemars = { workspace = true }

[dev-dependencies]
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
tempfile = { workspace = true }
