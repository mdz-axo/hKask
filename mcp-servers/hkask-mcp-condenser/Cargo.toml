[package]
name = "hkask-mcp-condenser"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Context condensation MCP server — thin wrapper around hkask-condenser domain crate"

[dependencies]
hkask-condenser = { path = "../../crates/hkask-condenser" }
hkask-mcp-server = { path = "../../crates/hkask-mcp-server" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-memory = { path = "../../crates/hkask-memory" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-inference = { path = "../../crates/hkask-inference" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
tracing.workspace = true
anyhow.workspace = true
chrono.workspace = true
dotenvy.workspace = true

[lib]
name = "hkask_mcp_condenser"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-condenser"
path = "src/main.rs"

[dev-dependencies]
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
proptest = "1"
tokio = { workspace = true, features = ["macros", "rt"] }
