[package]
name = "hkask-mcp-memory"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Unified episodic + semantic memory MCP server with cloud backup"

[dependencies]
hkask-mcp-server = { path = "../../crates/hkask-mcp-server" }
hkask-types = { path = "../../crates/hkask-types" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-memory = { path = "../../crates/hkask-memory" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io"] }
rusqlite.workspace = true
r2d2.workspace = true
r2d2_sqlite.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
anyhow.workspace = true
tracing.workspace = true
chrono.workspace = true
dotenvy.workspace = true
hkask-bridge-dublincore = { path = "../../crates/hkask-bridge-dublincore" }

[lib]
name = "hkask_mcp_memory"
path = "src/lib.rs"

[[bin]]
name = "hkask-mcp-memory"
path = "src/main.rs"

[dev-dependencies]
hkask-test-harness = { path = "../../crates/hkask-test-harness" }
hkask-storage = { path = "../../crates/hkask-storage" }
hkask-memory = { path = "../../crates/hkask-memory" }
proptest = "1"
tempfile.workspace = true
rusqlite.workspace = true
r2d2.workspace = true
r2d2_sqlite.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
