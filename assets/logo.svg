<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Kask Logo - Rectangular Amphora with Calligraphic Lines -->
  <title>Kask</title>
  <desc>Rectangular amphora vessel with calligraphic stroke variation</desc>
  
  <!-- Background -->
  <rect width="400" height="600" fill="#FFFFFF"/>
  
  <!-- BITEMPORAL SHADOW (subtle, offset left) -->
  <g opacity="0.15">
    <!-- Shadow Body -->
    <rect x="120" y="185" width="140" height="255" rx="12" 
          fill="none" stroke="#000000" stroke-width="5"/>
    <!-- Shadow Neck -->
    <rect x="150" y="145" width="80" height="45" 
          fill="none" stroke="#000000" stroke-width="5"/>
    <!-- Shadow Handles -->
    <path d="M 120 200 C 95 200 95 255 120 265" 
          fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    <path d="M 260 200 C 285 200 285 255 260 265" 
          fill="none" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- MAIN AMPHORA BODY - Calligraphic strokes -->
  <!-- Body rectangle with varied stroke width simulated through overlapping paths -->
  
  <!-- Left vertical - thick downstroke -->
  <path d="M 145 185 L 145 440" 
        fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Right vertical - thick downstroke -->
  <path d="M 285 185 L 285 440" 
        fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Bottom - thick -->
  <path d="M 145 440 Q 215 445 285 440" 
        fill="none" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  
  <!-- Top of body - thinner transition -->
  <path d="M 145 185 Q 215 180 285 185" 
        fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Neck - calligraphic -->
  <!-- Left neck -->
  <path d="M 170 145 L 170 185" 
        fill="none" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round"/>
  <!-- Right neck -->
  <path d="M 260 145 L 260 185" 
        fill="none" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round"/>
  <!-- Neck top - thick to thin -->
  <path d="M 170 145 Q 215 140 260 145" 
        fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  
  <!-- Rim - elliptical, calligraphic pressure -->
  <path d="M 165 145 C 165 138 215 135 265 145 C 265 152 215 155 165 145" 
        fill="none" stroke="#1A1A1A" stroke-width="6" stroke-linecap="round"/>
  
  <!-- HANDLES - Calligraphic curves (thick middle, thin ends) -->
  <!-- Left Handle -->
  <path d="M 145 205 C 115 205 110 235 120 255 C 128 265 138 268 145 265" 
        fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right Handle -->
  <path d="M 285 205 C 315 205 320 235 310 255 C 302 265 292 268 285 265" 
        fill="none" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- STYLIZED EYE - Calligraphic -->
  <!-- Upper eyelid - thick to thin (pressure on downstroke) -->
  <path d="M 175 310 Q 215 295 255 310" 
        fill="none" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Lower eyelid - thinner, softer -->
  <path d="M 178 330 Q 215 350 252 330" 
        fill="none" stroke="#1A1A1A" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Iris - solid fill with calligraphic outline variation -->
  <circle cx="215" cy="320" r="18" fill="#1A1A1A"/>
  
  <!-- Pupil - smaller solid circle -->
  <circle cx="215" cy="320" r="10" fill="#000000"/>
  
  <!-- Light reflection - white dot -->
  <circle cx="220" cy="315" r="5" fill="#FFFFFF"/>
  
  <!-- Eyelashes - subtle calligraphic flicks -->
  <path d="M 188 308 L 185 302" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 202 305 L 200 298" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 228 305 L 230 298" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 242 308 L 245 302" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Operator Authority Gap - subtle break in iris -->
  <path d="M 223 312 A 18 18 0 0 1 225 328" 
        fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>
  
  <!-- Label - simple monospace -->
  <text x="200" y="540" font-family="monospace" font-size="18" fill="#1A1A1A" text-anchor="middle" letter-spacing="8">KASK</text>
</svg>