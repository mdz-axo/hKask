[package]
name = "hkask-wallet"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "rJoule wallet — multi-chain deposits, API key issuance, Hinkal privacy integration"

[dependencies]
hkask-types = { path = "../hkask-types" }
hkask-keystore = { path = "../hkask-keystore" }
hkask-storage = { path = "../hkask-storage" }
ed25519-dalek.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["full"] }
chrono.workspace = true
async-trait.workspace = true
zeroize.workspace = true
hex.workspace = true
subtle.workspace = true
rand.workspace = true
hmac.workspace = true
sha2.workspace = true
tracing.workspace = true

# Chain SDKs — feature-gated to keep default build lightweight
# Solana: solana-sdk (types) + solana-rpc-client-api (RPC types) + reqwest (rustls) for raw RPC
# solana-client is NOT used — it depends on openssl via solana-tls-utils
solana-sdk = { version = "2", optional = true }
spl-token = { version = "6", optional = true }
spl-associated-token-account = { version = "6", optional = true }
bincode = { version = "1", optional = true }
# Hedera — mirror node REST API via reqwest (rustls); hiero-sdk blocked by openssl dep
reqwest = { version = "0.12", optional = true, default-features = false, features = ["rustls-tls", "json"] }

[features]
default = []
solana = ["dep:solana-sdk", "dep:spl-token", "dep:spl-associated-token-account", "dep:bincode", "dep:reqwest"]
hedera = ["dep:reqwest"]
hinkal = ["dep:reqwest"]

[dev-dependencies]
hkask-storage = { path = "../hkask-storage" }
