[package]
name = "hkask-wallet"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "rJoule wallet — self-custody multi-chain deposits, API key issuance, Hinkal privacy integration"

[dependencies]
hkask-types = { path = "../hkask-types" }
hkask-wallet-types = { path = "../hkask-wallet-types" }
hkask-keystore = { path = "../hkask-keystore" }
hkask-storage = { path = "../hkask-storage" }
ed25519-dalek.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["full"] }
chrono.workspace = true
async-trait.workspace = true
zeroize.workspace = true
hex.workspace = true
subtle.workspace = true
rand.workspace = true
hmac.workspace = true
sha2.workspace = true
tracing.workspace = true

# Chain SDKs — feature-gated to keep default build lightweight
# Hedera: hiero-sdk-proto + tonic + prost for mirror node REST + gRPC
# HTTP client — required for live price feeds (EODHD, CoinGecko) and chain RPC
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
hiero-sdk-proto = { version = "0.22", optional = true }
tonic = { version = "0.12", optional = true, default-features = false, features = ["transport", "codegen", "prost"] }
prost = { version = "0.13", optional = true }

[features]
default = []
hedera = ["dep:hiero-sdk-proto", "dep:tonic", "dep:prost"]

[dev-dependencies]
hkask-storage = { path = "../hkask-storage" }
proptest = "1"
hkask-test-harness = { path = "../hkask-test-harness" }
tokio = { workspace = true, features = ["macros", "rt"] }
wiremock = "0.6"
