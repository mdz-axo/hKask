[package]
name = "hkask-types"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "ID types, nu-event, and visibility types for hKask"

[dependencies]
# NOTE: hkask-types must NOT depend on hkask-capability (would create a cycle).
# Modules that need capability types (kanban, goal, loops/curation) are being
# migrated to their domain crates.
serde.workspace = true
serde_yaml_neo.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
sha2.workspace = true
hmac.workspace = true
zeroize.workspace = true
hex.workspace = true
subtle.workspace = true
ed25519-dalek.workspace = true
base64 = "0.21"
blake3 = "1"

rusqlite = { workspace = true, optional = true }

[dev-dependencies]
hkask-capability = { path = "../hkask-capability" }
tokio = { workspace = true, features = ["macros", "rt"] }
proptest = "1"
hkask-test-harness = { path = "../hkask-test-harness" }

[features]
default = []
sql = ["dep:rusqlite"]

[[test]]
name = "types_contract"
path = "tests/contract/types_contract.rs"
