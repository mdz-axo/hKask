[package]
name = "hkask-regulation"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Cybernetic Nervous System for hKask"

[dependencies]
hkask-types = { path = "../hkask-types" }
hkask-ports = { path = "../hkask-ports" }
hkask-capability = { path = "../hkask-capability" }
# Regulation depends on the WalletBudgetPort trait (hkask-ports) and wallet value types
# (hkask-wallet-types), NOT on concrete hkask-wallet. The port inverts the
# dependency per hexagonal architecture: Regulation defines the interface it needs,
# and hkask-wallet implements it. Per Conant-Ashby, the regulator models the
# system via the abstract port, not the concrete type.
hkask-wallet-types = { path = "../hkask-wallet-types" }
hkask-storage = { path = "../hkask-storage" }

serde.workspace = true
serde_json.workspace = true
serde_yaml_neo.workspace = true
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
async-trait.workspace = true
chrono.workspace = true

parking_lot = "0.12"

tokio.workspace = true

[dev-dependencies]
hkask-test-harness = { path = "../hkask-test-harness" }
hkask-storage = { path = "../hkask-storage" }
hkask-wallet-types = { path = "../hkask-wallet-types" }
hkask-wallet = { path = "../hkask-wallet" }
proptest = "1"
