[package]
name = "hkask-storage"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SQLite + SQLCipher storage for hKask"

[dependencies]

hkask-capability = { path = "../hkask-capability" }
hkask-types = { path = "../hkask-types", features = ["sql"] }

hkask-goal = { path = "../hkask-goal" }
hkask-identity = { path = "../hkask-identity" }
hkask-keystore = { path = "../hkask-keystore" }
rusqlite.workspace = true
r2d2.workspace = true
r2d2_sqlite.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
hex.workspace = true
argon2.workspace = true
zeroize.workspace = true
rand.workspace = true
base64.workspace = true
aes-gcm.workspace = true
blake3.workspace = true
sqlite-vec = "0.1"
sqlx.workspace = true
tokio.workspace = true
utoipa.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
hkask-test-harness = { path = "../hkask-test-harness" }

[[test]]
name = "services_storage_contract"
path = "tests/contract/services_storage_contract.rs"
