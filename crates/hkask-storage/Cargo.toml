[package]
name = "hkask-storage"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SQLite + SQLCipher storage for hKask"

[dependencies]
hkask-types = { path = "../hkask-types", features = ["sql"] }
hkask-wallet-types = { path = "../hkask-wallet-types", features = ["sql"] }
hkask-ports = { path = "../hkask-ports" }
hkask-services-core = { path = "../hkask-services-core" }
hkask-capability = { path = "../hkask-capability" }
hkask-keystore = { path = "../hkask-keystore" }
rusqlite.workspace = true
sqlite-vec = "0.1"
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
tracing.workspace = true
hex.workspace = true
argon2.workspace = true
zeroize.workspace = true
rand.workspace = true
aes-gcm.workspace = true
base64.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
hkask-test-harness = { path = "../hkask-test-harness" }
proptest = "1"

[[test]]
name = "services_storage_contract"
path = "tests/contract/services_storage_contract.rs"
