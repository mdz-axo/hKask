[package]
name = "hkask-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MCP runtime and dispatch for hKask"

[dependencies]
hkask-services-core = { path = "../hkask-services-core" }
hkask-types = { path = "../hkask-types" }
hkask-templates = { path = "../hkask-templates" }
hkask-keystore = { path = "../hkask-keystore" }
hkask-storage = { path = "../hkask-storage" }
hkask-cns = { path = "../hkask-cns" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io", "client", "transport-child-process"] }
tokio-util.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml_neo.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
url.workspace = true
anyhow.workspace = true
reqwest.workspace = true
hex.workspace = true
async-trait.workspace = true
dirs = "6"
gix = { workspace = true }
jsonschema = "0.28"

[dev-dependencies]
tempfile.workspace = true
proptest = "1"
tokio = { workspace = true, features = ["macros", "rt"] }
hkask-test-harness = { path = "../hkask-test-harness" }

[[test]]
name = "tool_input_fuzz"
path = "tests/tool_input_fuzz.rs"

[[test]]
name = "mcp_lifecycle_integration"
path = "tests/mcp_lifecycle_integration.rs"
