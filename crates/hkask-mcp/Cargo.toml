[package]
name = "hkask-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MCP runtime and dispatch for hKask"

[dependencies]
hkask-types = { path = "../hkask-types" }
hkask-ports = { path = "../hkask-ports" }
hkask-capability = { path = "../hkask-capability" }
hkask-templates = { path = "../hkask-templates" }
hkask-keystore = { path = "../hkask-keystore" }
hkask-storage = { path = "../hkask-storage" }
hkask-cns = { path = "../hkask-cns" }
# Runtime needs client (to talk to child MCP servers) and
# transport-child-process (to spawn/manage them).
rmcp = { workspace = true, features = ["server", "macros", "transport-io", "client", "transport-child-process"] }
tokio-util.workspace = true
serde.workspace = true
serde_json.workspace = true

thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true


reqwest.workspace = true
hex.workspace = true
async-trait.workspace = true
dirs = "6"
jsonschema = "0.28"
dotenvy.workspace = true

[dev-dependencies]
tempfile.workspace = true
proptest = "1"
tokio = { workspace = true, features = ["macros", "rt"] }
hkask-test-harness = { path = "../hkask-test-harness" }
hkask-mcp-cloud-gateway = { path = "../hkask-mcp-cloud-gateway" }
rcgen = "0.13"
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring"] }

[[test]]
name = "tool_input_fuzz"
path = "tests/tool_input_fuzz.rs"

[[test]]
name = "mcp_lifecycle_integration"
path = "tests/mcp_lifecycle_integration.rs"
