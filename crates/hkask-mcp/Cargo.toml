[package]
name = "hkask-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MCP runtime and governance for hKask"

[dependencies]
hkask-mcp-server = { path = "../hkask-mcp-server" }
hkask-types = { path = "../hkask-types" }
hkask-capability = { path = "../hkask-capability" }
hkask-regulation = { path = "../hkask-regulation" }
rmcp = { workspace = true, features = ["server", "macros", "transport-io", "client", "transport-child-process"] }
tokio-util.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
tokio.workspace = true

[dev-dependencies]
tempfile.workspace = true
proptest = "1"
tokio = { workspace = true, features = ["macros", "rt"] }
hkask-test-harness = { path = "../hkask-test-harness" }
hkask-mcp-cloud-gateway = { path = "../hkask-mcp-cloud-gateway" }
rcgen = "0.13"
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring"] }

[[test]]
name = "tool_input_fuzz"
path = "tests/tool_input_fuzz.rs"

[[test]]
name = "mcp_lifecycle_integration"
path = "tests/mcp_lifecycle_integration.rs"