# hKask CI Invariant Gates Configuration
#
# Each gate is a named invariant check. The ci-invariants binary reads this
# config, discovers crates from the workspace Cargo.toml, and runs all gates
# in a single pass over the source tree.
#
# Gates with severity = "deny" exit non-zero on any match.
# Gates with severity = "warning" print matches but do not fail the build.
# Allowlist entries carry an expiry date — expired entries are reported as errors.

[gate.deprecated]
pattern = '#\[deprecated'
principle = "P5"
severity = "warning"
description = "#[deprecated] annotations — allow transitional use, remove in next release"
exclude_paths = ["/tests/", "/examples/"]

[gate.stubs]
pattern = 'todo!\(|unimplemented!\('
principle = "P5"
severity = "deny"
description = "Stubs (todo!/unimplemented!) — implement or remove"
exclude_paths = ["/tests/"]

[gate.unwrap]
pattern = '\.unwrap\(\)'
principle = "P3"
severity = "deny"
description = ".unwrap() calls — panics are runtime risks, use proper error handling"
exclude_paths = ["/tests/"]

[gate.visual-ui]
pattern = '(?i)grafana|prometheus|dashboard|visual\s*\.?\s*ui'
principle = "P3"
severity = "deny"
description = "Visual UI infrastructure — use CLI/MCP/API only (headless system)"
exclude_paths = ["/tests/"]

[gate.hardcoded-secrets]
pattern = '(?i)(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\s*=\s*"[^"]+"'
principle = "P3"
severity = "deny"
description = "Hardcoded secrets — use env vars or keystore"
exclude_paths = ["/tests/"]

[gate.unsafe-safety]
pattern = 'unsafe\s*\{|unsafe\s+fn'
principle = "P3"
severity = "deny"
description = "Unsafe blocks/functions must have // SAFETY: comments within 3 preceding lines"
exclude_paths = ["/tests/"]

# ── Allowlist entries ────────────────────────────────────────────────────
# Format: [[gate.<name>.allowlist]]
#   path = "relative/file/path.rs"
#   pattern = "regex of the specific violation" (optional — if omitted, all patterns allowed)
#   reason = "principle-anchored justification"
#   expires = "YYYY-MM-DD"
#
# Example (commented out — uncomment when needed):
#
# [[gate.deprecated.allowlist]]
# path = "crates/hkask-condenser/src/api.rs"
# pattern = "#\\[deprecated.*since.*0\\.29"
# reason = "P7: removing in 0.30, transitional window"
# expires = "2026-07-15"
