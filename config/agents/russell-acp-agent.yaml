# Russell ACP Agent Configuration for hKask
# 
# This configuration registers Russell as an ACP agent in hKask,
# enabling bidirectional communication for skill execution and
# host probe access.
#
# Location: ~/.config/hkask/agents/russell.yaml

agent:
  russell:
    # Agent type: ACP (Agent Client Protocol)
    type: acp
    
    # Transport configuration
    transport:
      protocol: stdio
      command: ["russell-acp-server"]
      working_dir: null  # Use default
    
    # Authentication
    auth:
      type: macaroon
      root_key_file: ~/.config/hkask/macaroon-root.key
      
      # Capabilities requested from Russell
      # These must match the attenuations in macaroon.yaml
      capabilities:
        - skill: web-search
        - skill: journal-viewer
        - skill: journal-compactor
        - skill: package-checker
        - skill: scenario-tester
        - skill: ubuntu-jack
        - skill: pragmatic-cybernetics
        - skill: pragmatic-semantics
        - skill: spec-curation
        - rate_limit: 100/minute
    
    # Connection settings
    connection:
      timeout: 30s
      retry:
        max_attempts: 3
        backoff: exponential
        initial_delay: 1s
        max_delay: 30s
    
    # Session management
    session:
      max_concurrent: 10
      idle_timeout: 5m
      max_turns: 100
    
    # Health monitoring
    health:
      check_interval: 30s
      timeout: 5s
      unhealthy_threshold: 3
    
    # Logging
    logging:
      level: info
      include_payloads: false
      log_to_journal: true

# MCP tool mapping (Russell capabilities exposed as hKask MCP tools)
mcp_tools:
  russell:
    # Journal operations
    - name: russell/journal/query
      description: Query Russell's SQLite journal for host telemetry
      method: acp/probe/run
      params:
        skill_id: journal-viewer
        probe_id: show-host-samples
    
    - name: russell/journal/compact
      description: Compact Russell's journal to reduce disk usage
      method: acp/skill/run
      params:
        skill_id: journal-compactor
    
    # Package management
    - name: russell/package/check
      description: Check installed packages and available updates
      method: acp/probe/run
      params:
        skill_id: package-checker
    
    # Web search (via Brave MCP integration)
    - name: russell/web/search
      description: Search the web using Brave Search API
      method: acp/skill/run
      params:
        skill_id: web-search
    
    # Scenario testing
    - name: russell/scenario/run
      description: Run a scenario test against Russell/Okapi/hKask
      method: acp/probe/run
      params:
        skill_id: scenario-tester
    
    # Ubuntu health checks
    - name: russell/ubuntu/check
      description: Check Ubuntu system health (systemd, apt, snap, etc.)
      method: acp/skill/run
      params:
        skill_id: ubuntu-jack
    
    # Specification curation (via hkask-mcp-spec)
    - name: russell/spec/goal/capture
      description: Capture and structure user goals as specifications
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/goal/capture
    
    - name: russell/spec/goal/decompose
      description: Decompose high-level goals into sub-goals
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/goal/decompose
    
    - name: russell/spec/require/bind
      description: Bind requirements to goals with constraints
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/require/bind
    
    - name: russell/spec/curate/evaluate
      description: Evaluate specification collection coherence
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/evaluate
    
    - name: russell/spec/curate/reconcile
      description: Reconcile conflicts between specifications
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/reconcile
    
    - name: russell/spec/curate/cultivate
      description: Cultivate specification collection over time
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/cultivate
    
    - name: russell/spec/graph/query
      description: Query specification dependency graph
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/graph/query
    
    - name: russell/spec/graph/validate
      description: Validate specification graph integrity
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/graph/validate
    
    # Specification curation (via hkask-mcp-spec)
    - name: russell/spec/goal/capture
      description: Capture and structure user goals as specifications
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/goal/capture
    
    - name: russell/spec/goal/decompose
      description: Decompose high-level goals into sub-goals
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/goal/decompose
    
    - name: russell/spec/require/bind
      description: Bind requirements to goals with constraints
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/require/bind
    
    - name: russell/spec/curate/evaluate
      description: Evaluate specification collection coherence
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/evaluate
    
    - name: russell/spec/curate/reconcile
      description: Reconcile conflicts between specifications
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/reconcile
    
    - name: russell/spec/curate/cultivate
      description: Cultivate specification collection over time
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/curate/cultivate
    
    - name: russell/spec/graph/query
      description: Query specification dependency graph
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/graph/query
    
    - name: russell/spec/graph/validate
      description: Validate specification graph integrity
      method: acp/skill/run
      params:
        skill_id: spec-curation
        tool: spec/graph/validate

# Skill routing (hLexicon-based routing for Russell skills)
skill_routing:
  russell:
    # WordAct skills (action verbs)
    wordact:
      - web-search
      - ubuntu-jack
      - scenario-tester
    
    # FlowDef skills (workflow definitions)
    flowdef:
      - journal-viewer
      - journal-compactor
      - spec-curation
      - spec-curation
    
    # KnowAct skills (knowledge assertions)
    knowact:
      - package-checker
      - pragmatic-cybernetics
      - pragmatic-semantics
