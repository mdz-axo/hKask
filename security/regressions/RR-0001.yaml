id: RR-0001
title: "Guard scan_output redaction corrupts offsets on multi-secret input"
surface: code
cwe: CWE-131
owasp_llm: LLM06
discovered_in: crates/hkask-guard/src/pipeline.rs
discovered_by: kali-audit
discovered_at: 2026-07-17
severity: critical
detection:
  kind: grep
  # The bug pattern: iterating matches in forward order and mutating the string
  # in place with replace_range, which invalidates subsequent span offsets.
  # The fix uses a single-pass rebuild (redact_spans helper).
  pattern: 'replace_range\(m\.span'
  include: "crates/hkask-guard/src/**/*.rs"
mitigation: "Use the redact_spans helper which rebuilds the string in a single forward pass, keeping all original span offsets valid."
ci_gate: scripts/check-kali-regressions.sh
status: enforced
