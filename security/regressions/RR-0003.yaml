id: RR-0003
title: "A2A delegation secret stored as bare Vec<u8> without zeroization"
surface: code
cwe: CWE-316
owasp_llm: LLM06
discovered_in: crates/hkask-templates/src/executor.rs
discovered_by: kali-audit
discovered_at: 2026-07-17
severity: medium
detection:
  kind: grep
  # The bug pattern: a2a_secret declared as Vec<u8> without Zeroizing wrapper.
  # The fix wraps it in Zeroizing<Vec<u8>>.
  pattern: 'a2a_secret:\s*Vec<u8>'
  include: "crates/hkask-templates/src/**/*.rs"
mitigation: "Wrap a2a_secret in Zeroizing<Vec<u8>> to ensure the secret is zeroed from memory on drop."
ci_gate: scripts/check-kali-regressions.sh
status: enforced
