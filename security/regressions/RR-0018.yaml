id: RR-0018
title: "Extract-triples hallucination guard must cross-check predicate namespace against chunk ontology_tags"
surface: llm-io
cwe: CWE-20
owasp_llm_2025: LLM02
atlas_tactic: AML.TA0005
nist_ssdf: PW.4.1
discovered_in: mcp-servers/hkask-mcp-docproc/src/tools/semantic.rs
discovered_by: adversarial-red-team
discovered_at: 2026-07-19
severity: medium
detection:
  kind: grep
  pattern: 'namespace_tagged'
  include: "mcp-servers/hkask-mcp-docproc/src/tools/semantic.rs"
mitigation: "The extract-triples hallucination guard bypasses the text-containment check for abstract-namespace predicates (golem/eso/fibo/pko/epistemic/omc/other) ONLY when the predicate's namespace was actually tagged for the chunk (chunk_namespaces.contains(pred_ns)). Without this cross-check, the LLM could emit any golem:/eso:/fibo:/pko: predicate to bypass the guard for chunks where that ontology was never detected — allowing hallucinated triples to enter the knowledge graph at full LLM-reported confidence. The fix uses read_ontology_namespaces to load the chunk's tagged namespaces and passes them into the spawned task as chunk_namespaces."
source: "Adversarial review of docproc ontology tagging — M4 finding"
ci_gate: scripts/check-kali-regressions.sh
status: enforced
