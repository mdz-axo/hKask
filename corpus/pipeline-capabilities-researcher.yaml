# Capabilities Researcher — Full Pipeline Manifest v6.0
# Traces from raw files through trained LoRA adapter.
#
# Type: PipelineManifest
# Persona: Business and Economics Researcher — Capability-Performance Gap Analysis
# Source: 106 files (PDF + HTML) from Clones/Library/Researcher
# Target: Bloom-balanced QAs for LoRA training via Axolotl + PiSSA
#
# Architecture:
#   Phase 2 produces TWO outputs in a single step:
#     1. JSONL reference corpus — chunks + ontology tags (classify-chunks.j2 template)
#     2. Replica memory DB — h_mems (decimated triples) + embeddings
#   Single LLM call per chunk (combined ontology + h_mem extraction).
#   No separate salience, tagging, or replica_build steps — all consolidated.
#
# Models (all on DeepInfra):
#   Classifier: DI/Qwen/Qwen3-30B-A3B (30B total, 3B active MoE — fast)
#   Embedding:  DI/Qwen/Qwen3-Embedding-0.6B (1024-dim)
#   QA gen:     DI/Qwen/Qwen3-30B-A3B (same model, per-Bloom sampling params)
#
# Concurrency:
#   196 concurrent API calls (DeepInfra ceiling is 200)
#   HTTP pool_max_idle=256 (must be >= concurrency to avoid connection churn)
#   DB pool_size=64 (env: HKASK_DB_POOL_SIZE)
#
# Lessons learned (v5.0 → v6.0):
#   - Dual classifier (4 calls/chunk) was 4x slower with no build-quality benefit
#   - replica_build re-does chunking/tagging/embedding — fully redundant with Phase 2
#   - Qwen3 has thinking mode — JSON extraction must find { ... } in reasoning + JSON
#   - pool_max_idle=5 caused connection churn → Gemma 429/connection errors
#   - LLM may return output as dict {"answer": "..."} instead of string — deserializer
#     must handle both formats

id: capabilities-researcher-pipeline
version: "6.0"
type: pipeline
energy_budget:
  gas_cap: 500000
  rjoule_cap: 5
description: >
  Full corpus pipeline for the Capabilities Researcher persona.
  Single LLM call per chunk for combined ontology tagging + h_mem decimation.
  Produces tagged JSONL reference corpus and replica memory DB with h_mems + embeddings.
  SemDeDup deduplication. Axolotl + PiSSA LoRA training.

env:
  HKASK_EMBEDDING_DIM: "1024"
  HKASK_DB_PASSPHRASE: "hkask-default-passphrase-2024"
  HKASK_DB_POOL_SIZE: "64"
  HKASK_HTTP_POOL_MAX_IDLE: "256"
  HKASK_CLASSIFIER_MODEL_A: "DI/Qwen/Qwen3-30B-A3B"
  HKASK_QA_MODEL: "DI/Qwen/Qwen3-30B-A3B"

steps:
  # ═══════════════════════════════════════════════════════════════════════
  # Phase 0: Raw Files → Extracted Text
  # ═══════════════════════════════════════════════════════════════════════
  - id: extract_text
    description: "Extract text from 106 source files (PDF + HTML)"
    tool: docproc_convert
    params:
      path: "/home/mdz-axolotl/Clones/Library/Researcher"
      output: "corpus/extracted/researcher"
    verify:
      field: total_documents
      min: 80

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 1: Text → Chunks
  # ═══════════════════════════════════════════════════════════════════════
  - id: chunk_all
    description: "Chunk extracted text into ~256-token passages"
    tool: docproc_chunk
    params:
      input_dir: "corpus/extracted/researcher"
      output: "corpus/chunks/chunks.jsonl"
      max_tokens: 256
      overlap_tokens: 64
      entity_ref_prefix: "corpus:researcher"
      # Do NOT set index:true — embedding is done in Phase 2
      # index: true causes redundant embedding during chunking

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 2: Embed + Classify + Decimate (single LLM call per chunk)
  #
  # Produces TWO outputs:
  #   1. corpus/chunks/tagged_ontology.jsonl — JSONL reference corpus
  #   2. corpus/memory/john-brooks.db — replica memory DB (h_mems + embeddings)
  #
  # Uses classify-chunks.j2 combined template (ontology tags + RDF triples
  # in a single JSON response). Single model, 196 concurrency.
  # ═══════════════════════════════════════════════════════════════════════
  - id: embed_classify_decimate
    description: >
      Embed chunks (Qwen3-Embedding-0.6B), classify with combined ontology +
      h_mem extraction (classify-chunks.j2, single LLM call per chunk).
      196 concurrency. Two outputs: tagged JSONL + replica DB.
    tool: corpus_ingest_embed
    params:
      chunks_jsonl: "corpus/chunks/chunks.jsonl"
      output_jsonl: "corpus/chunks/tagged_ontology.jsonl"
      replica_db: "corpus/memory/john-brooks.db"
      replica_name: "john-brooks"
      passphrase: "hkask-default-passphrase-2024"
      batch_size: 50
      concurrency: 196

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 3: Dedup (near-identical chunk removal, cosine > 0.85)
  # ═══════════════════════════════════════════════════════════════════════
  - id: dedup_chunks
    description: "Remove near-identical chunks using embeddings from replica DB"
    tool: docproc_dedup_chunks
    params:
      tagged_jsonl: "corpus/chunks/tagged_ontology.jsonl"
      output: "corpus/chunks/deduped.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      threshold: 0.85

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 4: Consolidate (LLM synthesis of related chunks, cosine > 0.75)
  # ═══════════════════════════════════════════════════════════════════════
  - id: consolidate_chunks
    description: "Cluster related chunks, LLM-synthesize multi-chunk clusters"
    tool: docproc_consolidate_chunks
    params:
      tagged_jsonl: "corpus/chunks/deduped.jsonl"
      output: "corpus/chunks/consolidated.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      threshold: 0.75
      concurrency: 196
      max_chunks_per_cluster: 5

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 5: Build Bloom QA Prompts (5 per chunk, KNN scaffold)
  # ═══════════════════════════════════════════════════════════════════════
  - id: build_prompts
    description: >
      Build Bloom taxonomy prompts: 5 QAs per chunk (factual/conceptual/
      analyze/evaluate/create). KNN scaffold from replica DB embeddings.
      Ontology context in prompt. No qualifying filter — all chunks generate QAs.
    tool: corpus_ingest_build_prompts
    params:
      tagged_jsonl: "corpus/chunks/consolidated.jsonl"
      output: "corpus/qa_pairs/prompts.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 6: Generate QAs (single model, per-Bloom sampling, 196 concurrency)
  #
  # Qwen3-30B-A3B has thinking mode — JSON extraction finds { ... } in
  # reasoning + JSON response. LLM may return output as string or
  # dict {"answer": "..."} — deserializer handles both.
  # ═══════════════════════════════════════════════════════════════════════
  - id: generate_qas
    description: >
      Generate QA pairs via Qwen3-30B-A3B on DeepInfra. Per-Bloom sampling
      parameters. 196 concurrency. Incremental writes every 10 completions.
      Thinking-mode JSON extraction. Flexible output deserialization.
    tool: corpus_ingest_generate_qa
    params:
      prompts_jsonl: "corpus/qa_pairs/prompts.jsonl"
      output: "corpus/qa_pairs/generated.jsonl"
      concurrency: 196

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 7: Ingest QAs (SemDeDup + h_mem storage + QA embeddings)
  # ═══════════════════════════════════════════════════════════════════════
  - id: ingest_qas
    description: >
      SemDeDup (K-means clustering, K=2.5% of N, 10 iterations).
      Deduplicate within clusters at 0.92 cosine threshold.
      Store QA h_mems with 5W1H + Dublin Core + PKO provenance.
      Embed QA vectors for KNN search.
    tool: corpus_ingest_ingest_qa
    params:
      generated_jsonl: "corpus/qa_pairs/generated.jsonl"
      output: "corpus/qa_pairs/train.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      dedup_threshold: 0.92
      embed_qas: true
      dataset: "corpus-researcher"

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 8: Convert to ChatML format for Axolotl training
  # ═══════════════════════════════════════════════════════════════════════
  - id: convert_chatml
    description: >
      Convert training QAs to ChatML messages format with Capabilities
      Researcher system prompt. 80/10/10 train/val/test split.
    tool: script
    params:
      input: "corpus/qa_pairs/train.jsonl"
      output_train: "corpus/qa_pairs/train_chat.jsonl"
      output_val: "corpus/qa_pairs/val_chat.jsonl"
      output_test: "corpus/qa_pairs/test_chat.jsonl"
      train_split: 0.80
      val_split: 0.10
      test_split: 0.10

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 9: LoRA Training (Axolotl + PiSSA on RunPod H100)
  #
  # PiSSA initializes LoRA matrices from principal singular values of
  # the weight matrices, giving better performance than standard LoRA
  # initialization at the same rank.
  #
  # Lessons applied from rust-reasoning config (scripts/axolotl_rust_all.yml):
  #   - peft_init_lora_weights: pissa_niter_4 (correct Axolotl syntax)
  #   - liger_kernel + cut_cross_entropy for fused kernel speedups
  #   - flash_attention: false → SDPA (PyTorch native on H100)
  #   - sample_packing disabled (requires flash-attn for cross-sample masking)
  #   - gradient_checkpointing + grad_accum 16 for memory efficiency
  #   - warmup_steps: 100 (not 672 — too high for 80K dataset)
  #   - learning_rate: 1e-4 (lower works better with PiSSA init)
  #   - strict: false, early_stopping_patience: 25
  # ═══════════════════════════════════════════════════════════════════════
  - id: train_lora
    description: "Train Capabilities Researcher LoRA adapter with PiSSA init"
    tool: axolotl_train
    params:
      config_file: "corpus/lora/axolotl-pissa-config.yaml"
      base_model: "unsloth/Qwen3.6-27B"
      train_path: "corpus/qa_pairs/train_chat.jsonl"
      val_path: "corpus/qa_pairs/val_chat.jsonl"
      hardware:
        gpu: h100
        provider: runpod
      env:
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    requires_consent: true