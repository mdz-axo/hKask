# Capabilities Researcher — Full Pipeline Manifest v5.0
# Traces from raw files through trained LoRA adapter.
#
# Type: PipelineManifest
# Persona: Business and Economics Researcher — Capability-Performance Gap Analysis
# Source: 106 files (PDF + HTML) from Clones/Library/Researcher
# Target: Bloom-balanced QAs for LoRA training + John Brooks style replica
#
# Architecture: Two outputs from the embed step:
#   1. JSONL reference corpus — chunks + ontology tags (tag-chunks.j2 template)
#   2. Replica memory DB — h_mems (decimated triples) + embeddings (extract-hmems.j2 template)
#
# Dual classifier models (both on DeepInfra, 196 concurrency):
#   Model A: DI/Qwen/Qwen3-235B-A22B-Instruct-2507 (primary)
#   Model B: DI/google/gemma-4-26B-A4B-it (secondary)
# Embedding: DI/Qwen/Qwen3-Embedding-0.6B (1024-dim)
# QA generation: DI/zai-org/GLM-5.2

id: capabilities-researcher-pipeline
version: "5.0"
type: pipeline
energy_budget:
  gas_cap: 500000
  rjoule_cap: 5
description: >
  Full corpus pipeline for the Capabilities Researcher persona.
  Produces two separate outputs: a JSONL reference corpus with ontology tags
  and a John Brooks replica memory DB with h_mems and embeddings.
  Dual classifier LLM calls on DeepInfra at 196 concurrency.

steps:
  # ═══════════════════════════════════════════════════════════════════════
  # Phase 0: Raw Files → Extracted Text
  # ═══════════════════════════════════════════════════════════════════════
  - id: extract_text
    description: "Extract text from 106 source files (PDF + HTML)"
    tool: docproc_convert
    params:
      path: "/home/mdz-axolotl/Clones/Library/Researcher"
      output: "corpus/extracted/researcher"
    verify:
      field: total_documents
      min: 80

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 1: Text → Chunks
  # ═══════════════════════════════════════════════════════════════════════
  - id: chunk_all
    description: "Chunk extracted text into ~256-token passages"
    tool: docproc_chunk
    params:
      input_dir: "corpus/extracted/researcher"
      output: "corpus/chunks/chunks.jsonl"
      max_tokens: 256
      overlap_tokens: 64
      entity_ref_prefix: "corpus:researcher"
      index: true

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 2: Embed + Tag + Decimate (dual classifier, high concurrency)
  # Produces TWO outputs:
  #   1. corpus/chunks/tagged_ontology.jsonl — JSONL reference corpus
  #   2. corpus/memory/john-brooks.db — replica memory DB (h_mems + embeddings)
  # ═══════════════════════════════════════════════════════════════════════
  - id: embed_tag_decimate
    description: >
      Embed chunks (Qwen3-Embedding-0.6B), tag with ontology tags (tag-chunks.j2),
      decimate to h_mems (extract-hmems.j2). Dual classifier models A + B on
      DeepInfra at 196 concurrency. Two outputs: tagged JSONL + replica DB.
    tool: corpus_ingest_embed
    params:
      chunks_jsonl: "corpus/chunks/chunks.jsonl"
      output_jsonl: "corpus/chunks/tagged_ontology.jsonl"
      replica_db: "corpus/memory/john-brooks.db"
      replica_name: "john-brooks"
      passphrase: "hkask-default-passphrase-2024"
      batch_size: 50
      concurrency: 196

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 3: Dedup (near-identical chunk removal)
  # ═══════════════════════════════════════════════════════════════════════
  - id: dedup_chunks
    description: "Remove near-identical chunks (cosine > 0.85)"
    tool: docproc_dedup_chunks
    params:
      tagged_jsonl: "corpus/chunks/tagged_ontology.jsonl"
      output: "corpus/chunks/deduped.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      threshold: 0.85

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 4: Consolidate (LLM synthesis of related chunks)
  # ═══════════════════════════════════════════════════════════════════════
  - id: consolidate_chunks
    description: "Cluster related chunks (cosine > 0.75), LLM-synthesize multi-chunk clusters"
    tool: docproc_consolidate_chunks
    params:
      tagged_jsonl: "corpus/chunks/deduped.jsonl"
      output: "corpus/chunks/consolidated.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      threshold: 0.75
      concurrency: 128
      max_chunks_per_cluster: 5

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 5: Build Bloom QA Prompts (5 per chunk, KNN scaffold)
  # ═══════════════════════════════════════════════════════════════════════
  - id: build_prompts
    description: >
      Build Bloom taxonomy prompts: 5 QAs per chunk (factual/conceptual/analyze/evaluate/create).
      KNN scaffold from replica DB embeddings. Ontology context in prompt.
    tool: corpus_ingest_build_prompts
    params:
      tagged_jsonl: "corpus/chunks/consolidated.jsonl"
      output: "corpus/qa_pairs/prompts.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 6: Generate QAs (GLM-5.2, per-Bloom sampling, 128 concurrency)
  # ═══════════════════════════════════════════════════════════════════════
  - id: generate_qas
    description: >
      Generate QA pairs via GLM-5.2 on DeepInfra. Per-Bloom sampling parameters.
      196 concurrency. Incremental writes every 10 completions.
    tool: corpus_ingest_generate_qa
    params:
      prompts_jsonl: "corpus/qa_pairs/prompts.jsonl"
      output: "corpus/qa_pairs/generated.jsonl"
      concurrency: 196

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 7: Ingest QAs (SemDeDup + 5W1H + ontology sidecar)
  # ═══════════════════════════════════════════════════════════════════════
  - id: ingest_qas
    description: "SemDeDup (K-means, K=2.5% of N), store h_mems, embed QA vectors"
    tool: corpus_ingest_ingest_qa
    params:
      generated_jsonl: "corpus/qa_pairs/generated.jsonl"
      output: "corpus/qa_pairs/train.jsonl"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
      dedup_threshold: 0.92
      embed_qas: true
      dataset: "corpus-researcher"

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 8: Replica Build (style centroids from corpus)
  # ═══════════════════════════════════════════════════════════════════════
  - id: build_replica
    description: "Build John Brooks replica centroids from researcher corpus"
    tool: replica_build
    params:
      config_path: "corpus/replica/john-brooks.yaml"
      db_path: "corpus/memory/john-brooks.db"
      passphrase: "hkask-default-passphrase-2024"
    optional: true

  # ═══════════════════════════════════════════════════════════════════════
  # Phase 9: LoRA Training (RunPod + Unsloth + Qwen3.6-27B)
  # ═══════════════════════════════════════════════════════════════════════
  - id: train_lora
    description: "Train Capabilities Researcher LoRA adapter on RunPod"
    tool: training_submit
    params:
      provider: runpod
      base_model: "unsloth/Qwen3.6-27B"
      train_path: "corpus/qa_pairs/train_chat.jsonl"
      val_path: "corpus/qa_pairs/val_chat.jsonl"
      config:
        load_in_4bit: false
        load_in_16bit: true
        full_finetuning: false
        rank: 64
        alpha: 64
        lora_dropout: 0
        target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
        use_gradient_checkpointing: unsloth
        chat_template_kwargs: {"enable_thinking": false, "add_generation_prompt": false}
        learning_rate: 2.0e-4
        epochs: 3
        per_device_train_batch_size: 1
        gradient_accumulation_steps: 4
        max_seq_length: 4096
        warmup_steps: 672
        lr_scheduler_type: cosine
        optim: adamw_8bit
        weight_decay: 0.01
        max_grad_norm: 0.3
        precision: bf16
        eval_steps: 200
        save_steps: 400
        early_stopping_patience: 5
        save_total_limit: 3
        env:
          PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
          HF_DEACTIVATE_ASYNC_LOAD: "1"
    requires_consent: true