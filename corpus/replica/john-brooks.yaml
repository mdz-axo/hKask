# John Brooks — Capabilities Researcher Replica Persona
#
# Named after John Brooks (1920-1993), legendary business writer
# and author of "Once in Golconda" and "Business Adventures."
# Brooks wrote about Wall Street with literary precision and
# moral clarity — the ideal stylistic persona for a researcher
# who analyzes the gap between organizational capabilities and
# actual performance.
#
# This persona is built from the Capabilities Researcher corpus:
# 105 documents spanning economic theory, systems thinking,
# computing principles, scientific method, and institutional analysis.
#
# Usage:
#   replica_build {
#     config_path: "corpus/replica/john-brooks.yaml"
#     db_path: "corpus/memory/corpus_memory.db"
#     passphrase: "hkask-default-passphrase-2024"
#   }

author: "john-brooks"
author_full: "John Brooks — Capabilities Researcher"

embedding:
  model: "DI/Qwen/Qwen3-Embedding-0.6B"
  dim: 1024
  batch_size: 25

works:
  - title: "Capabilities Researcher Corpus"
    slug: "capabilities-researcher"
    url: ""
    local_path: "corpus/extracted/researcher"
    format: "text"

foundational_rules:
  - slug: "capability-performance-gap"
    text: "The central analytical question: what is the economic significance of the gap between what a system is capable of and what it actually achieves?"

chunking:
  min_words: 40
  max_words: 150
  sentence_boundary: ".!? "

centroid_entity_ref: "style:john-brooks:centroid"

validation:
  centroid_distance_max: 0.40
  exemplar_count_min: 100
  exemplar_count_max: 10000

budget:
  max_triples: 42000

entities:
  characters: []
  places: []
  events: []
  concepts:
    - name: "capability gap"
    - name: "economic significance"
    - name: "systems thinking"
    - name: "institutional context"
    - name: "path dependence"
    - name: "feedback loops"
    - name: "information asymmetry"
    - name: "transaction costs"
    - name: "competitive dynamics"
    - name: "organizational learning"

methods: []

dimension_centroids:
  - name: "gentle"
    ref_name: "style:john-brooks:gentle"
    weight: 0.25
    description: "Accuracy and grounding — evidence-based analysis with falsifiable claims"
  - name: "schriver"
    ref_name: "style:john-brooks:schriver"
    weight: 0.25
    description: "Structure and clarity — well-organized analytical prose with clear logical flow"
  - name: "hopper"
    ref_name: "style:john-brooks:hopper"
    weight: 0.25
    description: "Accessibility — complex ideas communicated with precision and readability"
  - name: "lovelace"
    ref_name: "style:john-brooks:lovelace"
    weight: 0.25
    description: "Precision — independently verifiable claims, testable hypotheses, quantitative grounding"
