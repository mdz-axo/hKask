# Axolotl Config — Capabilities Researcher LoRA with PiSSA (direct RunPod pod)
# Copy of axolotl-pissa-config.yaml with the dataset block reconciled for a
# direct `axolotl train` run on a RunPod H100 pod:
#   - single training dataset at /workspace/data/train_chat.jsonl
#   - val split auto-derived via val_set_size (the original yaml listed
#     val_chat.jsonl under `datasets:`, which axolotl treats as TRAINING data,
#     not a held-out val set — removed)
#
# Base: unsloth/Qwen3.6-27B (dense, 27B). PiSSA init from principal singular
# values. 30-50% faster convergence vs random init. lora_dropout: 0 required
# for PiSSA (principal components must not be dropped).

base_model: unsloth/Qwen3.6-27B
adapter: lora
load_in_4bit: false
load_in_8bit: false
trust_remote_code: true

sequence_len: 4096
bf16: true

# PiSSA LoRA — v2: r=32 (was 16) — r=16 is a capacity ceiling for analysis tasks
lora_r: 32
lora_alpha: 64
lora_dropout: 0
peft_init_lora_weights: pissa_niter_4
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

datasets:
  - path: mdz-axo/capabilities-researcher-qa
    data_files: train_chat_full.jsonl
    type: chat_template

# Training
num_epochs: 3
learning_rate: 1e-4
warmup_steps: 100
micro_batch_size: 1
eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
lr_scheduler: cosine
weight_decay: 0.01
max_grad_norm: 0.3
optim: adamw_8bit

# Eval — val auto-split from train (0.0012 ≈ 220 held-out examples)
val_set_size: 0.0012
eval_steps: 200
save_steps: 200
save_total_limit: 5
early_stopping_patience: 25

# Optimizations
liger_kernel: true
flash_attention: false
cut_cross_entropy: true

output_dir: /workspace/outputs
strict: false