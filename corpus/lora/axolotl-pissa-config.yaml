# Axolotl Config — Capabilities Researcher LoRA with PiSSA
# Base: unsloth/Qwen3.6-27B (dense, 27B)
# Training data: ChatML QAs (Capabilities Researcher corpus)
# PiSSA initializes LoRA from principal singular values of weight matrices
#
# Lessons from docs/how-to/axolotl-pissa-runpod-guide.md:
#   - flash_attention: false → SDPA (no flash-attn compile needed)
#   - sample_packing disabled (requires flash-attn for cross-sample masking)
#   - gradient_checkpointing essential for 27B on single H100
#   - eval_batch_size: 1 prevents OOM during eval
#   - early_stopping_patience: 25 (not 7 — cosine LR needs runway)
#   - lora_dropout: 0 required for PiSSA (principal components must not be dropped)
#   - save_total_limit: 5 preserves best checkpoint

base_model: unsloth/Qwen3.6-27B
adapter: lora
load_in_4bit: false
load_in_8bit: false
trust_remote_code: true

sequence_len: 4096
bf16: true

# PiSSA LoRA — SVD-based initialization from principal singular values
# 30-50% faster convergence vs random init. Free lunch (~2 min init).
# v2: r=32 (was 16) — r=16 is a capacity ceiling for analysis tasks
#      (lesson from Axolotl-Partners/rust-adapter-scripts v2 training)
lora_r: 32
lora_alpha: 64
lora_dropout: 0
peft_init_lora_weights: pissa_niter_4
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

datasets:
  # Only the train split goes into the training pool. Axolotl concatenates
  # every entry in this list into the train set and carves validation out of
  # it via `val_set_size` below — listing val_chat.jsonl here would leak the
  # validation set into training. The pipeline's val/test splits (val_chat.jsonl,
  # test_chat.jsonl) are reserved for offline evaluation/holdout, not consumed
  # by Axolotl.
  - path: /workspace/data/train_chat.jsonl
    type: chat_template

# Training
num_epochs: 3
learning_rate: 1e-4
warmup_steps: 100
micro_batch_size: 1
eval_batch_size: 1
gradient_accumulation_steps: 16
gradient_checkpointing: true
lr_scheduler: cosine
weight_decay: 0.01
max_grad_norm: 0.3
optim: adamw_8bit

# Eval
# val_set_size carves a validation split out of the train pool. 0.05 (5%)
# gives a statistically meaningful eval signal regardless of corpus size;
# the previous 0.0012 (0.12%) yielded only a handful of examples and made
# early_stopping_patience act on noise. eval_batch_size stays 1 to avoid OOM
# on long sequences.
val_set_size: 0.05
eval_steps: 200
save_steps: 200
save_total_limit: 5
early_stopping_patience: 25

# Optimizations (from axolotl-pissa-runpod-guide.md)
liger_kernel: true
flash_attention: false
cut_cross_entropy: true

# Output — no hub_model_id (avoids 403 if HF namespace doesn't exist)
output_dir: /workspace/outputs

strict: false