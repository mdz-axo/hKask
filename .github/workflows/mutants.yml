# Mutation testing + deep fuzzing — nightly, also gates release tags.
# Runs at 03:00 UTC daily. Triggered on push of v* tags.
# Deep fuzzing uses libfuzzer (coverage-guided) on nightly toolchain.

name: Mutation + Deep Fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  mutants:
    name: cargo-mutants
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run mutation testing
        run: cargo mutants --workspace --timeout 10

      - name: Suggest fuzz targets from surviving mutants
        if: success()
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        run: cargo mutants --workspace --timeout 10 2>&1 | grep 'Uncaught' | cargo run --bin kask -- qa suggest-fuzz

  deep-fuzz:
    name: Deep Fuzz (libfuzzer)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsqlite3-dev libdbus-1-dev mold clang \
            binutils-dev libunwind-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bolero
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bolero

      - name: Deep fuzz (coverage-guided, 300s per target)
        run: |
          cargo bolero test -p hkask-types-fuzz fuzz_cns_span_parse_never_panics -T 300s -e libfuzzer 2>&1 | tee bolero-deep-output.txt
          cargo bolero test -p hkask-cns-fuzz fuzz_cns_span_parse_never_panics -T 300s -e libfuzzer 2>&1 | tee -a bolero-deep-output.txt
          cargo bolero test -p hkask-inference-fuzz fuzz_provider_id_parse_model -T 300s -e libfuzzer 2>&1 | tee -a bolero-deep-output.txt
        continue-on-error: true

      - name: Triage failures
        if: failure()
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cat bolero-deep-output.txt | cargo run --bin kask -- qa triage

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bolero-deep-output
          path: bolero-deep-output.txt

  exhaustive-fuzz:
    name: Exhaustive Fuzz (all targets)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsqlite3-dev libdbus-1-dev mold clang \
            binutils-dev libunwind-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bolero
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bolero

      - name: Exhaustive fuzz (2 hours)
        run: |
          for target in \
            hkask-types-fuzz::fuzz_queue_depth_never_negative \
            hkask-types-fuzz::fuzz_cns_health_coherence \
            hkask-types-fuzz::fuzz_cns_span_parse_never_panics \
            hkask-types-fuzz::fuzz_cns_span_display_roundtrip \
            hkask-cns-fuzz::fuzz_cns_span_parse_never_panics \
            hkask-cns-fuzz::fuzz_energy_cost_construct \
            hkask-cns-fuzz::fuzz_energy_budget_construct \
            hkask-inference-fuzz::fuzz_model_name_prefix_never_panics \
            hkask-inference-fuzz::fuzz_provider_id_parse_model \
            hkask-inference-fuzz::fuzz_prompt_validation_never_panics; do
            cargo bolero test -p "${target%%::*}" "${target##*::}" -T 600s -e libfuzzer 2>&1 | tee -a bolero-exhaustive-output.txt
          done
        continue-on-error: true

      - name: Triage failures
        if: failure()
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cat bolero-exhaustive-output.txt | cargo run --bin kask -- qa triage

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bolero-exhaustive-output
          path: bolero-exhaustive-output.txt
