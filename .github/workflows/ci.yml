# hKask CI — minimal DAG, toolchain auto-discovered, invariants as single gate
#
# Critical path: fmt → clippy → build → test → invariants (~15 min)
# Heavyweight checks (deny, audit, mutants) moved to scheduled workflows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Stage 1: Fast checks (parallelizable) ──────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Stage 2: Build + lint (depends on fmt) ────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo build --workspace --all-targets

  # ── Stage 3: Test + docs (depends on clippy + build) ─────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo doc --workspace --no-deps

  # ── Stage 4: Invariants gate (single binary replacing all inline grep) ──
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo run --package hkask-ci-invariants -- check
