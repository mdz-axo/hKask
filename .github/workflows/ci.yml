# hKask CI

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsqlite3-dev libdbus-1-dev mold clang

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Doc
        run: cargo doc --workspace --no-deps

  security:
    name: Security Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: No stubs (todo!/unimplemented!)
        run: |
          violations=$(grep -rn 'todo!\|unimplemented!' crates/ mcp-servers/ --include="*.rs" | grep -v '/tests/' || true)
          if [ -n "$violations" ]; then echo "$violations"; echo "FAIL: stubs found — implement or remove"; exit 1; fi
          echo "PASS: no stubs"

      - name: No deprecated annotations
        run: |
          violations=$(grep -rn '#\[deprecated' crates/ mcp-servers/ --include="*.rs" | grep -v '/tests/' || true)
          if [ -n "$violations" ]; then echo "$violations"; echo "FAIL: #[deprecated] found — delete, don't annotate"; exit 1; fi
          echo "PASS: no deprecated"

      - name: No hardcoded secrets
        run: |
          violations=$(grep -rnE '(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)[[:space:]]*=[[:space:]]*"[^"]+"' crates/ mcp-servers/ --include="*.rs" | grep -v '/tests/' | grep -v 'env.example' || true)
          if [ -n "$violations" ]; then echo "$violations"; echo "FAIL: hardcoded secrets — use env vars or keystore"; exit 1; fi
          echo "PASS: no hardcoded secrets"

      - name: Unsafe blocks must have SAFETY comments
        run: |
          failed=0
          while IFS= read -r -d '' file; do
            [[ "$file" == */tests/* || "$file" == *test_* ]] && continue
            while IFS=: read -r line_num _; do
              [ -z "$line_num" ] && continue
              start=$((line_num > 3 ? line_num - 3 : 1))
              if ! sed -n "${start},${line_num}p" "$file" | grep -q 'SAFETY:'; then
                echo "  $file:$line_num — unsafe block missing // SAFETY: comment"
                failed=1
              fi
            done < <(grep -n 'unsafe\s*{\|unsafe\s\+fn' "$file" 2>/dev/null || true)
          done < <(find crates/ mcp-servers/ -name '*.rs' -print0)
          if [ "$failed" -eq 1 ]; then echo "FAIL: unsafe blocks need // SAFETY: comments"; exit 1; fi
          echo "PASS: unsafe blocks documented"

      - name: No visual UI infrastructure
        run: |
          violations=$(grep -rniE 'grafana|prometheus|dashboard|visual.*ui' crates/ mcp-servers/ --include="*.rs" | grep -v '/tests/' || true)
          if [ -n "$violations" ]; then echo "$violations"; echo "FAIL: visual UI references — use CLI/MCP/API only"; exit 1; fi
          echo "PASS: headless"

  deps:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check dependency policy
        run: cargo deny check
