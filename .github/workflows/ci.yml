# hKask CI/CD Pipeline

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  # ============================================================================
  # Format Check
  # ============================================================================
  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"
          components: rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  # ============================================================================
  # Lint Check
  # ============================================================================
  clippy:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: fmt

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ============================================================================
  # Build Check
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: fmt

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Build documentation
        run: cargo doc --workspace --no-deps

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [clippy, build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run integration tests
        run: cargo test --workspace --tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/debug/deps/*.d
          retention-days: 7

  # ============================================================================
  # Cybernetic Unit Tests
  # ============================================================================
  cyber-tests:
    name: Cybernetic Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run cybernetic tests (cyber_ prefix)
        run: |
          cargo test -p hkask-cns cyber_
          cargo test -p hkask-mcp cyber_

  # ============================================================================
  # Security Invariant Verification
  # ============================================================================
  security-invariants:
    name: Security Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: No unwrap on hot paths (CNS, agents)
        run: |
          violations=$(grep -rn "unwrap()" crates/hkask-cns/src/ crates/hkask-agents/src/pod/ --include="*.rs" | grep -v "cfg(test)" | grep -v "test_" || true)
          if [ -n "$violations" ]; then
            echo "SECURITY INVARIANT VIOLATED: unwrap() on hot paths:"
            echo "$violations"
            exit 1
          fi

      - name: No wildcard capabilities
        run: |
          violations=$(grep -rn '"\\*"' crates/ --include="*.rs" | grep -v "cfg(test)" | grep -v "test_" | grep -v "registry.rs" || true)
          if [ -n "$violations" ]; then
            echo "SECURITY INVARIANT VIOLATED: Wildcard capabilities detected:"
            echo "$violations"
            exit 1
          fi

      - name: No hardcoded secrets
        run: |
          violations=$(grep -rn 'OKAPI_DEV_KEY\|password\s*=\s*"' crates/ --include="*.rs" || true)
          if [ -n "$violations" ]; then
            echo "SECURITY INVARIANT VIOLATED: Hardcoded secrets detected:"
            echo "$violations"
            exit 1
          fi

      - name: No todo!/unimplemented! stubs (P6)
        run: |
          violations=$(grep -rn 'todo!\|unimplemented!' crates/ --include="*.rs" | grep -v "cfg(test)" || true)
          if [ -n "$violations" ]; then
            echo "CONSTRAINT P6 VIOLATED: Stubs detected in production code:"
            echo "$violations"
            exit 1
          fi

      - name: No deprecated (P7)
        run: |
          violations=$(grep -rn '#\[deprecated\]' crates/ --include="*.rs" || true)
          if [ -n "$violations" ]; then
            echo "CONSTRAINT P7 VIOLATED: Deprecated code detected:"
            echo "$violations"
            exit 1
          fi

      - name: No visual UI infrastructure
        run: |
          violations=$(grep -r 'grafana\|prometheus\|dashboard\|visual.*ui' crates/ --include="*.rs" --include="*.md" || true)
          if [ -n "$violations" ]; then
            echo "HEADLESS CONSTRAINT VIOLATED: Visual UI references detected:"
            echo "$violations"
            exit 1
          fi

  # ============================================================================
  # Dependency Policy Check
  # ============================================================================
  deps:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check dependency policy
        run: cargo deny check

  # ============================================================================
  # Build Binary (Release)
  # ============================================================================
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test, cyber-tests, security-invariants]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --package hkask-cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kask-binary
          path: target/release/kask
          retention-days: 30
