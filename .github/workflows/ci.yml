# hKask CI — pragmatically lazy parallel pipeline.
#
# Architecture:
#   invariants  ─── parallel, no compilation, <10s
#   lint        ─── parallel, Swatinem cache, ~2 min
#   test        ─── parallel, Swatinem cache, ~5 min
#   unused-deps ─── parallel, nightly, ~1 min
#
# All four jobs run in parallel.  No job dependencies, no build-once
# artifact sharing — that added complexity (15+ min first run on cache
# miss) for marginal gain (~1 min faster on subsequent runs).
#
# Tests are deterministic: integration tests call CuratorSync::tick()
# directly instead of polling a background task.  CNS observer test
# uses Notify instead of sleep.  No timeouts, no flakiness.
#
# Previous design: single sequential job, 12+ min, tests polled with
# 10-60s timeouts.  Non-deterministic failures on CI runners.
#
# This design: ~5 min wall time (max of parallel jobs), deterministic
# tests, fast-fail on invariants in <10s.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cheap checks — no Rust toolchain, fail in <10s ──────────────────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Prohibited visual UI and monitoring infrastructure
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi
      - name: Structured library errors
        run: bash scripts/check-string-errors.sh

  # ── Lint — fmt + clippy, runs in parallel ───────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test — compile + run + skill audit + doc, runs in parallel ──────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Stamp version
        run: bash scripts/ci/stamp-version.sh
      - uses: ./.github/actions/setup-rust
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Test and doctest
        run: cargo test --workspace
      - name: Skill audit
        run: cargo run --bin kask --quiet -- skill audit --fail-below 0.8
      - name: Documentation
        run: cargo doc --workspace --no-deps

  # ── Unused deps — independent nightly check ──────────────────────────────
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install linker and system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="-D unused_crate_dependencies" cargo +nightly check --workspace