# hKask CI — parallel jobs with separate caches to avoid conflicts.
#
# Architecture:
#   invariants  ─── parallel, no compilation, <10s
#   lint        ─── parallel, fmt + clippy, cache-key: clippy
#   test        ─── parallel, cargo test + audit + doc, default cache
#   unused-deps ─── parallel, nightly
#
# CACHE CONFLICT FIX:
#
# The root cause of 15+ min builds was a Swatinem cache conflict: the
# lint job (clippy artifacts) and test job (rustc artifacts) shared one
# cache key. Whichever job saved last overwrote the other's artifacts.
# The test job never got a cache hit — it recompiled from scratch every
# time.
#
# Fix: each compilation job gets its OWN cache key. The lint job uses
# cache-key: "clippy" (clippy-driver artifacts). The test job uses the
# default key (rustc artifacts). They never overwrite each other.
#
# First run: both jobs compile from scratch (~5-7 min each, parallel).
# Subsequent runs: both get cache hits (~2-3 min each, parallel).
# Wall time: max(lint, test) = ~5-7 min cold, ~3-4 min warm.
# Reliably <15 min.
#
# Tests are deterministic: CuratorSync::tick() called directly, CNS
# observer uses Notify. No polling, no timeouts, no flakiness.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cheap checks — no Rust toolchain, fail in <10s ──────────────────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Prohibited visual UI and monitoring infrastructure
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi
      - name: Structured library errors
        run: bash scripts/check-string-errors.sh

  # ── Lint — fmt + clippy, own cache (clippy artifacts) ───────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy
          cache-key: clippy
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test — cargo test + audit + doc, own cache (rustc artifacts) ────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - name: Stamp version
        run: bash scripts/ci/stamp-version.sh
      - uses: ./.github/actions/setup-rust
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Test and doctest
        run: cargo test --workspace
      - name: Skill audit
        run: cargo run --bin kask --quiet -- skill audit --fail-below 0.8
      - name: Documentation
        run: cargo doc --workspace --no-deps

  # ── Unused deps — independent nightly check ──────────────────────────────
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install linker and system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="-D unused_crate_dependencies" cargo +nightly check --workspace