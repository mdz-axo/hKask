# hKask CI — fmt → clippy + unused-deps + build → test + doc → invariants
#
# Clippy (with -D warnings + lint denials) catches: todo!(), unimplemented!(),
# .unwrap(), undocumented unsafe blocks, deprecated usage.
# Unused Deps (nightly -D unused_crate_dependencies) catches dependency drift.
# The invariants grep-only job catches project-specific non-code patterns.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Stage 1: Fast checks ─────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Stage 2: Build + lint (parallel, depends on fmt) ─────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  unused-deps:
    name: Unused Deps
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="-D unused_crate_dependencies" cargo +nightly check --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - run: cargo build --workspace --lib

  # ── Stage 3: Test + doc (depends on clippy + build) ──────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - run: cargo doc --workspace --no-deps

  # ── Stage 4: Structural invariants (grep-only, depends on test) ─────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version from VERSION into all files
        run: bash scripts/ci/stamp-version.sh
      - name: Prohibited visual-UI / monitoring infrastructure (P3 §5)
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets (P3)
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi

  qa-gate:
    name: QA Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker + system deps
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: QA manifest parse + validate
        run: cargo test -p hkask-test-harness -- qa_script::tests::all_real_manifests
      - name: QA end-to-end gates
        run: cargo test -p hkask-test-harness -- qa_script::tests::run_
