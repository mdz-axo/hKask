# hKask CI — fmt → clippy → build → test → doc → invariants
#
# Clippy (with -D warnings + lint denials) catches: todo!(), unimplemented!(),
# .unwrap(), undocumented unsafe blocks, deprecated usage.
# The invariants grep-only job catches project-specific non-code patterns.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Stage 1: Fast checks ─────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Stage 2: Build + lint (parallel, depends on fmt) ─────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo build --workspace --all-targets

  # ── Stage 3: Test + doc (depends on clippy + build) ──────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo doc --workspace --no-deps

  # ── Stage 4: Structural invariants (grep-only, depends on test) ─────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Prohibited visual-UI / monitoring infrastructure (P3 §5)
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' | grep -v '/tests/')
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets (P3)
        run: |
          violations=$(grep -rPni '(?i)(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\s*=\s*"[^"]+"' crates/ --include='*.rs' | grep -v '/tests/')
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi

  # ── Stage 5: Fuzz (property-based, stable Rust, depends on test) ────────
  fuzz:
    name: Fuzz (property)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install bolero system deps
        run: sudo apt-get install -y --no-install-recommends binutils-dev libunwind-dev
      - name: Fuzz (property-based testing)
        run: cargo test -p hkask-types-fuzz -p hkask-cns-fuzz -p hkask-inference-fuzz
      # TODO: Wire kask qa triage after CLI subcommand exists (step 3)
      # - name: Triage failures
      #   if: failure()
      #   env:
      #     DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
      #   run: cargo test ... 2>&1 | kask qa triage
