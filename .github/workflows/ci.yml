# hKask CI — fmt → clippy → build → test → doc → invariants
#
# Clippy (with -D warnings + lint denials) catches: todo!(), unimplemented!(),
# .unwrap(), undocumented unsafe blocks, deprecated usage.
# The invariants grep-only job catches project-specific non-code patterns.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Stage 1: Fast checks ─────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Stage 2: Build + lint (parallel, depends on fmt) ─────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - name: Install linker (mold + clang)
        run: sudo apt-get install -y --no-install-recommends mold clang
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker (mold + clang)
        run: sudo apt-get install -y --no-install-recommends mold clang
      - run: cargo build --workspace --lib

  # ── Stage 3: Test + doc (depends on clippy + build) ──────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker (mold + clang)
        run: sudo apt-get install -y --no-install-recommends mold clang
      - run: cargo test --workspace

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [clippy, build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install linker (mold + clang)
        run: sudo apt-get install -y --no-install-recommends mold clang
      - run: cargo doc --workspace --no-deps

  # ── Stage 4: Structural invariants (grep-only, depends on test) ─────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Prohibited visual-UI / monitoring infrastructure (P3 §5)
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets (P3)
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi

  # ── Stage 5: Fuzz (property-based, stable Rust, depends on test) ────────
  # Split across parallel matrix jobs to stay under timeout while compiling
  # all 20 fuzz targets from scratch (each pulls in the full workspace).
  fuzz:
    name: Fuzz (property)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install bolero system deps
        run: sudo apt-get install -y --no-install-recommends binutils-dev libunwind-dev
      - name: Fuzz group ${{ matrix.group }}
        id: fuzz
        run: |
          case ${{ matrix.group }} in
            1) cargo test -p hkask-types-fuzz -p hkask-cns-fuzz -p hkask-inference-fuzz -p hkask-wallet-fuzz -p hkask-storage-fuzz -p hkask-templates-fuzz -p hkask-memory-fuzz 2>&1 | tee bolero-output-group-${{ matrix.group }}.txt ;;
            2) cargo test -p hkask-services-core-fuzz -p hkask-improv-fuzz -p hkask-mcp-fuzz -p hkask-mcp-kanban-fuzz -p hkask-mcp-communication-fuzz -p hkask-mcp-companies-fuzz -p hkask-mcp-condenser-fuzz 2>&1 | tee bolero-output-group-${{ matrix.group }}.txt ;;
            3) cargo test -p hkask-mcp-docproc-fuzz -p hkask-mcp-media-fuzz -p hkask-mcp-memory-fuzz -p hkask-mcp-replica-fuzz -p hkask-mcp-research-fuzz -p hkask-mcp-training-fuzz 2>&1 | tee bolero-output-group-${{ matrix.group }}.txt ;;
          esac
        continue-on-error: true
      - name: Triage fuzz failures (group ${{ matrix.group }})
        if: steps.fuzz.outcome == 'failure'
        env:
          DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cat bolero-output-group-${{ matrix.group }}.txt | cargo run --bin kask -- qa triage
      - name: Upload fuzz logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bolero-output-group-${{ matrix.group }}
          path: bolero-output-group-${{ matrix.group }}.txt
          retention-days: 7
