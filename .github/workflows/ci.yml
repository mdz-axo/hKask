# hKask CI — pragmatically lazy: build once, test without recompiling.
#
# Architecture:
#   invariants  ──────────────────────────────────────┐  (no compilation, <10s)
#   lint        ───────────────────────────────────────┤  (parallel, ~2 min)
#   unused-deps ───────────────────────────────────────┤  (parallel, ~1 min)
#   build ──→ test ──→ skill-audit ──→ doc             ┘  (build ~3min, test ~30s)
#
# The build job compiles test binaries once (cargo test --no-run) and
# saves target/ via Swatinem/rust-cache with a shared key.  The test job
# (needs build) restores that cache and runs pre-built test binaries —
# zero recompilation.
#
# Lint runs in parallel with build using its own clippy-driver cache
# (different artifacts, can't share with test profile, but clippy is fast).
#
# Tests are deterministic: integration tests call CuratorSync::tick()
# directly instead of polling a background task.  No timeouts, no
# flakiness, no timing dependency.
#
# Previous design: single sequential job, 12+ min per run, tests polled
# for async results with 10-60s timeouts.  Non-deterministic failures
# on CI runners.
#
# This design: ~4 min critical path (build + test), deterministic tests,
# parallel fast-fail on invariants.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cheap checks — no Rust toolchain, fail in <10s ──────────────────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Prohibited visual UI and monitoring infrastructure
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi
      - name: Structured library errors
        run: bash scripts/check-string-errors.sh

  # ── Lint — runs in PARALLEL with build, own clippy cache ───────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Build — compile test binaries once, cache target/ ───────────────────
  # Critical path.  Uses Swatinem/rust-cache with a shared key so the
  # test job (needs build) can restore the pre-compiled target/ directory.
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Stamp version
        run: bash scripts/ci/stamp-version.sh
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: test-profile
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Compile test binaries
        run: cargo test --workspace --no-run

  # ── Test — restores pre-built target/, runs tests, no recompilation ─────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: test-profile
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Run tests
        run: cargo test --workspace
      - name: Skill audit
        run: cargo run --bin kask --quiet -- skill audit --fail-below 0.8
      - name: Documentation
        run: cargo doc --workspace --no-deps

  # ── Unused deps — independent nightly check, unchanged ──────────────────
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install linker and system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="-D unused_crate_dependencies" cargo +nightly check --workspace