# hKask CI/CD Pipeline

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  # ============================================================================
  # Format Check
  # ============================================================================
  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"
          components: rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

  # ============================================================================
  # Lint Check
  # ============================================================================
  clippy:
    name: Linting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: fmt

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ============================================================================
  # Build Check
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: fmt

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Build documentation
        run: cargo doc --workspace --no-deps

  # ============================================================================
  # Unit Tests
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [clippy, build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run integration tests
        run: cargo test --workspace --tests

      - name: Run doctests
        run: cargo test --workspace --doc

      - name: Upload test binary metadata
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-failure-logs
          path: |
            target/debug/deps/*.log
            target/debug/.fingerprint/
          retention-days: 3

  # ============================================================================
  # Cybernetic Unit Tests
  # ============================================================================
  cyber-tests:
    name: Cybernetic Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [clippy, build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Run cybernetic tests (cyber_ prefix)
        run: |
          cargo test -p hkask-cns cyber_
          cargo test -p hkask-mcp cyber_
          cargo test -p hkask-memory cyber_

  # ============================================================================
  # Security Invariant Verification
  # ============================================================================
  security-invariants:
    name: Security Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: No unwrap on hot paths (CNS, agents)
        run: bash scripts/check-unwrap-hotpaths.sh

      - name: No wildcard capabilities
        run: |
          # Find "*" usage in capability/token context (excl. CapabilityChecker authority,
          # boundary-matching checks, enforcement rejections, and test code)
          violations=$(grep -rnF '"*"' crates/ --include="*.rs" \
            | grep -v "cfg(test)" | grep -v "test_" | grep -v "// REQ:" \
            | grep -v "registry.rs" | grep -v "checker.rs" | grep -v "register_agent" | grep -v 'vec!["' \
            | grep -v "verification.rs" \
            | grep -v '== "\*"' | grep -v '!= "\*"' \
            | grep -v 'Wildcard' | grep -v 'Err(' \
            | grep -v '"\*",$' || true)
          if [ -n "$violations" ]; then
            echo "SECURITY INVARIANT VIOLATED: Wildcard capabilities detected:"
            echo "$violations"
            exit 1
          fi

      - name: No hardcoded secrets
        run: |
          violations=$(grep -rn 'FW_API_KEY[[:space:]]*=[[:space:]]*"\|DI_API_KEY[[:space:]]*=[[:space:]]*"\|password[[:space:]]*=[[:space:]]*"' crates/ --include="*.rs" || true)
          if [ -n "$violations" ]; then
            echo "SECURITY INVARIANT VIOLATED: Hardcoded secrets detected:"
            echo "$violations"
            exit 1
          fi

      - name: No todo!/unimplemented! stubs (P6)
        run: |
          violations=$(grep -rn 'todo!\|unimplemented!' crates/ --include="*.rs" | grep -v "cfg(test)" || true)
          if [ -n "$violations" ]; then
            echo "CONSTRAINT P6 VIOLATED: Stubs detected in production code:"
            echo "$violations"
            exit 1
          fi

      - name: No deprecated (P7)
        run: |
          violations=$(grep -rn '#\[deprecated\]' crates/ --include="*.rs" || true)
          if [ -n "$violations" ]; then
            echo "CONSTRAINT P7 VIOLATED: Deprecated code detected:"
            echo "$violations"
            exit 1
          fi

      - name: No undocumented unsafe blocks
        run: bash scripts/check-unsafe.sh

      - name: Public seam inventory check (P8 traceability)
        run: bash scripts/audit/public-seam-inventory.sh

      - name: No visual UI infrastructure
        run: |
          violations=$(grep -r 'grafana\|prometheus\|dashboard\|visual.*ui' crates/ --include="*.rs" || true)
          if [ -n "$violations" ]; then
            echo "HEADLESS CONSTRAINT VIOLATED: Visual UI references detected:"
            echo "$violations"
            exit 1
          fi

      - name: Contract coverage trend (Testing Discipline §9.2)
        run: |
          pub_fns=$(grep -rn "pub fn\|pub async fn" crates/ mcp-servers/ --include="*.rs" | grep -v "cfg(test)" | grep -v "/tests/" | wc -l)
          contracted=$(grep -rn "// REQ:.*pre:" crates/ mcp-servers/ --include="*.rs" | wc -l)
          echo "Contract coverage: $contracted / $pub_fns public functions"
          echo "Target: increasing over time (currently ~0%, warning-only gate)"
          # Warning-only: exit 0 always. Becomes hard gate when baseline > 50%.
          exit 0

  # ============================================================================
  # Quality Gates — Wave 6 Sustainment (regression prevention)
  # ============================================================================
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run all quality gates
        run: bash scripts/ci-quality-gates.sh

  # ============================================================================
  # Dependency Policy Check
  # ============================================================================
  deps:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check dependency policy
        run: cargo deny check

  # ============================================================================
  # Build Binary (Release)
  # ============================================================================
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [test, cyber-tests, security-invariants, quality-gates]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --package hkask-cli

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kask-binary
          path: target/release/kask
          retention-days: 30
