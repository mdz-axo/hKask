# hKask CI — pragmatically lazy: one compilation cache, no conflicts.
#
# Architecture:
#   invariants  ─── parallel, no compilation, <10s
#   ci          ─── fmt → clippy → test → audit → doc → grep checks
#   unused-deps ─── parallel, nightly
#
# WHY ONE JOB FOR CLIPPY + TEST:
#
# Clippy and rustc produce different artifacts in target/. In a parallel
# design, the lint job's Swatinem cache OVERWRITES the test job's cache.
# The test job never gets a cache hit — it recompiles from scratch every
# time (15+ min).
#
# In a single job, both clippy and rustc artifacts coexist in the same
# target/ directory. Swatinem caches the entire target/. Both sets of
# artifacts are preserved across runs. Both get cache hits.
#
# Timeline with warm cache:
#   fmt:           instant
#   clippy:        ~2 min (recompile changed workspace crates with clippy)
#   test:          ~2 min (recompile changed workspace crates with rustc)
#   test execution: ~30s (deterministic — direct tick, no polling)
#   audit + doc:   ~1 min
#   grep checks:   ~10s
#   Total:         ~5-6 min
#
# Timeline cold (no cache):
#   clippy:        ~5 min (full compile)
#   test:          ~5 min (full recompile with rustc)
#   Total:         ~10-12 min
#
# Both are reliably <15 min.
#
# Tests are deterministic: CuratorSync::tick() called directly, CNS
# observer uses Notify. No polling, no timeouts, no flakiness.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cheap checks — no Rust toolchain, fail in <10s ──────────────────────
  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - name: Prohibited visual UI and monitoring infrastructure
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi
      - name: Structured library errors
        run: bash scripts/check-string-errors.sh

  # ── Main: fmt + clippy + test + audit + doc + grep invariants ───────────
  # Single job so clippy and rustc artifacts share one target/ directory
  # and one Swatinem cache. No cache conflicts between parallel jobs.
  ci:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Stamp version
        run: bash scripts/ci/stamp-version.sh
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy
      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test and doctest
        run: cargo test --workspace
      - name: Skill audit
        run: cargo run --bin kask --quiet -- skill audit --fail-below 0.8
      - name: Documentation
        run: cargo doc --workspace --no-deps
      - name: Prohibited visual UI and monitoring infrastructure
        run: |
          violations=$(grep -rPni '(?i)grafana|prometheus|dashboard|visual[\s.]*ui' crates/ --include='*.rs' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Visual UI/monitoring infrastructure prohibited — headless system only (P3 §5)"
            exit 1
          fi
      - name: Hardcoded secrets
        run: |
          violations=$(grep -rPni '(?i)\b(api[_-]?key|api[_-]?secret|password|token|private[_-]?key)\b\s*=\s*"[^"]+"' crates/ --include='*.rs' --exclude-dir=tests 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Hardcoded secrets found — use env vars or keystore"
            exit 1
          fi
      - name: Structured library errors
        run: bash scripts/check-string-errors.sh

  # ── Unused deps — independent nightly check ──────────────────────────────
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install linker and system dependencies
        run: sudo apt-get install -y --no-install-recommends mold clang libdbus-1-dev libsqlite3-dev libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: RUSTFLAGS="-D unused_crate_dependencies" cargo +nightly check --workspace