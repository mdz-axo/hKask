# hKask Documentation

name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  docs:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.91"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libsqlite3-dev libdbus-1-dev mold clang

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Generate documentation
        run: cargo doc --workspace --no-deps

      - name: Add redirect to docs index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=hkask_types/index.html">' > target/doc/index.html

      - name: Check documentation links
        run: bash docs/ci/check-links.sh
