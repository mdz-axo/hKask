# hKask Documentation — toolchain auto-discovered

name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Generate documentation
        run: cargo doc --workspace --no-deps

      - name: Add redirect to docs index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=hkask_types/index.html">' > target/doc/index.html

      - name: Check documentation links
        run: bash docs/ci/check-links.sh
