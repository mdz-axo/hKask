# hKask Documentation — toolchain auto-discovered

name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "mcp-servers/**"
      - "docs/**"
      - "README.md"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust

      - name: Install linker (mold + clang)
        run: sudo apt-get install -y --no-install-recommends mold clang

      - name: Generate documentation
        run: cargo doc --workspace --no-deps

      - name: Add redirect to docs index
        run: |
          echo '<meta http-equiv="refresh" content="0; url=hkask_types/index.html">' > target/doc/index.html

      - name: Check documentation links
        run: bash docs/ci/check-links.sh

      - name: Verify documentation-code consistency (S3)
        run: bash docs/ci/verify-docs.sh
