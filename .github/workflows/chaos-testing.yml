# hKask Chaos Testing CI/CD Pipeline

name: Chaos Testing

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'hkask-testing/**'
      - 'scripts/chaos-injection.sh'
      - '.github/workflows/chaos-testing.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'hkask-testing/**'
      - 'scripts/chaos-injection.sh'
      - '.github/workflows/chaos-testing.yml'
  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run (all, instance, network, resource, circuit, retry)'
        required: false
        default: 'all'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Unit Tests with Chaos/Resilience Focus
  # ============================================================================
  chaos-unit-tests:
    name: Chaos Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: rustfmt, clippy
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Run cargo fmt
        run: cargo fmt --check
      
      - name: Run cargo clippy
        run: cargo clippy --workspace -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace --lib
      
      - name: Run resilience tests
        run: cargo test --package hkask-ensemble --lib resilience
      
      - name: Run failover tests
        run: cargo test --package hkask-ensemble --lib failover
      
      - name: Run circuit breaker tests
        run: cargo test --package hkask-ensemble --lib circuit_breaker

  # ============================================================================
  # Integration Tests with Mock Okapi
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: chaos-unit-tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Run integration tests
        env:
          HKASK_TEST_MODE: "integration"
        run: cargo test --package hkask-testing --test '*' -- --nocapture
      
      - name: Run chaos injection tests (requires Okapi)
        if: github.event_name == 'schedule' || github.event.inputs.test_category != ''
        run: |
          chmod +x scripts/chaos-injection.sh
          ./scripts/chaos-injection.sh ${{ github.event.inputs.test_category || 'all' }} || echo "::warning::Chaos injection tests require live Okapi instances (self-hosted runner)"
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-test-results
          path: |
            chaos_injection_*.log
          retention-days: 30

  # ============================================================================
  # Daily Chaos Tests (Scheduled - Self-Hosted)
  # ============================================================================
  daily-chaos-tests:
    name: Daily Chaos Tests
    runs-on: self-hosted
    timeout-minutes: 120
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_category == 'all')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev \
            stress-ng \
            iperf3 \
            tc \
            jq
      
      - name: Build test harness
        run: cargo build --package hkask-testing --release
      
      - name: Run instance failure tests
        run: |
          chmod +x scripts/chaos-injection.sh
          ./scripts/chaos-injection.sh 1.1
          ./scripts/chaos-injection.sh 1.2

      - name: Run network partition tests
        run: |
          ./scripts/chaos-injection.sh 2.1
          ./scripts/chaos-injection.sh 2.2

      - name: Run resource exhaustion tests
        run: |
          ./scripts/chaos-injection.sh 3.1

      - name: Run circuit breaker tests
        run: |
          ./scripts/chaos-injection.sh 4.1
          ./scripts/chaos-injection.sh 4.2

      - name: Run retry policy tests
        run: |
          ./scripts/chaos-injection.sh 5.1
          ./scripts/chaos-injection.sh 5.2
      
      - name: Generate test report
        run: |
          echo "# Chaos Test Report" > report.md
          echo "Date: $(date)" >> report.md
          echo "Run ID: ${{ github.run_id }}" >> report.md
          echo "Branch: ${{ github.ref_name }}" >> report.md
          echo "" >> report.md
          echo "## Test Results" >> report.md
          if [ -f chaos_injection_*.log ]; then
            cat chaos_injection_*.log >> report.md
          else
            echo "No log files generated" >> report.md
          fi
          
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-chaos-report
          path: report.md
          retention-days: 90

  # ============================================================================
  # Weekly Full Chaos Suite (Scheduled - Self-Hosted)
  # ============================================================================
  weekly-chaos-suite:
    name: Weekly Full Chaos Suite
    runs-on: self-hosted
    timeout-minutes: 180
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libclang-dev \
            llvm-dev \
            cmake \
            protobuf-compiler \
            libprotobuf-dev \
            libzstd-dev \
            stress-ng \
            iperf3 \
            tc \
            jq
      
      - name: Build test harness
        run: cargo build --package hkask-testing --release
      
      - name: Run full chaos suite
        run: |
          chmod +x scripts/chaos-injection.sh
          ./scripts/chaos-injection.sh all
      
      - name: Create weekly report
        run: |
          echo "# Weekly Chaos Engineering Report" > weekly_report.md
          echo "Week: $(date +%Y-W%V)" >> weekly_report.md
          echo "Run ID: ${{ github.run_id }}" >> weekly_report.md
          echo "" >> weekly_report.md
          echo "## Summary" >> weekly_report.md
          echo "- Duration: ~3 hours" >> weekly_report.md
          echo "" >> weekly_report.md
          echo "## Test Logs" >> weekly_report.md
          if [ -f chaos_injection_*.log ]; then
            echo "See attached log files" >> weekly_report.md
          else
            echo "No log files generated" >> weekly_report.md
          fi
          echo "" >> weekly_report.md
          echo "## Recommendations" >> weekly_report.md
          echo "- Review any failed tests" >> weekly_report.md
          echo "- Check circuit breaker metrics" >> weekly_report.md
          echo "- Verify retry policies are working" >> weekly_report.md
      
      - name: Upload weekly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-chaos-suite
          path: |
            weekly_report.md
            chaos_injection_*.log
          retention-days: 90
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly chaos suite failed. Check logs for details."
