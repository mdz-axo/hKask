# hKask Chaos Testing CI/CD Pipeline

name: Chaos Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run (all, instance, network, resource, circuit, retry)'
        required: false
        default: 'all'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run cargo fmt
        run: cargo fmt --check
      
      - name: Run cargo clippy
        run: cargo clippy --workspace -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace --lib
      
      - name: Run resilience tests
        run: cargo test --package hkask-ensemble resilience
      
      - name: Run multi-Okapi tests
        run: cargo test --package hkask-ensemble multi_okapi

  # ============================================================================
  # Integration Tests (Self-Hosted with Okapi)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: self-hosted
    timeout-minutes: 60
    needs: unit-tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    
    services:
      okapi-1:
        image: mdz-axolotl/okapi:latest
        ports:
          - 11435:11435
        options: >-
          --name okapi-1
          --health-cmd "curl -f http://localhost:11435/api/engine/status || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      
      okapi-2:
        image: mdz-axolotl/okapi:latest
        ports:
          - 11436:11435
        options: >-
          --name okapi-2
      
      okapi-3:
        image: mdz-axolotl/okapi:latest
        ports:
          - 11437:11435
        options: >-
          --name okapi-3
      
      prometheus:
        image: prom/prometheus:latest
        ports:
          - 9090:9090
        volumes:
          - ./prometheus.yml:/etc/prometheus/prometheus.yml
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
      
      - name: Wait for Okapi instances
        run: |
          echo "Waiting for Okapi instances to be healthy..."
          for i in {1..30}; do
            if curl -f http://localhost:11435/api/engine/status && \
               curl -f http://localhost:11436/api/engine/status && \
               curl -f http://localhost:11437/api/engine/status; then
              echo "All Okapi instances are healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Okapi instances failed to become healthy"
          exit 1
      
      - name: Run integration tests
        env:
          OKAPI_E2E_TEST: "1"
          OKAPI_BASE_URL: "http://localhost:11435"
        run: cargo test --package hkask-testing --test chaos_integration -- --nocapture
      
      - name: Run chaos injection tests
        run: |
          chmod +x scripts/chaos-injection.sh
          ./scripts/chaos-injection.sh all
      
      - name: Collect metrics
        run: |
          curl -s http://localhost:9090/api/v1/query?query=hkask_circuit_breaker_state > metrics_circuit_breaker.json
          curl -s http://localhost:9090/api/v1/query?query=hkask_okapi_instances_healthy > metrics_instances.json
      
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-test-results
          path: |
            chaos_injection_*.log
            metrics_*.json
          retention-days: 30

  # ============================================================================
  # Daily Chaos Tests (Scheduled)
  # ============================================================================
  daily-chaos-tests:
    name: Daily Chaos Tests
    runs-on: self-hosted
    timeout-minutes: 120
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_category == 'all')
    
    services:
      okapi-cluster:
        image: mdz-axolotl/okapi:latest
        ports:
          - 11435:11435
          - 11436:11435
          - 11437:11435
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stress-ng iperf3
      
      - name: Run instance failure tests
        run: |
          ./scripts/chaos-injection.sh 1.1
          ./scripts/chaos-injection.sh 1.2
      
      - name: Run network partition tests
        run: |
          ./scripts/chaos-injection.sh 2.1
          ./scripts/chaos-injection.sh 2.2
      
      - name: Run resource exhaustion tests
        run: |
          ./scripts/chaos-injection.sh 3.1
      
      - name: Run circuit breaker tests
        run: |
          ./scripts/chaos-injection.sh 4.1
          ./scripts/chaos-injection.sh 4.2
      
      - name: Run retry policy tests
        run: |
          ./scripts/chaos-injection.sh 5.1
          ./scripts/chaos-injection.sh 5.2
      
      - name: Generate test report
        run: |
          echo "# Chaos Test Report" > report.md
          echo "Date: $(date)" >> report.md
          echo "Run ID: ${{ github.run_id }}" >> report.md
          echo "" >> report.md
          echo "## Test Results" >> report.md
          cat chaos_injection_*.log >> report.md
          
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-chaos-report
          path: report.md
          retention-days: 90

  # ============================================================================
  # Weekly Full Chaos Suite
  # ============================================================================
  weekly-chaos-suite:
    name: Weekly Full Chaos Suite
    runs-on: self-hosted
    timeout-minutes: 180
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0'
    
    services:
      okapi-cluster:
        image: mdz-axolotl/okapi:latest
        ports:
          - 11435:11435
          - 11436:11435
          - 11437:11435
      
      prometheus:
        image: prom/prometheus:latest
        ports:
          - 9090:9090
      
      grafana:
        image: grafana/grafana:latest
        ports:
          - 3000:3000
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y stress-ng iperf3 tc
      
      - name: Run full chaos suite
        run: |
          ./scripts/chaos-injection.sh all
      
      - name: Export Grafana dashboards
        run: |
          curl -s http://localhost:3000/api/dashboards/db/hkask-okapi-cluster > grafana_dashboard.json
      
      - name: Export Prometheus metrics
        run: |
          curl -s 'http://localhost:9090/api/v1/query_range?query=hkask_circuit_breaker_state&start=$(date -d "2 hours ago" +%s)&end=$(date +%s)&step=15' > prometheus_metrics.json
      
      - name: Create weekly report
        run: |
          echo "# Weekly Chaos Engineering Report" > weekly_report.md
          echo "Week: $(date +%Y-W%V)" >> weekly_report.md
          echo "" >> weekly_report.md
          echo "## Summary" >> weekly_report.md
          echo "- Total tests run: 10" >> weekly_report.md
          echo "- Duration: ~3 hours" >> weekly_report.md
          echo "" >> weekly_report.md
          echo "## Metrics" >> weekly_report.md
          echo "### Circuit Breaker Events" >> weekly_report.md
          cat prometheus_metrics.json | jq '.data.result[0].values | length' >> weekly_report.md
          echo "" >> weekly_report.md
          echo "## Artifacts" >> weekly_report.md
          echo "- Test logs: chaos_injection_*.log" >> weekly_report.md
          echo "- Grafana dashboard: grafana_dashboard.json" >> weekly_report.md
          echo "- Prometheus metrics: prometheus_metrics.json" >> weekly_report.md
      
      - name: Upload weekly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-chaos-suite
          path: |
            weekly_report.md
            grafana_dashboard.json
            prometheus_metrics.json
            chaos_injection_*.log
          retention-days: 90
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Weekly chaos suite failed. Check logs for details."

  # ============================================================================
  # Metrics Dashboard Update
  # ============================================================================
  update-metrics:
    name: Update Metrics Dashboard
    runs-on: ubuntu-latest
    needs: [integration-tests, daily-chaos-tests]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: chaos-test-results
          path: ./results
      
      - name: Parse test results
        run: |
          echo "Parsing test results..."
          if [ -f results/chaos_injection_*.log ]; then
            passed=$(grep -c "✓" results/chaos_injection_*.log || echo 0)
            failed=$(grep -c "✗" results/chaos_injection_*.log || echo 0)
            echo "Tests passed: $passed"
            echo "Tests failed: $failed"
            echo "passed=$passed" >> $GITHUB_ENV
            echo "failed=$failed" >> $GITHUB_ENV
          fi
      
      - name: Update dashboard status
        run: |
          echo "Updating metrics dashboard with latest results..."
          # In production, this would update Grafana annotations or send to a metrics endpoint
