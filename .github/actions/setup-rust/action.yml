name: Setup Rust
description: Install Rust toolchain with caching and optional components/targets

inputs:
  components:
    description: Comma-separated list of rustup components to install
    required: false
    default: ""
  targets:
    description: Comma-separated list of target triples to install
    required: false
    default: ""
  cache-key:
    description: Extra cache key suffix (e.g., target triple)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: "1.91"
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
