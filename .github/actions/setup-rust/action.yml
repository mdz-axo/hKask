name: Setup Rust
description: "Install Rust toolchain (auto-discovered from rust-toolchain.toml), system deps, and cache"

inputs:
  components:
    description: "Additional rustup components (comma-separated)"
    required: false
    default: ""
  targets:
    description: "Additional compilation targets"
    required: false
    default: ""
  cache-key:
    description: "Extra cache key suffix"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Read toolchain
      id: toolchain
      shell: bash
      run: |
        channel=$(sed -n 's/.*channel\s*=\s*"\([^"]*\)".*/\1/p' rust-toolchain.toml || echo "stable")
        echo "channel=$channel" >> $GITHUB_OUTPUT

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ steps.toolchain.outputs.channel }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          pkg-config libssl-dev libsqlite3-dev libdbus-1-dev mold clang

    - name: Cache cargo registry
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key }}
