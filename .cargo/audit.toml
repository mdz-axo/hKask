# cargo-audit configuration for hKask
#
# The two vulnerabilities below are in transitive dependencies of
# solana-sdk v2.x (optional, feature-gated behind `solana` feature).
# solana-signature pins ed25519-dalek v1.x and curve25519-dalek v3.x.
# These cannot be upgraded without a breaking solana-sdk migration.
#
# Risk assessment:
#   - RUSTSEC-2024-0344 (curve25519-dalek): timing side-channel in Scalar
#     subtraction. hKask does not perform Scalar arithmetic directly;
#     this is internal to ed25519-dalek signature verification used by
#     solana-sdk for transaction signing. Exploitation requires local
#     timing measurement of signature operations.
#   - RUSTSEC-2022-0093 (ed25519-dalek): double public key signing oracle
#     attack. Requires attacker-controlled key derivation paths. hKask
#     uses ed25519 for WebID-based agent identity, not user-supplied
#     derivation paths. Solana transaction signing uses fixed keypairs.
#
# These advisories are suppressed until solana-sdk migrates to
# ed25519-dalek >=2 (tracked in solana-labs/solana).

[advisories]
ignore = [
    "RUSTSEC-2024-0344",  # curve25519-dalek <4.1.3 (via solana-signature)
    "RUSTSEC-2022-0093",  # ed25519-dalek <2 (via solana-signature)
]
