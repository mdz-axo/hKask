# Skill Maintenance Batch Bundle
# Composes auditing, simplification, and review for bulk skill corpus maintenance.
# Target: 33 agent-facing skills (excludes logo-builder, dokkodo-mindset — just created)

bundle:
  name: skill-maintenance-batch
  version: 1.0.0
  description: >
    Systematic audit of the hKask skill corpus. Applies registry-first maintenance
    (skill-maintenance), behavioral guardrails (coding-guidelines), existence
    challenges (essentialist), template logic audits (skill-logic-audit), and
    output self-critique (review). Produces health scores, cleanup directives,
    and deprecation recommendations.

skills:
  - name: coding-guidelines
    polarity: regulative
    phase: post-core
    cascade_order: 3
    rationale: >
      Constrains all output to be surgical, simple, and goal-driven.
      Prevents over-engineering of maintenance fixes.

  - name: skill-maintenance
    polarity: procedural
    phase: core
    cascade_order: 1
    rationale: >
      Defines the registry-first audit procedure: manifest validation,
      .j2 contract checks, FlowDef tool validation, SKILL.md companion
      verification, health scoring.

  - name: essentialist
    polarity: evaluative
    phase: post-core
    cascade_order: 4
    rationale: >
      After skills are scored, challenges each low-scoring skill's existence.
      Applies deletion test: can the skill be deleted without losing capability?
      Recommends merge, deprecation, or retirement.

  - name: review
    polarity: evaluative
    phase: post-core
    cascade_order: 5
    rationale: >
      Self-critiques the consolidated audit output for contradictions,
      unsupported claims, and confidence calibration before finalization.

  - name: skill-logic-audit
    polarity: evaluative
    phase: post-core
    cascade_order: 2
    rationale: >
      Adversarial critique of each skill's .j2 template logic.
      Detects redundancy, ambiguity, inefficiency. Proposes concrete revisions.
      Runs after skill-maintenance identifies candidates but before essentialist
      challenges existence.

conflicts:
  - skills: [essentialist, review]
    resolution: domain-separation
    note: >
      Essentialist challenges skill existence; review critiques output quality.
      Different targets — no conflict.

  - skills: [essentialist, skill-logic-audit]
    resolution: domain-separation
    note: >
      Essentialist operates at module level (should this skill exist?);
      skill-logic-audit operates at template level (is this .j2 sound?).
      Complementary — skill-logic-audit informs essentialist decisions.

  - skills: [skill-maintenance, skill-logic-audit]
    resolution: phase-separation
    note: >
      skill-maintenance scores and identifies candidates (core phase);
      skill-logic-audit deep-dives into flagged templates (post-core phase).
      Sequential — no conflict.

complementarities:
  - skills: [skill-maintenance, skill-logic-audit]
    leveraged: >
      skill-maintenance identifies stale templates; skill-logic-audit provides
      concrete revision proposals for those templates. Together they produce
      actionable fixes, not just scores.

  - skills: [essentialist, review]
    leveraged: >
      Essentialist proposes deletions/deprecations; review validates the
      reasoning and catches premature or overzealous pruning.

convergence:
  criterion: >
    All 33 target skills have audit scores; all skills scoring < 0.5 have
    concrete remediation steps or deprecation rationale; no contradictory
    recommendations between essentialist and review passes.

execution:
  strategy: parallel-batch
  batches:
    batch-1-core-dev:
      - coding-guidelines
      - deep-module
      - diagnose
      - refactor-service-layer
      - improve-codebase-architecture
      - tdd
      - rust-expertise
      - strangler-fig
    batch-2-meta-skills:
      - skill-bundler
      - skill-discovery
      - skill-logic-audit
      - skill-maintenance
      - skill-manager
      - skill-translator
      - document-update
      - zoom-out
    batch-3-pragmatics:
      - pragmatic-cybernetics
      - pragmatic-laziness
      - pragmatic-semantics
      - constraint-forces
      - essentialist
      - review
      - self-critique-revision
      - caveman
    batch-4-kata-coaching:
      - kata
      - kata-coaching
      - kata-improvement
      - kata-starter
      - grill-me
      - improv
      - handoff
      - condenser-continuation
      - magna-carta-verifier
