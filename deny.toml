# hKask — cargo-deny configuration for supply-chain audit
# REQ: SHOULD-5 — cargo-deny in CI for dependency license and security auditing
#
# Run: cargo deny check

[graph]
all-features = true
no-default-features = false

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained but has no safe upgrade; transitive dep of utoipa-axum" },
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 is unmaintained; transitive dep of aquamarine→matrix-sdk→hkask-communication; no safe upgrade" },
    { id = "RUSTSEC-2024-0344", reason = "curve25519-dalek <4.1.3 via solana-signature (optional, feature-gated); hKask does not perform Scalar arithmetic directly" },
    { id = "RUSTSEC-2022-0093", reason = "ed25519-dalek <2 via solana-signature (optional, feature-gated); hKask uses ed25519 for WebID identity, not user-supplied derivation paths" },
    { id = "RUSTSEC-2024-0375", reason = "atty is unmaintained; stale lockfile entry, not in active dependency tree" },
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x is unmaintained; transitive dep of solana-sdk (optional, feature-gated)" },
    { id = "RUSTSEC-2024-0388", reason = "derivative is unmaintained; transitive proc-macro dep, no safe upgrade" },
    { id = "RUSTSEC-2025-0161", reason = "libsecp256k1 is unmaintained; transitive dep of solana-sdk (optional, feature-gated)" },
]

[licenses]
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = [
    { crate = "ring", allow = ["ISC", "MIT", "OpenSSL"] },
]

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "warn"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [
    { crate = "libsodium", reason = "wallet spec §4.5: use RustCrypto crates" },
    { crate = "libsodium-sys", reason = "wallet spec §4.5: use RustCrypto crates" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
