# CNS Ports — Hexagonal Architecture Definition
# ℏKask v0.27.0 — Cybernetic Nervous System port definitions
#
# Second consumer for registry/ports/ (P1: no directory without ≥2 consumers).
# Kata ports are the first consumer (kata-ports.yaml).

ports:
  # Inbound Ports (requests into CNS)
  inbound:
    - port: cns:health
      description: Query CNS health status (variety, alerts, thresholds)
      handler: CnsRuntime::health
      output_schema:
        type: object
        properties:
          healthy:
            type: boolean
          variety_deficit:
            type: integer
          alert_count:
            type: integer
          critical_count:
            type: integer

    - port: cns:alerts
      description: Retrieve current algedonic alerts
      handler: CnsRuntime::alerts
      output_schema:
        type: array
        items:
          type: object
          properties:
            domain:
              type: string
            severity:
              type: string
              enum: [Warning, Critical]
            deficit:
              type: integer
            threshold:
              type: integer

    - port: cns:variety
      description: Query variety counts across all monitored domains
      handler: CnsRuntime::variety
      output_schema:
        type: array
        items:
          type: object
          properties:
            domain:
              type: string
            count:
              type: integer

    - port: cns:increment-variety
      description: Increment variety counter and trigger threshold check
      handler: CnsRuntime::increment_variety
      input_schema:
        type: object
        properties:
          domain:
            type: string
          state_name:
            type: string
      side_effects:
        - algedonic_threshold_check
        - observer_notification
        - critical_depletion_emission

    - port: cns:calibrate
      description: Adjust expected variety threshold for a domain
      handler: CnsRuntime::calibrate_threshold
      input_schema:
        type: object
        properties:
          domain:
            type: string
          new_threshold:
            type: integer

    - port: cns:subscribe
      description: Register a CnsObserver to receive events
      handler: CnsRuntime::subscribe_async
      input_schema:
        type: object
        properties:
          observer:
            type: object
            description: "Arc<dyn CnsObserver> with interest_mask"

  # Outbound Ports (signals emitted by CNS)
  outbound:
    - port: cns:emit:backpressure
      description: Broadcast backpressure signal to all subscribers
      handler: CnsRuntime::emit_backpressure
      output_schema:
        type: object
        properties:
          agent_id:
            type: string
          budget_remaining:
            type: number
          throttle_level:
            type: string
            enum: [moderate, severe, critical]

    - port: cns:emit:depletion
      description: Broadcast critical depletion signal to affected agent
      handler: emit_critical_depletion
      output_schema:
        type: object
        properties:
          agent_id:
            type: string
          domain:
            type: string
          deficit:
            type: integer
          recommendation:
            type: string

    - port: cns:emit:event
      description: Notify observers of variety increment events
      handler: CnsObserver::on_event
      output_schema:
        type: object
        properties:
          span_namespace:
            type: string
          span_name:
            type: string
          phase:
            type: string
          observation:
            type: object

# Adapters (connect ports to infrastructure)
adapters:
  algedonic_adapter:
    type: hexagonal_inbound
    port: cns:alerts
    infrastructure: internal_algedonic_manager
    protocol: threshold_comparison

  variety_adapter:
    type: hexagonal_inbound
    port: cns:variety
    infrastructure: internal_variety_monitor
    protocol: ashby_variety_counting

  observer_adapter:
    type: hexagonal_outbound
    port: cns:emit:event
    infrastructure: trait_impl_cns_observer
    protocol: async_trait_notification

  backpressure_adapter:
    type: hexagonal_outbound
    port: cns:emit:backpressure
    infrastructure: cybernetics_loop
    protocol: energy_throttle_signal

# Infrastructure Dependencies
infrastructure:
  required:
    - internal_algedonic_manager
    - internal_variety_monitor
    - internal_energy_budget_tracker
  optional: []
