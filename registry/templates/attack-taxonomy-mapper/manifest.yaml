# Registry manifest for attack-taxonomy-mapper skill
crate:
  name: attack-taxonomy-mapper
  version: "0.31.0"
  visibility: public
  description: >
    Attack taxonomy mapping skill for hKask. Consumes findings from
    supply-chain-sentinel (CWE-mapped manifest evidence) and kali-audit
    (OWASP/ATLAS-mapped findings) as input — does NOT generate new
    findings. Maps each finding to the OSC&R attack taxonomy (verified
    against github.com/pbom-dev/OSCAR matrix.json — organized by tactics
    + techniques, NOT numeric IDs). Adds an optional, backward-compatible
    `taxonomy_mapping` field to existing `surface: supply-chain`
    regression YAML entries. Emits reg.taxonomy.* spans (P9 — all
    registered in CANONICAL_NAMESPACES). P8 evidence-backed: every
    mapping includes concrete evidence (finding reference, CWE category,
    OSC&R tactic + technique). P12 userpod_host
    mandatory. Decomposed into 4 phases matching bug-hunt and
    supply-chain-sentinel pipeline. Minimal (P5): answers all 5W1H;
    single skill, no bundle; complements supply-chain-sentinel (adds
    taxonomy layer) and adversarial-red-team (parallel taxonomy
    discipline: ATLAS for LLM, OSC&R for supply chain).

templates:
  - id: attack-taxonomy-mapper/select-evidence
    name: "Select evidence sources and discover findings to map"
    path: select-evidence.j2
    type: KnowAct
    lexicon_terms: [select, discover, evidence, finding, taxonomy, map]
    description: >
      Discover evidence sources: supply-chain-sentinel findings (CWE-mapped
      manifest evidence), kali-audit findings with surface: supply-chain
      (OWASP/ATLAS-mapped), CI logs, manifest evidence. Reads regression
      library for existing taxonomy_mapping fields. Returns findings_to_map
      list with concrete evidence references.

  - id: attack-taxonomy-mapper/map-taxonomy
    name: "Map findings to OSC&R taxonomy"
    path: map-taxonomy.j2
    type: KnowAct
    lexicon_terms: [map, classify, taxonomy, oscr, supply]
    description: >
      For each finding, map to OSC&R tactic + technique (verified against
      github.com/pbom-dev/OSCAR matrix.json). Applies pragmatic-cybernetics:
      feedback loop (does the attack pattern have a defense layer?),
      variety (alternative attack vectors in same OSC&R tactic?),
      Good Regulator (is the defense layer enforcing?). Emits
      reg.taxonomy.map span per mapping.

  - id: attack-taxonomy-mapper/taxonomize
    name: "Classify mapped findings and propose taxonomy_mapping fields"
    path: taxonomize.j2
    type: KnowAct
    lexicon_terms: [classify, taxonomize, categorize, rank, label, report]
    description: >
      Classify mapped findings into OSC&R categories. Produce pattern
      signatures for detecting similar attack patterns. Propose
      backward-compatible taxonomy_mapping field additions to existing
      surface: supply-chain regression entries (status: pending). Emits
      reg.taxonomy.report span.

  - id: attack-taxonomy-mapper/convergence-check
    name: "Compute taxonomy coverage metric"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, taxonomy, coverage, regression]
    description: >
      Compute normalized convergence metric: unmapped findings (0.45),
      OSC&R tactic coverage (0.30), regression taxonomy_mapping field
      growth (0.15), residual unmapped risk (0.10). Converged when
      metric ≤ 0.10 with ≥5% improvement.
