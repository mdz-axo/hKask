# Template crate manifest for platform-consent-auditor skill
# hKask v0.31.0

crate:
  name: platform-consent-auditor
  version: "0.31.0"
  description: >
    Consent audit. Queries DelegationToken registry, correlates with CNS span
    usage data, detects anomalous patterns, and produces a structured audit
    report. Operationalizes P2 (Affirmative Consent): every token is traceable.

templates:
  - id: platform-consent-auditor/query-tokens
    name: "Query the DelegationToken registry for all tokens within the window"
    path: query-tokens.j2
    type: KnowAct
    lexicon_terms: [query, extract, list, retrieve, enumerate]
    description: >
      Query the DelegationToken registry for all tokens within the window.
      Retrieves token metadata: issuer, recipient, resource, action, timestamps.

  - id: platform-consent-auditor/correlate-usage
    name: "Correlate each DelegationToken with CNS span data showing actual usage"
    path: correlate-usage.j2
    type: KnowAct
    lexicon_terms: [correlate, match, trace, compare, map]
    description: >
      Correlate each DelegationToken with CNS span data showing actual usage.
      Flags over-provisioned consent (tokens granting more access than used).

  - id: platform-consent-auditor/detect-anomalies
    name: "Detect anomalous patterns: stale tokens, orphaned consent, consent…"
    path: detect-anomalies.j2
    type: KnowAct
    lexicon_terms: [detect, flag, identify, classify, assess]
    description: >
      Detect anomalous patterns: stale tokens, orphaned consent, consent
      concentration, scope violations, out-of-hours critical token issuance.

  - id: platform-consent-auditor/synthesize-report
    name: "Synthesize audit findings into a structured report with per-token…"
    path: synthesize-report.j2
    type: KnowAct
    lexicon_terms: [synthesize, summarize, structure, report, recommend]
    description: >
      Synthesize audit findings into a structured report with per-token
      status, anomaly categories, and consent hygiene recommendations.

  - id: platform-consent-auditor/convergence-check
    name: "Compute normalized convergence metric for consent audit PDCA cycles"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for consent audit PDCA cycles.
