# Template crate manifest for chain-of-density skill
# hKask v0.30.0

crate:
  name: chain-of-density
  version: "0.30.0"
  description: >
    Chain-of-Density iterative text summarization (Gao et al. 2024). Generates
    increasingly dense summaries by merging missing entities into summaries while
    maintaining fixed-length constraints across multiple density passes.

templates:
  - id: chain-of-density/density-pass
    path: density-pass.j2
    type: KnowAct
    lexicon_terms: [compress, converge, synthesize, revise, evaluate]
    description: >
      Iterative density-increase pass that weaves missing entities into the
      prior summary, removes redundant language, and maintains the target length.

  - id: chain-of-density/initial-summary
    path: initial-summary.j2
    type: KnowAct
    lexicon_terms: [summarize, distill, extract, analyze, classify]
    description: >
      Generate an initial summary with entity identification. Extracts named
      entities and key concepts, produces a baseline summary, and computes
      entity density as the starting point for density passes.

  - id: chain-of-density/cod-convergence-check
    path: cod-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for chain-of-density PDCA cycles.
      Returns convergence_metric plus rationale and blockers.
