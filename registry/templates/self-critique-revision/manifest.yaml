crate:
  name: self-critique-revision
  version: "0.30.0"
  description: >
    Iterative self-critique and revision cycle: generate an initial draft,
    critique it against quality criteria, then revise based on the critique.

templates:
  - id: self-critique-revision/generate
    name: "Produce an initial draft response and an honest quality score"
    path: generate.j2
    type: WordAct
    lexicon_terms: [create, specify, report, propose]
    description: >
      Produce an initial draft response and an honest quality score.

  - id: self-critique-revision/critique
    name: "Evaluate a draft against quality criteria and return structured issues"
    path: critique.j2
    type: KnowAct
    lexicon_terms: [critique, evaluate, detect, discriminate, analyze]
    description: >
      Evaluate a draft against quality criteria and return structured issues.

  - id: self-critique-revision/revise
    name: "Produce a revised draft that addresses each critique point"
    path: revise.j2
    type: KnowAct
    lexicon_terms: [revise, evaluate, reflect, adapt, calibrate]
    description: >
      Produce a revised draft that addresses each critique point.

  - id: self-critique-revision/self-critique-convergence-check
    name: "Compute normalized convergence metric for self-critique revision PDCA…"
    path: self-critique-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for self-critique revision PDCA cycles.
      Returns convergence_metric plus rationale and blockers.
