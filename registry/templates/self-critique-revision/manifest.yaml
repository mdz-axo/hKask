crate:
  name: self-critique-revision
  version: "0.28.0"
  description: >
    Iterative self-critique and revision cycle: generate an initial draft,
    critique it against quality criteria, then revise based on the critique.

templates:
  - id: self-critique-revision/generate
    path: generate.j2
    type: WordAct
    lexicon_terms: [create, specify, report, propose]
    description: >
      Produce an initial draft response and an honest quality score.

  - id: self-critique-revision/critique
    path: critique.j2
    type: KnowAct
    lexicon_terms: [critique, evaluate, detect, discriminate, analyze]
    description: >
      Evaluate a draft against quality criteria and return structured issues.

  - id: self-critique-revision/revise
    path: revise.j2
    type: KnowAct
    lexicon_terms: [revise, evaluate, reflect, adapt, calibrate]
    description: >
      Produce a revised draft that addresses each critique point.

hlexicon_terms:
  - create
  - specify
  - report
  - propose
  - critique
  - evaluate
  - detect
  - discriminate
  - analyze
  - revise
  - reflect
  - adapt
  - calibrate
