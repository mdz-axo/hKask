# Template crate manifest for grill-me skill
# hKask v0.28.0

crate:
  name: grill-me
  version: "0.30.0"
  description: >
    Socratic interrogation skill. Tests deep understanding through escalating
    difficulty (Recall → Mechanism → Rationale → Edge Cases → Synthesis).
    Probes gaps, challenges assumptions, produces gap analysis.

templates:
  - id: grill-me/grill-me-round
    path: grill-me-round.j2
    type: KnowAct
    lexicon_terms:
      [probe, challenge, discriminate, classify, evaluate, infer, detect]
    description: >
      Generate interrogation questions at the appropriate difficulty level,
      evaluate answers, and decide whether to escalate, hold, or re-probe.

  - id: grill-me/grill-me-assess
    path: grill-me-assess.j2
    type: KnowAct
    lexicon_terms: [evaluate, classify, integrate, crystallize, contextualise]
    description: >
      Synthesize final assessment with per-area ratings (Solid/Partial/Gap)
      and prioritized study recommendations.

  - id: grill-me/grill-me-escalate
    path: grill-me-escalate.j2
    type: KnowAct
    lexicon_terms: [detect, evaluate, regulate, orient]
    description: >
      Decide whether to escalate difficulty, hold, or re-probe based on
      answer quality ratio.

  - id: grill-me/grill-me-convergence-check
    path: grill-me-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for grill-me PDCA cycles.
      Returns convergence_metric plus rationale and blockers.
