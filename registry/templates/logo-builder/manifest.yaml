# Template crate manifest for logo-builder skill
# hKask v0.31.0
# References templates in registry/templates/media/ for actual generation.
# This skill is an orchestration layer — no own .j2 or .yaml templates.
# Logo generation templates live under media/ because they use media server tools.

crate:
  name: logo-builder
  version: "0.30.0"
  description: >
    Pragmatic and principled logo design using LLM-assisted generation.
    Synthesizes Martin (Made By James — Minimum Viable Brand), Bokhua
    (Principles of Logo Design — five formal gates), and Peters (Logos
    That Last — iterative case study method). Three-phase pipeline:
    discovery (brand-to-design mapping), formal generation (Bokhua gates),
    and iterative refinement (weighted critique loop). Uses the media
    server's generate_image and describe_image tools. Logos stored in
    the gallery as regular images — no separate storage.

templates:
  - id: media/logo-discovery
    path: ../media/logo-discovery.yaml
    type: FlowDef
    lexicon_terms: [classify, map, strategize, discover]
    description: >
      Discovery-phase pipeline: map qualitative brand identity inputs to
      formal logo design parameters, then select the appropriate generation
      strategy. Agent-coordinated; uses inference router for classification.

  - id: media/logo-discovery-map
    path: ../media/logo-discovery-map.j2
    type: KnowAct
    lexicon_terms: [classify, map, recommend, strategize]
    description: >
      Map qualitative brand identity inputs (industry, audience, values) to
      formal logo design parameters (style, type, shape, palette, density)
      using strategic brand reasoning. From Martin's Minimum Viable Brand.

  - id: media/logo-formal-prompt
    path: ../media/logo-formal-prompt.j2
    type: KnowAct
    lexicon_terms: [generate, design, create, formalize]
    description: >
      Core logo generation prompt encoding Bokhua's five design gates:
      simplicity, monochrome viability, grid discipline, negative space,
      and scalability. Every logo generation flow delegates to this template.

  - id: media/logo-iterative-refine
    path: ../media/logo-iterative-refine.yaml
    type: FlowDef
    lexicon_terms: [generate, critique, refine, iterate, score]
    description: >
      Peters-inspired iterative logo pipeline: generate N candidates, score
      each against 7 weighted critique dimensions (5 Bokhua gates + brand-fit
      + distinctiveness), select best, refine through critique cycles.
      Final output is background-removed for transparent PNG deliverables.

  - id: media/logo-presentation
    path: ../media/logo-presentation.yaml
    type: FlowDef
    lexicon_terms: [package, export, deliver, present]
    description: >
      Generate a complete logo deliverables package from a refined logo:
      transparent PNG, monochrome variant, icon-only mark, and context
      mockup showing the logo in real-world use.
