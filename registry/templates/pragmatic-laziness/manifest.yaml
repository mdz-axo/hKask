# Template crate manifest for pragmatic-laziness skill
# hKask v0.28.0

crate:
  name: pragmatic-laziness
  version: "0.30.0"
  description: >
    Procedural composition skill that finds the path of least action through
    meaning-space. Describes the intersection of pragmatic-semantics,
    pragmatic-cybernetics, essentialist, and grill-me through a 3-phase lazy
    loop.

templates:
  - id: pragmatic-laziness/pragmatic-laziness-flow
    path: pragmatic-laziness-flow.j2
    type: KnowAct
    lexicon_terms:
      [
        decompose,
        recognize,
        simplify,
        verify,
        converge,
        reflect,
        route,
        compose,
        discriminate,
        evaluate,
      ]
    description: >
      3-phase lazy loop for least-action path finding. Sequences and delegates
      to other skills; does not add artifacts.

  - id: pragmatic-laziness/pragmatic-laziness-converge
    path: pragmatic-laziness-converge.j2
    type: KnowAct
    lexicon_terms: [converge, classify, evaluate, verify, discriminate]
    description: >
      δS = 0 convergence check. Compares current and previous configurations
      to decide whether the lazy loop has reached a stationary point.
