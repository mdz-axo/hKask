# Template crate manifest for refactor-service-layer skill
# hKask v0.28.0

crate:
  name: refactor-service-layer
  version: "0.30.0"
  description: >
    Extract a shared service layer from duplicated surface logic using the strangler
    fig pattern, deep-module discipline, and vertical tracer-bullet TDD. Classifies
    duplication hotspots, designs deep service modules, migrates one domain at a time
    with both surfaces functional at every step. Composes improve-codebase-architecture,
    tdd, coding-guidelines, pragmatic-semantics, zoom-out, and pragmatic-cybernetics.

templates:
  - id: refactor-service-layer/rsl-audit
    path: rsl-audit.j2
    type: KnowAct
    lexicon_terms:
      [detect, explore, classify, discriminate, orient, assess, rank]
    description: >
      Audit and classify all duplicated operations across CLI, API, and MCP surfaces.
      Apply the deletion test to each candidate. Produce RDF triples, classification
      table, and mermaid entity-relationship diagram of the duplication landscape.

  - id: refactor-service-layer/rsl-strangle
    path: rsl-strangle.j2
    type: KnowAct
    lexicon_terms:
      [deepen, design, constrain, verify, crystallize, migrate, extract]
    description: >
      Plan the strangler fig migration for a selected domain: define the new
      service operation, design CLI/API adapters, identify duplication to delete,
      and list verification steps. Enforces one-domain-per-commit discipline,
      dependency direction checks, and surgical change scope.

  - id: refactor-service-layer/rsl-verify
    path: rsl-verify.j2
    type: KnowAct
    lexicon_terms: [verify, assess, validate, discriminate, crystallize]
    description: >
      Verify surgical completeness after a domain migration or full extraction:
      dependency direction, depth test, P6/P7/P8 compliance, clippy, test suite,
      deletion test on service modules. Produces a structured pass/fail report.
