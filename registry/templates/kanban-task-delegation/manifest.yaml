# Template crate manifest for kanban-task-delegation skill
# hKask v0.28.0

crate:
  name: kanban-task-delegation
  version: "0.28.0"
  description: >
    Task delegation completion verification. Evaluates delivered artifacts
    and evidence against acceptance criteria to determine pass/fail with
    detailed reasoning per criterion.

templates:
  - id: kanban-task-delegation/verify-completion
    path: verify-completion.j2
    type: KnowAct
    lexicon_terms: [verify, evaluate, assess]
    description: >
      Verify a delegated task's completion by evaluating each acceptance
      criterion against delivered artifacts and provided evidence.
      Produces a pass/fail verdict with per-criterion results.

hlexicon_terms:
  - verify
  - evaluate
  - assess