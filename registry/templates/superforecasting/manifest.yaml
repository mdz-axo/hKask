# Template crate manifest for superforecasting skill
# hKask v0.31.0
#
# Note: This crate declares 10 templates (8 Tetlock stages + 1 independent
# quality gate + 1 convergence check), exceeding the 7-function surface
# guideline. The 8 stages are methodologically mandated — each implements
# one of Tetlock's Ten Commandments for Superforecasters (triage,
# Fermi-ization, outside view, inside view, Bayesian update, dragonfly
# synthesis, calibration, record). The 9th (forecast-quality-gate) is an
# independent evaluator separated from calibration to prevent self-
# assessment bias (parallels scenario-builder's scenario-quality-gate).
# The 10th (convergence-check) is shared PDCA infrastructure, not a domain
# stage. See deep-module G2 justification.

crate:
  name: superforecasting
  version: "0.31.0"
  description: >
    Superforecasting pipeline following Tetlock's Good Judgment Project
    methodology. Eight-stage process from question triage through Fermi
    decomposition, outside/inside views, Bayesian evidence updating,
    dragonfly-eye synthesis, probability calibration, and forecast recording.

templates:
  - id: superforecasting/stage_0_triage
    name: "Triage a forecasting question to determine difficulty level and…"
    path: stage_0_triage.j2
    type: WordAct
    lexicon_terms: [classify, assess, query]
    description: >
      Triage a forecasting question to determine difficulty level and whether
      it falls in the Goldilocks zone warranting full pipeline investment.

  - id: superforecasting/stage_1_fermi_decompose
    name: "Fermi-decompose the forecasting question into independent, tractable…"
    path: stage_1_fermi_decompose.j2
    type: WordAct
    lexicon_terms: [decompose, analyze, query]
    description: >
      Fermi-decompose the forecasting question into independent, tractable
      sub-questions. Separate knowns from unknowns and document assumptions.

  - id: superforecasting/stage_2_outside_view
    name: "Establish base rates by identifying reference classes and determining…"
    path: stage_2_outside_view.j2
    type: WordAct
    lexicon_terms: [analyze, compare, search]
    description: >
      Establish base rates by identifying reference classes and determining
      how often similar events occur. Produces the outside-view starting
      probability.

  - id: superforecasting/stage_3_probability_estimate
    name: "Inside-view probability estimation"
    path: stage_3_probability_estimate.j2
    type: WordAct
    lexicon_terms: [assess, weigh, estimate, combine, update]
    description: >
      Inside-view probability estimation. Takes pre-generated hypotheses (from
      falsifiability/falsifiability-hypothesize) and their counterfactual
      necessary-conditions (from falsifiability/falsifiability-counterfactual),
      weighs evidence pro/con against each counterfactual's testable consequence,
      assigns individual probabilities, enforces internal consistency, and
      combines to adjust from the outside-view anchor. Replaces the probability
      half of the former stage_3_inside_view step.

  - id: superforecasting/stage_4_evidence_update
    name: "Incorporate new evidence via Bayesian updating with likelihood ratios"
    path: stage_4_evidence_update.j2
    type: WordAct
    lexicon_terms: [probe, assert, validate]
    description: >
      Incorporate new evidence via Bayesian updating with likelihood ratios.
      Revise the prior probability based on evidence strength.

  - id: superforecasting/stage_5_synthesis
    name: "Synthesize a dragonfly-eye view by integrating multiple causal models…"
    path: stage_5_synthesis.j2
    type: WordAct
    lexicon_terms: [synthesize, aggregate, compose]
    description: >
      Synthesize a dragonfly-eye view by integrating multiple causal models
      and perspectives. Steel-man dissenting views and produce a synthesized
      probability.

  - id: superforecasting/stage_6_calibration
    name: "Calibrate the final probability using the full 0-100% scale"
    path: stage_6_calibration.j2
    type: WordAct
    lexicon_terms: [calibrate, assert, specify]
    description: >
      Calibrate the final probability using the full 0-100% scale. Justify
      precision against known calibration principles and the pipeline's
      evidence trail.

  - id: superforecasting/stage_7_record
    name: "Create a structured forecast record with resolution criteria and…"
    path: stage_7_record.j2
    type: WordAct
    lexicon_terms: [document, report, commit]
    description: >
      Create a structured forecast record with resolution criteria and
      expiration date for later tracking, Brier scoring, and post-mortem
      analysis.

  - id: superforecasting/forecast-quality-gate
    name: "Independent quality gate that evaluates forecast calibration realism,…"
    path: forecast-quality-gate.j2
    type: KnowAct
    lexicon_terms: [evaluate, verify, gate, calibrate]
    description: >
      Independent quality gate that evaluates forecast calibration realism,
      confidence justification, evidence trail completeness, and record
      quality without self-assessment bias. Receives calibration and record
      outputs and produces calibrated 0–1 scores plus a gate_pass determination
      with actionable fix notes.

  - id: superforecasting/superforecasting-convergence-check
    name: "Compute normalized convergence metric for superforecasting PDCA cycles"
    path: superforecasting-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for superforecasting PDCA cycles.
      Returns convergence_metric plus rationale and blockers.

# FlowDef orchestrator — chains all 8 stages with convergence criteria.
# Regulation spans (hkask.template.{select,render,outcome}) are emitted automatically
# by the flow engine for WordAct populate steps; no explicit reg_spans needed.
flowdef:
  manifest: registry/manifests/superforecasting.yaml
  description: >
    Cascading 10-step pipeline from triage through forecast recording,
    independent quality gate, and convergence. Implements convergence
    criteria (independent gate_pass, synthesis-calibration agreement,
    materiality guard, min confidence "medium") and gas accounting.
