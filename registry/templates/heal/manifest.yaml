# Template crate manifest for heal skill
# hKask v0.31.0

crate:
  name: heal
  version: "0.31.0"
  description: >
    Self-healing templates for error classification, configuration recovery,
    and transient retry handling. Provides structured error diagnosis and
    automated recovery suggestions.

templates:
  - id: heal/classify-error
    path: classify-error.j2
    type: KnowAct
    lexicon_terms: [classify, discriminate, diagnose, route]
    description: Classify errors by type and suggest recovery actions.

  - id: heal/command_not_found
    path: command_not_found.j2
    type: KnowAct
    lexicon_terms: [diagnose, suggest, recover]
    description: Diagnose command-not-found errors and suggest alternatives.

  - id: heal/config_not_found
    path: config_not_found.j2
    type: KnowAct
    lexicon_terms: [diagnose, create, recover]
    description: Diagnose missing configuration and create default files.

  - id: heal/missing_api_key
    path: missing_api_key.j2
    type: KnowAct
    lexicon_terms: [diagnose, identify, guide]
    description: Diagnose missing API key errors and guide setup.

  - id: heal/network_error
    path: network_error.j2
    type: KnowAct
    lexicon_terms: [diagnose, retry, recover]
    description: Diagnose network errors and recommend retry strategies.

  - id: heal/permission_denied
    path: permission_denied.j2
    type: KnowAct
    lexicon_terms: [diagnose, identify, guide]
    description: Diagnose permission errors and guide remediation.

  - id: heal/self-heal
    path: self-heal.j2
    type: KnowAct
    lexicon_terms: [heal, recover, restore]
    description: General self-healing orchestration template.

  - id: heal/transient_retry
    path: transient_retry.j2
    type: KnowAct
    lexicon_terms: [retry, recover, transient]
    description: Handle transient errors with retry logic.
