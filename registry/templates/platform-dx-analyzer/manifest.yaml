# Template crate manifest for platform-dx-analyzer skill
# hKask v0.31.0

crate:
  name: platform-dx-analyzer
  version: "0.31.0"
  description: >
    Developer experience analysis. Computes DORA metrics and SPACE dimensions
    for skill authors from CNS span data. Classifies into performance clusters,
    detects regressions, and generates recommendations.

templates:
  - id: platform-dx-analyzer/compute-dora
    path: compute-dora.j2
    type: KnowAct
    lexicon_terms: [compute, measure, classify, evaluate, assess]
    description: Compute DORA metrics from CNS skill lifecycle spans.

  - id: platform-dx-analyzer/compute-space
    path: compute-space.j2
    type: KnowAct
    lexicon_terms: [compute, measure, assess, evaluate, score]
    description: Compute SPACE dimensions for skill authors.

  - id: platform-dx-analyzer/detect-regressions
    path: detect-regressions.j2
    type: KnowAct
    lexicon_terms: [detect, compare, flag, alert, assess]
    description: Detect DORA cluster downgrades and SPACE score regressions.

  - id: platform-dx-analyzer/generate-recommendations
    path: generate-recommendations.j2
    type: KnowAct
    lexicon_terms: [recommend, suggest, advise, propose, frame]
    description: Generate human-readable recommendations from DORA/SPACE findings.

  - id: platform-dx-analyzer/convergence-check
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: Compute convergence for DX analysis PDCA cycles.
