# Template crate manifest for skill-bundler skill
# hKask v0.28.0

crate:
  name: skill-bundler
  version: "0.28.0"
  description: >
    Orchestrate and compose multiple skills into a cohesive bundle.
    Activates a set of skills together, resolves conflicts, determines
    application order, and produces a manifest that governs how the skills
    compose. Re-composes the manifest when skills evolve.

templates:
  - id: skill-bundler/bundler-compose
    path: bundler-compose.j2
    type: KnowAct
    lexicon_terms: [classify, analyze, rank, resolve, synthesize]
    description: >
      Analyze a set of skills for conflicts, complementarities, and optimal
      ordering. Classify each skill by polarity (generative/evaluative/
      regulative/procedural), assign cascade phase, and produce a structured
      bundle manifest.

  - id: skill-bundler/bundler-validate
    path: bundler-validate.j2
    type: KnowAct
    lexicon_terms: [validate, detect, classify, evaluate, enforce]
    description: >
      Validate a composed bundle manifest: check for contradictory directives
      in the same cascade phase, cascade depth limits, skill uniqueness,
      conflict resolution completeness, and convergence criteria.

  - id: skill-bundler/bundler-evolve
    path: bundler-evolve.j2
    type: KnowAct
    lexicon_terms: [detect, evaluate, resolve, synthesize, adapt]
    description: >
      Re-assess a bundle when one or more skills have changed. Re-compose
      the manifest preserving what hasn't changed and updating what has.
      Detect drift from the original composition principles.
