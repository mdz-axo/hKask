# Template crate manifest for zoom-out skill
# hKask v0.28.0

crate:
  name: zoom-out
  version: "0.30.0"
  description: >
    Context expansion skill. Zooms out to provide broader architectural context,
    module maps, caller graphs, data flows, and boundary summaries.
    Use when lost in implementation details or unfamiliar with a
    section of the codebase.

templates:
  - id: zoom-out/zoom-out-context
    path: zoom-out-context.j2
    type: KnowAct
    lexicon_terms: [orient, contextualise, map, classify, integrate]
    description: >
      Generate a module map, caller graph, data flow summary, boundary summary,
      and key invariants for the current code region. Uses hKask domain vocabulary.

  - id: zoom-out/zoom-out-convergence-check
    path: zoom-out-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for zoom-out PDCA cycles.
