# Template crate manifest for goal skill
# hKask v0.28.0

crate:
  name: goal
  version: "0.28.0"
  description: >
    Goal specification and verification. Extracts structured goals from user
    intent, judges completion via semantic evaluation or command execution,
    and produces calibrated verdicts with confidence scoring.

templates:
  - id: goal/create
    path: create.j2
    type: WordAct
    lexicon_terms: [specify, propose, require, create]
    description: >
      Extract a structured goal from raw user intent. Produces goal text,
      completion criteria, visibility setting, and priority level.

  - id: goal/judge
    path: judge.j2
    type: KnowAct
    lexicon_terms: [evaluate, verify, ground]
    description: >
      Verify goal completion via semantic evaluation of outcome summary
      and produced artifacts against the original goal criteria.

  - id: goal/judge_command
    path: judge_command.j2
    type: KnowAct
    lexicon_terms: [assert, command, verify]
    description: >
      Verify goal completion via executed command results against acceptance
      criteria. Produces a done/continue/blocked verdict with reasoning.

  - id: goal/judge_simple
    path: judge_simple.j2
    type: KnowAct
    lexicon_terms: [assert, acknowledge, evaluate]
    description: >
      Fallback goal verification with minimal evaluation. Produces a
      continue verdict and default confidence for lightweight judgment.

hlexicon_terms:
  - specify
  - propose
  - require
  - create
  - evaluate
  - verify
  - ground
  - assert
  - command
  - acknowledge