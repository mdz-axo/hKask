# Template crate manifest for prompt-templates skill
# hKask v0.28.0

crate:
  name: prompt-templates
  version: "0.28.0"
  description: >
    LLM inference prompt templates. Condenses long session
    transcripts, extracts structured content from documents, performs
    LLM inference calls, searches academic research, and scrapes web content.

templates:
  - id: prompt-templates/condense_session
    name: "Condense long session transcripts into compact summaries"
    path: condense_session.j2
    type: WordAct
    lexicon_terms: [compact, compress, distill]
    description: >
      Condense long session transcripts into compact summaries.
      Extract key decisions, action items, and compute compression ratio.

  - id: prompt-templates/doc_extract
    name: "Extract structured content and metadata from documents against an…"
    path: doc_extract.j2
    type: WordAct
    lexicon_terms: [extract, parse, structure]
    description: >
      Extract structured content and metadata from documents against an
      optional extraction schema with confidence scoring.

  - id: prompt-templates/inference_call
    name: "Execute a single LLM inference call with configurable temperature,…"
    path: inference_call.j2
    type: WordAct
    lexicon_terms: [prompt, request, query]
    description: >
      Execute a single LLM inference call with configurable temperature,
      max tokens, and stop sequences. Produces completion text.

  - id: prompt-templates/scholar_extract
    name: "Search academic databases for research papers matching a query, with…"
    path: scholar_extract.j2
    type: WordAct
    lexicon_terms: [search, extract, query]
    description: >
      Search academic databases for research papers matching a query,
      with configurable year range, database selection, and abstract inclusion.

  - id: prompt-templates/web_extract
    name: "Search the web and extract content from results with configurable…"
    path: web_extract.j2
    type: WordAct
    lexicon_terms: [search, extract, query]
    description: >
      Search the web and extract content from results with configurable
      source filtering, freshness constraints, and snippet inclusion.
