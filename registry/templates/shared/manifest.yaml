# Template crate manifest for shared PDCA infrastructure templates
# hKask v0.31.0

crate:
  name: shared
  version: "0.31.0"
  description: >
    Shared infrastructure templates for the hKask PDCA convergence system.
    Not a skill — templates referenced by other skill manifests via
    template_ref: shared/<name>.

templates:
  - id: shared/convergence-check-base
    path: convergence-check-base.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Shared convergence check template for PDCA cycles. Computes normalized
      convergence metric with materiality guard and gate-specific penalty
      computation. All skills use this as their convergence step base.
