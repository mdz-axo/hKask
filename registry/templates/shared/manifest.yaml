# Shared template crate manifest
# hKask v0.31.0

crate:
  name: shared
  version: "0.31.0"
  description: >
    Shared, parameterized templates used across multiple skill PDCA flows.
    Not a standalone skill — these are composable building blocks invoked
    by other skills' manifests via template_ref.

templates:
  - id: shared/convergence-check
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Parameterized PDCA convergence evaluator. Accepts `convergence_description`
      (a string describing what stable convergence means for the calling skill)
      and `primary_result` (the output to evaluate). Configurable `include_blockers`
      flag adds a `blockers` array to the output for skills that need it (e.g.,
      refactor-service-layer).
      Used by: pragmatic-semantics, pragmatic-cybernetics, pragmatic-laziness,
      refactor-service-layer, coding-guidelines, grill-me,
      improve-codebase-architecture, essentialist.
