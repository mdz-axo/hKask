# Template crate manifest for kanban-task-management skill
# hKask v0.28.0

crate:
  name: kanban-task-management
  version: "0.28.0"
  description: >
    Kanban board monitoring and task verification. Monitors board state with
    summary statistics and verifies individual task completion against
    acceptance criteria.

templates:
  - id: kanban-task-management/monitor-board
    path: monitor-board.j2
    type: KnowAct
    lexicon_terms: [monitor, assess, detect]
    description: >
      Monitor kanban board state across all columns. Produces summary counts,
      identifies stuck or blocked tasks, and flags issues requiring attention.

  - id: kanban-task-management/verify-completion
    path: verify-completion.j2
    type: KnowAct
    lexicon_terms: [verify, evaluate, assess]
    description: >
      Verify a task's completion by evaluating each acceptance criterion
      against deliverables and evidence. Produces pass/fail with
      per-criterion results and detailed reasoning.

hlexicon_terms:
  - monitor
  - assess
  - detect
  - verify
  - evaluate