# Template crate manifest for falstaffian-perspective skill
# hKask v0.30.0

crate:
  name: falstaffian-perspective
  version: "0.30.0"
  description: >
    Inference-augmented multi-iteration perspective generation through Falstaffian
    semantic shape transforms. Three-phase pipeline: (1) deterministic rotation
    via Jinja2 macros applies calibrated experience and affirmed spirit through
    eight rotation vectors (predicate hollow, subject expansion, counterfeit
    inversion, object inversion, direction reversal, physiological causal,
    liability transmutation, linguistic precision), (2) LLM inference enriches
    each perspective with emotional texture, implicit assumptions,
    counter-perspectives, and contextual awareness at configurable depth
    (light/medium/deep), (3) synthesis merges deterministic structure with
    enrichment into unified perspectives. Carries tension without breaking into
    bitterness or naivety.

templates:
  - id: falstaffian-perspective/falstaffian-perspective
    path: falstaffian-perspective.j2
    type: KnowAct
    lexicon_terms:
      [
        calibrate,
        affirm,
        select,
        execute,
        verify,
        enrich,
        synthesize,
        compose,
        transform,
        discriminate,
        evaluate,
      ]
    description: >
      Inference-augmented perspective generation through Falstaffian shape
      vectors. Phase 1: deterministic Jinja2 macros compute structural rotations
      from input text and selected perspective vectors. Phase 2: LLM inference
      enriches each rotation with emotional depth, implicit assumption surfacing,
      counter-perspective generation, and contextual awareness (configurable via
      enrichment_depth: light/medium/deep). Phase 3: synthesis merges structural
      core with enrichment into unified perspectives with variance reporting.
