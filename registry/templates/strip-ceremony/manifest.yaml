# Template crate manifest for strip-ceremony skill
# hKask v0.31.0

crate:
  name: strip-ceremony
  version: "0.31.0"
  description: >
    Detect and strip ceremonial, ritualistic, and ornamental code artifacts
    across the hKask codebase. Operates on named crates, modules, or the
    template registry. Generalizable pattern detection with domain adapters.

templates:
  - id: strip-ceremony/ceremony-detect
    path: ceremony-detect.j2
    type: KnowAct
    lexicon_terms: [detect, scan, classify, cross-reference, audit]
    description: >
      Scan target domain for ceremonial code patterns. Cross-references
      template crate manifests against flow manifests, parses Rust source
      for dead code, and validates manifest step structures. Produces
      classified findings with confidence scores.

  - id: strip-ceremony/ceremony-strip
    path: ceremony-strip.j2
    type: KnowAct
    lexicon_terms: [delete, remove, strip, prune, clean]
    description: >
      Execute stripping actions for confirmed ceremonial artifacts.
      Produces specific removal instructions with file paths, line ranges,
      and action types (delete file, remove entry, renumber ordinals).

  - id: strip-ceremony/ceremony-convergence-check
    path: ceremony-convergence-check.j2
    type: KnowAct
    lexicon_terms: [verify, validate, check, confirm, audit]
    description: >
      Verify that stripping was complete — no ceremonial artifacts remain,
      all remaining references resolve, OCAP coverage matches flow templates,
      and convergence fields point to correct step ordinals.
