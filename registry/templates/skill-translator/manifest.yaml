# Template crate manifest for skill-translator
# hKask v0.30.0

crate:
  name: skill-translator
  version: "0.30.0"
  description: >
    Translate external skill definitions into hKask-compatible structures.
    Supports iterative normalization and validation with convergence checks.

templates:
  - id: skill-translator/translate-skill
    name: "Translate and normalize source skill definitions into target…"
    path: translate-skill.j2
    type: KnowAct
    lexicon_terms: [translate, map, normalize, transform, validate]
    description: >
      Translate and normalize source skill definitions into target schema-ready
      hKask-compatible representation with explicit mapping rationale.

  - id: skill-translator/translation-convergence-check
    name: "Compute normalized convergence metric for skill-translation PDCA…"
    path: translation-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for skill-translation PDCA cycles.
      Returns convergence_metric plus rationale and blockers.
