# Template crate manifest for bug-hunt skill
# hKask v0.30.0

crate:
  name: bug-hunt
  version: "0.31.0"
  description: >
    Bug hunting: explores a target crate for threats to user-defined quality.
    Applies Weinberg's quality definition ("value to some person who matters"),
    Beizer's bug taxonomy, Bach/Bolton's heuristic test strategy model, and
    Hendrickson's exploratory testing charters. Decomposed into phased templates:
    Charter → Probe (agent-coordinated) → Oracle → Taxonomize → Report.
    Reasoning patterns from pragmatic-semantics (IS/OUGHT + epistemic classification
    + provenance), pragmatic-cybernetics (feedback loop analysis + Good Regulator
    checks + variety engineering), diagnose, grill-me, and adversarial-red-team
    are embedded as inline prompt instructions in the oracle phase.
    Emits Regulation spans (reg.bughunt.*) for observability (P12). OCAP-gated: requires
    Tool:test:Execute and Tool:regulation:Read.

templates:
  - id: bug-hunt/bug-hunt-charter
    name: "Generate a focused bug-hunt charter using Hendrickson format and…"
    path: bug-hunt-charter.j2
    type: KnowAct
    lexicon_terms: [charter, plan, target, explore, assess]
    description: >
      Generate a focused bug-hunt charter using Hendrickson format and Bach's
      Heuristic Test Strategy Model (HTSM). Targets specific Beizer taxonomy
      categories based on the target crate and user-defined quality criteria.
    generates_spans:
      - reg.bughunt.charter

  - id: bug-hunt/bug-hunt-probe
    name: "PROBE phase — agent-coordinated MCP tool execution"
    path: bug-hunt-probe.j2
    type: KnowAct
    lexicon_terms: [probe, explore, search, test, verify]
    description: >
      PROBE phase — agent-coordinated MCP tool execution. Reads target source
      files, searches for bug patterns, runs cargo check/test/clippy, and
      when probe_depth includes `dynamic`, executes BugStalker (`bs`) runtime
      probes (breakpoints, thread inspection, Tokio oracle) for timing,
      integration, and structural Beizer categories. This template provides
      guidance and collects results; the actual probing is performed by the
      agent using MCP tools between template calls.
    generates_spans:
      - reg.bughunt.probe

  - id: bug-hunt/bug-hunt-oracle
    name: "Apply Weinberg oracle (bug = threat to user-defined quality),…"
    path: bug-hunt-oracle.j2
    type: KnowAct
    lexicon_terms:
      [evaluate, verify, classify, discriminate, calibrate, critique]
    description: >
      Apply Weinberg oracle (bug = threat to user-defined quality), pragmatic-semantics
      IS/OUGHT classification, epistemic mode labeling, provenance tracing, and
      grill-me self-challenge to raw probe findings. Produces tiered verdicts
      (BUG / POTENTIAL_BUG / OBSERVATION) with confidence scores.
    generates_spans:
      - reg.bughunt.oracle

  - id: bug-hunt/bug-hunt-taxonomize
    name: "Classify evaluated findings into Beizer taxonomy (requirements,…"
    path: bug-hunt-taxonomize.j2
    type: KnowAct
    lexicon_terms: [classify, taxonomize, categorize, rank, label]
    description: >
      Classify evaluated findings into Beizer taxonomy (requirements, structural,
      data, coding, interface, integration, timing, configuration) and assign
      severity ratings (CRITICAL, HIGH, MEDIUM, LOW). Produces pattern signatures
      for detecting similar bugs elsewhere.
    generates_spans:
      - reg.bughunt.taxonomize

  - id: bug-hunt/bug-hunt-report
    name: "Compile charter, oracle, and taxonomy results into a structured JSON…"
    path: bug-hunt-report.j2
    type: KnowAct
    lexicon_terms: [report, summarize, compose, document]
    description: >
      Compile charter, oracle, and taxonomy results into a structured JSON bug
      report. Consolidates findings, computes summary statistics, and produces
      the final expedition report.
    generates_spans:
      - reg.bughunt.report

  - id: bug-hunt/bug-hunt-expedition
    name: "Legacy monolithic expedition template (v0.30.0)"
    path: bug-hunt-expedition.j2
    type: KnowAct
    lexicon_terms: [hunt, explore, probe, detect, classify, report, charter]
    description: >
      Legacy monolithic expedition template (v0.30.0). Retained for backward
      compatibility. Prefer the decomposed pipeline: charter → probe → oracle →
      taxonomize → report.
    generates_spans:
      - reg.bughunt.charter
      - reg.bughunt.probe
      - reg.bughunt.oracle
      - reg.bughunt.taxonomize
      - reg.bughunt.learn
      - reg.bughunt.report

  - id: bug-hunt/bug-hunt-convergence-check
    name: "Compute normalized convergence metric for bug-hunt PDCA cycles"
    path: bug-hunt-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for bug-hunt PDCA cycles.
      Saturation detection with stability check — severity-weighted unresolved
      findings + Beizer taxonomy coverage.
