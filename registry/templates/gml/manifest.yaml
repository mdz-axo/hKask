# Template crate manifest for gml skill
# hKask v0.28.0

crate:
  name: gml
  version: "0.28.0"
  description: >
    The Generative Meaning Layer — a Monod-Wyman-Changeux allosteric model for
    concept interpretation. Models conceptual flexibility as equilibrium between
    progressive (R-state) and conservative (T-state) interpretations, with
    effector binding, coherence assessment, and network homeostasis.

templates:
  - id: gml/assess-coherence
    path: assess-coherence.j2
    type: KnowAct
    lexicon_terms: [evaluate, reflect, calibrate, assess]
    description: >
      Evaluate concept coherence and network homeostasis. Compare interpretive
      equilibrium before and after effector binding, detect stability states.

  - id: gml/bind-effector
    path: bind-effector.j2
    type: KnowAct
    lexicon_terms: [infer, analogy, abduct]
    description: >
      Apply an effector to a concept's allosteric ports, compute the resulting
      equilibrium shift via the MWC state function, and generate a binding
      analogy interpreting the directional effect.

  - id: gml/cns-instrument
    path: cns-instrument.j2
    type: KnowAct
    lexicon_terms: [instrument, monitor, observe]
    description: >
      CNS instrumentation macros. Emit span events for monitoring, record
      errors, trigger algedonic alerts on variety deficits, and produce
      audit logs for every GML operation.

  - id: gml/compute-equilibrium
    path: compute-equilibrium.j2
    type: KnowAct
    lexicon_terms: [analyze, compare, evaluate]
    description: >
      Compute the MWC equilibrium before and after effector binding including
      Hill coefficient analysis, cooperativity assessment, and partition
      function comparison for accessible microstate count.

  - id: gml/error-generic
    path: error-generic.j2
    type: KnowAct
    lexicon_terms: [detect, handoff, escalate]
    description: >
      Display any GML error with code, message, and context, and provide
      suggested corrective actions based on the error type.

  - id: gml/error-validation
    path: error-validation.j2
    type: KnowAct
    lexicon_terms: [validate, detect, handoff]
    description: >
      Display field-level GML validation errors with valid parameter ranges
      and corrective suggestions for each validation failure.

  - id: gml/macros
    path: macros.j2
    type: KnowAct
    lexicon_terms: [analyze, compose, structure]
    description: >
      Shared macro library for GML templates. Provides the MWC state function,
      Hill coefficient, and partition function computations.

  - id: gml/recognize-ensemble
    path: recognize-ensemble.j2
    type: KnowAct
    lexicon_terms: [recognize, discriminate, parse]
    description: >
      Parse a concept into its R-state and T-state ensemble components.
      Identify allosteric ports from possible effector shapes.

  - id: gml/reframe-concept
    path: reframe-concept.j2
    type: KnowAct
    lexicon_terms: [synthesize, abduct, explore]
    description: >
      Generate alternative interpretation frames for a concept based on
      its coherence analysis. Synthesize new perspectives that might
      resolve interpretive instability.

  - id: gml/validate-inputs
    path: validate-inputs.j2
    type: KnowAct
    lexicon_terms: [validate, detect, enforce]
    description: >
      Validate GML concept and effector inputs against type, shape, and range
      constraints before template processing.
