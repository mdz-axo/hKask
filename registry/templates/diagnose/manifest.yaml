# Template crate manifest for diagnose skill
# hKask v0.28.0

crate:
  name: diagnose
  version: "0.30.0"
  description: >
    Disciplined diagnosis loop for hard bugs and performance regressions.
    Cybernetic debugging: build feedback loop → reproduce → hypothesise →
    instrument → fix → regression-test. Aligned with CNS sense→orient→decide→act.

templates:
  - id: diagnose/diagnose-loop
    path: diagnose-loop.j2
    type: KnowAct
    lexicon_terms: [detect, reproduce, observe, discriminate, orient]
    description: >
      Build a feedback loop for the bug. Evaluate repro strategies, select the
      fastest deterministic signal, and confirm the bug reproduces before hypothesising.

  - id: diagnose/diagnose-hypothesise
    path: diagnose-hypothesise.j2
    type: KnowAct
    lexicon_terms: [infer, discriminate, rank, predict, evaluate]
    description: >
      Generate 3-5 ranked falsifiable hypotheses for the bug's root cause.
      Each hypothesis must state a prediction. Present to user before testing.

  - id: diagnose/diagnose-instrument
    path: diagnose-instrument.j2
    type: KnowAct
    lexicon_terms: [probe, instrument, constrain, isolate, verify]
    description: >
      Instrument the code with targeted probes mapped to specific hypotheses.
      Change one variable at a time. Use tagged diagnostic logs or breakpoints.

  - id: diagnose/diagnose-fix
    path: diagnose-fix.j2
    type: KnowAct
    lexicon_terms: [fix, verify, audit, document, calibrate]
    description: >
      Apply fix with regression test (before the fix). Verify original repro
      no longer reproduces. Clean up instrumentation. Write post-mortem.

  - id: diagnose/diagnose-convergence-check
    path: diagnose-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for diagnosis cycles.
      Outputs `convergence_metric` in [0,1], where 0 means root cause and fix
      confidence are sufficient for exit.
