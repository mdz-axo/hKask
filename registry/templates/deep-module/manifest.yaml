# Template crate manifest for deep-module skill
# ℏKask v0.27.0

crate:
  name: deep-module
  version: "0.28.0"
  description: >
    Module design discipline based on John Ousterhout's "A Philosophy of Software
    Design." Apply the deletion test to evaluate whether a module deserves to exist:
    delete the callers — if complexity reappears, extract. Delete the module — if
    complexity vanishes, don't create it. Enforces depth (high benefit/cost ratio),
    interface minimalism (≤7 public functions), and dependency direction.

templates:
  - id: deep-module/deep-module-assess
    path: deep-module-assess.j2
    type: KnowAct
    lexicon_terms: [assess, classify, evaluate, detect, infer]
    description: >
      Assess module depth: enumerate public interface items, evaluate behavior
      complexity, compute depth score, classify as Deep/Adequate/Shallow/
      Very Shallow. Identify interface cost drivers and behavior gaps.

  - id: deep-module/deep-module-delete
    path: deep-module-delete.j2
    type: KnowAct
    lexicon_terms: [critique, evaluate, discriminate, audit, verify]
    description: >
      Execute the deletion test in both directions: caller's perspective
      (complexity reappears?) and module's perspective (complexity vanishes?).
      Produce a definitive keep/extract/don't create recommendation.

  - id: deep-module/deep-module-design
    path: deep-module-design.j2
    type: KnowAct
    lexicon_terms: [design, simplify, constrain, specify, structure]
    description: >
      Design a deep module interface from deletion test results. Minimize public
      surface, hide information, design for caller mental model, unify config
      and errors. Produce a module specification with ≤7 public functions.

hlexicon_terms:
  - assess
  - classify
  - evaluate
  - detect
  - infer
  - critique
  - discriminate
  - audit
  - verify
  - design
  - simplify
  - constrain
  - specify
  - structure
