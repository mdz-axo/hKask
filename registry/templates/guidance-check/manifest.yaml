manifest:
  id: guidance-check
  name: guidance_check
  description: "Map management guidance to calibrated DCF assumption ranges"
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.20
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 2
  min_iterations: 1

gas:
  cap: 50000
  cost_per_iteration: 100

rjoule:
  cap: 16000
  cost_per_token: 0.25

inputs:
  - name: symbol
    type: string
    required: true

steps:
  - ordinal: 1
    action: execute
    description: Fetch company profile
    tool: company_profile
    mcp: hkask-mcp-companies
    arguments:
      symbol: "${input.symbol}"

  - ordinal: 2
    action: execute
    description: Search for management guidance and outlook
    tool: research_search
    mcp: hkask-mcp-companies
    arguments:
      symbol: "${input.symbol}"
      query: "management guidance outlook forecast 2025 2026 earnings call"

  - ordinal: 3
    action: execute
    description: Fetch key metrics for historical calibration context
    tool: key_metrics
    mcp: hkask-mcp-companies
    arguments:
      symbol: "${input.symbol}"
      limit: 5

  - ordinal: 4
    action: select
    description: Extract guidance statements and calibrate assumption ranges
    renderer: minijinja
    template_ref: guidance-check/guidance-check
    gas_cap: 4500
    timeout_seconds: 60
    arguments:
      symbol: "${input.symbol}"
      company_name: "${step_1_result.companyName | default(input.symbol)}"
      claims: "${step_2_result.claims}"
      historical_context: "${step_3_result | default({})}"

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1

ocap:
  required_capabilities:
    - resource: mcp
      action: execute
      mcp_server: hkask-mcp-companies
      tool: company_profile
      gas_budget: 500
    - resource: mcp
      action: execute
      mcp_server: hkask-mcp-companies
      tool: research_search
      gas_budget: 2000
    - resource: mcp
      action: execute
      mcp_server: hkask-mcp-companies
      tool: key_metrics
      gas_budget: 500
    - resource: template
      action: render
      template_id: guidance-check/guidance-check
      gas_budget: 4500
  delegation_chain_required: true
