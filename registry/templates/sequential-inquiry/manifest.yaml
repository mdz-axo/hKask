# Template crate manifest for sequential-inquiry skill
# hKask v0.31.0

crate:
  name: sequential-inquiry
  version: "0.31.0"
  description: >
    Dynamic chain-of-thought reasoning engine with branching, revision,
    hypothesis testing, and automatic deep-dive delegation to specialized
    skills (hypothesis-framer, mcda, diagnose, falsifiability). Subsumes the
    deprecated sequential-thinking skill. The engine decides at runtime
    whether delegation is needed — no pre-selection. Templates: reasoning
    engine, four delegation targets (hypothesis-framer, mcda, diagnose,
    falsifiability), and a convergence check.

templates:
  - id: sequential-inquiry/sequential-inquiry-engine
    name: "Core reasoning engine — advances one chain-of-thought step, deciding…"
    path: sequential-inquiry-engine.j2
    type: KnowAct
    lexicon_terms: [reason, analyze, hypothesize, verify, revise, branch, delegate, converge, synthesize, decompose, calibrate]
    description: >
      Core reasoning engine — advances one chain-of-thought step, deciding
      whether to continue, branch, revise, delegate, or converge based on
      the current reasoning state.

  - id: sequential-inquiry/sequential-inquiry-delegate-hypothesis-framer
    name: "Delegation target — frames a research question / testable hypothesis…"
    path: sequential-inquiry-delegate-hypothesis-framer.j2
    type: KnowAct
    lexicon_terms: [delegate, frame, evaluate, structure, hypothesize]
    description: >
      Delegation target — frames a research question / testable hypothesis
      via FINER + PICO when the engine detects a question-framing subproblem.

  - id: sequential-inquiry/sequential-inquiry-delegate-mcda
    name: "Delegation target — multi-criteria decision analysis when the engine…"
    path: sequential-inquiry-delegate-mcda.j2
    type: KnowAct
    lexicon_terms: [delegate, compare, weight, rank, decide]
    description: >
      Delegation target — multi-criteria decision analysis when the engine
      detects a choice among alternatives requiring structured tradeoff.

  - id: sequential-inquiry/sequential-inquiry-delegate-diagnose
    name: "Delegation target — disciplined diagnosis loop when the engine…"
    path: sequential-inquiry-delegate-diagnose.j2
    type: KnowAct
    lexicon_terms: [delegate, detect, reproduce, hypothesise, instrument]
    description: >
      Delegation target — disciplined diagnosis loop when the engine detects
      a bug or regression requiring reproduce → anchor → hypothesize → fix.

  - id: sequential-inquiry/sequential-inquiry-delegate-falsifiability
    name: "Delegation target — eliminative inference engine when the engine…"
    path: sequential-inquiry-delegate-falsifiability.j2
    type: KnowAct
    lexicon_terms: [delegate, falsify, eliminate, counterfactual, corroborate]
    description: >
      Delegation target — eliminative inference engine when the engine branches
      on a counterfactual scenario or needs to rule out the untestable. Applies
      the Popper/Platt/Chamberlin/Pearl method: admit → hypothesize →
      counterfactual → discriminate → eliminate.

  - id: sequential-inquiry/sequential-inquiry-convergence-check
    name: "Convergence gate — evaluates whether the reasoning chain has reached…"
    path: sequential-inquiry-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Convergence gate — evaluates whether the reasoning chain has reached a
      defensible answer or requires another iteration.