# Template crate manifest for platform-health-scorer skill
# hKask v0.31.0

crate:
  name: platform-health-scorer
  version: "0.31.0"
  description: >
    Platform health scoring. Aggregates SLO compliance, contract violations,
    test pass rate, and Regulation variety into a single health score (0.0-1.0).

templates:
  - id: platform-health-scorer/query-slos
    name: "Query SLO evaluations from the Regulation event store"
    path: query-slos.j2
    type: KnowAct
    lexicon_terms: [query, retrieve, compute]
    description: Query SLO evaluations from the Regulation event store. Computes average error budget remaining, burn rate, breach count.
  - id: platform-health-scorer/query-contracts
    name: "Query contract violations from CI checks"
    path: query-contracts.j2
    type: KnowAct
    lexicon_terms: [query, retrieve, compute]
    description: Query contract violations from CI checks. Computes violation density, most-violated contracts, trend.
  - id: platform-health-scorer/query-tests
    name: "Query test pass rate from Regulation spans"
    path: query-tests.j2
    type: KnowAct
    lexicon_terms: [query, retrieve, compute]
    description: Query test pass rate from Regulation spans. Computes pass ratio, failing crates, flaky test count.
  - id: platform-health-scorer/query-regulation
    name: "Query Regulation variety metrics: overall deficit, critical/warning count,…"
    path: query-regulation.j2
    type: KnowAct
    lexicon_terms: [query, retrieve, compute]
    description: "Query Regulation variety metrics: overall deficit, critical/warning count, variety EMA. Computes variety health score."
  - id: platform-health-scorer/compute-score
    name: "Aggregate SLO, contract, test, and Regulation variety metrics into a single…"
    path: compute-score.j2
    type: KnowAct
    lexicon_terms: [compute, aggregate, score]
    description: Aggregate SLO, contract, test, and Regulation variety metrics into a single platform health score (0.0-1.0).
  - id: platform-health-scorer/convergence-check
    name: "Compute normalized convergence metric for health score PDCA cycles"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: Compute normalized convergence metric for health score PDCA cycles.
