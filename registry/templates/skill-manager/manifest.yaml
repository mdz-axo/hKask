# Template crate manifest for skill-manager skill
# ℏKask v0.24.0

crate:
  name: skill-manager
  version: "0.24.0"
  description: >
    Meta-skill for CRUD operations on the skill corpus. List, validate, build,
    install, and prune skills from within a session. Pairs with skill-discovery,
    skill-maintenance, and skill-translator for full lifecycle management.

templates:
  - id: skill-manager/skill-manager-validate
    path: skill-manager-validate.j2
    type: KnowAct
    lexicon_terms: [validate, verify, classify, audit, recommend]
    description: >
      Validate skills against format, quality, and safety checks. Check frontmatter
      format (name, description), instruction quality (imperative, concrete, no placeholders),
      and safety compliance (Magna Carta, headless, CNS spans, crate paths).

  - id: skill-manager/skill-manager-build
    path: skill-manager-build.j2
    type: KnowAct
    lexicon_terms: [create, specify, design, compose, verify]
    description: >
      Scaffold a new skill from a user description. Generate name, description,
      directory structure, and SKILL.md outline. Validate against format rules
      and confirm with user before writing.

hlexicon_terms:
  - validate
  - verify
  - classify
  - audit
  - recommend
  - create
  - specify
  - design
  - compose
  - install
  - prune
  - list
