# Template crate manifest for adversarial-red-team skill
# hKask v0.30.0

crate:
  name: adversarial-red-team
  version: "0.30.0"
  description: >
    Adversarial robustness testing. Select targets, generate adversarial inputs
    across multiple categories (injection, hijacking, exfiltration, tool misuse)
    at configurable persistence levels (single-shot, iterative multi-turn, or
    persistent adaptive attacks), and evaluate resistance rates against generated
    adversarial inputs.

templates:
  - id: adversarial-red-team/generate-adversarial
    name: "Generate adversarial inputs targeting a specific output across…"
    path: generate-adversarial.j2
    type: KnowAct
    lexicon_terms:
      [assess, detect, analyze, synthesize, probe, classify, sequence, escalate]
    description: >
      Generate adversarial inputs targeting a specific output across multiple
      vulnerability categories and injection vectors. Supports three persistence
      levels: single (one batch), iterative (multi-turn escalating scripts
      building on prior findings), and persistent (ongoing adaptive attack
      scripts with response-driven adaptation rules).

  - id: adversarial-red-team/select-target
    name: "Select the best adversarial target and map its vulnerability surface"
    path: select-target.j2
    type: KnowAct
    lexicon_terms: [classify, discriminate, calibrate, assess, orient]
    description: >
      Select the best adversarial target and map its vulnerability surface.
      Evaluates target domain against adversarial categories and calibrates
      intensity level.

  - id: adversarial-red-team/test-against-target
    name: "Test a target output against generated adversarial inputs"
    path: test-against-target.j2
    type: KnowAct
    lexicon_terms: [evaluate, verify, audit, score, detect, classify]
    description: >
      Test a target output against generated adversarial inputs. Evaluate
      resistance rate and identify critical failures that bypass defenses.

  - id: adversarial-red-team/adversarial-convergence-check
    name: "Compute normalized convergence metric for adversarial-red-team PDCA…"
    path: adversarial-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for adversarial-red-team PDCA cycles.
      Returns convergence_metric plus rationale and blockers.
