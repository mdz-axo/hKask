# Template crate manifest for kata-coaching skill
# hKask v0.27.0 — 5-question dialogue for teaching scientific thinking

crate:
  name: kata-coaching
  version: "0.27.0"
  description: >
    Toyota Kata Coaching Kata — the 5-question dialogue for teaching scientific
    thinking. Used by managers, supervisors, and Curator to coach learners through
    the Improvement Kata. The coach provides procedural guidance, not solutions.

templates:
  - id: kata-coaching/coaching-cycle
    path: coaching-cycle.j2
    type: FlowDef
    lexicon_terms: [sequence, coach, question, dialogue]
    description: >
      5-question Coaching Kata dialogue flow — orchestrates all five
      questions in the prescribed sequence.

  - id: kata-coaching/coaching-q1-target
    path: coaching-q1-target.j2
    type: WordAct
    lexicon_terms: [target, condition, goal]
    description: >
      Question 1: What is the Target Condition? Ground the learner in the goal.

  - id: kata-coaching/coaching-q2-actual
    path: coaching-q2-actual.j2
    type: WordAct
    lexicon_terms: [observe, measure, assess]
    description: >
      Question 2: What is the Actual Condition now? Ground the learner in reality.

  - id: kata-coaching/coaching-q3-obstacles
    path: coaching-q3-obstacles.j2
    type: WordAct
    lexicon_terms: [obstacle, focus, prioritize]
    description: >
      Question 3: What Obstacles do you see? Which ONE are you addressing now?

  - id: kata-coaching/coaching-q4-experiment
    path: coaching-q4-experiment.j2
    type: WordAct
    lexicon_terms: [experiment, predict, expect]
    description: >
      Question 4: What is your Next Step (next experiment)? What do you expect?

  - id: kata-coaching/coaching-q5-learn
    path: coaching-q5-learn.j2
    type: WordAct
    lexicon_terms: [learn, feedback, measure, reflect]
    description: >
      Question 5: How quickly can we go and see What we have Learned?

hlexicon_terms:
  - coach
  - question
  - dialogue
  - target
  - condition
  - goal
  - observe
  - measure
  - assess
  - obstacle
  - focus
  - prioritize
  - experiment
  - predict
  - expect
  - learn
  - feedback
  - reflect
  - sequence
