# Template crate manifest for skill-logic-audit
# hKask v0.28.0

# goal: Declare the runtime templates that implement the skill-logic-audit cascade and bind them to the Zed companion guide.

crate:
  name: skill-logic-audit
  version: "0.30.0"
  description: >
    Runtime templates for skill-logic-audit: load a goal annotation, critique
    the artifact against that goal, filter the critique for soundness, compose
    a concrete revised artifact and diff, and drive a bounded user-review loop.

templates:
  - id: skill-logic-audit/load-goal
    name: "Parse the annotated `goal:` block from a .j2 or manifest.yaml file…"
    path: load-goal.j2
    type: WordAct
    lexicon_terms: [extract, parse, specify, verify]
    description: >
      Parse the annotated `goal:` block from a .j2 or manifest.yaml file and
      return it as a normalized string. Verify that a goal exists and is
      non-empty.

  - id: skill-logic-audit/critique-template
    name: "Adversarial critique of a template or manifest body against its…"
    path: critique-template.j2
    type: KnowAct
    lexicon_terms: [critique, evaluate, discriminate, detect, classify]
    description: >
      Adversarial critique of a template or manifest body against its stated
      goal. List concrete flaws, redundancies, ambiguities, and missing cases,
      each anchored to the goal.

  - id: skill-logic-audit/critique-critique
    name: "Soundness review of a critique list"
    path: critique-critique.j2
    type: KnowAct
    lexicon_terms: [evaluate, verify, discriminate, classify, rank]
    description: >
      Soundness review of a critique list. Separate valid, goal-anchored
      concerns from spurious or stylistic ones. Produce a filtered list with
      rationale.

  - id: skill-logic-audit/compose-proposal
    name: "Compose a concrete revised artifact body and a unified diff against…"
    path: compose-proposal.j2
    type: KnowAct
    lexicon_terms: [synthesize, adapt, simplify, specify, verify]
    description: >
      Compose a concrete revised artifact body and a unified diff against the
      original, given the goal and the valid concerns. Do not weaken the
      contract or add stubs.

  - id: skill-logic-audit/user-choice
    name: "Present the composed proposal to the user and capture a discrete…"
    path: user-choice.j2
    type: WordAct
    lexicon_terms: [prompt, specify, discriminate, classify, verify]
    description: >
      Present the composed proposal to the user and capture a discrete choice:
      accept, reject, or counter-proposal. Enforce the configured loop depth
      limit and emit the next action.

  - id: skill-logic-audit/user-review-loop
    name: "Plan the bounded audit cascade routing (load-goal → critique-template…"
    path: user-review-loop.j2
    type: KnowAct
    lexicon_terms: [sequence, choice, iteration, escalate, route, compose]
    description: >
      Plan the bounded audit cascade routing (load-goal → critique-template →
      critique-critique → compose-proposal → user-choice) and the branching
      rules on accept/reject/counter-proposal. Does not execute the flow itself.

  - id: skill-logic-audit/convergence-check
    name: "Compute a normalized convergence metric for audit iterations"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute a normalized convergence metric for audit iterations.
      Uses calibrated verdict, valid concern count, and loop depth to output
      `convergence_metric` in [0,1], where 0 means no material flaws remain.
