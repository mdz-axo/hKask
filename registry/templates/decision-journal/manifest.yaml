# Template crate manifest for decision-journal skill
# hKask v0.28.0

crate:
  name: decision-journal
  version: "0.28.0"
  description: >
    Kahneman-style decision journal for improving judgment quality. Records
    decisions with reasoning and assumptions, defines calibrated probability
    predictions, revisits outcomes to measure accuracy via Brier scores.

templates:
  - id: decision-journal/compute-brier
    path: compute-brier.j2
    type: KnowAct
    lexicon_terms: [score, calibrate, evaluate, aggregate]
    description: >
      Compute Brier scores for decision calibration following the Good Judgment
      Project methodology. Detects overconfidence and underconfidence bias.

  - id: decision-journal/define-expected-outcomes
    path: define-expected-outcomes.j2
    type: KnowAct
    lexicon_terms: [predict, calibrate, plan, specify]
    description: >
      Define measurable expected outcomes with calibrated probability estimates,
      time horizons, and observable indicators for each decision entry.

  - id: decision-journal/record-decision
    path: record-decision.j2
    type: KnowAct
    lexicon_terms: [document, analyze, reflect, assess]
    description: >
      Record a decision with full context: reasoning, assumptions, alternatives
      considered, disconfirming evidence, emotional state, and bias awareness.

  - id: decision-journal/revisit-evaluate
    path: revisit-evaluate.j2
    type: KnowAct
    lexicon_terms: [evaluate, compare, calibrate, reflect]
    description: >
      Revisit a recorded decision by comparing predicted outcomes against
      actual results, performing hindsight bias checks, and evaluating
      process quality independently of outcome quality.
