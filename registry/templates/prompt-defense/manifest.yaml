# Template crate manifest for prompt-defense skill
# hKask v0.28.0

crate:
  name: prompt-defense
  version: "0.28.0"
  description: >
    Prompt injection defense analysis. Classifies threats across injection,
    jailbreak, and exfiltration vectors, maps attack surfaces and exploitation
    paths, and recommends layered defense strategies.

templates:
  - id: prompt-defense/analyze-attack-surface
    path: analyze-attack-surface.j2
    type: KnowAct
    lexicon_terms: [analyze, evaluate, detect, assess]
    description: >
      Map the attack surface for a given input and agent context.
      Identify exploitation paths and compute blast radius for each
      identified threat classification.

  - id: prompt-defense/classify-threat
    path: classify-threat.j2
    type: KnowAct
    lexicon_terms: [classify, detect, analyze]
    description: >
      Classify an input against threat categories: injection, jailbreak,
      exfiltration, and tool misuse. Produces threat classification with
      attack vectors and overall threat level.

  - id: prompt-defense/recommend-defenses
    path: recommend-defenses.j2
    type: KnowAct
    lexicon_terms: [recommend, isolate, monitor, audit]
    description: >
      Recommend layered defense strategies based on threat classification
      and exploitation paths. Identifies critical gaps and suggests
      sandbox-level adjustments.
