# Template crate manifest for document-update skill
# hKask v0.31.0 — consolidation-first redesign

crate:
  name: document-update
  version: "0.31.0"
  description: >
    Document consolidation and maintenance. Primary goal: sweep information
    into core documents and archive the originals, reducing corpus size and
    eliminating redundancy. Works with plain files and shell tools — no
    running hKask instance required. Five KnowAct templates.

templates:
  - id: document-update/doc-audit
    path: doc-audit.j2
    type: KnowAct
    lexicon_terms: [audit, map, walk, classify, target]
    description: >
      Walk the docs/ corpus. Identify consolidation targets (the core
      documents that absorb related content) and children (documents
      that should be merged into targets or archived). Count line
      lengths to flag thin docs as consolidation candidates.

  - id: document-update/doc-identify
    path: doc-identify.j2
    type: KnowAct
    lexicon_terms: [identify, classify, flag, dispose, plan]
    description: >
      For each non-target document, determine its disposition: MERGE
      (unique content → sweep into target), ARCHIVE (historical, no
      unique content), or KEEP (standalone, no overlap). Every
      document gets a disposition.

  - id: document-update/doc-merge
    path: doc-merge.j2
    type: KnowAct
    lexicon_terms: [merge, extract, incorporate, consolidate, sweep]
    description: >
      Extract unique information from child documents and merge it
      into their consolidation targets. Preserve code references,
      diagrams, and citations. Flag conflicts for manual resolution.
      Add "Incorporated from" attribution headers.

  - id: document-update/doc-archive
    path: doc-archive.j2
    type: KnowAct
    lexicon_terms: [archive, delete, remove, retire, cleanup]
    description: >
      Remove merged and stubbed documents. Git rm merged children.
      Delete stubs/redirects immediately. Fix all cross-references
      to point to the target document sections. Verify with
      check-links.sh.

  - id: document-update/doc-refresh-portal
    path: doc-refresh-portal.j2
    type: KnowAct
    lexicon_terms: [refresh, update, catalog, verify, index]
    description: >
      Update docs/README.md portal and architecture master index to
      reflect the reduced corpus. Remove entries for archived/deleted
      docs. Update document counts. Verify every listed path exists.

  - id: document-update/doc-structured-pass
    path: doc-structured-pass.j2
    type: KnowAct
    lexicon_terms: [audit, classify, consolidate, verify, plan]
    description: >
      Convert document-audit guidance into structured consolidation output.

  - id: document-update/doc-convergence-check
    path: doc-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for document-update PDCA cycles.
