# Template crate manifest for coding-guidelines skill
# ℏKask v0.22.0

crate:
  name: coding-guidelines
  version: "0.22.0"
  description: >
    Behavioral guardrails for LLM coding based on Karpathy's four principles:
    Think Before Coding, Simplicity First, Surgical Changes, Goal-Driven Execution.
    An Encoded Preference skill: constrains HOW the agent codes, not WHAT it codes.

templates:
  - id: coding-guidelines/guidelines-assess
    path: guidelines-assess.j2
    type: KnowAct
    lexicon_terms: [assess, orient, detect, classify, discriminate]
    description: >
      Assess a coding task against four behavioral principles before implementation.
      Surfaces assumptions, simplicity risks, scope creep warnings, and success criteria.

  - id: coding-guidelines/guidelines-apply
    path: guidelines-apply.j2
    type: KnowAct
    lexicon_terms: [constrain, apply, regulate, simplify, specify]
    description: >
      Generate constrained implementation directives from the assessment.
      Produces file-level guardrails, forbidden patterns, and style matching rules.

  - id: coding-guidelines/guidelines-verify
    path: guidelines-verify.j2
    type: KnowAct
    lexicon_terms: [verify, evaluate, discriminate, calibrate, audit]
    description: >
      Verify an implementation or diff against all four principles.
      Produces a violations report, compliance scores, and corrective recommendations.

hlexicon_terms:
  - assess
  - orient
  - detect
  - classify
  - discriminate
  - constrain
  - apply
  - regulate
  - simplify
  - specify
  - verify
  - evaluate
  - calibrate
  - audit
