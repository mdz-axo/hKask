# Template crate manifest for essentialist skill
# ℏKask v0.27.0

crate:
  name: essentialist
  version: "0.27.0"
  description: >
    General-purpose recursive eliminative interrogation. Enforces "always take
    away, never add" through a 3-gate challenge loop (Exist → Surface → Contract)
    that every artifact must survive before being committed. Delegates G1 to
    deep-module deletion test, G2 to deep-module surface assessment, and G3 to
    coding-guidelines abstraction audit.

templates:
  - id: essentialist/essentialist-flow
    path: essentialist-flow.j2
    type: FlowDef
    lexicon_terms:
      [
        sequence,
        iterate,
        evaluate,
        classify,
        discriminate,
        verify,
        audit,
        simplify,
        reduce,
        calibrate,
        constrain,
      ]
    description: >
      Orchestrate the 3-gate eliminative interrogation loop in either autonomous
      (agent evaluates and reduces without pause) or advisory (agent recommends,
      human accepts/rejects/overrides per gate) mode. Branch on pass/fail per
      gate, classify every finding by constraint-force (Prohibition → required,
      Guideline → suggested), escalate to human on retry exhaustion (3 max),
      abort on zero-delta completion. Delegates to deep-module (G1, G2) and
      coding-guidelines (G3) templates.

hlexicon_terms:
  - sequence
  - iterate
  - evaluate
  - classify
  - discriminate
  - verify
  - audit
  - simplify
  - reduce
  - calibrate
  - constrain
