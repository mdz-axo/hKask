# Template crate manifest for essentialist skill
# hKask v0.28.0

crate:
  name: essentialist
  version: "0.28.0"
  description: >
    General-purpose recursive eliminative interrogation. Enforces "always take
    away, never add" through a 3-gate challenge loop (Exist → Surface → Contract)
    that every artifact must survive before being committed. Delegates G1 to
    deep-module deletion test, G2 to deep-module surface assessment, and G3 to
    coding-guidelines abstraction audit.

templates:
  - id: essentialist/essentialist-flow
    path: essentialist-flow.j2
    type: KnowAct
    lexicon_terms:
      [
        sequence,
        iteration,
        evaluate,
        classify,
        discriminate,
        verify,
        audit,
        simplify,
        reduce,
        calibrate,
        constrain,
      ]
    description: >
      Run the 3-gate eliminative interrogation loop in either autonomous
      (agent evaluates and recommends without pause) or advisory (agent recommends,
      human accepts/rejects/overrides per gate) mode. Classify every finding by
      constraint-force (Prohibition → required, Guideline → suggested), escalate
      to human on retry exhaustion (3 max), abort on zero-delta completion.
      Delegates reasoning to deep-module (G1, G2) and coding-guidelines (G3)
      templates.
