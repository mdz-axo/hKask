# Template crate manifest for skill-maintenance skill
# hKask v0.31.0

crate:
  name: skill-maintenance
  version: "0.31.0"
  description: >
    Skill lifecycle management and maintenance. Registry crate (manifest.yaml + *.j2)
    is the canonical source of truth; SKILL.md is a generated companion.
    Audit staleness, coverage gaps, and quality. List, build, validate, install,
    translate, and prune skills. Pairs with skill-discovery and skill-bundler.

templates:
  - id: skill-maintenance/skill-maintenance-validate
    path: skill-maintenance-validate.j2
    type: KnowAct
    lexicon_terms: [validate, verify, classify, audit, recommend]
    description: >
      Validate skills against registry format and quality checks. Check manifest
      structure, .j2 frontmatter (template_type, contract, visibility, energy_cap).
      SKILL.md is validated as secondary companion.

  - id: skill-maintenance/skill-maintenance-build
    path: skill-maintenance-build.j2
    type: KnowAct
    lexicon_terms: [create, specify, design, compose, verify]
    description: >
      Scaffold a new registry crate from a user description. Generate manifest.yaml
      with crate metadata, template entries, and lexicon_terms. Generate companion
      SKILL.md from the registry crate. Validate and confirm before writing.

  - id: skill-maintenance/skill-maintenance-translate
    path: skill-maintenance-translate.j2
    type: KnowAct
    lexicon_terms: [translate, adapt, extract, compose, verify]
    description: >
      Forward translation: convert a classified source skill into a hKask registry crate
      (manifest.yaml + *.j2 templates). Map source elements to hKask equivalents,
      drop concepts with no equivalent, produce validated output with translation summary.

  - id: skill-maintenance/skill-maintenance-reverse
    path: skill-maintenance-reverse.j2
    type: KnowAct
    lexicon_terms: [translate, extract, compose, generate, verify]
    description: >
      Reverse translation: generate a SKILL.md companion from a registry crate.
      Read manifest.yaml for crate metadata, read .j2 templates for methodology,
      produce a markdown companion suitable for the Zed coding agent.

  - id: skill-maintenance/skill-maintenance-prose
    path: skill-maintenance-prose.j2
    type: KnowAct
    lexicon_terms: [synthesize, extract, compose, derive, instruct]
    description: >
      Prose-only derivation: synthesize the "When to Use" and "Instructions"
      sections of a SKILL.md from a registry crate, emitted as raw markdown.
      Used by `kask skill derive` alongside the mechanically-built skeleton
      (frontmatter, templates table, constraints) — the LLM only writes the
      prose that needs synthesis, not the structural parts copied from the registry.
