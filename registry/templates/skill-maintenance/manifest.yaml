# Template crate manifest for skill-maintenance skill
# hKask v0.28.0

crate:
  name: skill-maintenance
  version: "0.28.0"
  description: >
    Audit the skill corpus for staleness, coverage gaps, and quality degradation.
    Registry crate (manifest.yaml + *.j2) is the canonical source of truth.
    Detect broken references, contract drift, invalid template types. Score skills
    and recommend retirement. Full lifecycle from active to retired.

templates:
  - id: skill-maintenance/skill-maintenance-audit
    path: skill-maintenance-audit.j2
    type: KnowAct
    lexicon_terms: [audit, detect, score, classify, recommend]
    description: >
      Audit a registry crate for staleness: manifest version freshness, .j2 contract
      drift, template_type validity, hLexicon coverage, energy_cap range, visibility
      values. Produce health scores and deprecation recommendations.

  - id: skill-maintenance/skill-maintenance-coverage
    path: skill-maintenance-coverage.j2
    type: KnowAct
    lexicon_terms: [map, trace, gap, classify, prioritize]
    description: >
      Analyze coverage gaps across the registry corpus. Map common task patterns
      to existing registry crates, identify uncovered patterns, check template_type
      and hLexicon distribution. Produce recommendations for skill creation or discovery.
