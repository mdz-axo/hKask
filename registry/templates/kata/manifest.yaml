# Template crate manifest for kata bundle skill
# hKask v0.27.0 — Toyota Kata system orchestration

crate:
  name: kata
  version: "0.27.0"
  description: >
    Toyota Kata system orchestrator. Composes kata-starter, kata-improvement,
    and kata-coaching into a coherent scientific capability development practice.
    Routes agents to the appropriate kata based on context and manages transitions.

templates:
  # ── Routing ────────────────────────────────────────────────────────────
  - id: kata/kata-selector
    path: kata-selector.j2
    type: KnowAct
    lexicon_terms: [select, classify, match, discriminate]
    description: >
      Route agent to the appropriate kata (starter, improvement, or coaching)
      based on context: skill level, automaticity, capability gaps.

  - id: kata/consent-and-select
    path: consent-and-select.j2
    type: KnowAct
    lexicon_terms: [consent, select, verify, discriminate]
    description: >
      Verify consent before executing any kata. Route based on consent model
      (self for starter, Curator for improvement, learner for coaching).

  # ── Outcome & Habit ───────────────────────────────────────────────────
  - id: kata/outcome-and-habit
    path: outcome-and-habit.j2
    type: KnowAct
    lexicon_terms: [synthesize, assess, evaluate, habit]
    description: >
      Synthesize kata outcome with habit assessment (automaticity score,
      streak days, intervention needs).

  - id: kata/habit-intervention
    path: habit-intervention.j2
    type: WordAct
    lexicon_terms: [intervene, encourage, remind, habit]
    description: >
      Generate intervention message when habit is at risk (3+ days without
      practice). Triggered by CNS algedonic alert.

  # ── Iteration ─────────────────────────────────────────────────────────
  - id: kata/iteration-check
    path: iteration-check.j2
    type: KnowAct
    lexicon_terms: [detect, evaluate, variance, confidence]
    description: >
      Check if iteration is needed based on variance or low confidence
      in improvement kata outcomes.

  - id: kata/iteration-comparison
    path: iteration-comparison.j2
    type: KnowAct
    lexicon_terms: [compare, evaluate, variance, confidence, select]
    description: >
      Compare all iterations for variance assessment and confidence building.

  # ── Composition ───────────────────────────────────────────────────────
  - id: kata/kata-switch-check
    path: kata-switch-check.j2
    type: KnowAct
    lexicon_terms: [switch, compose, evaluate, consent]
    description: >
      Check if kata switching is requested and validate against composition
      rules (starter→improvement, improvement↔coaching).

hlexicon_terms:
  - select
  - classify
  - match
  - discriminate
  - consent
  - verify
  - synthesize
  - assess
  - evaluate
  - habit
  - intervene
  - encourage
  - remind
  - detect
  - variance
  - confidence
  - compare
  - switch
  - compose
