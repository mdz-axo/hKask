# Template crate manifest for kata bundle skill
# hKask v0.31.0

crate:
  name: kata
  version: "0.31.0"
  description: >
    Kata system orchestrator — routes agents to starter/improvement/coaching
    based on automaticity, history, and context. Manages habit monitoring,
    iteration, and composition switching. The three cycle templates bridge
    the bundle → sub-skill boundary for each kata type.

templates:
  - id: kata/consent-and-select
    path: consent-and-select.j2
    type: KnowAct
    lexicon_terms: [consent, verify, route, classify, select]
    description: >
      Verify P2 consent then route to selected kata type. Subsumes the
      former kata-selector functionality — kata type selection happens
      inline during consent verification.

  - id: kata/starter-cycle
    path: starter-cycle.j2
    type: KnowAct
    lexicon_terms: [execute, practice, exercise, reflect, record]
    description: >
      Bridge template for kata-pattern → kata-starter delegation.
      Provides execution context when kata_type == "starter".

  - id: kata/improvement-cycle
    path: improvement-cycle.j2
    type: KnowAct
    lexicon_terms: [execute, plan, measure, experiment, reflect]
    description: >
      Bridge template for kata-pattern → kata-improvement delegation.
      Provides execution context when kata_type == "improvement".

  - id: kata/coaching-cycle
    path: coaching-cycle.j2
    type: KnowAct
    lexicon_terms: [execute, query, probe, guide, reflect]
    description: >
      Bridge template for kata-pattern → kata-coaching delegation.
      Provides execution context when kata_type == "coaching".

  - id: kata/outcome-and-habit
    path: outcome-and-habit.j2
    type: KnowAct
    lexicon_terms: [synthesize, assess, compare, monitor, reflect]
    description: Synthesize kata outcome with habit assessment (automaticity, streak, delta).

  - id: kata/habit-intervention
    path: habit-intervention.j2
    type: WordAct
    lexicon_terms: [prompt, pledge, promise, commit, instruct]
    description: Generate encouraging intervention message when practice habit decays.

  - id: kata/iteration-check
    path: iteration-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, compare, decide, converge, iterate]
    description: Determine if kata cycle should be re-run (variance, confidence, budget).

  - id: kata/iteration-comparison
    path: iteration-comparison.j2
    type: KnowAct
    lexicon_terms: [compare, evaluate, classify, discriminate, select]
    description: Compare iteration outputs for variance, consistency, and best run.

  - id: kata/kata-switch-check
    path: kata-switch-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, route, decide, classify, monitor]
    description: Check if kata composition switching is appropriate mid-session.

  - id: kata/kata-convergence-check
    path: kata-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for kata practice sessions.
