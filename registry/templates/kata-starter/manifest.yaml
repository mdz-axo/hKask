# Template crate manifest for kata-starter skill
# hKask v0.27.0 — Foundational scientific thinking practice routines

crate:
  name: kata-starter
  version: "0.27.0"
  description: >
    Toyota Kata Starter practice routines for building foundational scientific
    thinking habits. Three deliberate practice routines: Five Questions Drill,
    PDCA Cycle, and Observation Drill. Self-contained with no dependencies.

templates:
  - id: kata-starter/starter-cycle
    path: starter-cycle.j2
    type: FlowDef
    lexicon_terms: [practice, routine, habit, sequence]
    description: >
      Starter Kata practice cycle — orchestrates selection and execution
      of the appropriate starter routine.

  - id: kata-starter/starter-selector
    path: starter-selector.j2
    type: KnowAct
    lexicon_terms: [select, practice, habit, routine]
    description: >
      Select the appropriate starter routine (Five Questions, PDCA, or
      Observation Drill) based on learner state and progression.

  - id: kata-starter/starter-five-questions
    path: starter-five-questions.j2
    type: FlowDef
    lexicon_terms: [question, coach, practice]
    description: >
      Five Questions Drill — practice asking the 5 Coaching Kata questions
      in sequence to internalize the questioning pattern.

  - id: kata-starter/starter-pdca-cycle
    path: starter-pdca-cycle.j2
    type: FlowDef
    lexicon_terms: [plan, experiment, check, act]
    description: >
      PDCA Cycle — Plan-Do-Check-Act experimentation loop practiced on
      trivial, low-stakes processes.

  - id: kata-starter/starter-observation-drill
    path: starter-observation-drill.j2
    type: FlowDef
    lexicon_terms: [observe, discriminate, fact, interpret]
    description: >
      Observation Drill — distinguish facts from interpretations to build
      the foundation for Grasp Current Condition (IK Step 2).

hlexicon_terms:
  - practice
  - routine
  - habit
  - sequence
  - select
  - question
  - coach
  - plan
  - experiment
  - check
  - act
  - observe
  - discriminate
  - fact
  - interpret
