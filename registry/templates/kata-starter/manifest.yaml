# Template crate manifest for kata-starter skill
# hKask v0.28.0

crate:
  name: kata-starter
  version: "0.30.0"
  description: >
    Starter Kata practice templates for building foundational scientific
    thinking habits. Training wheels — agents graduate when automaticity > 0.5.
    Three drills: Five Questions, PDCA Cycle, Observation Drill.

templates:
  - id: kata-starter/starter-overview
    path: starter-overview.j2
    type: KnowAct
    lexicon_terms: [sequence, iterate, exercise, reflect, write]
    description: Starter Kata practice overview — select drill, exercise, reflect, write. Provides orientation and context; does not invoke sub-templates.

  - id: kata-starter/starter-selector
    path: starter-selector.j2
    type: KnowAct
    lexicon_terms: [select, classify, assess, recommend, route]
    description: Select appropriate starter drill based on history and automaticity.

  - id: kata-starter/starter-five-questions
    path: starter-five-questions.j2
    type: KnowAct
    lexicon_terms: [probe, query, challenge, exercise, iterate]
    description: Five Questions Drill — exercise asking the 5 coaching questions in order.

  - id: kata-starter/starter-pdca-cycle
    path: starter-pdca-cycle.j2
    type: KnowAct
    lexicon_terms: [plan, apply, evaluate, iterate, reflect]
    description: PDCA Cycle Drill — practice Plan-Do-Check-Act on a trivial process.

  - id: kata-starter/starter-observation-drill
    path: starter-observation-drill.j2
    type: KnowAct
    lexicon_terms: [observe, classify, discriminate, verify, reflect]
    description: Observation Drill — practice separating facts (IS) from interpretations (OUGHT).
