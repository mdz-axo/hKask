# Template crate manifest for media-workflow skill
# hKask v0.31.0
# Teaches agents to compose and execute multi-step Fal.ai media pipelines.

crate:
  name: media-workflow
  version: "0.31.0"
  description: >
    Multi-step media pipeline skill. Teaches agents to compose Fal.ai
    workflow DAGs from natural-language intent and execute them as atomic
    operations. Bridges the gap between single-call media tools and
    complex multi-step pipelines (e.g., generate → remove background →
    upscale). Uses media/workflow-composer to build the DAG and
    media.execute_workflow to run it.

templates:
  - id: media-workflow/compose-and-execute
    path: compose-and-execute.j2
    type: KnowAct
    lexicon_terms:
      [compose, generate, pipeline, chain, multi-step, workflow, batch]
    description: >
      Compose a Fal.ai workflow DAG from a natural-language media intent,
      then execute it as a single atomic operation. Use this when the user
      wants multiple media operations chained together (e.g., "generate a
      logo, remove its background, and upscale to 4K"). Delegates to
      media/workflow-composer for DAG construction and media.execute_workflow
      for execution.
