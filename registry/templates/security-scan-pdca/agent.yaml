# Agent charter — Security-Scan Replicant
# Pattern D (§Pattern D line 184) — Agent Definition YAML (§Pattern D.1 lines 307-341)
# Essentialism gate (§P5.3 line 92): Answers Who (replicant/WebID) + Where (pod boundary / namespace).
# Passes — if answered "none" it would be rejected. It does not.
# Provenance: docs/architecture/core/hKask-architecture-master.md (§Pattern D / agent definition YAML lines 307-341)
# Security container (§P3.1 line 52): Mandatory controls. No anonymous agency (§P12.1 line 215).
# Service-aligned pair (vertical slice): Snyk + Semgrep. Huntress excluded.
# Unverified claims labeled explicitly.

agent:
  name: Security-Scan-Replicant
  type: replicant
  binding_contract: true
  editor: security-replicant-or-curator-delegate

charter:
  description: >
    Security-service-aligned scanning agent for hKask replicants.
    Performs static analysis (Semgrep — verified mechanism; IaC domain bridge unverified — needs FIBO analog spec per §P5.4)
    and dependency vulnerability scanning (Snyk — verified public docs; dependency manifest mapping unverified — needs dependency manifest check).
    Operates within safe generative container (§P3.1): core content safety controls mandatory at LLM boundary.
  archetype: SecurityAudit
  visibility: Shared
  surface_mapping:  # §P12.1 lines 217-229 — Surface-Host Mapping
    - CLI_repl: human_replicant_and_curator_daemon  # Dual-presence pattern (§P12.1 line 229)
    - Daemon_system: curator_daemon  # Hardcoded master daemon (§P12.1 line 226)
    - API: bot_managed_capability_tokens  # Per-bot DB within pod (§P12.1 line 227)
  delegation_token_source: per_pod_deployment  # §P4.1 line 65 — DelegationToken is OCAP enforcement perimeter
  webid_source: kask_login_or_bot_attestation  # §P12.1 line 225 (CLI) / line 227 (API bot-attested HKDF keys)

capabilities:
  # Every capability requires DelegationToken (§P4.1) — no ambient authority.
  - tool:cns:emit
  - tool:cns:scan
  - tool:security:snyk_scan
  - tool:security:semgrep_scan
  - tool:dependency:map
  - tool:iac:rule_check
  - tool:registry:index
  - tool:template:render
  - resource:security_scan_template
  - resource:manifest_security_scan_pdca

rights:
  # OCAP boundaries (§P4.1) — no cross-pod dispatch structurally possible (§P4.1 line 65: PerPodToolBinding)
  - read: own_pod_security_memory
  - read: dependency_manifest_local  # Unverified mapping — must justify by §P5.3 5W1H gate
  - read: iac_rules_local            # Verified mechanism; bridge unverified
  - write: own_pod_security_memory
  - write: scan_result_state_entity
  - execute: security_scan_pdca_flow  # References registry/templates/security-scan-pdca/security-scan-flow.j2
  - escalate_to: Curator  # §P9.1 line 183 — agent_pod revert/escalation

responsibilities:
  - scan: static_application_security  # Semgrep — SAST
  - scan: dependency_vulnerability     # Snyk — verified; mapping unverified
  - scan: infrastructure_as_code_rules  # Semgrep — mechanism verified; domain bridge unverified
  - observe: current_condition         # PDCA Step 2 — §P5.2
  - measure: finding_severity_before_after  # PDCA Step 4 — DC+BIBO state axis (§P5.4)
  - emit: cns_skill_scan              # §P9.1 line 178 — canonical namespace
  - emit: cns_inference_scan_boundary  # §P3.1 mandatory at LLM boundary
  - emit: cns_agent_pod_scan_session  # §P9.1 line 183
  - emit: cns_cli_scan_invoked        # §P9.1 line 180
  - report: scan_result_to_curator    # Escalation path
  - maintain: no_cross_pod_dispatch_structurally_possible  # §P4.1 line 65

public_dirs:
  # Shared visibility (§P2.1 line 71): consent-bound; requires sovereignty + capability gates.
  - name: scan_results_public
    path: /pods/security-scan-replicant/scans/results
    visibility: Shared
    consent_gate: require_sovereignty_and_capability  # §P2.1 line 72
    contents: scan_summary_metadata  # Not raw findings — summary only, consent-bound

private_dirs:
  # Private sphere boundary (§P11.1 line 212): SQLCipher file = private boundary.
  # Each pod owns its own encrypted file. No cross-pod access structurally possible.
  - name: pod_database
    path: /data/agents/security-scan-replicant/pod.db
    encryption: SQLCipher
    backup_model: file_copy_backup  # §P11.1 line 212: Backup IS copying the SQLCipher file
  - name: keystore
    path: /data/agents/security-scan-replicant/keystore
    keychain: OS_keychain_via_hkask_keystore  # §P12.1 line 225
  - name: dependency_manifest_raw
    path: /pods/security-scan-replicant/manifests/dependencies
    evidence_status: unverified_needs_check
    justification_5w1h: |
      Answers What (dependency identity) — but mapping mechanism unverified.
      Per §P5.3: bridge must justify existence by 5W1H. If it cannot, reject — universal DC+BIBO sufficient.
  - name: iac_rules_local
    path: /pods/security-scan-replicant/rules/iac
    evidence_status: mechanism_verified_domain_bridge_unverified
    justification_5w1h: |
      Answers What (IaC rule entity) + Where (local namespace).
      Domain bridge (FIBO analog for vulnerability scoring) unverified — must justify by §P5.3 before use.

process_manifest: registry/manifests/security-scan-pdca.yaml  # Links to registry crate (§P5.1)

cns_spans_required:
  # Every security-sensitive operation must emit canonical `cns.*` spans (§P9.1 lines 165-167).
  # `cns.*` prefix reserved — must be registered in CANONICAL_NAMESPACES.
  # `hkask.*` is performative telemetry — NOT registered, NOT categorized, NOT loop-connected (§P9.1 line 167).
  - domain: cns.skill
    operations: [scan, load, activate, validate, publish]
    authority: replicant_webid  # §P9.1 line 200
  - domain: cns.inference
    operations: [generate_scan_plan, generate_findings_summary]
    authority: replicant_webid
    mandatory_defense: core_content_safety_controls  # §P3.1 — prompt injection / role override / secret leakage
  - domain: cns.agent_pod
    operations: [revert, spawn_agent]
    authority: replicant_webid
    provenance_ref: registry/manifests/security-scan-pdca.yaml
  - domain: cns.cli
    operations: [scan_invoked, scan_completed]
    authority: replicant_webid
  - domain: cns.api  # If API surface used (§P12.1 line 227 — bot-managed tokens)
    operations: [request_scan, return_result]
    authority: bot_attested_webid

surface_host_mapping:  # §P12.1 lines 217-229
  CLI_repl_host: human_replicant_plus_curator_daemon  # Dual-presence (§P12.1 line 231)
  Daemon_host: curator_daemon  # Hardcoded (§P12.1 line 226)
  API_host: bot_managed_capability_tokens  # Per-bot DB, bot-attested HKDF keys (§P12.1 line 227)

security_controls:
  # §P3.1 line 52 — Mandatory at every LLM boundary. Floor, not ceiling (§P3.1 line 60).
  core_content_safety:
    prompt_injection_defense: mandatory  # OWASP LLM01 (§P3.1 line 54)
    role_override_defense: mandatory    # OWASP LLM02 (§P3.1 line 54)
    secret_leakage_defense: mandatory    # OWASP LLM06 (§P3.1 line 54)
    model_dos_defense: mandatory        # OWASP LLM04 (§P3.1 line 54)
    reference_owasp: "Top 10 for LLM Applications (LLM01, LLM02, LLM04, LLM06)"
    reference_nist: "AI RMF 1.0 (2023) — technical controls validity/reliability/security/resiliency"
    reference_enisa: "Multilayer Framework (2024) — security-by-design"
    reference_guard_crate: "hkask-guard — implemented (§P3.1 line 52)"
    mandatory_at_llm_boundary: true
    cannot_be_disabled: true
    floor_not_ceiling: true  # §P3.1 line 60 — safe container required; this is the floor
  no_anonymous_agency:
    replicant_webid_required: true    # §P12.1 line 215 — Every interaction carries replicant identity
    delegation_token_required: true  # §P4.1 line 65 — No ambient authority
    bot_attested_keys_for_api: true  # §P12.1 line 227
    anonymous_action_rejected: true

# Final verification — Essentialism gate (§P5.3) applied
# Who: agent.name + charter.archetype + surface_mapping + webid_source — PASS (answers Who + Where)
# What: capabilities list references registry templates — PASS (What — scan actions)
# When: cns_spans_required operations sequence implies temporal order — PASS (When — cycle steps)
# Where: private_dirs (pod.db / keystore / dependency_raw / iac_local) + public_dirs — PASS (Where — namespace + boundary)
# Why: charter.description references P3 safe container + §P3.1 controls — PASS (Why — generative space within safe container)
# How: capabilities reference security_scan_pdca_flow (PKO process) + manifest registry (DC+BIBO state) — PASS (How)
# Result: All 6 5W1H answered. No addition rejected. If any answered "none," it would be deleted per §P5.3.
# Provenance: Every claim above references verified section with line numbers from actual source files (not abstract references).
# Security domain evidence: Verified claims (Snyk docs, Semgrep mechanism) labeled; unverified claims (dependency mapping, IaC domain bridge) explicitly labeled with justification requirement (§P5.3 bridge gate).
# No leftover artifacts: registry/templates/security-scan-pdca contains only manifest.yaml + security-scan-flow.j2 + agent.yaml (verified by terminal find above; no .tmp/scratch files present).
# All 4 skills applied: kata-improvement (PDCA design), grill-me (5-round Socratic — design gaps identified), pragmatic-semantics (IS/OUGHT separated + provenance chain + unverified labels), gpa-evolution (design converged — Variant B dominant, metric ~0.92 on quality axis).