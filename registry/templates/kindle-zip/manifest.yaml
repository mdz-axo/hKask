# Template crate manifest for kindle-zip
# ℏKask v0.30.0

crate:
  id: kindle-zip
  name: Kindle-Zip Templates
  version: "0.30.0"
  description: >
    Jinja2 templates for the Kindle-Zip pipeline: OCR configuration,
    content assembly with TOC structure, and format-agnostic export logic.
    All templates are KnowAct — they instruct the runtime on how to
    process, not what data to produce.
  editor: curator-or-human-admin
  visibility: Public

templates:
  - id: kindle-zip/configure-ocr
    path: configure-ocr.j2
    type: KnowAct
    description: "Select OCR model, token budget, and concurrency based on book complexity"

  - id: kindle-zip/assemble-content
    path: assemble-content.j2
    type: KnowAct
    description: "Assemble transcribed pages into structured content with TOC anchoring"

  - id: kindle-zip/ocr-system-prompt
    path: ocr-system-prompt.j2
    type: WordAct
    description: "System prompt for vision-model OCR of book page images"

  - id: kindle-zip/export-markdown
    path: export-markdown.j2
    type: KnowAct
    description: "Export assembled content as Markdown with chapter headings"

  - id: kindle-zip/export-epub-page
    path: export-epub-page.j2
    type: WordAct
    description: "Single EPUB chapter page template (XHTML content)"

  - id: kindle-zip/capture-page
    path: capture-page.j2
    type: KnowAct
    description: "Declarative page capture loop with CNS spans and resume support"

  - id: kindle-zip/verify-selectors
    path: verify-selectors.j2
    type: KnowAct
    description: "Self-test for Kindle UI selector drift detection and auto-repair"

  - id: kindle-zip/export-dispatch
    path: export-dispatch.j2
    type: KnowAct
    description: "Format export dispatcher — routes to format-specific sub-templates"

  - id: kindle-zip/export-pdf
    path: export-pdf.j2
    type: KnowAct
    description: "PDF export configuration with typography and TOC embedding"

dependencies:
  - template_id: inference/selectors/model-selector
    purpose: "Model tier selection for OCR"
