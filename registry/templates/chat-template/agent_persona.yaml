# Chat Template Crate — Ephemeral chat-session agent
#
# This is the minimal template crate for pod-mediated chat sessions.
# It defines an ephemeral replicant with inference capability and
# private episodic memory. Pods created from this template are
# transient — created per session, deactivated on exit.

agent:
  name: "{{ agent_name }}"
  type: Replicant
  version: "0.1.0"

charter:
  description: "Ephemeral chat session"
  editor: cli

capabilities:
  - "tool:inference:call"

rights: []

responsibilities: []

visibility:
  default: public
  episodic_override: private
