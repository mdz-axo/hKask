# Infrastructure config manifest for chat-template
# hKask v0.28.0
# This directory contains chat persona, dispatch, and hLexicon configuration.
# Not a skill template crate — no [inference] .j2 templates.

infrastructure:
  name: chat-template
  version: "0.28.0"
  description: >
    Chat session configuration: agent persona definitions, dispatch manifests,
    and hLexicon term mappings. Referenced by the runtime at session start.
  role: config
  contains:
    - agent_persona.yaml
    - dispatch_manifest.yaml
    - hlexicon.yaml
    - templates/