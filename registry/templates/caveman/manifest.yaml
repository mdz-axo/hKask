# Template crate manifest for caveman skill
# ℏKask v0.23.0

crate:
  name: caveman
  version: "0.23.0"
  description: >
    Ultra-compressed communication mode. Cuts token usage ~75% by dropping
    filler, articles, and pleasantries while keeping full technical accuracy.
    Active every response once triggered.

templates:
  - id: caveman/caveman-compress
    path: caveman-compress.j2
    type: WordAct
    lexicon_terms: [compress, distill, simplify, specify, document]
    description: >
      Compress a draft response into caveman mode: drop articles, filler,
      pleasantries, hedging. Preserve all technical substance. Insert
      clarity exceptions for security and irreversible actions.

hlexicon_terms:
  - compress
  - distill
  - simplify
  - specify
  - document
