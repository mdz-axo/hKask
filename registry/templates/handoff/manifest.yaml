# Template crate manifest for handoff skill
# hKask v0.28.0

crate:
  name: handoff
  version: "0.30.0"
  description: >
    Session context transfer skill. Compacts the current conversation into a
    structured handoff document that a fresh agent can use to pick up work
    cleanly — without duplicating file content. Includes artifact referencing,
    sensitive data redaction, and skill suggestion for the receiving agent.

templates:
  - id: handoff/handoff-compact
    name: "Compress session context into a structured summary with purpose,…"
    path: handoff-compact.j2
    type: KnowAct
    lexicon_terms: [compact, distill, extract, summarize, crystallize]
    description: >
      Compress session context into a structured summary with purpose,
      progress, decisions, and current state. Reduces verbose conversation
      history to essential facts.

  - id: handoff/handoff-artifacts
    name: "Identify and catalog artifacts by path or URL reference"
    path: handoff-artifacts.j2
    type: KnowAct
    lexicon_terms: [catalog, reference, classify, detect, redact]
    description: >
      Identify and catalog artifacts by path or URL reference. Detect and
      flag sensitive data (API keys, tokens, PII) for redaction.

  - id: handoff/handoff-skills-suggest
    name: "Analyze session content and suggest relevant skills the next agent…"
    path: handoff-skills-suggest.j2
    type: KnowAct
    lexicon_terms: [suggest, match, prioritize, analyze, recommend]
    description: >
      Analyze session content and suggest relevant skills the next agent
      should invoke. Extract open questions and risks for the next session.

  - id: handoff/handoff-compose
    name: "Assemble the final handoff document from all gathered sections"
    path: handoff-compose.j2
    type: WordAct
    lexicon_terms: [compose, synthesize, structure, redact, document]
    description: >
      Assemble the final handoff document from all gathered sections.
      Apply redaction, format as structured markdown, and write to the
      OS temp directory.

  - id: handoff/handoff-convergence-check
    name: "Compute normalized convergence metric for handoff PDCA cycles"
    path: handoff-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for handoff PDCA cycles.
