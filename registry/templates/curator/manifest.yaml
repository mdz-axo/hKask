# Template crate manifest for curator skill
# hKask v0.28.0

crate:
  name: curator
  version: "0.28.0"
  description: >
    The canonical system persona for hKask. Gathers system state, diagnoses
    issues, calibrates thresholds, escalates critical alerts, and maintains
    system homeostasis through metacognitive selection and intervention.

templates:
  - id: curator/metacognition-calibrate
    path: metacognition-calibrate.j2
    type: KnowAct
    lexicon_terms: [calibrate, regulate, assess, evaluate, adapt]
    description: >
      Calibrate system thresholds and energy budgets based on observed
      performance metrics and bot success rates.

  - id: curator/metacognition-diagnose
    path: metacognition-diagnose.j2
    type: KnowAct
    lexicon_terms: [detect, analyze, evaluate, classify, infer]
    description: >
      Diagnose system issues from bot reports and CNS alerts. Analyze
      severity, trace to source bots, and propose remediation strategies.

  - id: curator/metacognition-escalate
    path: metacognition-escalate.j2
    type: KnowAct
    lexicon_terms: [escalate, prioritize, rank, evaluate, classify]
    description: >
      Escalate critical issues to the Administrator. Prepare structured
      notification with impact assessment and resolution attempt history.

  - id: curator/system_state_gather
    path: system_state_gather.j2
    type: KnowAct
    lexicon_terms: [synthesize, observe, analyze, assess, orient]
    description: >
      Gather and synthesize current system state from all bot reports and
      CNS monitoring data. Produce a unified system state assessment.
