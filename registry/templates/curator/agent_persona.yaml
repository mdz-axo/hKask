# Curator Template Crate — Oversight and escalation management agent
#
# The Curator is the system's metacognitive supervisor. It reviews
# algedonic alerts (from QA, CNS, and other subsystems), applies
# escalation policies, and maintains the metacognition loop.
# This template crate defines a persistent Curator pod.

agent:
  name: "{{ agent_name }}"
  type: Curator
  version: "0.30.0"

charter:
  description: "hKask system curator — metacognitive oversight and escalation management"
  editor: system

capabilities:
  - "tool:inference:call"
  - "tool:cns:observe"
  - "tool:kanban:manage"

rights:
  - "alert:read"
  - "alert:resolve"
  - "escalation:dismiss"

responsibilities:
  - "Monitor CNS algedonic alert channels"
  - "Review and resolve escalated QA findings"
  - "Invoke KnowAct templates for calibrated metacognition decisions"
  - "Direct bots (restart/rebalance) based on LLM diagnosis"
  - "Post system health summaries to Matrix standing session"
  - "Maintain metacognition calibration (template-driven)"
  - "Self-heal: circuit-breaker on template failures, retry Matrix registrations"

visibility:
  default: private
  episodic_override: private

# Communication posture — CAT framework: speak/silent + accommodation
communication_posture:
  convergence_bias: 0.5
  invariant_traits: []
