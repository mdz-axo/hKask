# Dispatch Manifest — Curator Template Crate
#
# Routes for the Curator pod:
# - metacognition: calibrate, diagnose, escalate, maintain, select
# - system_state: gather system health snapshot
# - inference: primary LLM reasoning
# - episodic: private memory for escalation history

dispatch:
  - id: metacognition_calibrate
    type: template
    route: curator/metacognition-calibrate
    description: "Calibrate Curator confidence against ground truth"

  - id: metacognition_diagnose
    type: template
    route: curator/metacognition-diagnose
    description: "Diagnose system anomalies from CNS alerts"

  - id: metacognition_escalate
    type: template
    route: curator/metacognition-escalate
    description: "Escalate unresolved alerts to human operator"

  - id: metacognition_respond
    type: template
    route: curator/metacognition-respond
    description: "Evaluate and respond to Matrix communication events using CAT"

  - id: system_state_gather
    type: template
    route: curator/system_state_gather
    description: "Gather system health snapshot from CNS and QA subsystems"

  - id: inference
    type: inference
    route: inference
    description: "Primary LLM inference for Curator reasoning"

  - id: episodic_write
    type: memory
    route: episodic
    action: write
    description: "Store escalation and resolution history"

  - id: episodic_recall
    type: memory
    route: episodic
    action: read
    description: "Recall past escalations and resolutions"
