# Template crate manifest for reasoning skill
# hKask v0.28.0

crate:
  name: reasoning
  version: "0.28.0"
  description: >
    Reasoning templates for atomic fact extraction and tool-augmented
    inference. Extracts atomic facts with confidence scores from evidence
    and performs constraint-guided convergent reasoning.

templates:
  - id: reasoning/reason_constrained
    path: reason_constrained.j2
    type: WordAct
    lexicon_terms: [infer, converge, verify, constrain]
    description: >
      Perform constraint-guided convergent reasoning with evidence and
      tool augmentation. Iterates toward conclusions bounded by
      project constraints and available evidence.

  - id: reasoning/reasoning
    path: reasoning.j2
    type: WordAct
    lexicon_terms: [deduce, infer, analyze, ground]
    description: >
      Extract atomic facts from evidence with confidence scores.
      Derives logical conclusions anchored in provided evidence
      and constraints.
