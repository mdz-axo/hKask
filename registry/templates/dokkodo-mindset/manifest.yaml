# Template crate manifest for dokkodo-mindset skill
# hKask v0.30.0

crate:
  name: dokkodo-mindset
  version: "0.30.0"
  description: >
    Metacognitive perceptual filter based on Miyamoto Musashi's 21 Dokkodo
    precepts. Applies the precepts as a perceptual lens to transform how the
    agent sees a situation — removing attachment-distorted preferences,
    resentment, fear, and customary bias — before downstream decision
    processes (pragmatic-laziness, essentialist, constraint-forces) evaluate
    the action landscape. Converges when δP = 0 (perceptual frame is
    stationary — no further distortions identified).

templates:
  - id: dokkodo-mindset/dokkodo-perceive
    path: dokkodo-perceive.j2
    type: KnowAct
    lexicon_terms:
      [
        accept,
        assess,
        clarify,
        classify,
        converge,
        detach,
        discriminate,
        endure,
        evaluate,
        perceive,
        reflect,
        relinquish,
        renounce,
      ]
    description: >
      Apply the 21 Dokkodo precepts as a perceptual filter. Identifies
      where attachment, preference, resentment, fear, or customary belief
      distort the perceived action landscape. Produces a clarified perception
      with precept alignment scores, identified distortions, and action
      landscape shift metrics. Self-converges: embedded δP = 0 check
      determines whether perception has reached stationary state.

  - id: dokkodo-mindset/dokkodo-convergence-check
    path: dokkodo-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for Dokkodo cycles.
      Outputs `convergence_metric` in [0,1], where 0 means the perceptual field
      is sufficiently de-attached for downstream reasoning.
