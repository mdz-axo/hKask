# Dokkodo Precept Config — Shared canonical source for all 21 precepts
# hKask v0.31.0 — Referenced by dokkodo-perceive.j2 and any skill
# that needs precept definitions (e.g., pragmatic-laziness pre-filter).
# License: CC-BY-4.0

precepts:
  cluster_a_perceptual_reset:
    name: Perceptual Reset
    precepts: [1, 4, 11, 12, 15, 19]
    items:
      - number: 1
        text: Accept things exactly as they are
        function: "Ground perception in reality, not in what you wish were true."
        governing: true
      - number: 4
        text: Think lightly of yourself but seriously of the world
        function: "Invert the ego-weighting. Self-importance distorts more perceptions than any other single bias."
      - number: 11
        text: In all things, have no preferences
        function: "Eliminate preference-driven path distortion. The lazy path is the one that minimizes action, not the one you prefer."
      - number: 12
        text: Be indifferent to where you live
        function: "Sever location-attachment. External circumstance is not identity."
      - number: 15
        text: Do not act following customary beliefs
        function: "Question the default. Custom is not truth — it's just what people got used to."
      - number: 19
        text: Respect Buddha and the Gods without counting on their help
        function: "Agency without dependency. Acknowledge the sacred without outsourcing responsibility."

  cluster_b_desire_management:
    name: Desire/Attachment Management
    precepts: [2, 5, 10, 13, 14, 18]
    items:
      - number: 2
        text: Do not seek pleasure for its own sake
        function: "Pleasure-seeking creates artificial gradients in the action landscape — paths appear easier because they feel good."
      - number: 5
        text: Avoid attachment to desire for as long as you live
        function: "Attachment adds friction — energy spent maintaining what you cling to."
      - number: 10
        text: Do not let yourself be guided by the feeling of lust or love
        function: "Strong emotion is not navigation. It's weather — acknowledge it, don't steer by it."
      - number: 13
        text: Do not pursue the taste of good food
        function: "Sensory preference is a local minimum. The body's cravings are not the Way's direction."
      - number: 14
        text: Do not hold on to possessions you no longer need
        function: "Carrying dead weight increases action. Everything you hold costs energy to maintain."
      - number: 18
        text: Do not seek to either goods or fiefs for your old age
        function: "Future-security hoarding distorts present perception. Plan, but don't let planning become attachment."

  cluster_c_emotional_resilience:
    name: Emotional Resilience
    precepts: [3, 6, 7, 8, 9]
    items:
      - number: 3
        text: Do not ever rely on a partial feeling
        function: "Incomplete data is not a foundation. Wait for clarity rather than acting on half-formed impressions."
      - number: 6
        text: Do not regret anything that you have done
        function: "Regret is action spent on an unchangeable past. It produces nothing."
      - number: 7
        text: Never be envious
        function: "Envy is friction from comparing your path to another's. Their path is not your path."
      - number: 8
        text: Never let yourself be saddened by a separation
        function: "Grief at loss is attachment in retrospect. What is gone is gone — perceive what remains."
      - number: 9
        text: Resentment and complaining are not appropriate for the warrior or for anyone else
        function: "Resentment is energy spent wishing the past were different. Complaint is friction without traction."

  cluster_d_existential_posture:
    name: Existential Posture
    precepts: [16, 17, 20, 21]
    items:
      - number: 16
        text: Do not collect weapons or train with weapons beyond what is useful
        function: "Tool accumulation is future-anxiety made material. Own what you use; use what you own."
      - number: 17
        text: Do not fear Death
        function: "The ultimate brachistochrone. When death is accepted, no path is too costly — the true least-action landscape becomes visible."
      - number: 20
        text: You may abandon your own body, but you must preserve your honor
        function: "Physical preservation is not the highest value. Some things cost more to preserve than to lose."
      - number: 21
        text: Never stray from the Way
        function: "The meta-precept. All 20 other precepts serve this one. When precepts conflict, the Way resolves."
        meta: true
