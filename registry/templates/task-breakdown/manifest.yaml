# Template crate manifest for task-breakdown skill
# hKask v0.31.0 — adapted from addyosmani/planning-and-task-breakdown

crate:
  name: task-breakdown
  version: "0.31.0"
  description: >
    Decompose work into small, verifiable, vertically-sliced tasks with explicit
    acceptance criteria and checkpoints. Convergent PDCA: gather read-only context
    and dependency graph, decompose (slice + write tasks in one producer), evaluate
    against sizing/red-flag/checkpoint criteria, iterate until the plan is stable,
    then finalize tasks/plan.md + tasks/todo.md with PKO process-axis anchors.
    Distinct from kanban-task-decomposition (single-pass board populate) and tdd
    (consumes the plan one vertical slice at a time).

templates:
  - id: task-breakdown/task-breakdown-plan
    name: "PLAN phase — read-only mode"
    path: task-breakdown-plan.j2
    type: KnowAct
    lexicon_terms:
      [orient, map, discriminate, specify, plan, trace, anchor]
    description: >
      PLAN phase — read-only mode. Read the spec and relevant codebase sections,
      identify existing patterns/conventions, build the dependency graph, and
      note risks/unknowns. No code is written. Produces context summary,
      dependency graph, and risk register.
    generates_spans:
      - cns.task-breakdown.plan

  - id: task-breakdown/task-breakdown-decompose
    name: "DO phase — single producer: slice vertically AND write tasks in one…"
    path: task-breakdown-decompose.j2
    type: KnowAct
    lexicon_terms:
      [decompose, slice, write, verify, sequence, discriminate]
    description: >
      DO phase — single producer: slice vertically AND write tasks in one step.
      Each task carries slice_id/feature_path, acceptance criteria, verification,
      dependencies, files, and scope (XS/S/M/L/XL). The PDCA loop re-enters here
      so refinement directives are task-addressable and re-slicing + re-writing
      happen together. Merges the former slice + write-tasks steps to fix the
      grain-mismatch (mirrors diataxis-diagram's single generate producer).
    generates_spans:
      - cns.task-breakdown.decompose

  - id: task-breakdown/task-breakdown-evaluate
    name: "CHECK phase — score the plan against six weighted criteria: task…"
    path: task-breakdown-evaluate.j2
    type: KnowAct
    lexicon_terms:
      [evaluate, score, audit, calibrate, classify]
    description: >
      CHECK phase — score the plan against six weighted criteria: task sizing
      (0.25), vertical-slice integrity (0.20), acceptance-criteria specificity
      (0.20), dependency ordering (0.15), checkpoint presence (0.10), red-flag
      absence (0.10). Emits specific refinement_directives for criteria above
      threshold — directives are task-addressable (consumed by decompose).
    generates_spans:
      - cns.task-breakdown.evaluate

  - id: task-breakdown/task-breakdown-quality-gate
    name: "Independent quality gate (fusion: false) — evaluates the plan WITHOUT…"
    path: task-breakdown-quality-gate.j2
    type: KnowAct
    lexicon_terms:
      [evaluate, audit, verify, score, calibrate, discriminate]
    description: >
      Independent quality gate (fusion: false) — evaluates the plan WITHOUT
      self-assessment bias, distinct from the producer-coupled evaluate step. Scores
      the six criteria independently, flags compensation masking, and detects bias
      deltas vs the producer's self-assessment. Mirrors superforecasting's
      forecast-quality-gate separation of concerns.
    generates_spans:
      - cns.task-breakdown.quality-gate

  - id: task-breakdown/task-breakdown-convergence
    name: "Compute normalized convergence metric from the evaluation scores"
    path: task-breakdown-convergence.j2
    type: KnowAct
    lexicon_terms:
      [evaluate, converge, score, verify, calibrate]
    description: >
      Compute normalized convergence metric from the evaluation scores. Weighted
      sum across six criteria, normalized to [0,1] where 0 = plan is complete,
      correctly ordered, properly sized, and free of red flags. Threshold 0.15.
    generates_spans:
      - cns.task-breakdown.converge

  - id: task-breakdown/task-breakdown-write-plan
    name: "ACT phase — finalize the plan into tasks/plan.md (overview,…"
    path: task-breakdown-write-plan.j2
    type: KnowAct
    lexicon_terms:
      [write, compose, structure, format, finalize]
    description: >
      ACT phase — finalize the plan into tasks/plan.md (overview, architecture
      decisions, phased task list with checkpoints, risks, open questions) and
      tasks/todo.md (checklist-style task list), with a pko_anchors map giving each
      element a PKO process-axis identity (Procedure, Step, StepVerification, etc.).
      The plan.md document itself carries DC+BIBO state metadata. Create the tasks/
      directory if absent.
    generates_spans:
      - cns.task-breakdown.write-plan