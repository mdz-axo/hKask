# Doc-Knowledge MCP Server Manifest
# Server: mcp-servers/hkask-mcp-doc-knowledge
# Purpose: Document parsing, chunking, QA generation

server:
  name: hkask-mcp-doc-knowledge
  version: 0.1.0
  description: Document knowledge extraction and QA generation

tools:
  - name: doc_knowledge_ping
    description: Liveness check and semantic memory availability
    inputs: []

  - name: doc_knowledge_chunk
    description: Chunk text at configurable token granularity (1 token ≈ 1.33 words)
    inputs:
      - text: string (required)
      - entity_ref_prefix: string (required)
      - max_tokens: "integer (default: 512)"
      - overlap_tokens: "integer (default: 64)"
      - strip_gutenberg: "boolean (default: false)"

  - name: doc_knowledge_detect_format
    description: Detect document format from path/extension
    inputs:
      - path: string (required)

  - name: doc_knowledge_extract_markdown
    description: Extract text and image references from markdown
    inputs:
      - content: string (required)
      - label: string (required)

  - name: doc_knowledge_extract_html
    description: Extract text from HTML content (strips tags)
    inputs:
      - content: string (required)
      - label: string (required)

  - name: doc_knowledge_parse
    description: Parse document into IR with multi-tier chunking (coarse/medium/fine)
    inputs:
      - path: string (required)
      - coarse_max_tokens: "integer (default: 2048)"
      - medium_max_tokens: "integer (default: 512)"
      - fine_max_tokens: "integer (default: 128)"

  - name: doc_knowledge_generate_qa
    description: Generate QA pairs from text chunk (returns structured prompt for routing through inference engine)
    inputs:
      - text: string (required)
      - chunk_id: string (required)
      - strategy: 'string (default: "default")'
      - bloom_levels: 'array[string] (default: ["factual", "conceptual"])'

  - name: doc_knowledge_store_qa
    description: Store QA items with provenance (requires semantic memory credentials)
    inputs:
      - qa_items: array[object] (required, each with question, answer, bloom_level)
      - source_document: string (required)

supported_formats:
  - markdown (.md, .markdown)
  - html (.html, .htm)
  - plain text (.txt)

credentials:
  - HKASK_MEMORY_DB (optional): Path to per-agent memory database for QA storage
  - HKASK_DB_PASSPHRASE (optional): Passphrase for the database (required if HKASK_MEMORY_DB is set)
