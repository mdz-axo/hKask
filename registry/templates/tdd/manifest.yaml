# Template crate manifest for tdd skill
# ℏKask v0.22.0

crate:
  name: tdd
  version: "0.22.0"
  description: >
    Test-driven development with red-green-refactor loop. Builds features or
    fixes bugs one vertical slice at a time. Enforces behavior testing through
    public interfaces, anti-horizontal-slicing, and minimal-implementation discipline.

templates:
  - id: tdd/tdd-plan
    path: tdd-plan.j2
    type: KnowAct
    lexicon_terms: [assess, orient, discriminate, specify, plan]
    description: >
      Plan a TDD cycle: identify public interfaces, prioritize behaviors to test,
      confirm crate scope, and get user approval before writing any code.

  - id: tdd/tdd-tracer
    path: tdd-tracer.j2
    type: KnowAct
    lexicon_terms: [detect, write, verify, constrain, specify]
    description: >
      Execute a tracer bullet: write ONE failing test for ONE behavior, then
      write the minimal code to make it pass. Proves the end-to-end path works.

  - id: tdd/tdd-refactor
    path: tdd-refactor.j2
    type: KnowAct
    lexicon_terms: [simplify, extract, deepen, verify, regulate]
    description: >
      Refactor while GREEN: extract duplication, deepen modules, apply SOLID
      principles. Verify tests still pass after each refactor step.

  - id: tdd/tdd-verify
    path: tdd-verify.j2
    type: KnowAct
    lexicon_terms: [verify, evaluate, audit, calibrate, classify]
    description: >
      Verify TDD cycle completion: all tests pass, clippy clean, no todo!/unimplemented!
      stubs, tests describe behavior not implementation, public-interface-only seams.

hlexicon_terms:
  - assess
  - orient
  - discriminate
  - specify
  - plan
  - detect
  - write
  - verify
  - constrain
  - simplify
  - extract
  - deepen
  - regulate
  - evaluate
  - audit
  - calibrate
  - classify
