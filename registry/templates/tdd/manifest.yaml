# Template crate manifest for tdd skill
# ℏKask v0.27.0

crate:
  name: tdd
  version: "0.28.0"
  description: >
    Test-driven development with red-green-refactor loop, MDS spec-anchored functional
    testing, and gap analysis. Builds features or fixes bugs one vertical slice at a
    time. Enforces behavior testing through public interfaces, spec traceability via
    // REQ: tags (anchored to MDS spec/goal/capture outputs), anti-horizontal-slicing,
    and minimal-implementation discipline. Five MDS categories: domain, composition,
    trust, lifecycle, curation.

templates:
  - id: tdd/tdd-plan
    path: tdd-plan.j2
    type: KnowAct
    lexicon_terms: [assess, orient, discriminate, specify, plan, trace]
    description: >
      Plan a TDD cycle: extract functional requirements from specifications,
      identify public interfaces, prioritize behaviors by risk (P0-P2+),
      and get user approval before writing any code.

  - id: tdd/tdd-tracer
    path: tdd-tracer.j2
    type: KnowAct
    lexicon_terms: [detect, write, verify, constrain, specify, trace]
    description: >
      Execute a tracer bullet: write ONE failing test for ONE behavior anchored
      to a spec requirement via spec_id (from spec/graph/query), then write
      the minimal code to make it pass.

  - id: tdd/tdd-refactor
    path: tdd-refactor.j2
    type: KnowAct
    lexicon_terms: [simplify, extract, deepen, verify, regulate, trace]
    description: >
      Refactor while GREEN: extract duplication, deepen modules, apply SOLID
      principles. Preserve // REQ: tags during refactoring. Verify tests still
      pass after each refactor step.

  - id: tdd/tdd-verify
    path: tdd-verify.j2
    type: KnowAct
    lexicon_terms: [verify, evaluate, audit, calibrate, classify, trace, map]
    description: >
      Verify TDD cycle completion: all tests pass, clippy clean, no todo!/unimplemented!
      stubs, tests describe behavior not implementation, spec traceability via // REQ:
      tags, functional coverage gaps identified.

  - id: tdd/tdd-gap-check
    path: tdd-gap-check.j2
    type: KnowAct
    lexicon_terms: [trace, map, gap, defer, classify, audit]
    description: >
      Functional gap analysis: compare specification requirements against tested
      behaviors. Identify uncovered requirements (gaps) and produce deferral
      recommendations for OPEN_QUESTIONS.md. P0 gaps MUST have tracer bullets.

hlexicon_terms:
  - assess
  - orient
  - discriminate
  - specify
  - plan
  - trace
  - detect
  - write
  - verify
  - constrain
  - simplify
  - extract
  - deepen
  - regulate
  - evaluate
  - audit
  - calibrate
  - classify
  - map
  - gap
  - defer
