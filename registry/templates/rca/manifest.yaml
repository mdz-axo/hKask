# Template crate manifest for rca skill
# hKask v0.28.0

crate:
  name: rca
  version: "0.28.0"
  description: >
    Root Cause Analysis toolkit. Defines precise problem statements, performs
    Ishikawa fishbone and 5-Whys causal chain analysis, and produces
    corrective action plans with verification steps.

templates:
  - id: rca/corrective-action
    path: corrective-action.j2
    type: KnowAct
    lexicon_terms: [fix, plan, recommend, verify]
    description: >
      Define corrective actions for validated root causes. Produces
      action items with owners, deadlines, systemic improvements,
      and a verification plan.

  - id: rca/define-problem
    path: define-problem.j2
    type: KnowAct
    lexicon_terms: [analyze, specify, isolate]
    description: >
      Define and scope a problem with precise, measurable specification.
      Distinguishes symptoms from potential causes and assigns severity.

  - id: rca/five-whys-chain
    path: five-whys-chain.j2
    type: KnowAct
    lexicon_terms: [trace, analyze, verify]
    description: >
      Build 5-Whys causal chains from prioritized causes to validated root
      causes. Cross-references chain outputs for consistency.

  - id: rca/ishikawa-6m
    path: ishikawa-6m.j2
    type: KnowAct
    lexicon_terms: [analyze, classify, decompose]
    description: >
      Perform Ishikawa fishbone analysis across the 6M categories:
      Machine, Method, Material, Measurement, Man, and Environment.
      Produces prioritized potential causes.
