# Template crate manifest for gentle-lovelace skill
# hKask v0.30.0

crate:
  name: gentle-lovelace
  version: "0.30.0"
  description: >
    Four-dimensional technical documentation quality evaluator. Scores writing
    on accessibility (Hopper), precision (Lovelace), findability (Schriver), and
    agent-correctness (Gentle) against embedded exemplar centroids.

templates:
  - id: gentle-lovelace/replica-report
    path: replica-report.j2
    type: KnowAct
    lexicon_terms: [evaluate, score, assess, recommend, analyze, compare]
    description: >
      Produce a structured diagnostic report from per-dimension cosine distance
      scores, with a diagnostic summary and actionable recommendations for
      improving the weakest writing dimensions.

  - id: gentle-lovelace/gentle-convergence-check
    path: gentle-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for gentle-lovelace PDCA cycles.
      Returns convergence_metric plus rationale.
