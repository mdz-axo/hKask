# Template crate manifest for codegraph skill
# hKask v0.31.0

crate:
  name: codegraph
  version: "0.31.0"
  description: >
    Code understanding engine templates for symbol summarization, complexity
    analysis, dead code detection, fix suggestions, embedding generation, and
    the codegraph skill flow (discover, query, analyze, context, convergence).

templates:
  # ── Skill flow templates (PDCA step-level prompts) ──
  - id: codegraph/codegraph-discover
    name: "Discover and map the target codebase area"
    path: codegraph-discover.j2
    type: KnowAct
    lexicon_terms: [discover, index, map, survey, structure]
    description: >
      Discover and map the target codebase area. Synthesizes index statistics
      and structure overview into a discovery summary with relevant crates
      and entry symbols for further traversal.

  - id: codegraph/codegraph-query
    name: "Query the code graph for symbols relevant to the userpod's goal"
    path: codegraph-query.j2
    type: KnowAct
    lexicon_terms: [query, search, find, locate, identify]
    description: >
      Query the code graph for symbols relevant to the userpod's goal.
      Scores results by relevance, identifies traversal targets, and flags
      gaps for further exploration.

  - id: codegraph/codegraph-analyze
    name: "Traverse the dependency graph and run quality analysis"
    path: codegraph-analyze.j2
    type: KnowAct
    lexicon_terms: [traverse, analyze, impact, complexity, dead_code]
    description: >
      Traverse the dependency graph and run quality analysis. Organizes
      results into dependency maps, caller maps, impact analysis, and
      quality findings with fix suggestions.

  - id: codegraph/codegraph-context
    name: "Assemble token-budgeted context from gathered analysis results for…"
    path: codegraph-context.j2
    type: KnowAct
    lexicon_terms: [context, assemble, budget, format, package]
    description: >
      Assemble token-budgeted context from gathered analysis results for
      downstream LLM use. Formats symbol definitions, doc comments, and
      key relationships within the specified token budget.

  - id: codegraph/codegraph-convergence-check
    name: "Compute normalized convergence metric for codegraph cycles"
    path: codegraph-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, assess]
    description: >
      Compute normalized convergence metric for codegraph cycles.
      Outputs `convergence_metric` in [0,1], where 0 means discovery, query,
      traversal, analysis, and context assembly are complete.

  # ── Utility templates (used by the MCP server internally) ──
  - id: codegraph/symbol-summarize
    name: "Generate one-sentence summaries of code symbols"
    path: symbol-summarize.j2
    type: KnowAct
    lexicon_terms: [summarize, describe, classify]
    description: Generate one-sentence summaries of code symbols.

  - id: codegraph/analysis-complexity
    name: "Analyze code complexity metrics for symbols and modules"
    path: analysis-complexity.j2
    type: KnowAct
    lexicon_terms: [analyze, measure, classify]
    description: Analyze code complexity metrics for symbols and modules.

  - id: codegraph/analysis-dead-code
    name: "Detect dead code and unused symbols"
    path: analysis-dead-code.j2
    type: KnowAct
    lexicon_terms: [analyze, detect, classify]
    description: Detect dead code and unused symbols.

  - id: codegraph/fix-suggestion
    name: "Generate fix suggestions for code issues"
    path: fix-suggestion.j2
    type: KnowAct
    lexicon_terms: [suggest, propose, fix]
    description: Generate fix suggestions for code issues.

  - id: codegraph/symbol-embedding
    name: "Generate embeddings for code symbols"
    path: symbol-embedding.j2
    type: KnowAct
    lexicon_terms: [embed, encode, vectorize]
    description: Generate embeddings for code symbols.