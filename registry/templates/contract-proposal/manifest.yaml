# Template crate manifest for contract-proposal skill
# hKask v0.28.0

crate:
  name: contract-proposal
  version: "0.28.0"
  description: >
    Replicant-driven behavioral contract proposal workflow. Guides agents through
    analyzing a function's behavior, proposing pre/post conditions, generating
    property-based tests, and submitting via kask contract propose for human consent.
    Encoded Preference skill: constrains HOW the agent writes contracts, not WHAT
    contract it proposes.

templates:
  - id: contract-proposal/contract-analyze
    path: contract-analyze.j2
    type: KnowAct
    lexicon_terms: [analyze, detect, discriminate, assess, classify]
    description: >
      Analyze a public function for contract opportunities. Reads implementation
      and existing tests, identifies preconditions and postconditions, and
      determines whether a property-based or example-based test is appropriate.

  - id: contract-proposal/contract-propose
    path: contract-propose.j2
    type: KnowAct
    lexicon_terms: [write, specify, constrain, verify, propose]
    description: >
      Generate a behavioral contract (/// REQ: pre/post) and a property-based
      test for a function, then submit via kask contract propose. Traces to the
      specification system via spec_id.

hlexicon_terms:
  - analyze
  - detect
  - discriminate
  - assess
  - classify
  - write
  - specify
  - constrain
  - verify
  - propose
  - contract
  - precondition
  - postcondition
  - invariant
