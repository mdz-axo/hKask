# Bootstrap Registry — core template definitions loaded at startup.
# Each entry maps to a RegistryEntry struct. Template types use domain-aligned names:
#   WordAct  — Jinja2 prompts ("what to say")
#   KnowAct  — Jinja2 cognition ("how to think")
#   FlowDef  — YAML process manifests ("what to do")
#
# cascade_level is always 0 at bootstrap; matroshka_limit is set at runtime.
# required_capabilities is always [] at bootstrap.

- id: wordact/selector
  template_type: WordAct
  name: "Template Selector"
  lexicon_terms:
    - recognize
    - classify
    - match
    - discriminate
  description: "Selects best-fit template for input context"
  source_path: registry/templates/wordact/selector.j2
  required_capabilities: []
  cascade_level: 0
  matroshka_limit: 7

