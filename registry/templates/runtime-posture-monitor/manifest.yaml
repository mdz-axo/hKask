# Registry manifest for runtime-posture-monitor skill
crate:
  name: runtime-posture-monitor
  version: "0.31.0"
  visibility: public
  description: >
    Runtime security posture monitoring skill for hKask. Observes runtime
    telemetry (hkask.* performative spans, cns.guard.* violations,
    cns.regulation events) to detect runtime threats: API endpoint abuse,
    bot traffic, LLM usage anomalies, and runtime dependency behavior
    anomalies. Distinct from supply-chain-sentinel (static manifest audit,
    P4 manifest boundary) — this skill observes runtime behavior (P4
    runtime boundary). Anchored to MITRE CWE (CWE-1357, CWE-829, CWE-200),
    OWASP LLM Top 10 (LLM06, LLM07), MITRE ATLAS (AML.TA0010). Consumes
    security/regressions/ as input; proposes RR-NNNN.yaml entries with
    surface: runtime. Emits cns.runtime.* spans (P9 — all registered in
    CANONICAL_NAMESPACES). Decomposed into 4 phases: select-signal →
    classify-threat → emit-regulation → convergence-check. Minimal (P5):
    answers all 5W1H; single skill, no bundle; complements
    supply-chain-sentinel (distinct P4 boundaries) and adversarial-red-team
    (synthetic vs real traffic).

templates:
  - id: runtime-posture-monitor/select-signal
    name: "Select runtime signal sources and discover telemetry"
    path: select-signal.j2
    type: KnowAct
    lexicon_terms: [select, discover, signal, runtime, telemetry, monitor]
    description: >
      Discover runtime signal sources within the deployed replicant host:
      hkask.* performative spans (tool invocations, inference calls,
      communication events), cns.guard.* violation spans (input/output
      filter firings, canary detections, runtime policy enforcements),
      cns.regulation events (action blocks, substitutions, plateaus).
      Reads regression library for existing surface: runtime checks.
      Signal parameter: guard | regulation | tool | inference | all.

  - id: runtime-posture-monitor/classify-threat
    name: "Classify runtime signals into threat patterns"
    path: classify-threat.j2
    type: KnowAct
    lexicon_terms: [classify, threat, anomaly, runtime, signal, pattern]
    description: >
      Read observed runtime signals. Classify into threat patterns:
      endpoint abuse (repeated tool calls exceeding baseline), bot traffic
      (automated request patterns), LLM usage spike (inference rate
      anomaly), dependency behavior anomaly (unexpected tool invocation
      chain). Apply pragmatic-cybernetics: IS/OUGHT (observed vs expected
      baseline), feedback loop polarity, variety, Good Regulator. Emit
      cns.runtime.classify spans per classified threat.

  - id: runtime-posture-monitor/emit-regulation
    name: "Synthesize runtime threats and propose regulation actions"
    path: emit-regulation.j2
    type: KnowAct
    lexicon_terms: [synthesize, regulate, emit, block, escalate, report]
    description: >
      Synthesize classified threats with MITRE CWE / OWASP LLM / ATLAS
      taxonomy. For each threat: emit cns.regulation event and trigger
      cns.guard.violation if blocking warranted. Propose RR-NNNN.yaml
      entries with surface: runtime for enforced CI gates. Produce
      verdict (Pass / Conditional / Fail) based on threat severity and
      defense-layer firing coverage.

  - id: runtime-posture-monitor/convergence-check
    name: "Compute runtime posture coverage metric"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, runtime, coverage, posture, regression]
    description: >
      Compute normalized convergence metric: unresolved runtime threats
      (0.40), defense-layer runtime coverage (0.25), threat-pattern
      taxonomy coverage (0.15), regression library growth (0.10), residual
      runtime risk (0.10). Converged when metric ≤ 0.10 with ≥5%
      improvement.
