# Registry manifest for runtime-posture-monitor skill
crate:
  name: runtime-posture-monitor
  version: "0.31.0"
  visibility: public
  description: >
    Runtime security audit skill for hKask. Observes `hkask.*` performative
    spans emitted by the running system and classifies runtime threats
    (API endpoint exposure, bot traffic, LLM usage spikes, runtime
    dependency behavior anomalies). Emits `cns.runtime.*` spans (P9) for
    its own PDCA loop and `cns.regulation` / `cns.guard.violation` for
    downstream defensive action. Proposes `surface: runtime` regressions
    in `security/regressions/` using the exact YAML format from
    `security/regressions/README.md`. P4 runtime boundary — distinct from
    `supply-chain-sentinel`'s manifest boundary (this skill reads only
    local CNS telemetry already emitted by the running system; no
    external package download). P12 replicant_host mandatory in every
    output. Anchored to MITRE CWE-1357 / CWE-829 / CWE-200, OWASP LLM06
    (Excessive Agency) / LLM07 (System Prompt Leakage), MITRE ATLAS
    AML.TA0010 (Exfiltration). Decomposed into 4 phases: select-signal →
    classify-threat → emit-regulation → convergence-check.

templates:
  - id: runtime-posture-monitor/select-signal
    name: "Select runtime signal sources and map signal types"
    path: select-signal.j2
    type: KnowAct
    lexicon_terms: [select, signal, runtime, telemetry, span]
    description: >
      Discover runtime signal sources (`hkask.*` performative spans,
      `cns.guard.*` violations, `cns.regulation` events). Map signal
      types to monitor (API endpoint exposure, bot detection, LLM usage
      anomalies, runtime dependency behavior). Read `security/regressions/`
      for existing `surface: runtime` entries. Emit `cns.runtime.select`
      span. Surface parameter: runtime (single surface).

  - id: runtime-posture-monitor/classify-threat
    name: "Classify observed runtime signals into threat patterns"
    path: classify-threat.j2
    type: KnowAct
    lexicon_terms: [classify, threat, runtime, signal, pattern]
    description: >
      Classify observed runtime signals into threat patterns (endpoint
      abuse, bot traffic, LLM usage spike, dependency behavior anomaly).
      Apply pragmatic-cybernetics (IS/OUGHT, epistemic mode, provenance,
      grill-me self-challenge, feedback loop polarity, variety, Good
      Regulator). Emit `cns.runtime.classify` span per classified threat.
      Every finding includes concrete runtime signal evidence (span
      target, timestamp, signal value). No synthetic signals.

  - id: runtime-posture-monitor/emit-regulation
    name: "Emit regulation events and propose runtime regressions"
    path: emit-regulation.j2
    type: KnowAct
    lexicon_terms: [emit, regulate, regression, runtime, guard]
    description: >
      For each classified threat, emit a regulation event
      (`cns.regulation`) and trigger a defensive action
      (`cns.guard.violation` if blocking is warranted). Propose
      `surface: runtime` regression entries using exact YAML format from
      `security/regressions/README.md`. Emit `cns.runtime.regulate` span.
      Produce verdict (Pass / Conditional / Fail).

  - id: runtime-posture-monitor/convergence-check
    name: "Compute runtime posture coverage metric"
    path: convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, runtime, coverage, regression]
    description: >
      Compute normalized convergence metric: unresolved runtime threats
      (0.40), defense-layer runtime coverage (0.25), threat-pattern
      taxonomy coverage (0.15), regression library growth (0.10),
      residual runtime risk (0.10). Emit `cns.runtime.convergence` span
      unconditionally (namespace registered in `CANONICAL_NAMESPACES`).
      Converged when metric ≤ 0.10 with ≥5% improvement.
