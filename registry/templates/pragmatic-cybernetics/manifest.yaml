# Template crate manifest for pragmatic-cybernetics skill
# hKask v0.28.0

crate:
  name: pragmatic-cybernetics
  version: "0.28.0"
  description: >
    Cybernetic reasoning framework for hKask's CNS. VSM mapping,
    feedback loop analysis (5 properties), variety engineering (Ashby's Law),
    Good Regulator check, and spec drift as cybernetic signal.

templates:
  - id: pragmatic-cybernetics/cybernetics-analyze-loop
    path: cybernetics-analyze-loop.j2
    type: KnowAct
    lexicon_terms: [detect, observe, discriminate, evaluate, orient]
    description: >
      Analyze a feedback loop on 5 properties: polarity, delay, gain,
      closure, fidelity. Diagnose broken loops and prescribe remediation.

  - id: pragmatic-cybernetics/cybernetics-variety-check
    path: cybernetics-variety-check.j2
    type: KnowAct
    lexicon_terms: [assess, rank, propose, evaluate, regulate]
    description: >
      Evaluate variety balance using Ashby's Law of Requisite Variety.
      Identify deficits, recommend attenuation or amplification strategies.

  - id: pragmatic-cybernetics/cybernetics-vsm-map
    path: cybernetics-vsm-map.j2
    type: KnowAct
    lexicon_terms: [map, classify, orient, integrate, assess]
    description: >
      Map hKask components to VSM S1–S5. Assess system viability and
      identify unviable components requiring structural intervention.
