# Template crate manifest for scenario-builder skill
# hKask v0.31.0

crate:
  name: scenario-builder
  version: "0.31.0"
  description: >
    Scenario planning methodology following Schwartz's framework. Refines
    focal questions, maps key forces and macro-level driving forces, generates
    divergent 2x2 scenario narratives, runs independent quality gate, and
    derives implications with early-warning indicators.

templates:
  - id: scenario-builder/axes-and-narratives
    path: axes-and-narratives.j2
    type: KnowAct
    lexicon_terms: [synthesize, explore, structure]
    description: >
      Generate divergent scenario narratives by selecting two critical
      uncertainty axes from identified driving forces. Produces four
      quadrant scenarios with internally consistent narratives.

  - id: scenario-builder/driving-forces
    path: driving-forces.j2
    type: KnowAct
    lexicon_terms: [analyze, classify, rank]
    description: >
      Map macro-level driving forces (STEEP: society, technology, economy,
      environment, politics) against an importance-uncertainty matrix to
      identify critical uncertainties.

  - id: scenario-builder/focal-question
    path: focal-question.j2
    type: KnowAct
    lexicon_terms: [specify, plan, structure]
    description: >
      Refine and bound the focal question with decision relevance, time
      horizon, and scope boundaries. Produces a current state summary.

  - id: scenario-builder/implications-indicators
    path: implications-indicators.j2
    type: KnowAct
    lexicon_terms: [monitor, recommend, predict]
    description: >
      Derive per-scenario implications and identify early-warning indicators.
      Produces robust strategies (for all scenarios) and contingent
      strategies (for specific unfoldings).

  - id: scenario-builder/key-forces
    path: key-forces.j2
    type: KnowAct
    lexicon_terms: [analyze, elicit, classify]
    description: >
      Identify micro-level forces: proximate factors, market dynamics,
      competitor actions, demand shifts, and regulatory changes. Clusters
      identified forces into thematic groups.

  - id: scenario-builder/scenario-convergence-check
    path: scenario-convergence-check.j2
    type: KnowAct
    lexicon_terms: [evaluate, converge, classify, verify, calibrate]
    description: >
      Compute normalized convergence metric for scenario-planning PDCA cycles.
      Uses independent quality gate output plus heuristic divergence checks.
      Returns convergence_metric plus rationale, blockers, and heuristic results.

  - id: scenario-builder/scenario-quality-gate
    path: scenario-quality-gate.j2
    type: KnowAct
    lexicon_terms:
      [
        evaluate,
        verify,
        gate,
        divergence,
        consistency,
        coverage,
        quality,
        calibrate,
      ]
    description: >
      Independent quality gate that evaluates scenario divergence, consistency,
      and coverage without self-assessment bias. Receives scenarios from the
      narrative generator and produces calibrated 0–1 scores plus a gate_pass
      determination with actionable fix notes.

# FlowDef orchestrator — chains all 7 steps with convergence criteria.
# CNS spans (cns.prompt.{select,render,outcome}) are emitted automatically
# by the flow engine for KnowAct steps; no explicit cns_spans needed.
flowdef:
  manifest: registry/manifests/scenario-builder.yaml
  description: >
    Convergent 7-step pipeline from focal-question refinement through
    scenario narratives, independent quality gate, implications extraction,
    and convergence. Implements convergence criteria (gate_pass +
    parametric_variation_flag + stall detector) and gas accounting. The
    loop restarts at narrative generation (step 4) to preserve upstream
    work across iterations.
