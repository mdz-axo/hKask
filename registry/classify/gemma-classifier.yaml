# Gemma Classifier — DeepInfra + Gemma 4 26B MoE
# Used by: kask embed-corpus (section_type classification pass)
# Model: google/gemma-4-26B-A4B-it (4B active, 26B total, non-reasoning)
# Provider: DeepInfra (cloud API, OpenAI-compatible)
#
# Multiple classifier configs can coexist in this directory.
# corpus.yaml references which one to use via the `classifier` field.

classifier:
  name: gemma-classifier
  model: google/gemma-4-26B-A4B-it
  provider: deepinfra
  concurrency: 150
  timeout_secs: 30

  # Prompt template
  system_prompt: >
    Classify. Return ONLY: {"category":"X"}.
    Statement=principle/rule/assertion.
    Evidence=example/data/citation (look for: "for instance", "for example").
    Diagram=structure/layout/mechanical description.
    Implications=consequence ("therefore", "thus", "hence").

  # API configuration
  base_url: https://api.deepinfra.com/v1/openai/chat/completions
  api_key_env: DEEPINFRA_API_KEY

  # Request parameters
  temperature: 0.0
  max_tokens: 15

  # Fallback when classification fails or no API key available
  fallback_category: Statement
