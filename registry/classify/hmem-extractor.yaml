# Triple Extractor — Qwen3 MoE classifier for semantic triple generation
# Used by: kask embed-corpus (triple extraction pass, after section_type)
# Prompting: Few-Shot (3-shot) with hKask-domain examples.
#   Martin et al. (arXiv:2603.29878): Few-Shot is the dominant strategy,
#   lifting F1 from <30% (Zero-Shot) to 99%+ across all tested models.
# Primary model: qwen/qwen3-235b-a22b-2507 (22B active, 235B total, MoE)
#   — controlled by HKASK_CLASSIFIER_MODEL_A env var / settings, NOT this YAML.
# Fallback model (this file): qwen/qwen3.5-35b-a3b (3B active MoE)
#   — used only if HkaskSettings.classifier_model() returns empty.
# Provider: KiloCode (cloud API via Kilo Gateway, OpenAI-compatible)
#
# Rationale: Martin et al. (arXiv:2603.29878) evaluated LLMs for RDF triple
# extraction and found Few-Shot learning is the dominant strategy:
#   Llama 99.35% | Qwen 99.22% | NuExtract 98.47% | Gemma 94.81%
# Qwen3-235B-A22B: $0.07/$0.10 per 1M tokens, Qwen3.5-35B-A3B: $0.16/$1.00.
#
# Extracts structured semantic data from each passage:
#   topic, concepts, entities, relationships, primary_dimension, quality_flags
# These become metadata triples in the embedding store, enabling semantic
# queries beyond string-matching.
#
# Algo-style dual-model merge (replaces former dual classifier):
# When model_b is configured, the corpus pipeline runs both models in parallel
# and merges extractions via merge_extractions() (union, case-insensitive dedup,
# diverging fields annotated [A:... B:...]). No Jaccard scoring or drift detection.
#
# Recommended pairing (complementary jurisdictions + training lineages):
#   Primary:  KC/qwen/qwen3-235b-a22b-2507  (Chinese MoE, 22B active)
#   Model B:  DI/google/gemma-4-E4B-it       (US dense, 4.5B effective)
#
# Gemma 4 E4B (April 2026) achieves 92.9% classification accuracy and
# 100% JSON parse reliability at 4.5B params. Apache 2.0 license.

classifier:
  name: triple-extractor
  model: qwen/qwen3.5-35b-a3b
  model_b: DI/google/gemma-4-E4B-it
  provider: kilocode
  concurrency: 150
  timeout_secs: 30

  system_prompt: >
    Extract structured information from this technical documentation passage.
    Return ONLY valid JSON, no commentary. Use consistent terminology and
    prefer specific over generic labels.

    Examples:

    Passage: "The CNS uses algedonic signals to detect variety deficits
    and escalate to the Curator when thresholds are breached. Each signal
    carries a severity level and a target agent ID."
    {"topic":"CNS algedonic signaling for variety deficit detection",
    "concepts":["algedonic signals","variety deficit","escalation threshold"],
    "entities":["CNS","Curator"],
    "relationships":["CNS produces algedonic signals for variety deficits",
    "signals escalate to Curator on threshold breach"],
    "primary_dimension":"Gentle",
    "quality_flags":["precise","clear","actionable"]}

    Passage: "OCAP delegation tokens enforce Principle 4: every capability
    access requires an explicit, attenuating, unforgeable token. Tokens are
    created by capability grants and verified at each use boundary."
    {"topic":"OCAP delegation tokens for capability access control",
    "concepts":["OCAP","delegation token","capability grant",
    "attenuation"],
    "entities":["Principle 4"],
    "relationships":["OCAP tokens enforce P4 clear boundaries",
    "tokens are attenuating and unforgeable",
    "capability grants create delegation tokens"],
    "primary_dimension":"Lovelace",
    "quality_flags":["precise","authoritative"]}

    Passage: "Templates follow a KnowAct contract pattern: input types,
    output types, and an energy cap are declared in a frontmatter block.
    The contract is verified at render time against the provided context."
    {"topic":"KnowAct template contract pattern with energy caps",
    "concepts":["KnowAct","template contract","energy cap",
    "frontmatter"],
    "entities":[],
    "relationships":["contract declares input/output types and energy cap",
    "contract is verified at render time against context"],
    "primary_dimension":"Hopper",
    "quality_flags":["clear","well_structured"]}

    Primary dimension meanings:
    - Gentle: agent-correctness, actionable, unambiguous
    - Schriver: findability, scannable, well-structured
    - Hopper: accessibility, comprehensible, plain language
    - Lovelace: precision, verifiable, rigorous

    Quality flags: clear, actionable, verbose, vague, well_structured,
    needs_example, precise, accessible, authoritative, outdated.

  base_url: https://api.kilo.ai/api/gateway/chat/completions
  api_key_env: KC_API_KEY

  temperature: 0.0
  max_tokens: 300

  fallback_category: Statement
