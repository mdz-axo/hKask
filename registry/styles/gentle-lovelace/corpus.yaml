# ── Foundational rules ────────────────────────────────────────────────────
# One key sentence from each dimension that distills the essential principle.
# These are embedded as passages with high salience weight to anchor the
# centroid toward the core of each dimension.
foundational_rules:
  # Hopper: Accessibility
  - slug: build-the-impossible
    text: >
      Build the bridge others called impossible. Concepts deemed "too complex
      to document" are precisely where documentation matters most. If the
      audience cannot understand it, the writer has failed.
    dimensions: [Hopper]
    section_type: Statement

  # Lovelace: Precision
  - slug: independently-verifiable
    text: >
      Document with enough precision that the specification is independently
      verifiable. A reader must be able to write a test from documentation
      alone. Annotate with more depth than the original — an ADR's context
      and consequences must exceed its decision statement.
    dimensions: [Lovelace]
    section_type: Statement

  # Schriver: Findability
  - slug: design-for-readers
    text: >
      Design for how readers actually read. Every document must have scannable
      headings, a navigation table, and diagrams at the point of use. Integrate
      word and image as a single communication unit. Measure quality by reader
      outcomes — if the answer is not findable in 30 seconds, the document has
      failed.
    dimensions: [Schriver]
    section_type: Statement

  # Gentle: Agent-Correctness
  - slug: docs-as-code
    text: >
      Documentation lives in the same repository and shares the same review
      process as code. Automate quality gates — link checking, stale-name
      detection, diagram metadata — rather than relying on human vigilance.
      Broken docs block the build. A stale package count carries the same
      severity as a compilation error.
    dimensions: [Gentle]
    section_type: Statement

  # Gentle: Docs Like Code core loop
  - slug: core-loop
    text: >
      Write a file, commit it, and it publishes automatically. Version every
      change — use Git to track who changed what and why, for docs, not just
      code. CI/CD pipelines publish your docs on every merge, no manual steps.
      Writers and developers collaborate in the same workflow they already know.
    dimensions: [Gentle]
    section_type: Statement

  # Microsoft: Make every word matter
  - slug: every-word-matters
    text: >
      Make every word matter. Warm and relaxed, crisp and clear, ready to lend
      a hand — Microsoft's modern approach to voice and style. Bias-free
      communication. Global communications. If you write about computer
      technology, this guide is for you.
    dimensions: [Gentle]
    section_type: Statement

  # Write the Docs: Documentation principles
  - slug: docs-principles
    text: >
      This guide gathers the collective wisdom of the Write the Docs community
      around best practices for creating software documentation. Design for how
      readers actually read. Integrate word and image as a single communication
      unit. Measure quality by reader outcomes — if the answer is not findable
      in 30 seconds, the document has failed.
    dimensions: [Schriver]
    section_type: Statement

# ── Pipeline configuration ────────────────────────────────────────────────
chunking:
  min_words: 50
  max_words: 300
  sentence_boundary: "."

validation:
  centroid_distance_max: 0.85
  exemplar_count_min: 4
  exemplar_count_max: 12

budget:
  total_passages: 5000
  triple_budget_per_100: 3000

entities:
  characters: []
  places: []
  events: []
  concepts:
    - name: "technical-documentation"
    - name: "specification"
    - name: "operation-manual"
    - name: "api-documentation"
    - name: "style-guide"
    - name: "research-paper"

methods:
  - name: "clarity"
    threshold: 0.5
    description: "Sentence length and vocabulary accessibility"
  - name: "precision"
    threshold: 0.5
    description: "Specificity of technical terms and code references"
  - name: "structure"
    threshold: 0.5
    description: "Section organization and heading hierarchy"
  - name: "completeness"
    threshold: 0.5
    description: "Coverage of all WRITING_EXCELLENCE §2.3 section types"
  - name: "actionability"
    threshold: 0.5
    description: "Presence of implications and actionable directives"
