# Gentle Lovelace Style Mashup Configuration
# Owner: The Curator (hKask)
# License: CC-BY-4.0
# Version: 1.0
# Created: 2026-06-12
#
# Style mashup: Ada Lovelace (1815-1852) × Grace Hopper (1906-1992)
#                × Karen Schriver (1954-) × Anne Gentle (contemporary)
# Replicator name: Gentle Lovelace
#
# Four dimensions of technical documentation excellence, each grounded in
# one woman's contribution to the field, combined into a single evaluative
# persona. The centroid is the mean of all four dimension-specific centroids,
# producing a composite that scores documents on accessibility, precision,
# findability, and agent-correctness simultaneously.
#
# Tag sets are orthogonal — each passage carries four independent labels
# (section_type, mds_category, document_type, dimension) enabling rich
# multi-axis queries against the embedding space.
#
# Processed by: kask embed-corpus
# Storage: hKask sqlite-vec via EmbeddingStore
# Pipeline: markitdown → chunk → tag → embed → centroid → validate
# Lovelace (Gutenberg) and Schriver (ERIC) are public domain.
# Schriver (Karen Schriver Associates) and Gentle (OpenStack) are CC-BY.
# Hopper (Harvard University Press) is public domain per 1946 authorization.
# Write the Docs guide is CC-BY 4.0.
# Docs Like Code is © Anne Gentle, used as exemplar corpus.
# Microsoft Style Guide welcome page is © Microsoft, used as exemplar excerpt.

author: gentle-lovelace
centroid_entity_ref: "style:gentle-lovelace:centroid"

embedding:
  model: "DI/Qwen/Qwen3-Embedding-0.6B"
  dim: 1024
  batch_size: 64

# ── Dimension centroids ───────────────────────────────────────────────────
# Each dimension has its own centroid for per-dimension distance scoring.
# The composite centroid (style:gentle-lovelace:centroid) is the mean of
# all four dimension centroids.
dimension_centroids:
  hopper:
    ref: "style:gentle-lovelace:hopper-centroid"
    weight: 0.25
    description: "Accessibility — write for the reader's vocabulary"
  lovelace:
    ref: "style:gentle-lovelace:lovelace-centroid"
    weight: 0.25
    description: "Precision — specification independently verifiable"
  schriver:
    ref: "style:gentle-lovelace:schriver-centroid"
    weight: 0.25
    description: "Findability — answer findable in 30 seconds"
  gentle:
    ref: "style:gentle-lovelace:gentle-centroid"
    weight: 0.25
    description: "Agent-correctness — agent consuming doc behaves correctly"

# ── Orthogonal tag sets ───────────────────────────────────────────────────
# Each passage receives tags from all four sets during embedding.
# These tags enable multi-axis queries: "show me Evidence sections from
# Trust-category documents that score high on Lovelace precision."
tag_sets:
  section_type:
    description: "Structural role per WRITING_EXCELLENCE.md §2.3"
    values: [Statement, Evidence, Diagram, Implications]
    detection: "Section headings and content patterns"
  mds_category:
    description: "MDS 5-category taxonomy per MDS.md §1"
    values: [domain, composition, trust, lifecycle, curation]
    detection: "Document frontmatter mds_categories field"
  document_type:
    description: "Document classification per MDS_SCAFFOLD.md §2"
    values: [specification, adr, guide, reference, plan, status]
    detection: "Directory location and document structure"
  dimension:
    description: "Primary WRITING_EXCELLENCE quality dimension"
    values: [Hopper, Lovelace, Schriver, Gentle]
    detection: "Explicit annotation in corpus manifest"

# ── Tag weighting by context ──────────────────────────────────────────────
# For replica_compare, weights adjust per document type so the right
# dimensions are emphasized for the right kind of document.
# These weights are defaults — they can be overridden per invocation.
tag_weights:
  specification:
    Lovelace: 0.35
    Schriver: 0.25
    Hopper: 0.20
    Gentle: 0.20
  adr:
    Lovelace: 0.30
    Schriver: 0.25
    Hopper: 0.20
    Gentle: 0.25
  guide:
    Hopper: 0.40
    Schriver: 0.25
    Gentle: 0.20
    Lovelace: 0.15
  reference:
    Schriver: 0.35
    Hopper: 0.25
    Lovelace: 0.20
    Gentle: 0.20
  plan:
    Gentle: 0.35
    Lovelace: 0.25
    Schriver: 0.20
    Hopper: 0.20
  status:
    Gentle: 0.35
    Schriver: 0.25
    Hopper: 0.20
    Lovelace: 0.20

