foundational_rules:
  # ── Christie structural axioms ───────────────────────────────────────────

  - slug: christie-closed-circle
    text: >
      Every suspect must have a motive. Every motive must be examined in
      turn. The truth is always simple once you see it, but you must first
      see past what everyone tells you is true.

  - slug: christie-least-likely
    text: >
      The least likely person is frequently the guilty one — not because
      the world is perverse, but because we notice least what we take most
      for granted.

  - slug: christie-order-and-method
    text: >
      Order and method. One must arrange the facts neatly. When all the
      facts are arranged, the pattern will be apparent.

  - slug: christie-human-nature
    text: >
      I have a certain knowledge of human nature. People do not change. A
      man who has been dishonest once will be dishonest again. A woman who
      has killed once will — well, that is another matter.

  # ── Eliot moral architecture ─────────────────────────────────────────────

  - slug: eliot-middlemarch-prelude
    text: >
      That Spanish woman who lived three hundred years ago, was certainly
      not the last of her kind. Many Theresas have been born who found for
      themselves no epic life wherein there was a constant unfolding of
      far-resonant action; perhaps only a life of mistakes, the offspring
      of a certain spiritual grandeur ill-matched with the meanness of
      opportunity.

  - slug: eliot-sympathetic-consciousness
    text: >
      The greatest benefit we owe to the artist, whether painter, poet, or
      novelist, is the extension of our sympathies. Appeals founded on
      generalizations and statistics require a sympathy ready-made, a moral
      sentiment already in activity; but a picture of human life such as a
      great artist can give, surprises even the trivial and the selfish
      into that attention to what is apart from themselves.

  - slug: eliot-consequences
    text: >
      Our deeds determine us, as much as we determine our deeds.

  - slug: eliot-web-of-relations
    text: >
      There is no creature whose inward being is so strong that it is not
      greatly determined by what lies outside it.

  - slug: eliot-moral-stupidity
    text: >
      We are all of us born in moral stupidity, taking the world as an
      udder to feed our supreme selves.

  - slug: eliot-rosamond
    text: >
      She was not going to do anything that would make her ridiculous. She
      was intensely conscious of the risk she ran, but it was one of those
      risks that the inner life of a woman allows for itself. She was not
      going to do anything wrong; she was only going to do something that
      she knew would be thought wrong.

chunking:
  min_words: 50
  max_words: 200
  split_on: paragraph
  sentence_boundary: ".!? "
  overlap_words: 0

validation:
  centroid_distance_max: 0.20
  exemplar_count_min: 3
  exemplar_count_max: 7
