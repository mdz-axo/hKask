# Agatha Eliot Style Mashup Configuration
# Owner: The Curator (hKask)
# License: CC-BY-4.0
# Version: 1.0
# Created: 2026-06-10
#
# Style mashup: Agatha Christie (1890-1976) × George Eliot (1819-1880)
# Replicator name: Agatha Eliot
#
# Mixture of Experts pattern: Christie contributes structural architecture
# (closed-circle suspects, clue distribution, the revelation scene); Eliot
# contributes psychological and moral depth (free indirect discourse, the
# inner life, the web of interdependent consciousness). They do not "blend"
# sentence by sentence — they operate at different narrative layers.
#
# Processed by: kask embed-corpus
# Storage: hKask sqlite-vec via EmbeddingStore
# Pipeline: web_extract → chunk → embed_sentences → centroid → validate
# All works are public domain (Christie pre-1931, Eliot pre-1881).

author: agatha-eliot
