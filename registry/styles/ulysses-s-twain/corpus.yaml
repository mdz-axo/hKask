# ── Declared Methods ─────────────────────────────────────────────────────────

methods:
  - name: "declarative_sentence"
    description: "Subject. Verb. Object. Period. No ornament."
    signal:
      avg_sentence_length_max: 25.0
      parataxis_ratio_min: 0.5
      adjective_density_max: 5.0

  - name: "understatement"
    description: "Report catastrophe as if it were weather"
    signal:
      adverb_density_max: 2.0
      intensifier_density_max: 1.0
      hedge_density_max: 1.0

# ── Budget ───────────────────────────────────────────────────────────────────

budget:
  per_100_pages: 3750
