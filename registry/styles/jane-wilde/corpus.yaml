foundational_rules:
  # ── Austen aesthetic manifestos ────────────────────────────────────────

  - slug: truth-universally-acknowledged
    text: >
      It is a truth universally acknowledged, that a single man in possession
      of a good fortune, must be in want of a wife.

  - slug: little-bit-of-ivory
    text: >
      What should I do with your strong, manly, spirited Sketches, full of
      Variety and Glow? How could I possibly join them on to the little bit
      (two Inches wide) of Ivory on which I work with so fine a Brush,
      as produces little effect after much labour?

  - slug: emma-woodhouse
    text: >
      Emma Woodhouse, handsome, clever, and rich, with a comfortable home
      and happy disposition, seemed to unite some of the best blessings of
      existence; and had lived nearly twenty-one years in the world with
      very little to distress or vex her.

  # ── Wilde aesthetic manifestos ────────────────────────────────────────

  - slug: resist-everything
    text: >
      I can resist everything except temptation.

  - slug: decay-of-lying
    text: >
      The final revelation is that Lying, the telling of beautiful untrue things,
      is the proper aim of Art. Life imitates Art far more than Art imitates Life.

  - slug: earnest-epigrams
    text: >
      The truth is rarely pure and never simple. Modern life would be very tedious
      if it were either, and modern literature a complete impossibility.

  - slug: dorian-gray-preface
    text: >
      There is no such thing as a moral or an immoral book. Books are well written,
      or badly written. That is all. The artist is the creator of beautiful things.

chunking:
  min_words: 50
  max_words: 200
  sentence_boundary: ".!? "

validation:
  centroid_distance_max: 0.18
  exemplar_count_min: 3
  exemplar_count_max: 7
