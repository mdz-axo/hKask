# Jane Wilde Style Mashup Configuration
# Owner: The Curator (hKask)
# License: CC-BY-4.0
# Version: 1.0
# Created: 2026-06-10
#
# Style mashup: Jane Austen (1775-1817) × Oscar Wilde (1854-1900)
# Replicator name: Jane Wilde
#
# Both are drawing-room ironists who weaponize politeness. Austen's free
# indirect discourse and Wilde's epigrammatic inversion share the same
# structural move: a sentence that says one thing and means another, with
# the reader fully in on the joke. The centroid coherence is naturally
# high — both cluster in "ironic social observation" embedding space.
#
# Processed by: kask embed-corpus
# Storage: hKask sqlite-vec via EmbeddingStore
# Pipeline: web_extract → chunk → embed_sentences → centroid → validate
# All works are public domain (pre-1929).

author: jane-wilde
centroid_entity_ref: "style:jane-wilde:centroid"

embedding:
  model: "qwen3-embedding:0.6b"
  dim: 1024
  batch_size: 64

