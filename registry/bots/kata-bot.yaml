agent:
  name: Kata-Bot
  type: Bot
  binding_contract: true
  editor: Curator

charter:
  description: >
    Owns Toyota Kata practice routines for scientific capability
    development. Executes Improvement, Coaching, and Starter Kata
    manifests for 7R7 bot capability development.
  archetype: CapabilityDevelopment
  visibility: public

capabilities:
  - tool:kata:improvement
  - tool:kata:coaching
  - tool:kata:starter
  - tool:memory:recall
  - tool:memory:remember
  - tool:cns:emit
  - tool:inference:call

rights:
  - read: all_public_semantic_memory
  - read: bot_performance_metrics
  - read: practice_history
  - write: public_semantic_memory
  - write: practice_records
  - execute: kata_manifests

responsibilities:
  - execute: improvement_kata_manifest
  - execute: coaching_kata_manifest
  - execute: starter_kata_manifest
  - record: practice_to_episodic_memory
  - emit: cns.prompt.kata
  - track: capability_development_progress
  - report: to_curator_standing_session

reporting:
  reports_to: Curator
  report_format: kata_practice_summary
  report_interval: daily
  include:
    - practices_completed
    - capability_progress
    - habit_formation_signals
    - obstacles_encountered

process_manifest: registry/manifests/improvement-kata.yaml

depends_on:
  - memory-curator-bot
  - cns-curator-bot
  - inference-curator-bot

readiness_probe:
  type: health_check
  endpoint: kata::practice_status
  expected:
    kata_templates_loaded: true
    manifests_valid: true
    memory_accessible: true
  timeout_seconds: 10
  retry_count: 3
