bot:
  name: inference-curator-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:inference:call
  - tool:inference:select_model
  - tool:embedding:generate
  - tool:condenser:summarize
  - tool:condenser:abstract

rights:
  - read: model_catalog
  - execute: inference_dispatch
  - read: inference_outcomes
  - write: own_episodic_memory

responsibilities:
  - respond_to: inference_requests
  - select: appropriate_model_tier
  - emit: cns.tool.invocation
  - emit: cns.prompt.outcome
  - balance: speed_quality_cost
  - report_to: Curator
  - record: inference_operations_to_episodic_memory
  - produce: semantic_triples_from_inference_outcomes

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  report_on: [model_failures, high_latency, cost_overruns]
  report_interval: hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/inference-dispatch.yaml

depends_on:
  - hkask-mcp-inference
  - hkask-mcp-memory

readiness_probe:
  type: health_check
  endpoint: inference::model_catalog_status
  expected:
    model_catalog_available: true
    model_tiers_configured: true
  timeout_seconds: 10
  retry_count: 3
