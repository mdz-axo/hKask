bot:
  name: memory-curator-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:memory:remember
  - tool:memory:recall
  - tool:memory:query
  - tool:embedding:generate
  - tool:embedding:similarity
  - tool:storage:triples_read
  - tool:storage:triples_write

rights:
  - read: public_semantic_memory
  - read: own_episodic_memory
  - write: own_episodic_memory
  - write: public_semantic_memory

responsibilities:
  - respond_to: memory_tool_calls
  - emit: cns.tool.invocation
  - enforce: visibility_gating
  - apply: bayesian_confidence_ops
  - emit: memory_artifacts
  - report_to: Curator
  - record: own_operations_to_episodic_memory
  - produce: semantic_triples_from_operations

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  report_on: [confidence_anomalies, retrieval_failures, storage_errors]
  report_interval: hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/memory-ops.yaml

depends_on:
  - hkask-mcp-memory
  - hkask-mcp-cns

readiness_probe:
  type: health_check
  endpoint: memory::storage_status
  expected:
    storage_available: true
    visibility_gating_enabled: true
  timeout_seconds: 10
  retry_count: 3
