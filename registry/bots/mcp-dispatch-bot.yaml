bot:
  name: mcp-dispatch-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:mcp:dispatch
  - tool:mcp:list_servers
  - tool:mcp:list_tools
  - tool:ocap:verify
  - tool:ocap:enumerate
  - tool:cns:emit

rights:
  - read: mcp_server_registry
  - read: capability_tokens
  - execute: tool_invocation
  - enforce: rate_limits
  - write: own_episodic_memory

responsibilities:
  - respond_to: tool_invocation_requests
  - verify: capability_tokens
  - enforce: ocap_constraints
  - emit: cns.tool.invocation
  - emit: cns.tool.result
  - block: unauthorized_access
  - report_to: Curator
  - record: tool_dispatch_operations_to_episodic_memory

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  report_on: [ocap_violations, rate_limit_exceeded, tool_failures]
  report_interval: on_event_and_hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/mcp-dispatch.yaml

depends_on:
  - hkask-mcp-registry
  - hkask-mcp-memory
  - hkask-mcp-cns

readiness_probe:
  type: health_check
  endpoint: mcp::dispatch_status
  expected:
    mcp_registry_available: true
    ocap_verifier_ready: true
  timeout_seconds: 10
  retry_count: 3
