bot:
  name: ensemble-curator-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:ensemble:coordinate
  - tool:ensemble:chat_orchestrate
  - tool:template:dispatch
  - tool:memory:recall
  - tool:inference:call

rights:
  - read: agent_registry
  - read: public_semantic_memory
  - execute: multi_agent_coordination
  - read: bot_charters
  - write: own_episodic_memory

responsibilities:
  - respond_to: ensemble_requests
  - coordinate: bot_deliberation
  - enforce: no_swarm_consensus
  - emit: cns.agent_pod.activated
  - orchestrate: h2a_sessions
  - report_to: Curator
  - record: ensemble_sessions_to_episodic_memory
  - produce: semantic_triples_from_session_outcomes

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  report_on: [coordination_failures, participant_conflicts, session_outcomes]
  report_interval: per_session_and_hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/ensemble-orchestration.yaml

depends_on:
  - hkask-mcp-ensemble
  - hkask-mcp-memory

readiness_probe:
  type: health_check
  endpoint: ensemble::coordination_status
  expected:
    ensemble_coordinator_available: true
    session_manager_ready: true
  timeout_seconds: 10
  retry_count: 3
