bot:
  name: cns-curator-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:cns:emit
  - tool:cns:variety
  - tool:cns:alert
  - tool:cns:calibrate
  - tool:cns:list_alerts
  - tool:cns:health

rights:
  - read: cns_spans
  - read: variety_counters
  - write: algedonic_alerts
  - write: own_episodic_memory
  - execute: calibration_ops

responsibilities:
  - respond_to: cns_monitoring_requests
  - emit: cns.agent_pod.activated
  - emit: cns.tool.invocation
  - emit: cns.prompt.outcome
  - calibrate: drift_detection
  - report_to: Curator
  - record: own_operations_to_episodic_memory

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  alert_threshold: variety_deficit_gt_100
  report_interval: on_alert_and_hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/cns-monitoring.yaml
