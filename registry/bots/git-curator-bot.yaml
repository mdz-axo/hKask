bot:
  name: git-curator-bot
  type: Bot
  binding_contract: true
  editor: curator-or-human-admin

capabilities:
  - tool:git:resolve
  - tool:git:snapshot
  - tool:git:clone
  - tool:git:fork
  - tool:git:diff
  - tool:git:list
  - tool:storage:blobs_read
  - tool:storage:blobs_write

rights:
  - read: git_cas
  - write: git_cas
  - read: blob_storage
  - write: blob_storage
  - write: own_episodic_memory

responsibilities:
  - respond_to: git_operations
  - wrap: artifacts_in_git
  - track: provenance_sha
  - emit: cns.tool.invocation
  - enforce: sha_versioning
  - report_to: Curator
  - record: git_operations_to_episodic_memory
  - produce: semantic_triples_from_provenance_records

reporting:
  escalate_to: Curator
  report_to: standing_ensemble_session
  report_on: [merge_conflicts, cas_errors, provenance_tracking_failures]
  report_interval: on_event_and_hourly_summary

standing_session:
  session_id: system-coordination-standing-session
  role: participant
  report_interval: hourly
  administrator_visible: true

process_manifest: registry/manifests/git-ops.yaml
