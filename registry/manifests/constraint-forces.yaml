# Constraint Forces Process Manifest
# ℏKask v0.30.0 — Force classification as convergent PDCA

manifest:
  id: constraint-forces
  name: Constraint Forces
  description: >
    Convergent constraint-force process. Classifies constraint force and
    evaluates convergence until classification/actionability is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: statement
    type: string
    required: true
  - name: context
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Classify dominant force type and Magna Carta mapping.
    renderer: minijinja
    template_ref: constraint-forces/constraint-forces-classify
    gas_cap: 5000
    timeout_seconds: 45
    input_mapping:
      statement: "{{ statement }}"
      context: "{{ context | default('') }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for force stability.
    renderer: minijinja
    template_ref: constraint-forces/constraint-forces-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter force classification cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: constraint-forces/constraint-forces-classify
      gas_budget: 5000
    - resource: template
      action: render
      template_id: constraint-forces/constraint-forces-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: constraint-forces
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
