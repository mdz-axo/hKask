# Kindle-Zip Pipeline Manifest
# ℏKask v0.30.0 — A Minimal Viable Container for Agents
# Functionally equivalent to transitive-bullshit/kindle-ai-export
# Declarative pipeline: Extract → Transcribe → Assemble → Export

manifest:
  id: kindle-zip
  name: Kindle-Zip
  description: >
    Export any Kindle book you own as text, PDF, EPUB, or Markdown.
    Pipeline: browser extraction of page screenshots → OCR transcription
    via hKask's multi-backend OCR pipeline → content assembly with TOC
    structure → format export. All steps are driven by Jinja2 templates
    for technology-evolvable processing.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

# Energy Budget Configuration
gas:
  cap: 120000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Pipeline Inputs
inputs:
  - name: asin
    type: string
    description: "Amazon Standard Identification Number for the Kindle book"
    required: true
  - name: amazon_email
    type: string
    description: "Amazon account email for Kindle Cloud Reader login"
    required: true
  - name: amazon_password
    type: string
    description: "Amazon account password"
    required: true
  - name: output_dir
    type: string
    description: "Output directory for extracted pages and exports"
    required: false
    default: "output"
  - name: ocr_model
    type: string
    description: "Vision model for OCR (defaults to HKASK_OCR_MODEL env var)"
    required: false
  - name: export_formats
    type: array
    description: "Output formats: pdf, epub, markdown, txt (default: all)"
    required: false
    default: ["pdf", "epub", "markdown"]

# ── Pipeline Steps ──────────────────────────────────────────────────────────

steps:
  # Step 1: Browser extraction — Kindle Cloud Reader → page screenshots + metadata
  - ordinal: 1
    action: execute
    description: >
      Extract book pages from Kindle Cloud Reader via headless browser.
      Navigates to book, captures PNG screenshots of each content page,
      and records metadata (title, author, TOC, page map).
    renderer: null
    template_ref: null
    mcp: hkask-mcp-docproc
    tool: kindle_extract
    gas_cap: 30000
    timeout_seconds: 600
    input_mapping:
      asin: "{{ asin }}"
      amazon_email: "{{ amazon_email }}"
      amazon_password: "{{ amazon_password }}"
      output_dir: "{{ output_dir | default('output') }}"
    output_schema:
      type: object
      properties:
        metadata_path: { type: string }
        pages_dir: { type: string }
        total_pages: { type: integer }
        content_pages: { type: integer }
        title: { type: string }
        author: { type: string }
        toc: { type: array }

  # Step 2: OCR transcription — page images → text via multi-backend OCR pipeline
  - ordinal: 2
    action: populate
    description: >
      Configure OCR transcription parameters. Select model tier based on
      book complexity (page count, image density).
    renderer: minijinja
    template_ref: kindle-zip/configure-ocr
    gas_cap: 2000
    timeout_seconds: 15
    input_mapping:
      total_pages: "{{ ordinal_1.total_pages }}"
      content_pages: "{{ ordinal_1.content_pages }}"
      ocr_model: "{{ ocr_model | default('') }}"
    output_schema:
      type: object
      properties:
        model: { type: string }
        max_tokens: { type: integer }
        concurrency: { type: integer }
        strategy: { type: string }

  - ordinal: 3
    action: execute
    description: >
      Transcribe each page screenshot to text using hKask's OCR pipeline.
      Routes pages through Tesseract (simple), LLM OCR (complex/fallback).
    renderer: null
    template_ref: null
    mcp: hkask-mcp-docproc
    tool: kindle_transcribe
    gas_cap: 60000
    timeout_seconds: 1800
    input_mapping:
      pages_dir: "{{ ordinal_1.pages_dir }}"
      metadata_path: "{{ ordinal_1.metadata_path }}"
      model: "{{ ordinal_2.model }}"
      max_tokens: "{{ ordinal_2.max_tokens }}"
      concurrency: "{{ ordinal_2.concurrency }}"
      output_dir: "{{ output_dir | default('output') }}"
      asin: "{{ asin }}"
    output_schema:
      type: object
      properties:
        content_path: { type: string }
        total_words: { type: integer }
        transcribed_pages: { type: integer }
        failed_pages: { type: integer }
        mean_confidence: { type: number }

  # Step 4: Content assembly — transcriptions + TOC → structured content
  - ordinal: 4
    action: populate
    description: >
      Assemble transcribed pages into structured content.
      Applies TOC chapter boundaries, cleans OCR artifacts,
      and normalizes text for export.
    renderer: minijinja
    template_ref: kindle-zip/assemble-content
    gas_cap: 4000
    timeout_seconds: 30
    input_mapping:
      content_path: "{{ ordinal_3.content_path }}"
      metadata_path: "{{ ordinal_1.metadata_path }}"
      title: "{{ ordinal_1.title }}"
      author: "{{ ordinal_1.author }}"
      toc: "{{ ordinal_1.toc }}"
    output_schema:
      type: object
      properties:
        assembled_text: { type: string }
        chapter_count: { type: integer }
        structure_valid: { type: boolean }

  # Step 5: Format export — assembled content → PDF, EPUB, Markdown
  - ordinal: 5
    action: execute
    description: >
      Export assembled content to requested formats.
      Generates PDF with embedded TOC, EPUB with chapters,
      and Markdown with proper heading hierarchy.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-docproc
    tool: kindle_export
    gas_cap: 15000
    timeout_seconds: 120
    input_mapping:
      asin: "{{ asin }}"
      output_dir: "{{ output_dir | default('output') }}"
      assembled_text: "{{ ordinal_4.assembled_text }}"
      metadata_path: "{{ ordinal_1.metadata_path }}"
      formats: "{{ export_formats | default(['pdf', 'epub', 'markdown']) }}"
      title: "{{ ordinal_1.title }}"
      author: "{{ ordinal_1.author }}"
      toc: "{{ ordinal_1.toc }}"
    output_schema:
      type: object
      properties:
        exports:
          type: array
          items:
            type: object
            properties:
              format: { type: string }
              path: { type: string }
              size_bytes: { type: integer }
        total_bytes: { type: integer }

  # Step 6: CNS feedback — emit completion metrics
  - ordinal: 6
    action: feedback
    description: >
      Emit CNS feedback for pipeline quality tracking.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-memory
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      total_words: integer
      transcribed_pages: integer
      formats_exported: integer
    output_schema:
      type: object
      properties:
        variety_counter: { type: integer }
        cns_event_id: { type: string }

# ── Error Handling ──────────────────────────────────────────────────────────

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 5
  on_validation_failure: abort
  on_capability_denied: escalate
  on_extraction_failure: abort
  on_ocr_failure: fallback
  fallback_message: "Some pages failed OCR — exported content may be incomplete"

# ── OCAP Configuration ──────────────────────────────────────────────────────

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: kindle-zip/configure-ocr
      gas_budget: 2000
    - resource: template
      action: render
      template_id: kindle-zip/assemble-content
      gas_budget: 4000
    - resource: manifest
      action: execute
      template_id: kindle-zip
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: kindle-zip
      gas_budget: 500
    - resource: browser
      action: extract
      gas_budget: 30000
    - resource: document
      action: ocr
      gas_budget: 60000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 7200
  template_scoped: true

# ── CNS Monitoring ──────────────────────────────────────────────────────────

cns:
  emit_spans: true
  span_namespace: cns.doc.kindle-zip
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  variety_counters:
    - total_words
    - transcribed_pages
    - ocr_confidence
    - formats_exported

# ── Audit Trail ─────────────────────────────────────────────────────────────

audit:
  enabled: true
  log_level: info
  include_input: false
  include_output: false
  include_gas_cost: true
  include_cns_events: true
  include_export_paths: true
