# Platform Wardley Mapper
# ℏKask v0.31.0 — Strategy: component evolution mapping
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: inventory_components, classify_evolution, map_value_chain, identify_movement, synthesize_recommendations, convergence_check

manifest:
  id: platform-wardley-mapper
  name: Platform Wardley Mapper
  description: >
    Convergent strategic mapping process. Inventories all hKask components
    (crates, MCP servers, skills, infrastructure), classifies each on the
    Wardley evolution axis (Genesis → Custom → Product → Commodity), maps
    them on the value chain, identifies movement (what should be commoditized,
    what should stay product, what is missing), and produces strategic
    recommendations aligned with the platform's loyalty-anchored mission.

    Per Simon Wardley's methodology: poor situational awareness kills
    platforms. This skill builds the map that prevents strategic blindness.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 75000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: component_inventory
    type: string
    required: false
    description: Pre-computed component inventory (JSON). If not provided, queries via MCP.
  - name: previous_map
    type: string
    required: false
    description: Previous Wardley Map for movement detection.

steps:
  - ordinal: 1
    action: select
    description: >
      Inventory all hKask components from the codebase and registry.
      Categories: crates (53), MCP servers (14), infrastructure (Caddy,
      Conduit, SQLite/SQLCipher), skills (43), and conceptual components
      (CNS, OCAP, Magna Carta). For each: name, type, dependencies, and
      current evolutionary position.

    renderer: minijinja
    template_ref: platform-wardley-mapper/inventory-components
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      component_inventory: "{{ component_inventory | default('') }}"

  - ordinal: 2
    action: select
    description: >
      Classify each component on the Wardley evolution axis:
      - Genesis: novel, uncertain, rapidly changing (e.g., Platform Engineer replicant)
      - Custom: built for specific need, differentiated (e.g., CNS algedonic pathway)
      - Product: stable, well-understood, rentable (e.g., skill FlowDef manifests)
      - Commodity: utility, undifferentiated, should be bought not built (e.g., SQLite, MCP protocol)

      Classification criteria: maturity, adoption, standardization,
      differentiation value, and alignment with loyalty-anchored mission.

    renderer: minijinja
    template_ref: platform-wardley-mapper/classify-evolution
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      components: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: >
      Map components on the value chain. The value chain flows from
      infrastructure (bottom) through platform services to user-facing
      capabilities (top). Y-axis: visibility to user. X-axis: evolution
      stage. Each component gets (x, y) coordinates.

      Example mapping:
      - Infrastructure (bottom): SQLite/SQLCipher → Commodity
      - Protocol (middle): MCP → Product/Commodity
      - Platform core (middle): CNS, OCAP → Product
      - User-facing (top): REPL, skills → Product/Custom
      - Future (far right): Platform Engineer replicant → Genesis

    renderer: minijinja
    template_ref: platform-wardley-mapper/map-value-chain
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      classified_components: "{{ step_2_result }}"

  - ordinal: 4
    action: select
    description: >
      Identify movement and strategic implications:
      - What should move right (commoditize)? Components currently Custom
        that provide no differentiation value.
      - What should stay Product? Components that are hKask's strategic
        differentiators (loyalty-anchored features).
      - What is over-commoditized? Components that were commoditized too
        early, losing differentiation value.
      - What is missing? Gaps in the value chain where no component exists.
      - Compare against previous_map to detect drift and velocity.

    renderer: minijinja
    template_ref: platform-wardley-mapper/identify-movement
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      current_map: "{{ step_3_result }}"
      previous_map: "{{ previous_map | default('') }}"

  - ordinal: 5
    action: select
    description: >
      Synthesize strategic recommendations:
      - Commoditization targets (build → buy, or open-source)
      - Investment priorities (what to build next)
      - Divestment candidates (what to stop maintaining)
      - Ecosystem plays (what to open to complementors)
      - Loyalty alignment check: does the strategic direction strengthen
        or weaken the loyalty contract?

      Output: structured JSON + Mermaid diagram of the Wardley Map.

    renderer: minijinja
    template_ref: platform-wardley-mapper/synthesize-recommendations
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      movement_analysis: "{{ step_4_result }}"
      current_map: "{{ step_3_result }}"

  - ordinal: 6
    action: select
    description: >
      Compute convergence metric. Checks all components classified,
      map generated, movement identified, recommendations actionable
      and loyalty-aligned. Outputs convergence_metric in [0,1].

    renderer: minijinja
    template_ref: platform-wardley-mapper/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      recommendations: "{{ step_5_result }}"

  - ordinal: 7
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-wardley-mapper/inventory-components
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-wardley-mapper/classify-evolution
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-wardley-mapper/map-value-chain
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-wardley-mapper/identify-movement
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-wardley-mapper/synthesize-recommendations
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-wardley-mapper/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-wardley-mapper
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
