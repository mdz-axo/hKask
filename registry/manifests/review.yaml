# Review Process Manifest
# ℏKask v0.30.0 — Self-critique as convergent PDCA

manifest:
  id: review
  category: skill
  name: Review
  description: >
    Convergent self-critique process. Builds a critique prompt, produces a
    structured review result, computes convergence, and iterates until
    contradictions and unsupported claims are reduced to acceptable levels.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: agent_identity
    type: string
    required: false
  - name: active_project
    type: string
    required: false
  - name: goal_query
    type: string
    required: true
  - name: derived_facts
    type: array
    required: false
  - name: constraints
    type: array
    required: false
  - name: prior_review_feedback
    type: string
    required: false

fusion:
  judge: deepseek-v4-pro
  panel:
    - Kimi2.7
    - Qwen3.7 Max
    - GLM5.2
  mode: critique
  skills:
    - pragmatic-semantics
  max_rounds: 3

steps:
  - ordinal: 1
    action: populate
    description: Render the self-critique prompt from current reasoning context.
    renderer: minijinja
    template_ref: review/self_critique
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      agent_identity: "{{ agent_identity | default('hKask Agent') }}"
      active_project: "{{ active_project | default('hKask') }}"
      goal_query: "{{ goal_query }}"
      derived_facts: "{{ derived_facts | default([]) }}"
      constraints: "{{ constraints | default([]) }}"
      prior_review_feedback: "{{ prior_review_feedback | default('') }}"

  - ordinal: 2
    action: select
    description: Produce a structured critique from the rendered prompt.
    renderer: minijinja
    template_ref: review/review-structured-eval
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      critique_prompt: "{{ step_1_populated }}"
      goal_query: "{{ goal_query }}"
      derived_facts: "{{ derived_facts | default([]) }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for review cycle.
    renderer: minijinja
    template_ref: review/review-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_2_result }}"
    fusion: false

  - ordinal: 4
    action: loop
    description: Re-enter review cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: review/self-critique
      gas_budget: 2000
    - resource: template
      action: render
      template_id: review/review-structured-eval
      gas_budget: 5000
    - resource: template
      action: render
      template_id: review/review-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: review
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
