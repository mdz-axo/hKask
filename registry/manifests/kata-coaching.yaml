# Coaching Kata Manifest
# ℏKask v0.21.0 — 5-question coaching dialogue for capability development

manifest:
  id: coaching-kata
  name: Coaching Kata
  version: "0.1.0"
  description: >
    5-question coaching cycle used by Curator to teach scientific
    thinking to bots. Each cycle ~20 minutes. Questions reveal
    learner's thinking pattern and reinforce Improvement Kata.
    Coaching Kata for teaching scientific thinking patterns.
    5-question dialogue to guide the bot through PDCA thinking.
  editor: Curator
  visibility: Public

gas:
  cap: 12000
  cost_per_token: 0.25
  alert_threshold: 0.7
  hard_limit: true

questions:
  - number: 1
    question: "What is your target condition?"
    description: "Where do you want to be?"
    cns_span: "cns.prompt.kata.coaching.target"
    expected_output: "Clear, measurable target condition"

  - number: 2
    question: "What is the actual condition now?"
    description: "Where are you currently?"
    cns_span: "cns.prompt.kata.coaching.current"
    expected_output: "Data-driven assessment of current state"

  - number: 3
    question: "What obstacles do you see between you and the target?"
    description: "What's preventing progress?"
    cns_span: "cns.prompt.kata.coaching.obstacles"
    expected_output: "Prioritized list of obstacles"

  - number: 4
    question: "What is your next step? (What experiment will you run?)"
    description: "What one step will you take next?"
    cns_span: "cns.prompt.kata.coaching.next_step"
    expected_output: "Specific, measurable experiment"

  - number: 5
    question: "What do you expect to happen?"
    description: "What's your prediction?"
    cns_span: "cns.prompt.kata.coaching.prediction"
    expected_output: "Testable prediction about experiment outcome"

evaluation_criteria:
  - name: scientific_thinking
    description: "Uses data and evidence rather than assumptions"
    weight: 0.4
  - name: iterative_approach
    description: "Breaks problems into small, testable steps"
    weight: 0.3
  - name: measurable_progress
    description: "Defines clear, measurable success criteria"
    weight: 0.3

steps:
  - ordinal: 1
    action: populate
    description: >
      Question 1: What is your target condition?
      Establish the goal the learner is working toward.
    renderer: minijinja
    template_ref: kata-coaching/coaching-q1-target
    gas_cap: 1500
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        target_condition:
          type: string
        learner_response:
          type: string

  - ordinal: 2
    action: populate
    description: >
      Question 2: What is your actual condition now?
      What does the learner observe about current performance?
    renderer: minijinja
    template_ref: kata-coaching/coaching-q2-actual
    gas_cap: 1500
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        actual_condition:
          type: string
        learner_response:
          type: string

  - ordinal: 3
    action: populate
    description: >
      Question 3: What obstacles do you think are preventing
      you from reaching the target condition? Which one are you
      addressing now?
    renderer: minijinja
    template_ref: kata-coaching/coaching-q3-obstacles
    gas_cap: 2500
    timeout_seconds: 20
    output_schema:
      type: object
      properties:
        obstacles:
          type: array
        focus_obstacle:
          type: string

  - ordinal: 4
    action: populate
    description: >
      Question 4: What is your next step (next experiment)?
      What do you expect?
    renderer: minijinja
    template_ref: kata-coaching/coaching-q4-experiment
    gas_cap: 3000
    timeout_seconds: 25
    output_schema:
      type: object
      properties:
        next_experiment:
          type: string
        prediction:
          type: string

  - ordinal: 5
    action: populate
    description: >
      Question 5: How quickly can we go and see what we have
      learned from taking that step?
      Establish immediate feedback loop.
    renderer: minijinja
    template_ref: kata-coaching/coaching-q5-learn
    gas_cap: 2000
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        when:
          type: string
        what_to_measure:
          type: string
        learning_goal:
          type: string

  - ordinal: 6
    action: execute
    description: >
      Synthesize coaching cycle outcome and emit to CNS.
      Record learner progress and next coaching needs.
    renderer: null
    template_ref: null
    target: synthesize_coaching_outcome
    mcp: hkask-mcp-memory # CNS feedback now via memory server
    tool: cns_emit
    gas_cap: 1500
    timeout_seconds: 10
    output_schema:
      type: object
      properties:
        cns_event_id:
          type: string
        learner_progress:
          type: string
        next_coaching_focus:
          type: string

error_handling:
  on_gas_exceeded: abort_and_escalate
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1

cns:
  emit_spans: true
  span_namespace: cns.prompt.kata.coaching
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: hKask-Administrator

coaching_outcomes:
  - name: demonstrates_thinking
    condition: "bot shows scientific thinking patterns"
    action: "Close gap, record in episodic memory"
  - name: needs_practice
    condition: "thinking patterns improving but not yet consistent"
    action: "Repeat coaching kata with adjusted questions"
  - name: resistance
    condition: "bot not engaging with thinking process"
    action: "Switch to starter kata for foundational habits"

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
