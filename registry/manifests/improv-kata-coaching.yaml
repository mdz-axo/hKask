# Improv + Kata-Coaching Bundle Manifest
# hKask v0.27.0 — Composes improv interaction grammar with coaching kata dialogue
#
# Polarity classification:
#   - improv: regulative (constrains interaction posture)
#   - kata-coaching: procedural (orchestrates 5-question dialogue flow)
#
# Phase assignment:
#   - improv runs pre-core (sets interaction posture before each question)
#   - kata-coaching runs core (executes the 5-question dialogue)
#
# Complementarity: Yes But introduces constraints at Q4 (next step guidance)
# without contradicting the learner's experiment. Plussing amplifies the
# learner's experimental design at Q5 before suggesting refinements.
# Both modes preserve the coach's non-directive posture — the coach never
# gives solutions, only procedural guidance.

bundle:
  name: improv-kata-coaching
  version: "0.27.0"
  description: >
    Composes the improv interaction grammar with the Coaching Kata's 5-question
    dialogue. Improv modes are applied per-question: Yes But at Q4 (introduce
    constraints that guide the learner's next experiment without contradicting),
    Plussing at Q5 (amplify the learner's experimental design before suggesting
    refinements). The bundle preserves the coach's non-directive posture while
    making feedback constructive-by-default.

  skills:
    - name: improv
      polarity: regulative
      phase: pre-core
      cascade_order: 1
      config:
        question_modes:
          q1_target: null # Q1: no improv — pure grounding question
          q2_actual: null # Q2: no improv — pure reality check
          q3_obstacles: plussing # Q3: Plussing filters obstacle list constructively
          q4_experiment: yes-but # Q4: Yes But introduces constraints on next step
          q5_learn: plussing # Q5: Plussing amplifies experimental design

    - name: kata-coaching
      polarity: procedural
      phase: core
      cascade_order: 2
      config:
        questions: [q1_target, q2_actual, q3_obstacles, q4_experiment, q5_learn]
        cadence: daily
        duration: ~20 minutes

  conflicts: []
  # No conflicts — improv (regulative) and kata-coaching (procedural) operate
  # in different phases. Improv is applied per-question, not globally.

  complementarities:
    - skills: [improv, kata-coaching]
      leveraged: >
        Q3 (obstacles): Plussing filters the learner's obstacle list, silently
        discarding non-obstacles while amplifying real blockers — helps the coach
        focus on what matters without explicitly rejecting the learner's input.
        Q4 (next step): Yes But accepts the learner's proposed experiment and
        appends a boundary condition — "Yes, and also consider: what if the
        cache size limit is reached?" — narrowing without contradicting.
        Q5 (learn): Plussing amplifies what the learner got right in their
        experimental design before the coach suggests any refinements, keeping
        the coach non-directive.

  convergence:
    criterion: >
      Learner PDCA cycle completion rate reaches ≥80% within 10 coaching sessions.
      CNS span: cns.kata.improv.effectiveness tracks the delta.

  cns:
    spans:
      - cns.kata.improv.effectiveness
      - cns.improv.mode.active
      - cns.improv.plussing.ratio
    variety_monitoring: true
