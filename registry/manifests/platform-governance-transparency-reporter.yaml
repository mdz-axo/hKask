# Platform Governance Transparency Reporter
# ℏKask v0.31.0 — Sovereignty verification: governance transparency
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: query_cns_spans, classify_governance_events, synthesize_report, convergence_check

manifest:
  id: platform-governance-transparency-reporter
  category: infrastructure
  name: Platform Governance Transparency Reporter
  description: >
    Convergent governance transparency process. Queries CNS spans for all
    governance decisions (Curator directives, spec changes, energy budget
    adjustments, contract proposals/acceptances/rejections), classifies each
    event by type, explains it in plain language accessible to non-technical
    users, synthesizes a structured transparency report, computes convergence,
    and iterates until all significant decisions are covered.

    Operationalizes P4 (Clear Boundaries): the platform's decision-making
    is visible and explainable, not opaque. Every governance action is
    traceable to a CNS span with a human-readable explanation.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: window_days
    type: integer
    required: false
    default: 30
  - name: output_format
    type: string
    required: false
    default: markdown

steps:
  - ordinal: 1
    action: select
    description: >
      Query CNS spans for governance events within the specified window.
      Collects spans from: cns.curation, cns.spec, cns.contract.proposed,
      cns.contract.accepted, cns.contract.rejected, cns.curator.*, and
      cns.energy.* (energy budget adjustments). The CNS query tool returns
      structured span data for classification.

      Design note: This step requires CNS MCP server access. In flow-only
      execution, governance_spans input should be pre-populated from a
      CNS query. The template renders classification guidance for the
      LLM to apply to the span data.

    renderer: minijinja
    template_ref: platform-governance-transparency-reporter/query-spans
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"
      governance_spans: "{{ governance_spans | default('') }}"

  - ordinal: 2
    action: select
    description: >
      Classify each governance event by type and explain it in plain language.
      For each CNS span: identify the decision type, who made it (Curator,
      human admin, userpod), what changed, why (if traceable), and frame
      the explanation for a non-technical audience. Flags decisions that
      require additional context or appear anomalous.

    renderer: minijinja
    template_ref: platform-governance-transparency-reporter/classify-events
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      governance_spans: "{{ step_1_result }}"
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 3
    action: select
    description: >
      Synthesize classified events into a structured transparency report.
      Groups events by category (curation, specification, contracts, energy),
      provides summary statistics per category, identifies patterns (e.g.,
      frequent contract rejections), and renders in the requested output format.
      Computes a coverage metric: what percentage of CNS governance spans
      were successfully classified and explained?

      Output schema:
      - summary (overview paragraph)
      - categories[] (per-category: count, events[], patterns[])
      - coverage_pct (0-100)
      - recommendations[] (if gaps detected)

    renderer: minijinja
    template_ref: platform-governance-transparency-reporter/synthesize-report
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      classified_events: "{{ step_2_result }}"
      output_format: "{{ output_format | default('markdown') }}"
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 4
    action: select
    description: >
      Compute normalized convergence metric for the transparency report.
      Checks: are all CNS governance span categories covered? Are
      explanations clear and actionable? Is coverage above threshold?
      Outputs convergence_metric in [0,1].

    renderer: minijinja
    template_ref: platform-governance-transparency-reporter/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      report: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-governance-transparency-reporter/query-spans
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-governance-transparency-reporter/classify-events
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-governance-transparency-reporter/synthesize-report
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-governance-transparency-reporter/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-governance-transparency-reporter
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
