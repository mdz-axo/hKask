# Standing Ensemble Session — System Coordination Chat
# hKask v0.21.0 - A Minimal Viable Container for Agents

session:
  id: system-coordination-standing-session
  name: System Coordination Standing Session
  description: >
    Persistent ensemble session where the 7 R7 bots report status,
    Curator orchestrates metacognition, and Administrator can observe/participate.
  functional_role: flowdef
  type: standing
  visibility: Shared
  created_by: hKask-Administrator
  created_at: system_bootstrap

# Participants — the 7 R7 bots + Curator
# Each R7.x bot owns one or more template domains.
# Per personas-r7.md: "They share all registries. They can swap. They do swap."
participants:
  - agent: Curator
    type: Replicant
    role: orchestrator
    voting: false
    description: System metacognition, Administrator liaison

  - agent: R7.1
    type: Bot
    role: participant
    voting: true
    description: Storage (hkask-storage). Data persistence, encryption, query.
    domains: [storage]

  - agent: R7.2
    type: Bot
    role: participant
    voting: true
    description: Memory (hkask-memory). Semantic/episodic pipelines, OCAP.
    domains: [memory]

  - agent: R7.3
    type: Bot
    role: participant
    voting: true
    description: CNS (hkask-cns). Variety counters, algedonic alerts, spans.
    domains: [cns]

  - agent: R7.4
    type: Bot
    role: participant
    voting: true
    description: Templates (hkask-templates). Registry, hLexicon, Jinja2.
    domains: [templates, registry]

  - agent: R7.5
    type: Bot
    role: participant
    voting: true
    description: Agents (hkask-agents). Pods, ACP, ensemble, kata.
    domains: [agents, ensemble, kata]

  - agent: R7.6
    type: Bot
    role: participant
    voting: true
    description: MCP (hkask-mcp). Tool dispatch, inference, git, web, spec.
    domains:
      [
        mcp,
        inference,
        git,
        web,
        condenser,
        github,
        gml,
        spec,
        fmp,
        telnyx,
        fal,
        rss-reader,
      ]

  - agent: R7.7
    type: Bot
    role: participant
    voting: true
    description: CLI/API (hkask-cli). Human interface, commands, utoipa.
    domains: [cli, api]

# Session Rules
rules:
  # No swarm consensus — explicit coordination only
  consensus_required: false

  # Curator orchestrates, bots report
  orchestration_model: curator_led

  # Administrator can join/observe anytime
  administrator_access:
    observe: true
    participate: true
    override: true

  # Bots report on schedule and on events
  reporting:
    scheduled: hourly
    on_event: true
    on_curator_request: true

  # Message retention
  retention:
    keep_messages: 1000
    keep_summaries: true
    archive_to_git: true

# Curator Authority
curator_authority:
  # Can request status from any bot
  can_request_status: true

  # Can calibrate bot thresholds
  can_calibrate_thresholds: true

  # Can adjust energy budgets (within limits)
  can_adjust_energy_budgets: true
  max_adjustment_percent: 25

  # Can escalate to Administrator
  can_escalate_to_administrator: true

  # Can spawn ad-hoc sub-ensembles
  can_spawn_sub_ensembles: true
  max_sub_ensemble_size: 4

# Administrator Access
administrator_access:
  # Can observe all messages
  observe_all: true

  # Can participate in discussions
  participate: true

  # Can override Curator decisions
  override_curator: true

  # Can modify bot charters
  modify_bot_charters: true

  # Can adjust session rules
  modify_session_rules: true

  # Can terminate/restart session
  control_session: true

# Message Types
message_types:
  - type: status_report
    from: bots
    to: all
    priority: normal
    schema:
      bot_name: string
      status: enum[healthy, degraded, critical]
      metrics: object
      issues: array
      timestamp: string

  - type: metacognition_update
    from: Curator
    to: all
    priority: high
    schema:
      system_health: enum[healthy, degraded, critical]
      actions_taken: array
      calibrations: array
      escalations: array
      timestamp: string

  - type: alert
    from: any_bot
    to: all
    priority: critical
    schema:
      alert_type: string
      severity: enum[low, medium, high, critical]
      source: string
      description: string
      recommended_action: string
      timestamp: string

  - type: instruction
    from: Curator
    to: specific_bot_or_all
    priority: high
    schema:
      target: string
      instruction: string
      parameters: object
      expected_outcome: string
      timestamp: string

  - type: administrator_message
    from: hKask-Administrator
    to: all
    priority: critical
    schema:
      message: string
      action_required: boolean
      recipients: array
      timestamp: string

# Integration Points
integration:
  # CNS span emission for all messages
  cns_spans:
    namespace: cns.ensemble.standing_session
    emit_all_messages: true
    emit_summaries: true
    rate_limit:
      per_session_per_minute: 500
      burst_allowance: 50
      on_exceed: queue_not_drop
    aggregation:
      enabled: true
      interval_minutes: 5
      repetitive_span_threshold: 10
    priority_queue:
      enabled: true
      order: [alert, outcome, invocation, production]

  # Memory persistence
  memory:
    persist_to: episodic_memory
    visibility: shared
    index_for_recall: true
    batch_writes:
      enabled: true
      max_batch_size: 100
      max_batch_age_minutes: 5
    deduplication:
      enabled: true
      strategy: entity_attribute_value_hash

  # Git archival
  git:
    archive_interval: daily
    archive_path: registry/ensemble-archives/system-coordination
    include_summaries: true
    lock_protocol:
      enabled: true
      timeout_minutes: 5
      retry_backoff_minutes: [1, 2, 4, 8]
    on_unavailable: skip_with_cns_alert

# Energy Budget
gas:
  session_cap: 150000
  per_message_cost: 100
  alert_threshold: 0.7
  hard_limit: true
  per_bot_allocation: 15000
  curator_allocation: 25000
  dynamic_adjustment:
    enabled: true
    max_adjustment_percent: 10
    requires_cns_justification: true
    audit_trail: true
  degradation:
    at_80_percent: reduce_memory_to_batch_only
    at_90_percent: suspend_standing_session_reports
    at_95_percent: curator_escalates_to_administrator

# Health Monitoring
health:
  # Session is healthy if:
  healthy_if:
    - min_participants: 5
    - curator_responsive: true
    - message_latency_max_ms: 5000
    - no_critical_alerts: true

  # Session degrades if:
  degraded_if:
    - participants_below: 4
    - curator_unresponsive_seconds: 60
    - message_latency_avg_ms: 10000

  # Session critical if:
  critical_if:
    - participants_below: 3
    - curator_unresponsive_seconds: 300
    - variety_deficit_gt: 100

# Bootstrapping
bootstrap:
  # Session starts automatically on system bootstrap
  auto_start: true

  # Initial message from Curator
  initial_message:
    from: Curator
    type: metacognition_update
    content: |
      ## System Coordination Standing Session — Initialized

      All R7 bots: report status.
      Administrator: session is open for observation/participation.

  # Initial bot status reports from each R7.x
  initial_reports:
    - from: R7.1
      content: "Storage ready. SQLite encrypted. sqlite-vec indexed."
    - from: R7.2
      content: "Memory operations ready. Visibility gating enabled."
    - from: R7.3
      content: "CNS monitoring active. Variety counters initialized."
    - from: R7.4
      content: "Template registry ready. hLexicon loaded. Jinja2 active."
    - from: R7.5
      content: "Agent pods ready. ACP runtime initialized. Kata templates loaded."
    - from: R7.6
      content: "MCP dispatch ready. 15 servers registered. OCAP verification enabled."
    - from: R7.7
      content: "CLI interface ready. API endpoints active. Listening for commands."
