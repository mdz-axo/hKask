# Platform Health Scorer
# ℏKask v0.31.0 — Platform health: aggregate score from all dimensions
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: query_slos, query_contracts, query_tests, query_regulation, compute_score, convergence_check

manifest:
  id: platform-health-scorer
  category: infrastructure
  name: Platform Health Scorer
  description: >
    Convergent platform health scoring process. Aggregates SLO compliance,
    contract violations, test pass rate, dependency health, and Regulation variety
    metrics into a single platform health score (0.0–1.0). Tracks score over
    time, identifies degradation trends, and produces a health dashboard.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: window_days
    type: integer
    required: false
    default: 30

steps:
  - ordinal: 1
    action: select
    description: >
      Query SLO evaluations from the Regulation ν-event store for the window.
      Retrieves reg.slo.evaluated spans and computes average compliance
      across all active SLOs. Weight: 0.25 in composite score.

    renderer: minijinja
    template_ref: platform-health-scorer/query-slos
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 2
    action: select
    description: >
      Query contract violations from the CI contract check.
      Retrieves reg.contract.violated spans and computes violation
      density (violations per crate per day). Weight: 0.20 in composite.

    renderer: minijinja
    template_ref: platform-health-scorer/query-contracts
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 3
    action: select
    description: >
      Query test pass rate from Regulation spans (reg.qa.*). Computes the
      ratio of passing tests to total tests across all crates.
      Weight: 0.20 in composite.

    renderer: minijinja
    template_ref: platform-health-scorer/query-tests
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 4
    action: select
    description: >
      Query Regulation variety metrics: overall deficit, critical/warning count,
      variety EMA. Computes variety health score.
      Weight: 0.15 in composite.

    renderer: minijinja
    template_ref: platform-health-scorer/query-regulation
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 5
    action: select
    description: >
      Compute composite platform health score from all dimensions.
      Formula: SLO_compliance × 0.25 + (1 − contract_violation_density) × 0.20
      + test_pass_rate × 0.20 + variety_health × 0.15 + dependency_health × 0.10
      + loyalty_score × 0.10.

      Where dependency_health is 1.0 if no cycles or orphans detected,
      decaying with each issue. Loyalty score is pulled from
      platform-loyalty-scorecard if available, else defaulted to 1.0.

      Also computes trend: compare to previous month's score.
      Flags degradation if score drops > 0.05 month-over-month.

    renderer: minijinja
    template_ref: platform-health-scorer/compute-score
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      slo_compliance: "{{ step_1_result }}"
      contract_health: "{{ step_2_result }}"
      test_health: "{{ step_3_result }}"
      reg_health: "{{ step_4_result }}"

  - ordinal: 6
    action: select
    description: >
      Compute normalized convergence metric for the health score.
      Checks: all dimensions covered, trend computed, degradation flagged.
      Outputs convergence_metric in [0,1].

    renderer: minijinja
    template_ref: platform-health-scorer/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      health_score: "{{ step_5_result }}"

  - ordinal: 7
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-health-scorer/query-slos
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-health-scorer/query-contracts
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-health-scorer/query-tests
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-health-scorer/query-regulation
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-health-scorer/compute-score
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-health-scorer/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-health-scorer
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
