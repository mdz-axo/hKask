# Skill Maintenance Process Manifest
# ℏKask v0.30.0 — Registry health maintenance as PDCA
# Template type: FlowDef — audit + coverage + convergence loop

manifest:
  id: skill-maintenance
  category: skill
  name: Skill Maintenance
  description: >
    Convergent maintenance process for the skill corpus. Audits staleness,
    checks coverage gaps, computes convergence, and iterates until critical
    maintenance blockers are reduced below threshold.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: skill_name
    type: string
    description: "Optional specific skill to audit"
    required: false
  - name: workspace_context
    type: object
    description: "Workspace metadata and known references"
    required: false
  - name: existing_skills
    type: array
    description: "Skill corpus list for coverage analysis"
    required: false
  - name: task_patterns
    type: array
    description: "Task patterns to map against corpus"
    required: false

steps:
  - ordinal: 1
    action: select
    description: Run staleness and health audit for target scope.
    renderer: minijinja
    template_ref: skill-maintenance/skill-maintenance-audit
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      skill_name: "{{ skill_name | default('') }}"
      workspace_context: "{{ workspace_context | default({}) }}"

  - ordinal: 2
    action: select
    description: Run corpus coverage analysis for uncovered/partial capabilities.
    renderer: minijinja
    template_ref: skill-maintenance/skill-maintenance-coverage
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      existing_skills: "{{ existing_skills | default([]) }}"
      task_patterns: "{{ task_patterns | default([]) }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for maintenance cycle.
    renderer: minijinja
    template_ref: skill-maintenance/skill-maintenance-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      audit_result: "{{ step_1_result }}"
      coverage_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter maintenance cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: skill-maintenance/skill-maintenance-audit
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-maintenance/skill-maintenance-coverage
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-maintenance/skill-maintenance-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: skill-maintenance
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-maintenance
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
