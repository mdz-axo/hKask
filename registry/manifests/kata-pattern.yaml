# Kata Pattern Manifest
# ℏKask v0.21.4 — Unified Kata execution with iteration support

manifest:
  id: kata-pattern
  name: Kata Pattern
  description: >
  functional_role: flowdef
    Unified Kata execution pattern. Selects and executes one of three
    Kata patterns: Improvement (4-step), Coaching (5-question), or Starter
    (practice routine). All Kata outcomes recorded to memory and CNS.
    
    Supports limited composition: Improvement ↔ Coaching switching when
    obstacles or capability gaps are identified. Starter is self-contained.
  editor: Curator
  visibility: public

gas:
  accounting:
    framework: GHG-Protocol-Scope-2
    version: 2024-edition
    reporting_method: dual

  grid_intensity:
    source: IEA-Emission-Factors-2026
    default_location_based: 0.370
    market_based: null

  inference_energy:
    source: LLMCO2-AAAI-2026
    model_tier_factors:
      fast_local: 0.0003
      balanced: 0.0008
      reasoning_local: 0.0015

  pue: 1.15
  token_budget: 100000
  cost_per_token: 0.0008
  alert_threshold: 0.7
  hard_limit: true

  carbon_accounting:
    location_based_co2e: (energy_wh × pue × grid_intensity_location)
    market_based_co2e: (energy_wh × pue × grid_intensity_market)
    unit: kg-CO₂e

  audit_trail:
    required_disclosures:
      - methodology_version
      - grid_intensity_source
      - pue_assumption
      - model_tier_used
      - uncertainty_range
    verification_standard: ISO-14064-3
    base_year: 2026

# Core Steps (always executed)
steps:
  - ordinal: 1
    action: select
    description: Verify consent and select Kata pattern
    renderer: minijinja
    template_ref: kata/consent-and-select.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    token_cap: 3000
    timeout_seconds: 20
    output_schema:
      type: object
      properties:
        consent_valid:
          type: boolean
        kata_type:
          type: string
          enum: [improvement, coaching, starter]
        learner_bot:
          type: string
        confidence:
          type: number

  - ordinal: 2
    action: populate
    description: Execute selected Kata pattern
    renderer: minijinja
    template_ref: kata/{{ kata_type }}-cycle.j2
    model_tier: balanced
    mcp: hkask-mcp-inference
    token_cap: 70000
    timeout_seconds: 60
    output_schema:
      type: object
      properties:
        kata_outcome:
          type: object
        learner_response:
          type: string

  - ordinal: 3
    action: populate
    description: Synthesize Kata outcome with habit assessment
    renderer: minijinja
    template_ref: kata/outcome-and-habit.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    token_cap: 8000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        capability_delta:
          type: string
        automaticity_score:
          type: number
        streak_days:
          type: integer
        intervention_needed:
          type: boolean

  - ordinal: 4
    action: execute
    description: Record practice to episodic memory (mandatory)
    renderer: null
    template_ref: null
    target: record_kata_practice
    mcp: hkask-mcp-memory
    tool: memory_remember
    token_cap: 2000
    timeout_seconds: 10
    required: true
    output_schema:
      type: object
      properties:
        triple_id:
          type: string
        memory_visibility:
          type: string

  - ordinal: 5
    action: execute
    description: Emit CNS span with carbon and habit data
    renderer: null
    template_ref: null
    target: emit_kata_cns_span
    mcp: hkask-mcp-cns
    tool: cns_emit
    token_cap: 2000
    timeout_seconds: 10
    output_schema:
      type: object
      properties:
        cns_event_id:
          type: string
        span_type:
          type: string
        energy_wh:
          type: number
        co2e_kg:
          type: number
        automaticity_score:
          type: number
        streak_days:
          type: integer

  # Conditional Steps (only when triggered)
  - ordinal: 6
    action: select
    description: Check if intervention is needed (habit at risk)
    renderer: minijinja
    template_ref: kata/habit-intervention.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    token_cap: 4000
    timeout_seconds: 15
    condition: intervention_needed OR days_since_practice_gt_3
    output_schema:
      type: object
      properties:
        intervention_type:
          type: string
        message:
          type: string

  - ordinal: 7
    action: select
    description: Check if Kata switching is requested
    renderer: minijinja
    template_ref: kata/kata-switch-check.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    token_cap: 3000
    timeout_seconds: 15
    condition: composition_enabled
    output_schema:
      type: object
      properties:
        switch_requested:
          type: boolean
        to_kata:
          type: string
        reason:
          type: string

  - ordinal: 8
    action: execute
    description: Execute Kata switch if requested (save state, invoke new)
    renderer: null
    template_ref: null
    target: execute_kata_switch
    mcp: hkask-mcp-templates
    tool: kata_switch
    token_cap: 5000
    timeout_seconds: 20
    condition: switch_requested
    output_schema:
      type: object
      properties:
        state_saved:
          type: boolean
        new_kata_started:
          type: boolean

  - ordinal: 9
    action: select
    description: Check if iteration is needed (high variance or low confidence)
    renderer: minijinja
    template_ref: kata/iteration-check.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    token_cap: 3000
    timeout_seconds: 15
    condition: variance_detected OR confidence_low
    output_schema:
      type: object
      properties:
        iteration_needed:
          type: boolean
        reason:
          type: string
        iterations_remaining:
          type: integer

  - ordinal: 10
    action: execute
    description: Execute iteration if triggered (invokes kata-iteration manifest)
    renderer: null
    template_ref: null
    target: execute_kata_iteration
    mcp: hkask-mcp-templates
    tool: kata_iteration
    token_cap: 50000
    timeout_seconds: 90
    condition: iteration_needed
    output_schema:
      type: object
      properties:
        iteration_completed:
          type: boolean
        variance_score:
          type: number
        confidence:
          type: string
        best_iteration:
          type: integer

error_handling:
  on_consent_revoked: abort_and_save_partial
  on_token_exceeded: abort_and_escalate
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_memory_failure: escalate_to_curator
  on_cns_failure: retry_once_then_escalate

# CNS Integration
cns:
  emit_spans: true
  span_namespace: cns.prompt.kata
  
  # Carbon tracking (integrated)
  carbon_tracking:
    enabled: true
    counter_id: kata.carbon.cumulative
    unit: kg-CO₂e
    grid_intensity_source: IEA-Emission-Factors-2026
    pue: 1.15
  
  # Capability metrics wired to counters
  capability_metrics:
    primary:
      - metric_id: task.success_rate
        counter_id: capability.task.success.rate
        unit: percent
        aggregation: mean
      - metric_id: thinking.automaticity
        counter_id: kata.automaticity.score
        unit: score_0_to_1
        aggregation: mean
  
  # Variety counters with baselines
  variety_counters:
    baseline:
      kata.practices.completed:
        expected: 5
        unit: per_week
        warning_threshold: 0.6
        critical_threshold: 0.4
      kata.habit.formation:
        expected: 1
        unit: per_21_days
        warning_threshold: 0.6
        critical_threshold: 0.4
      kata.automaticity.score:
        expected: 0.05
        unit: per_week_gain
        warning_threshold: 0.03
        critical_threshold: 0.01
    
    counter_ids:
      - counter_id: kata.practices.completed
        increment_on: kata_execution_success
      - counter_id: kata.habit.formation
        increment_on: practice_streak_milestone
      - counter_id: kata.automaticity.score
        increment_on: automaticity_measurement
  
  # Algedonic alerts
  algedonic_alerts:
    - trigger: variety_deficit_warning
      condition: practices_completed < 60%_of_baseline
      escalate_to: Curator
    - trigger: variety_deficit_critical
      condition: practices_completed < 40%_of_baseline
      escalate_to: hKask-Administrator
    - trigger: kata_practices_missed_3d
      threshold: 3
      escalate_to: Curator
      action: send_encouragement
    - trigger: kata_practices_missed_7d
      threshold: 7
      escalate_to: hKask-Administrator
      action: habit_decay_alert
    - trigger: automaticity_decline
      condition: automaticity_score_drop_0.2
      escalate_to: Curator
  
  # Iteration tracking
  iteration_tracking:
    enabled: true
    max_iterations: 2
    iteration_budget: 50000
    variance_threshold: 0.3
    confidence_threshold: 0.5
    
    variety_counters:
      - counter_id: kata.iterations.used
        increment_on: iteration_executed
        baseline:
          expected: 0.5
          warning_threshold: 1.5
          critical_threshold: 2.0
      - counter_id: kata.variance.score
        increment_on: variance_measurement
        baseline:
          expected: 0.2
          warning_threshold: 0.4
          critical_threshold: 0.6

# Kata Composition
composition:
  enabled: true
  allowed_transitions:
    improvement_to_coaching:
      allowed: true
      condition: thinking_pattern_is_obstacle
      requires: learner_consent
    coaching_to_improvement:
      allowed: true
      condition: specific_capability_gap_identified
      requires: curator_consent
    starter_to_any:
      allowed: false
      reason: starter_is_self_contained
    nested_kata:
      allowed: false
      reason: violates_minimalism
  
  switching_protocol:
    - complete_current_step
    - save_state_to_memory
    - invoke_new_kata
    - resume_original_on_completion

# Security (OCAP)
security:
  authentication:
    required: true
    method: webid_signature
    check_step: ordinal_1
  
  consent:
    model: revocable_at_any_time
    grant_required_for:
      improvement: Curator
      coaching: Learner OR Curator
      starter: Self
    
    revocation:
      who_can_revoke:
        improvement: [Curator]
        coaching: [Learner, Curator]
        starter: [Self]
      mid_cycle_effect: abort_and_save_partial
      save_incomplete_outcome: true
      emit_cns_span: true
      notify_parties: true
      re_consent:
        automatic: false
        requires: explicit_grant
  
  authorization:
    kata:improvement:
      requires: Curator-consent
    kata:coaching:
      requires: learner-consent OR Curator-consent
    kata:starter:
      requires: self-consent
  
  ocap:
    delegation_chain:
      Curator:
        can_delegate_to: [all_bots]
        can_access: [own_episodic, all_public_semantic]
        requires_consent: false
      bots:
        can_delegate_to: []
        can_access: [own_episodic]
        requires_consent: true
    capability_enforcement:
      runtime_check: true
      on_violation: abort_and_escalate
      audit_log: true
  
  audit:
    enabled: true
    log:
      - kata_invocation
      - consent_granted
      - consent_revoked
      - outcome_recorded
      - energy_wh
      - co2e_kg
      - automaticity_score
      - streak_days
  rate_limiting:
    per_bot_per_day: 10
    per_session: 3
    on_exceed: queue_not_drop

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_token_count: true
  include_energy_wh: true
  include_co2e_kg: true
  include_automaticity_score: true
  include_streak_days: true
  methodology_disclosure:
    framework: GHG-Protocol-Scope-2-2024
    grid_intensity_source: IEA-Emission-Factors-2026
    pue_assumption: 1.15
    model_tier: balanced
    uncertainty_range: ±50%