# Kata Pattern Manifest
# ℏKask v0.30.0 — Unified Kata execution with PDCA convergence tracking

manifest:
  id: kata-pattern
  name: Kata Pattern
  version: "0.30.0"
  description: >
    Unified Kata execution pattern. Selects and executes one of three
    Kata patterns: Improvement (4-step PDCA), Coaching (5-question PDCA), or Starter
    (practice routine PDCA). All Kata outcomes recorded to memory and CNS.
    Supports composition: Improvement ↔ Coaching switching when obstacles or
    capability gaps are identified. Starter is self-contained.
    This bundle delegates PDCA to sub-skills; it tracks aggregate convergence.
  functional_role: flowdef
  editor: Curator
  visibility: Public

convergence:
  threshold: 0.20
  improvement_ratio: 0.10
  improvement_gate: both
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 5
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: challenge
    type: string
    required: false
  - name: kata_type_hint
    type: string
    required: false
    description: "improvement|coaching|starter — optional hint to skip selection"

# Core Steps (always executed)
steps:
  - ordinal: 1
    action: select
    description: Verify consent and select Kata pattern (improvement, coaching, or starter).
    renderer: minijinja
    template_ref: kata/consent-and-select.j2
    gas_cap: 3000
    timeout_seconds: 20

  - ordinal: 2
    action: select
    description: Execute selected Kata pattern via sub-skill manifest.
    renderer: minijinja
    template_ref: kata/{{ kata_type }}-cycle.j2
    gas_cap: 70000
    timeout_seconds: 120

  - ordinal: 3
    action: select
    description: Synthesize Kata outcome with habit assessment.
    renderer: minijinja
    template_ref: kata/outcome-and-habit.j2
    gas_cap: 8000
    timeout_seconds: 60

  - ordinal: 4
    action: select
    description: Check if intervention is needed (habit at risk or decay detected).
    renderer: minijinja
    template_ref: kata/habit-intervention.j2
    gas_cap: 4000
    timeout_seconds: 30
    condition: "step_3_result.intervention_needed"

  - ordinal: 5
    action: select
    description: Compute convergence metric for kata practice session.
    renderer: minijinja
    template_ref: kata/kata-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      kata_type: "{{ step_1_result.kata_type | default('unknown') }}"
      practice_result: "{{ step_3_result }}"
      intervention_result: "{{ step_4_result | default(null) }}"

  - ordinal: 6
    action: loop
    description: Re-enter kata cycle if convergence not met (re-select or continue practice).
    input_mapping:
      loop_target: 1

  # Conditional Steps (only when triggered)
  - ordinal: 7
    action: select
    description: Check if Kata switching is requested (improvement↔coaching).
    renderer: minijinja
    template_ref: kata/kata-switch-check.j2
    gas_cap: 3000
    timeout_seconds: 30
    condition: composition_enabled

  - ordinal: 8
    action: choice
    description: Execute Kata switch if requested (save state, invoke new kata type).
    renderer: null
    template_ref: null
    condition: switch_requested

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: kata/consent-and-select
      gas_budget: 3000
    - resource: template
      action: render
      template_id: kata/improvement-cycle
      gas_budget: 18000
    - resource: template
      action: render
      template_id: kata/coaching-cycle
      gas_budget: 18000
    - resource: template
      action: render
      template_id: kata/starter-cycle
      gas_budget: 16000
    - resource: template
      action: render
      template_id: kata/outcome-and-habit
      gas_budget: 8000
    - resource: template
      action: render
      template_id: kata/habit-intervention
      gas_budget: 4000
    - resource: template
      action: render
      template_id: kata/kata-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: kata-pattern
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.kata
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Kata-specific features preserved from v0.21.4
# These are kata-domain extensions — unknown fields in BundleManifest schema,
# preserved for the KataEngine and kata-specific CNS counters.

# Carbon tracking (kata-specific)
carbon_tracking:
  enabled: true
  counter_id: kata.carbon.cumulative
  unit: kg-CO₂e
  framework: GHG-Protocol-Scope-2-2024
  grid_intensity_source: IEA-Emission-Factors-2026
  pue: 1.15

# Variety counters (kata-specific CNS integration)
variety_counters:
  - counter_id: kata.practices.completed
    increment_on: kata_execution_success
    baseline:
      {
        expected: 5,
        unit: per_week,
        warning_threshold: 0.6,
        critical_threshold: 0.4,
      }
  - counter_id: kata.habit.formation
    increment_on: practice_streak_milestone
    baseline:
      {
        expected: 1,
        unit: per_21_days,
        warning_threshold: 0.6,
        critical_threshold: 0.4,
      }
  - counter_id: kata.automaticity.score
    increment_on: automaticity_measurement
    baseline:
      {
        expected: 0.05,
        unit: per_week_gain,
        warning_threshold: 0.03,
        critical_threshold: 0.01,
      }

# Algedonic alerts (kata-specific)
algedonic_alerts:
  - trigger: variety_deficit_warning
    condition: practices_completed < 60%_of_baseline
    escalate_to: Curator
  - trigger: kata_practices_missed_3d
    threshold: 3
    escalate_to: Curator
    action: send_encouragement
  - trigger: kata_practices_missed_7d
    threshold: 7
    escalate_to: Curator
    action: habit_decay_alert
  - trigger: automaticity_decline
    condition: automaticity_score_drop_0.2
    escalate_to: Curator

# Iteration tracking (kata-specific — separate from PDCA convergence)
iteration_tracking:
  enabled: true
  max_iterations: 2
  iteration_budget: 50000
  variance_threshold: 0.3
  confidence_threshold: 0.5

# Kata Composition
composition:
  enabled: true
  allowed_transitions:
    improvement_to_coaching:
      allowed: true
      condition: thinking_pattern_is_obstacle
      requires: learner_consent
    coaching_to_improvement:
      allowed: true
      condition: specific_capability_gap_identified
      requires: curator_consent
    starter_to_any:
      allowed: false
      reason: starter_is_self_contained
    nested_kata:
      allowed: false
      reason: violates_minimalism
  switching_protocol:
    - complete_current_step
    - save_state_to_memory
    - invoke_new_kata
    - resume_original_on_completion

# Security (OCAP consent — kata-specific)
security:
  consent:
    model: revocable_at_any_time
    grant_required_for:
      improvement: Curator
      coaching: Learner OR Curator
      starter: Self
    revocation:
      mid_cycle_effect: abort_and_save_partial
      save_incomplete_outcome: true
      emit_cns_span: true
      notify_parties: true
      re_consent:
        automatic: false
        requires: explicit_grant
  authorization:
    "kata:improvement":
      requires: Curator-consent
    "kata:coaching":
      requires: learner-consent OR Curator-consent
    "kata:starter":
      requires: self-consent
  rate_limiting:
    per_bot_per_day: 10
    per_session: 3
    on_exceed: queue_not_drop

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
