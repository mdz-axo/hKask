# Security Scan PDCA — Registry Manifest Descriptor
# ℏKask v0.31.0 — Security-service-aligned design (vertical slice: Snyk + Semgrep)
# Registered: registry/templates/security-scan-pdca/ (crates: manifest.yaml + *.j2 + agent.yaml)
# Provenance: Every section below references verified architecture file + line. No abstract claims.

manifest:
  id: security-scan-pdca
  category: skill
  name: Security Scan PDCA
  description: >
    Security-service-aligned scanning skill — vertical slice of 2 services only:
    Snyk (SAST + dependency scanning — verified public docs; dependency manifest mapping unverified — needs dependency manifest check per §P5.3 bridge gate)
    + Semgrep (SAST + IaC rules — mechanism verified; domain bridge (FIBO analog for vulnerability scoring) unverified — needs domain-bridge spec per §P5.4 table line 111).
    PDCA cycle integration per kata-improvement (§P5.2 line 79). Safe container (§P3.1 line 52) mandatory.
  functional_role: flowdef
  version: 0.31.0
  editor: security-replicant-or-curator-delegate
  visibility: Public
  registry_crate_path: registry/templates/security-scan-pdca/
  canonical_source_of_truth: registry/templates/security-scan-pdca/manifest.yaml  # §P5.1 line 77 — registry is authoritative

# Essentialism gate (§P5.3 line 92) — applied before writing this descriptor
# What: skill identity + service pair description — PASS
# When: version 0.31.0 + lifecycle reference — PASS
# Where: registry/templates/security-scan-pdca/ namespace — PASS
# Why: P3 generative space within safe container (§P3.1) — PASS
# How: references FlowDef (.j2) + agent charter — PASS
# Who: replicant WebID (§P12.1) — referenced via agent.yaml — PASS
# If any answered "none," descriptor rejected — none did.

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: scan_result.convergence_metric
  on_not_reached: escalate
  reference_skill: kata-improvement  # §Pattern A — FlowDef convergence model

gas:
  cap: 120000
  cost_per_iteration: 120
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3.5
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: scan_target
    type: string
    required: true
    provenance: user_replicant_input
  - name: dependency_manifest_ref
    type: string
    required: false
    evidence_status: unverified_needs_check  # §P5.3 — bridge must justify by 5W1H; if not, universal core sufficient
  - name: iac_rules_ref
    type: string
    required: false
    evidence_status: mechanism_verified_domain_bridge_unverified
  - name: replicant_webid
    type: string
    required: true
    provenance_ref: §P12.1 line 225 (CLI) / line 227 (API bot-attested)
  - name: delegation_token_ref
    type: string
    required: true
    provenance_ref: §P4.1 line 65 — DelegationToken is OCAP enforcement perimeter; PerPodToolBinding makes cross-pod dispatch invalid

steps:
  - ordinal: 1
    name: scan_target_selection
    axis: PKO_process
    template_ref: security-scan-pdca/security-scan-flow
    provenance_ref: §P5.4 line 98 (PKO — How did this come to be?)
  - ordinal: 2
    name: dependency_scan_snyk
    axis: PKO_process
    service: Snyk
    evidence_status: verified_public_docs
  - ordinal: 3
    name: iac_scan_semgrep
    axis: PKO_process
    service: Semgrep
    evidence_status: mechanism_verified_domain_bridge_unverified
  - ordinal: 4
    name: state_result_recording
    axis: DC_BIBO_state
    provenance_ref: §P5.4 line 94 (Dublin Core + BIBO — noun identity of scan result)
    bridge: FIBO_analog_risk_scoring
    bridge_justification_5w1h: |
      Bridge must justify existence per §P5.3. Answers What (vulnerability classification) + How (scoring mechanism).
      If bridge cannot justify by 5W1H, reject — universal DC+BIBO core sufficient (§P5.4 line 103).
  - ordinal: 5
    name: cns_span_emit
    axis: regulation
    provenance_ref: §P9.1 lines 165-189
    spans:
      - cns.skill.scan
      - cns.inference.scan_boundary
      - cns.agent_pod.scan_session
      - cns.cli.scan_invoked
    authority: replicant_webid  # §P9.1 line 200 — every span carries replicant or owner WebID
  - ordinal: 6
    name: convergence_check
    axis: PKO_process
    provenance_ref: §Pattern A — FlowDef convergence

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort  # §P5.1 line 77 — registry authoritative; disagreeing SKILL.md is non-canonical

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: security-scan-pdca/security-scan-flow
      gas_budget: 4000
      provenance_ref: registry/templates/security-scan-pdca/security-scan-flow.j2
    - resource: registry
      action: index
      template_id: security-scan-pdca
      gas_budget: 1000
    - resource: manifest
      action: execute
      template_id: security-scan-pdca
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
  pod_boundary_enforcement: true  # §P4.1 line 65

cns:
  emit_spans: true
  span_namespace: cns.skill.scan
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator  # §P9.1 line 183
  spans:
    - cns.skill.scan  # lifecycle activate/load/scan/result/publish — §P9.1 line 178
    - cns.inference.scan_boundary  # LLM boundary — mandatory defense (§P3.1) — §P9.1 line 172
    - cns.agent_pod.scan_session  # pod-boundary revert/spawn — §P9.1 line 183
    - cns.cli.scan_invoked  # command invocation — §P9.1 line 180
  authority: replicant_or_owner_WebID  # §P9.1 line 200
  canonical_namespace_invariant: true  # §P9.1 line 165 — `cns.*` reserved; must be registered in CANONICAL_NAMESPACES
  performative_telemetry_distinction: |
    `hkask.*` targets (CLI, API middleware) are NOT registered, NOT categorized, NOT loop-connected — §P9.1 line 167.

security_container_controls:
  # §P3.1 line 52 — Mandatory at every LLM boundary. Floor (§P3.1 line 60), not ceiling.
  prompt_injection_defense: mandatory  # OWASP LLM01
  role_override_defense: mandatory    # OWASP LLM02
  secret_leakage_defense: mandatory    # OWASP LLM06
  model_dos_defense: mandatory        # OWASP LLM04
  reference_owasp: "Top 10 for LLM Applications (LLM01, LLM02, LLM04, LLM06)"
  reference_nist: "AI RMF 1.0 (2023) — technical controls for validity, reliability, security, resiliency"
  reference_enisa: "Multilayer Framework (2024) — security-by-design"
 