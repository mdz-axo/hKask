# Grill-Me Process Manifest
# ℏKask v0.30.0 — Socratic interrogation as convergent PDCA

manifest:
  id: grill-me
  name: Grill-Me
  description: >
    Convergent interrogation process. Calibrates questioning level,
    generates Socratic challenge rounds, synthesizes assessment,
    computes convergence, and iterates until coverage is sufficient.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: topic
    type: string
    required: true
  - name: start_level
    type: integer
    required: false

steps:
  - ordinal: 1
    action: select
    description: Calibrate initial interrogation level.
    renderer: minijinja
    template_ref: grill-me/grill-me-escalate
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      topic: "{{ topic }}"
      current_level: "{{ start_level | default(1) }}"
      solid_ratio: 1.0
      total_questions: 0

  - ordinal: 2
    action: select
    description: Generate and evaluate a Socratic interrogation round.
    renderer: minijinja
    template_ref: grill-me/grill-me-round
    gas_cap: 7000
    timeout_seconds: 90
    input_mapping:
      topic: "{{ topic }}"
      current_level: "{{ step_1_result.new_level | default(start_level | default(1)) }}"
      round_number: 1
      mode: "interrogate"
      previous_answers: "{{ [] }}"
      assessment_so_far: "{{ {} }}"

  - ordinal: 3
    action: select
    description: Synthesize final assessment and recommendations.
    renderer: minijinja
    template_ref: grill-me/grill-me-assess
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      topic: "{{ topic }}"
      all_answers: "{{ step_2_result.all_answers | default(step_2_result.evaluations | default([])) }}"
      assessment: "{{ step_2_result.assessment | default({}) }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for grill-me cycle.
    renderer: minijinja
    template_ref: grill-me/grill-me-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      round_result: "{{ step_2_result }}"
      assess_result: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    description: Re-enter interrogation cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: grill-me/grill-me-escalate
      gas_budget: 3000
    - resource: template
      action: render
      template_id: grill-me/grill-me-round
      gas_budget: 7000
    - resource: template
      action: render
      template_id: grill-me/grill-me-assess
      gas_budget: 4000
    - resource: template
      action: render
      template_id: grill-me/grill-me-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: grill-me
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
