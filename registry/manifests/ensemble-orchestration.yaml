# Dispatch manifest for ensemble-curator-bot
# Orchestrates multi-agent chat without swarms or consensus

manifest:
  name: ensemble-orchestration
  version: "0.1.0"
  description: Multi-agent coordination with H2A session orchestration
  functional_role: flowdef

steps:
  - ordinal: 1
    action: select
    template_ref: ensemble/selectors/participant-selector.j2
    renderer: minijinja
    model_tier: fast_local
    output_schema:
      type: object
      properties:
        participants:
          type: array
          items:
            type: string
        session_type:
          type: string
          enum: [h2a, a2a, multi_bot]

  - ordinal: 2
    action: populate
    template_ref: ensemble/templates/session-init.j2
    renderer: minijinja
    bindings:
      session_id: "${input.session_id}"
      participants: "${input.participants}"
      topic: "${input.topic}"

  - ordinal: 3
    action: execute
    target: coordinate_session
    # Ensemble orchestration now handled via ACP port (ACP adapter)
    tool: coordinate_session
    output_schema:
      type: object
      properties:
        session_outcome:
          type: string
        artifacts_produced:
          type: array

matroshka:
  max_depth: 5
  enforce: true

cns:
  spans:
    - cns.agent_pod.activated
    - cns.tool.invocation
constraints:
  no_swarm_consensus: true
  no_cross_machine_sync: true
  max_participants: 7
