# Bootstrap Sequence — hKask System Initialization
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

functional_role: flowdef

bootstrap:
  version: 0.21.0
  description: >
    Ordered system initialization with dependency resolution.
    Topological sort ensures no circular dependencies.
  timeout_seconds: 300
  on_failure: abort_with_diagnostic

# Initialization Sequence (ordered by dependency)
sequence:
  - ordinal: 1
    component: hkask-storage
    type: crate
    description: SQLite + SQLCipher initialization
    readiness_probe: storage_ping
    timeout_seconds: 30
    critical: true

  - ordinal: 2
    component: hkask-keystore
    type: crate
    description: OS keychain integration
    readiness_probe: keystore_ping
    timeout_seconds: 30
    critical: true
    depends_on: [hkask-storage]

  - ordinal: 3
    component: hkask-cns
    type: crate
    description: Cybernetic Nervous System span emitter
    readiness_probe: cns_ping
    timeout_seconds: 30
    critical: true
    depends_on: [hkask-storage]

  - ordinal: 4
    component: hkask-mcp-memory
    type: mcp_server
    description: Memory operations MCP server
    readiness_probe: mcp_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-storage, hkask-cns]

  - ordinal: 5
    component: hkask-mcp-cns
    type: mcp_server
    description: CNS monitoring MCP server
    readiness_probe: mcp_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-cns]

  - ordinal: 6
    component: hkask-mcp-registry
    type: mcp_server
    description: Registry operations MCP server
    readiness_probe: mcp_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-storage]

  - ordinal: 7
    component: cns-curator-bot
    type: bot
    manifest: registry/bots/cns-curator-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-cns, hkask-mcp-memory]

  - ordinal: 8
    component: memory-curator-bot
    type: bot
    manifest: registry/bots/memory-curator-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-memory, hkask-mcp-cns]

  - ordinal: 9
    component: inference-curator-bot
    type: bot
    manifest: registry/bots/inference-curator-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-memory, hkask-mcp-inference]

  - ordinal: 10
    component: mcp-dispatch-bot
    type: bot
    manifest: registry/bots/mcp-dispatch-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-registry, hkask-mcp-memory]

  - ordinal: 11
    component: ensemble-curator-bot
    type: bot
    manifest: registry/bots/ensemble-curator-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-ensemble, hkask-mcp-memory]

  - ordinal: 12
    component: git-curator-bot
    type: bot
    manifest: registry/bots/git-curator-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-git, hkask-mcp-memory]

  - ordinal: 13
    component: registry-dispatch-bot
    type: bot
    manifest: registry/bots/registry-dispatch-bot.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on: [hkask-mcp-registry, hkask-mcp-inference]

  - ordinal: 14
    component: Curator
    type: replicant
    manifest: registry/bots/Curator.yaml
    readiness_probe: bot_ping
    timeout_seconds: 60
    critical: true
    depends_on:
      - cns-curator-bot
      - memory-curator-bot
      - inference-curator-bot
      - mcp-dispatch-bot
      - ensemble-curator-bot
      - git-curator-bot
      - registry-dispatch-bot

  - ordinal: 15
    component: system-coordination-standing-session
    type: standing_session
    manifest: registry/manifests/standing-ensemble-session.yaml
    readiness_probe: session_ping
    timeout_seconds: 120
    critical: true
    depends_on:
      - Curator
      - cns-curator-bot
      - memory-curator-bot
      - inference-curator-bot
      - mcp-dispatch-bot
      - ensemble-curator-bot
      - git-curator-bot
      - registry-dispatch-bot

# Readiness Probe Definitions
readiness_probes:
  storage_ping:
    type: health_check
    endpoint: storage::ping
    expected: {status: ok}
    retry_count: 3
    retry_delay_seconds: 5

  keystore_ping:
    type: health_check
    endpoint: keystore::ping
    expected: {status: ok}
    retry_count: 3
    retry_delay_seconds: 5

  cns_ping:
    type: health_check
    endpoint: cns::ping
    expected: {status: ok}
    retry_count: 3
    retry_delay_seconds: 5

  mcp_ping:
    type: health_check
    endpoint: mcp::ping
    expected: {status: ok}
    retry_count: 3
    retry_delay_seconds: 5

  bot_ping:
    type: health_check
    endpoint: agent_pod::status
    expected: {state: Registered}
    retry_count: 3
    retry_delay_seconds: 5

  session_ping:
    type: health_check
    endpoint: ensemble::session_status
    expected: {state: Active}
    retry_count: 3
    retry_delay_seconds: 5

# Circular Dependency Detection
cycle_detection:
  enabled: true
  fail_fast: true
  max_depth: 20
  error_format: >
    Circular dependency detected: {cycle_path}
    Resolution: Remove or reorder dependency in {manifest_path}

# Error Handling
error_handling:
  on_critical_failure: abort
  on_non_critical_failure: continue_with_warning
  on_timeout: retry_then_abort
  max_retries: 2
  retry_backoff_seconds: 10
  diagnostic_output:
    - failed_component
    - dependency_tree
    - readiness_probe_output
    - cns_span_ref

# CNS Integration
cns:
  emit_bootstrap_spans: true
  span_namespace: cns.bootstrap
  spans:
    - cns.bootstrap.started
    - cns.bootstrap.component_initialized
    - cns.bootstrap.readiness_probe_passed
    - cns.bootstrap.completed
    - cns.bootstrap.failed

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_timestamps: true
  include_dependency_tree: true
  git_snapshot: true
  git_path: registry/bootstrap-archives
