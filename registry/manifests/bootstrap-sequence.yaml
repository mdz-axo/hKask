# Circular Dependency Detection
# cycle_detection: (removed — documentation-only field not parsed by Rust; deny_unknown_fields enforces schema)
#   enabled: true
#   fail_fast: true
#   max_depth: 20
#   error_format: >
#     Circular dependency detected: {cycle_path}
#     Resolution: Remove or reorder dependency in {manifest_path}

# Error Handling
error_handling:
  on_critical_failure: abort
  on_non_critical_failure: continue_with_warning
  on_timeout: retry_then_abort
  max_retries: 2
  retry_backoff_seconds: 10
  diagnostic_output:
    - failed_component
    - dependency_tree
    - readiness_probe_output
    - cns_span_ref

# CNS Integration
cns:
  emit_bootstrap_spans: true
  span_namespace: cns.bootstrap
  spans:
    - cns.bootstrap.started
    - cns.bootstrap.component_initialized
    - cns.bootstrap.readiness_probe_passed
    - cns.bootstrap.completed
    - cns.bootstrap.failed

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_timestamps: true
  include_dependency_tree: true
  git_snapshot: true
  git_path: registry/bootstrap-archives
