# Dispatch manifest for registry-dispatch-bot
# Routes template dispatch requests through selection → population → execution

manifest:
  id: dispatch
  name: dispatch
  version: "0.1.0"
  description: Template dispatch orchestration with selector-driven routing
  functional_role: flowdef
  visibility: Public

matroshka:
  max_depth: 7
  enforce: true
  depth_counter:
    enabled: true
    inherit_from_parent: true
    default: 0
    increment_on_dispatch: true
  cns_monitoring:
    span_namespace: cns.prompt.matroshka_depth
    alert_if_exceeds: 6
    rationale: "Warning before hard limit at 7"

steps:
  - ordinal: 1
    action: select
    template_ref: registry/selectors/selector.j2
    renderer: minijinja
    matroshka_depth: "${matroshka_depth}"
    output_schema:
      type: object
      properties:
        selected_template_id:
          type: string
        rationale:
          type: string
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0

  - ordinal: 2
    action: populate
    template_ref: "${selected_template_id}"
    renderer: minijinja
    bindings:
      raw_prompt: "${input.raw_prompt}"
      context: "${input.context}"
      matroshka_depth: "${matroshka_depth + 1}"

  - ordinal: 3
    action: execute
    target: "${template.contract.target}"
    contract: "${template.contract}"
    mcp: "${template.contract.mcp}"
    matroshka_depth: "${matroshka_depth + 1}"

cns:
  spans:
    - cns.prompt.select
    - cns.prompt.render
    - cns.prompt.outcome
