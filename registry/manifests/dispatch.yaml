# Dispatch manifest for registry-dispatch-bot
# Routes template dispatch requests through selection → population → execution

manifest:
  id: dispatch
  category: pipeline
  name: dispatch
  version: "0.2.0"
  description: Template dispatch orchestration with selector-driven routing
  functional_role: flowdef
  visibility: Public

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

# matroshka: (removed — documentation-only field not parsed by Rust; deny_unknown_fields enforces schema)
#   max_depth: 7
#   enforce: true
#   depth_counter:
#     enabled: true
#     inherit_from_parent: true
#     default: 0
#     increment_on_dispatch: true
#   cns_monitoring:
#     span_namespace: cns.prompt.matroshka_depth
#     alert_if_exceeds: 6
#     rationale: "Warning before hard limit at 7"

steps:
  - ordinal: 1
    action: select
    template_ref: registry/selectors/selector.j2
    renderer: minijinja
    matroshka_depth: "${matroshka_depth}"
    output_schema:
      type: object
      properties:
        selected_template_id:
          type: string
        rationale:
          type: string
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0

  - ordinal: 2
    action: populate
    template_ref: "${selected_template_id}"
    renderer: minijinja
    bindings:
      raw_prompt: "${input.raw_prompt}"
      context: "${input.context}"
      matroshka_depth: "${matroshka_depth + 1}"

  - ordinal: 3
    action: execute
    target: "${template.contract.target}"
    contract: "${template.contract}"
    mcp: "${template.contract.mcp}"
    matroshka_depth: "${matroshka_depth + 1}"

ledger:
  emit_spans: true
  span_namespace: cns.prompt.dispatch
  variety_monitoring: true
  algedonic_threshold: 100
  spans:
    - cns.prompt.select
    - cns.prompt.render
    - cns.prompt.outcome
    - cns.prompt.dispatch.resolved_template
  instrumentation:
    log_dynamic_template_id: true
    rationale: >
      Enabled because dispatch.yaml step 2 uses ${selected_template_id}
      for dynamic template resolution. Recording the resolved template ID
      at runtime enables static-analysis-invisible templates to be visible
      in CNS span data for orphan detection and dependency graph auditing.
