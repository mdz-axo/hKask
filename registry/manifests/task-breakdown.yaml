# Task Breakdown Process Manifest
# hKask v0.31.0 — Convergent plan generation
# Adapted from addyosmani/planning-and-task-breakdown
#
# PDCA cycle (single-producer loop — mirrors diataxis-diagram):
#   1. PLAN      — read-only context + dependency graph + risks
#   2. DECOMPOSE — slice vertically + write tasks in one producer (DO)
#   3. EVALUATE  — score against six weighted criteria (CHECK)
#   4. CONVERGE  — normalized metric (CHECK)
#   5. WRITE-PLAN — finalize tasks/plan.md + tasks/todo.md + pko_anchors (ACT)
#   6. LOOP      — re-enter at DECOMPOSE if unconverged
#
# Design notes:
#   - slice + write-tasks merged into one producer to fix the grain-mismatch between
#     task-level refinement directives and the loop re-entry point (Finding 1).
#   - min_iterations: 0 allows first-pass convergence when the plan is already good,
#     avoiding a forced non-converged write-plan execution (Finding 2). With
#     improvement_gate: threshold_only the forced second pass added no value.

manifest:
  id: task-breakdown
  category: skill
  name: Task Breakdown
  description: >
    Convergent planning process. Gathers read-only context and a dependency graph,
    decomposes work vertically into small verifiable tasks with acceptance criteria
    and checkpoints, evaluates the plan against sizing/red-flag/checkpoint criteria,
    and iterates until the plan is stable. Finalizes tasks/plan.md and tasks/todo.md
    with PKO process-axis anchors. Distinct from kanban-task-decomposition (single-pass
    board populate) and tdd (consumes the plan one vertical slice at a time).
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  # 0.15 — same band as diataxis-diagram / idiomatic-rust ("maximally correct").
  # A converged plan has: correct sizing, vertical slices, specific ACs, ordered
  # dependencies, checkpoints between phases, and zero red flags.
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  # 0: allow first-pass convergence. With threshold_only gating the forced second
  # pass provides no improvement-tracking benefit and guarantees a non-converged
  # write-plan execution. A first-pass-perfect plan (metric <= 0.15) converges now.
  min_iterations: 0
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 60000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1.5
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: spec_or_intent
    type: string
    description: "The spec, feature description, or clear requirements to decompose"
    required: true
  - name: crate_scope
    type: string
    description: "Optional target crate or module path to scope the plan"
    required: false
  - name: code_context
    type: object
    description: "Pre-read codebase context (patterns, conventions, existing modules)"
    required: false
  - name: parallelization_hint
    type: string
    description: "Optional hint on available agents/sessions for parallelization planning"
    required: false

steps:
  - ordinal: 1
    action: select
    description: >
      PLAN — read-only mode. Read the spec and relevant codebase sections,
      identify patterns/conventions, build the dependency graph, note risks.
      No code is written.
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-plan
    gas_cap: 6144
    timeout_seconds: 90
    input_mapping:
      spec_or_intent: "{{ spec_or_intent }}"
      crate_scope: "{{ crate_scope | default('') }}"
      code_context: "{{ code_context | default({}) }}"

  - ordinal: 2
    action: select
    description: >
      DECOMPOSE — single producer: slice vertically AND write tasks in one step.
      Accepts refinement_directives from the evaluate step on re-entry (task-addressable).
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-decompose
    gas_cap: 8192
    timeout_seconds: 90
    input_mapping:
      context_summary: "{{ step_1_result.context_summary | default('') }}"
      dependency_graph: "{{ step_1_result.dependency_graph | default([]) }}"
      risks: "{{ step_1_result.risks | default([]) }}"
      refinement_directives: "{{ step_3_result.refinement_directives | default([]) }}"
      parallelization_hint: "{{ parallelization_hint | default('') }}"

  - ordinal: 3
    action: select
    description: >
      EVALUATE — score the plan against six weighted criteria. Emit task-addressable
      refinement directives for criteria above threshold.
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-evaluate
    gas_cap: 6144
    timeout_seconds: 60
    input_mapping:
      tasks: "{{ step_2_result.tasks | default([]) }}"
      dependency_graph: "{{ step_1_result.dependency_graph | default([]) }}"
      slices: "{{ step_2_result.slices | default([]) }}"

  - ordinal: 4
    action: select
    description: >
      QUALITY-GATE — independent evaluation of the plan (fusion: false, deterministic
      rubric, no self-assessment bias). Scores the six criteria independently of the
      producer-coupled evaluate step and flags compensation masking. Mirrors
      superforecasting's forecast-quality-gate separation of concerns.
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-quality-gate
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      tasks: "{{ step_2_result.tasks | default([]) }}"
      slices: "{{ step_2_result.slices | default([]) }}"
      dependency_graph: "{{ step_1_result.dependency_graph | default([]) }}"
      evaluation_result: "{{ step_3_result }}"
    fusion: false

  - ordinal: 5
    action: select
    description: >
      CONVERGE — compute normalized metric from the INDEPENDENT gate's scores (not the
      producer's self-assessment). Below 0.15 means the plan is complete, correctly
      ordered, properly sized, and free of red flags. Applies the materiality guard
      using the carried prior_metric to detect a stable-but-unconverged plan.
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-convergence
    gas_cap: 2048
    timeout_seconds: 30
    input_mapping:
      evaluation_result: "{{ step_4_result }}"
      iteration: "{{ loop_context.iteration | default(1) }}"
      prior_metric: "{{ prior_metric | default(null) }}"
    fusion: false

  - ordinal: 6
    action: select
    description: >
      WRITE-PLAN — finalize tasks/plan.md (overview, architecture decisions, phased
      task list with checkpoints, risks, open questions) and tasks/todo.md (checklist),
      with a pko_anchors map giving each element a PKO process-axis identity.
    renderer: minijinja
    template_ref: task-breakdown/task-breakdown-write-plan
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      context_summary: "{{ step_1_result.context_summary | default('') }}"
      dependency_graph: "{{ step_1_result.dependency_graph | default([]) }}"
      tasks: "{{ step_2_result.tasks | default([]) }}"
      slices: "{{ step_2_result.slices | default([]) }}"
      risks: "{{ step_1_result.risks | default([]) }}"
      evaluation_result: "{{ step_4_result }}"

  - ordinal: 7
    action: loop
    description: >
      If convergence not met (metric > 0.15) and refinement directives exist, loop
      back to DECOMPOSE (step 2) with directives as focused, task-addressable
      improvement targets. Carries the prior convergence_metric forward so the next
      convergence check's materiality guard can detect a stable-but-unconverged plan.
      Each iteration narrows the gap.
    input_mapping:
      loop_target: 2
      prior_metric: "{{ step_5_result.convergence_metric }}"

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-plan
      gas_budget: 6144
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-decompose
      gas_budget: 8192
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-evaluate
      gas_budget: 6144
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-quality-gate
      gas_budget: 4096
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-convergence
      gas_budget: 2048
    - resource: template
      action: render
      template_id: task-breakdown/task-breakdown-write-plan
      gas_budget: 4096
    - resource: manifest
      action: execute
      template_id: task-breakdown
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.task-breakdown
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true