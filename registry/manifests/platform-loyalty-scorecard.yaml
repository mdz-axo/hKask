# Platform Loyalty Scorecard
# ℏKask v0.31.0 — The ultimate loyalty metric
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: query_sovereignty, query_consent, query_portability, query_governance, query_self_service, query_satisfaction, compute_loyalty, convergence_check

manifest:
  id: platform-loyalty-scorecard
  category: infrastructure
  name: Platform Loyalty Scorecard
  description: >
    Convergent loyalty scoring process. Aggregates six dimensions of the
    loyalty contract into a single score (0.0–1.0): data sovereignty,
    consent transparency, portability, governance visibility, self-service
    capability, and user satisfaction. Each dimension is weighted equally
    unless explicitly prioritized. Produces a loyalty score with trend
    analysis and degradation alerts.

    The loyalty score is the operational proof of the Magna Carta. It is
    what distinguishes hKask from lock-in platforms: loyalty is measured,
    not claimed.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_7_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 75000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: window_days
    type: integer
    required: false
    default: 30
  - name: previous_score
    type: number
    required: false
    description: Previous month's loyalty score for trend computation.

steps:
  - ordinal: 1
    action: select
    description: >
      Query sovereignty health: are user pods intact? Are backups
      functioning? Portability verification results from
      platform-portability-verifier. Weight: 0.20.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-sovereignty
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 2
    action: select
    description: >
      Query consent health: consent audit results from
      platform-consent-auditor. Anomaly count, token hygiene score.
      Weight: 0.20.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-consent
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 3
    action: select
    description: >
      Query portability health: backup verification results.
      Integrity checks passed, import verified.
      Weight: 0.20.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-portability
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 4
    action: select
    description: >
      Query governance transparency: report coverage from
      platform-governance-transparency-reporter. Percentage of
      governance decisions explained.
      Weight: 0.15.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-governance
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 5
    action: select
    description: >
      Query self-service capability: skill creation frequency,
      FlowDef success rate, time-to-first-agent. Measures how
      well P3 (Generative Space) is working in practice.
      Weight: 0.15.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-self-service
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 6
    action: select
    description: >
      Query user satisfaction: platform NPS, developer confidence,
      session engagement. From PaaP metrics.
      Weight: 0.10.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/query-satisfaction
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      window_days: "{{ window_days | default(30) }}"

  - ordinal: 7
    action: select
    description: >
      Compute composite loyalty score from all six dimensions.
      Formula: sovereignty × 0.20 + consent × 0.20 + portability × 0.20
      + governance × 0.15 + self_service × 0.15 + satisfaction × 0.10.

      Compare against previous_score to compute trend.
      Flag degradation if score drops > 0.05 month-over-month.
      Emit reg.platform.metric.loyalty CNS span.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/compute-loyalty
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      sovereignty: "{{ step_1_result }}"
      consent: "{{ step_2_result }}"
      portability: "{{ step_3_result }}"
      governance: "{{ step_4_result }}"
      self_service: "{{ step_5_result }}"
      satisfaction: "{{ step_6_result }}"
      previous_score: "{{ previous_score | default(1.0) }}"

  - ordinal: 8
    action: select
    description: >
      Compute convergence metric. Checks all six dimensions covered,
      trend computed, degradation flagged. Outputs convergence_metric.

    renderer: minijinja
    template_ref: platform-loyalty-scorecard/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      loyalty_score: "{{ step_7_result }}"

  - ordinal: 9
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-sovereignty
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-consent
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-portability
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-governance
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-self-service
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/query-satisfaction
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/compute-loyalty
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-loyalty-scorecard/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-loyalty-scorecard
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
