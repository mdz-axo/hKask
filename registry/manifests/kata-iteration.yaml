# Kata Iteration Manifest
# ℏKask v0.31.0 — PDCA iteration with variance assessment and confidence building
#
# Companion manifest to kata-pattern. When a PDCA cycle produces high variance
# or low confidence, kata-pattern's iteration_tracking configuration enforces
# inline thresholds that mirror this manifest. This standalone manifest exists
# for independent iteration testing and variance assessment experiments.
# See registry/manifests/kata-pattern.yaml iteration_tracking for bundle-level config.

manifest:
  id: kata-iteration
  name: Kata Iteration
  version: "0.31.0"
  description: >
    Iterate on a completed PDCA cycle to assess variance and build confidence.
    Re-executes the kata template with higher temperature, then compares
    outputs across iterations to determine whether variance decreased and
    confidence increased. Maximum 2 iterations per session.
  editor: Curator
  visibility: Public

convergence:
  threshold: 0.20
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 2
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  - ordinal: 1
    action: populate
    description: >
      Step 1: Re-execute the kata cycle with higher temperature for variance assessment.
      Uses the same template as the primary cycle but with temperature 0.8.
      The output reveals whether the model's predictions are stable or noisy.
    renderer: minijinja
    template_ref: kata/iteration-check.j2
    gas_cap: 40000
    timeout_seconds: 60
    output_schema:
      type: object
      properties:
        target_reached:
          type: boolean
        progress_made:
          type: boolean
        knowledge_gained:
          type: string
        should_iterate:
          type: boolean
        next_obstacle:
          type: string
        next_target:
          type: string

  - ordinal: 2
    action: populate
    description: >
      Step 2: Compare all iterations for variance and confidence assessment.
      If the check step says to iterate, the comparison step identifies
      whether learning converged or diverged across attempts.
    renderer: minijinja
    template_ref: kata/iteration-comparison.j2
    gas_cap: 5000
    timeout_seconds: 20
    output_schema:
      type: object
      properties:
        iteration_count:
          type: integer
        metric_trajectory:
          type: array
        variance_trend:
          type: string
        prediction_accuracy:
          type: array
        learning_convergence:
          type: string
        comparison_note:
          type: string

error_handling:
  on_gas_exceeded: abort_and_return_primary
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1

cns:
  emit_spans: true
  span_namespace: cns.prompt.kata.iteration
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

outcomes:
  - name: converging
    condition: "variance_trend is decreasing"
    action: "Iteration produced stable results — update CNS confidence counter"
  - name: diverging
    condition: "variance_trend is increasing"
    action: "Escalate to Curator for process review"
  - name: stable
    condition: "variance_trend is stable"
    action: "Process is predictable — no further iteration needed"

metrics:
  - name: variance_score
    description: "Variance between primary and iteration outputs"
    span: "cns.prompt.kata.variance"
  - name: confidence
    description: "Confidence in the learning trajectory"
    span: "cns.prompt.kata.confidence"

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
