# Strip Ceremony Process Manifest
# hKask v0.31.0 — Ceremonial code detection and removal as convergent PDCA

manifest:
  id: strip-ceremony
  name: Strip Ceremony
  description: >
    Convergent ceremonial-code stripping process. Detects ornamental,
    dead, and documentation-only artifacts across the template registry,
    Rust crates, and flow manifests. Classifies by pattern and confidence,
    strips confirmed dead code, and verifies no behavior was lost.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target_domain
    type: string
    required: true
    description: "templates | rust-crate:<name> | manifests | all"
  - name: target_path
    type: string
    required: false
    description: Specific crate name, module path, or manifest path for focused scanning

steps:
  - ordinal: 1
    action: select
    description: Scan target domain for ceremonial code patterns (orphaned templates, null-renderer steps, dead code, documentation-only artifacts).
    renderer: minijinja
    template_ref: strip-ceremony/ceremony-detect
    gas_cap: 8000
    timeout_seconds: 120
    input_mapping:
      target_domain: "{{ target_domain }}"
      target_path: "{{ target_path | default('') }}"

  - ordinal: 2
    action: select
    description: Evaluate findings with deletion test and classify by confidence. Present report for human review in advisory mode.
    renderer: minijinja
    template_ref: strip-ceremony/ceremony-detect
    gas_cap: 6000
    timeout_seconds: 90
    input_mapping:
      target_domain: "{{ target_domain }}"
      detection_findings: "{{ step_1_result }}"
      phase: "evaluate"

  - ordinal: 3
    action: select
    description: Execute stripping — delete confirmed ceremonial files, remove template entries, clean manifest steps.
    renderer: minijinja
    template_ref: strip-ceremony/ceremony-strip
    gas_cap: 8000
    timeout_seconds: 120
    condition: "step_2_result.strippable_count | default(0) > 0"
    input_mapping:
      strippable_artifacts: "{{ step_2_result.strippable | default([]) }}"
      target_domain: "{{ target_domain }}"

  - ordinal: 4
    action: select
    description: Compute convergence metric — verify no ceremonial artifacts remain and no broken references were introduced.
    renderer: minijinja
    template_ref: strip-ceremony/ceremony-convergence-check
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      detection_result: "{{ step_1_result }}"
      evaluation_result: "{{ step_2_result }}"
      strip_result: "{{ step_3_result | default({}) }}"

  - ordinal: 5
    action: loop
    description: Re-enter detection if ceremonial artifacts remain (convergence not met).
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: strip-ceremony/ceremony-detect
      gas_budget: 8000
    - resource: template
      action: render
      template_id: strip-ceremony/ceremony-strip
      gas_budget: 8000
    - resource: template
      action: render
      template_id: strip-ceremony/ceremony-convergence-check
      gas_budget: 4000
    - resource: manifest
      action: execute
      template_id: strip-ceremony
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.strip-ceremony
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  spans:
    - cns.ceremony.detected
    - cns.ceremony.stripped
    - cns.ceremony.verified

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
