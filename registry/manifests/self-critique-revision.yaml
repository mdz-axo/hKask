# Self-Critique & Revision Process Manifest
# ℏKask v0.30.0 — Iterative revision as convergent PDCA

manifest:
  id: self-critique-revision
  name: Self-Critique Revision
  description: >
    Convergent self-critique process. Generates a draft, critiques it against
    explicit criteria, revises it, computes convergence, and iterates until
    quality improvement stabilizes.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: task_prompt
    type: string
    required: true
  - name: quality_criteria
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Generate an initial draft output.
    renderer: minijinja
    template_ref: self-critique-revision/generate
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      task_prompt: "{{ task_prompt }}"
      quality_criteria: "{{ quality_criteria | default(['accuracy', 'completeness', 'clarity']) }}"

  - ordinal: 2
    action: select
    description: Critique the current draft against quality criteria.
    renderer: minijinja
    template_ref: self-critique-revision/critique
    gas_cap: 4500
    timeout_seconds: 60
    input_mapping:
      task_prompt: "{{ task_prompt }}"
      current_output: "{{ step_1_result.output | default('') }}"
      quality_criteria: "{{ quality_criteria | default(['accuracy', 'completeness', 'clarity']) }}"
      draft_number: "{{ step_1_result.draft_number | default(1) }}"

  - ordinal: 3
    action: select
    description: Revise draft based on structured critique.
    renderer: minijinja
    template_ref: self-critique-revision/revise
    gas_cap: 5500
    timeout_seconds: 90
    input_mapping:
      task_prompt: "{{ task_prompt }}"
      current_output: "{{ step_1_result.output | default('') }}"
      critique: "{{ step_2_result.critique | default([]) }}"
      quality_criteria: "{{ quality_criteria | default(['accuracy', 'completeness', 'clarity']) }}"
      previous_quality_score: "{{ step_2_result.overall_quality_score | default(step_1_result.initial_quality_score | default(0.0)) }}"
      draft_number: "{{ step_1_result.draft_number | default(1) + 1 }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for critique/revision cycle.
    renderer: minijinja
    template_ref: self-critique-revision/self-critique-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      critique_result: "{{ step_2_result }}"
      revision_result: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    description: Re-enter critique/revision cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: self-critique-revision/generate
      gas_budget: 5000
    - resource: template
      action: render
      template_id: self-critique-revision/critique
      gas_budget: 4500
    - resource: template
      action: render
      template_id: self-critique-revision/revise
      gas_budget: 5500
    - resource: template
      action: render
      template_id: self-critique-revision/self-critique-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: self-critique-revision
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
