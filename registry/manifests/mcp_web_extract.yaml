# MCP Web — Web Search & Extract Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for UserPods

manifest:
  id: prompt-templates/web_extract
  category: pipeline
  name: Prompt-Templates Web Extractor
  description: >
    Search and extract information from web sources.
    Supports source filtering, freshness constraints, and relevance ranking.
  functional_role: flowdef
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Public

# Energy Budget Configuration
gas:
  cap: 4096
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render web extraction template with query and parameters.
    renderer: minijinja
    template_ref: prompt-templates/web_extract
    mcp: null
    gas_cap: 1000
    timeout_seconds: 10
    output_schema:
      rendered_prompt: string

  - ordinal: 2
    action: execute
    description: >
      Execute web search and extraction via MCP.
      Call Brave/Firecrawl search APIs.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-research
    gas_cap: 4096
    timeout_seconds: 30
    output_schema:
      results: array
      total_found: integer
      search_metadata: object

  - ordinal: 3
    action: feedback
    description: >
      Emit search outcome to CNS.
      Track result quality and source diversity.
    renderer: null
    template_ref: null
    mcp: null # CNS is ambient (CnsRuntime)
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      result_count: integer
    output_schema:
      cns_event_id: string
      outcome_recorded: boolean

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_capability_denied: escalate
  on_search_failure: fallback

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: prompt-templates/web_extract
      gas_budget: 2000
    - resource: web
      action: search
      template_id: prompt-templates/web_extract
      gas_budget: 4000
    - resource: cns
      action: emit
      template_id: prompt-templates/web_extract
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
ledger:
  emit_spans: true
  span_namespace: reg.web.search
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
  include_search_metrics: true
