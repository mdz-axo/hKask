# Web Synthesis Manifest
# ℏKask v0.21.0 — A Minimal Viable Container for Agents

manifest:
  id: mcp/web-synthesis
  name: Web Synthesis
  description: >
    Extract-synthesize pipeline: search → extract full content from top results →
    produce a synthesis document with inline citations.
    Use when you need a coherent narrative from multiple web sources.
  version: 0.21.0
  functional_role: flowdef
  editor: curator-or-human-admin
  visibility: Shared

energy:
  cap: 8192
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

steps:
  - ordinal: 1
    action: execute
    description: >
      Search all providers with full fusion and reranking.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-web
    tool: web_search
    arguments:
      query: "${input.query}"
      strategy: "web"
      num_results: "${input.num_results | default(8)}"
    energy_cap: 4096
    timeout_seconds: 30
    output_schema:
      results: array
      related_questions: array

  - ordinal: 2
    action: execute
    description: >
      Extract full content from top results for synthesis.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-web
    tool: web_extract
    arguments:
      url: "${item.url}"
      format: "markdown"
      main_content_only: true
    loop_over: "${step1.results[:5]}"
    energy_cap: 4096
    timeout_seconds: 60
    output_schema:
      extracted_pages: array

  - ordinal: 3
    action: populate
    description: >
      Render synthesis template with extracted content.
    renderer: minijinja
    template_ref: web/extract-synthesize
    model_tier: null
    energy_cap: 1000
    timeout_seconds: 10
    output_schema:
      synthesis: string
      sources: array

  - ordinal: 4
    action: feedback
    description: >
      Emit synthesis outcome to CNS.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-cns
    energy_cap: 500
    timeout_seconds: 5
    feedback:
      result_count: integer
      pages_extracted: integer
    output_schema:
      cns_event_id: string

error_handling:
  on_energy_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 2
  on_search_failure: fallback

cns:
  emit_spans: true
  span_namespace: cns.web.synthesis
  variety_monitoring: true
  algedonic_threshold: 100

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_energy_cost: true
