# TDD Process Manifest
# ℏKask v0.30.0 — Contract-anchored TDD as convergent PDCA

manifest:
  id: tdd
  name: TDD
  description: >
    Convergent contract-anchored TDD process. Plans from requirements,
    executes a tracer bullet, proposes refactors, verifies quality,
    checks requirement coverage, computes convergence, and iterates.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 26000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: task_description
    type: string
    required: true
  - name: crate_scope
    type: string
    required: true
  - name: code_context
    type: object
    required: false
  - name: spec_context
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Plan contract-anchored TDD behaviors and seams.
    renderer: minijinja
    template_ref: tdd/tdd-plan
    gas_cap: 6000
    timeout_seconds: 90
    input_mapping:
      task_description: "{{ task_description }}"
      crate_scope: "{{ crate_scope }}"
      code_context: "{{ code_context | default({}) }}"
      spec_context: "{{ spec_context | default('') }}"

  - ordinal: 2
    action: select
    description: Execute one tracer bullet (contract → test → minimal implementation).
    renderer: minijinja
    template_ref: tdd/tdd-tracer
    gas_cap: 8000
    timeout_seconds: 120
    input_mapping:
      behavior_description: "{{ step_1_result.behaviors_to_test[0].behavior | default(task_description) }}"
      user_expectation: "{{ step_1_result.functional_requirements[0].user_expectation | default(task_description) }}"
      goal_principle: "{{ step_1_result.functional_requirements[0].goal_principle | default({}) }}"
      constraining_principles: "{{ step_1_result.behaviors_to_test[0].constraining_principles | default([]) }}"
      seam: "{{ step_1_result.behaviors_to_test[0].seam | default('public API') }}"
      crate_scope: "{{ crate_scope }}"
      test_style: "{{ step_1_result.behaviors_to_test[0].test_type | default('integration') }}"

  - ordinal: 3
    action: select
    description: Propose safe GREEN-phase refactors.
    renderer: minijinja
    template_ref: tdd/tdd-refactor
    gas_cap: 5000
    timeout_seconds: 90
    input_mapping:
      crate_scope: "{{ crate_scope }}"
      passing_tests: "{{ [step_2_result] }}"
      refactor_candidates: "{{ step_1_result.public_interface | default([]) }}"

  - ordinal: 4
    action: select
    description: Verify TDD completion quality and contract discipline.
    renderer: minijinja
    template_ref: tdd/tdd-verify
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      crate_scope: "{{ crate_scope }}"
      behaviors_tested: "{{ [step_2_result] }}"
      test_commands: "{{ ['cargo test -p ' ~ crate_scope] }}"
      clippy_commands: "{{ ['cargo clippy -p ' ~ crate_scope ~ ' -- -D warnings'] }}"

  - ordinal: 5
    action: select
    description: Analyze requirement coverage gaps and deferrals.
    renderer: minijinja
    template_ref: tdd/tdd-gap-check
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      spec_requirements: "{{ step_1_result.functional_requirements | default([]) }}"
      tested_behaviors: "{{ step_4_result.behavior_coverage | default([]) }}"
      crate_scope: "{{ crate_scope }}"
      collection_coherence: "{{ {} }}"

  - ordinal: 6
    action: select
    description: Compute normalized convergence metric for TDD cycle.
    renderer: minijinja
    template_ref: tdd/tdd-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_4_result }}"

  - ordinal: 7
    action: loop
    description: Re-enter TDD cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: tdd/tdd-plan
      gas_budget: 6000
    - resource: template
      action: render
      template_id: tdd/tdd-tracer
      gas_budget: 8000
    - resource: template
      action: render
      template_id: tdd/tdd-refactor
      gas_budget: 5000
    - resource: template
      action: render
      template_id: tdd/tdd-verify
      gas_budget: 4000
    - resource: template
      action: render
      template_id: tdd/tdd-gap-check
      gas_budget: 4000
    - resource: template
      action: render
      template_id: tdd/tdd-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: tdd
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
