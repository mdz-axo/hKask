# Pragmatic Laziness Process Manifest
# ℏKask v0.30.0 — Least-action pathfinding as convergent PDCA

manifest:
  id: pragmatic-laziness
  category: skill
  name: Pragmatic Laziness
  description: >
    Convergent least-action process. Runs lazy-loop analysis, synthesizes
    least-action recommendation, evaluates convergence, and iterates until
    a stable low-action configuration is reached.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: situation
    type: string
    required: true
  - name: context
    type: object
    required: false
  - name: scope
    type: string
    required: false

fusion:
  judge: deepseek-v4-pro
  panel:
    - Kimi2.7
    - Qwen3.7 Max
    - GLM5.2
  mode: synthesis
  skills:
    - pragmatic-laziness
    - essentialist
  max_rounds: 3

steps:
  - ordinal: 1
    action: select
    description: Phase 1 — Decompose situation into Morris's Triad layers.
    renderer: minijinja
    template_ref: pragmatic-laziness/lazy-decompose
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      situation: "{{ situation }}"
      context: "{{ context | default({}) }}"

  - ordinal: 2
    action: select
    description: Phase 2 — Identify feedback loops and effort distribution from decomposed layers.
    renderer: minijinja
    template_ref: pragmatic-laziness/lazy-identify-loops
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      syntax_layer: "{{ step_1_result.syntax_layer | default({}) }}"
      semantics_layer: "{{ step_1_result.semantics_layer | default({}) }}"
      pragmatics_layer: "{{ step_1_result.pragmatics_layer | default({}) }}"
      situation: "{{ situation }}"
      context: "{{ context | default({}) }}"

  - ordinal: 3
    action: select
    description: Phase 3 — Find stationary action via eliminative reduction and brachistochrone rule.
    renderer: minijinja
    template_ref: pragmatic-laziness/lazy-stationary-action
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      syntax_layer: "{{ step_1_result.syntax_layer | default({}) }}"
      semantics_layer: "{{ step_1_result.semantics_layer | default({}) }}"
      pragmatics_layer: "{{ step_1_result.pragmatics_layer | default({}) }}"
      loops_identified: "{{ step_2_result.loops_identified | default([]) }}"
      effort_hotspots: "{{ step_2_result.effort_hotspots | default([]) }}"
      situation: "{{ situation }}"

  - ordinal: 4
    action: select
    description: δS = 0 stationarity check — compare current and previous configurations.
    renderer: minijinja
    template_ref: pragmatic-laziness/pragmatic-laziness-converge
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      current_config: "{{ step_3_result }}"
      previous_config: "{{ step_4_result | default(None) }}"
      iteration: 1
      max_iterations: "{{ convergence.max_iterations | default(3) }}"
    fusion: false

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for least-action exit.
    renderer: minijinja
    template_ref: shared/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_4_result }}"
      convergence_description: "stable least-action recommendation"
      include_blockers: false

  - ordinal: 6
    action: loop
    description: Re-enter lazy-loop cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: pragmatic-laziness/lazy-decompose
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-laziness/lazy-identify-loops
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-laziness/lazy-stationary-action
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-laziness/pragmatic-laziness-converge
      gas_budget: 4000
    - resource: template
      action: render
      template_id: shared/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: pragmatic-laziness
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
