# Pragmatic Laziness Process Manifest
# ℏKask v0.30.0 — Least-action pathfinding as convergent PDCA

manifest:
  id: pragmatic-laziness
  name: Pragmatic Laziness
  description: >
    Convergent least-action process. Runs lazy-loop analysis, synthesizes
    least-action recommendation, evaluates convergence, and iterates until
    a stable low-action configuration is reached.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 16000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: situation
    type: string
    required: true
  - name: context
    type: object
    required: false
  - name: scope
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Run 3-phase lazy-loop analysis of the situation.
    renderer: minijinja
    template_ref: pragmatic-laziness/pragmatic-laziness-flow
    gas_cap: 7000
    timeout_seconds: 60
    input_mapping:
      situation: "{{ situation }}"
      context: "{{ context | default({}) }}"
      scope: "{{ scope | default('full') }}"
      max_iterations: "{{ convergence.max_iterations | default(3) }}"

  - ordinal: 2
    action: select
    description: Run δS stationarity check against current loop output.
    renderer: minijinja
    template_ref: pragmatic-laziness/pragmatic-laziness-converge
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      current_config: "{{ step_1_result }}"
      previous_config: null
      iteration: 1
      max_iterations: "{{ convergence.max_iterations | default(3) }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for least-action exit.
    renderer: minijinja
    template_ref: pragmatic-laziness/pragmatic-laziness-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter lazy-loop cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: pragmatic-laziness/pragmatic-laziness-flow
      gas_budget: 7000
    - resource: template
      action: render
      template_id: pragmatic-laziness/pragmatic-laziness-converge
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-laziness/pragmatic-laziness-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: pragmatic-laziness
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
