# QA Autonomous Cycle — v0.31.0
#
# Classifier-driven autonomous QA pipeline using ONLY hKask infrastructure.
# No external fuzzers, no bolero, no cargo-mutants.
#
# Architecture:
#   1. Run contract/property tests across crates (cargo test with proptest)
#   2. Classify failures via Gemma 4 26B (existing classifier)
#   3. Branch on confidence: high → report, medium → escalate, low → investigate
#   4. Loop retries for flaky failures
#
# Uses hKask's own:
#   - proptest (already in hkask-test-harness) for property-based testing
#   - fuzz seed corpora (fuzz.rs) for CLI/JSON input surface testing
#   - classifier (qa-triage) for LLM-powered failure diagnosis
#   - CNS spans for observability
#
# Runner readiness: PARTIAL — run_command + classify steps executable today;
#   loop steps require runner with classify + loop support.

manifest:
  id: qa-autonomous
  name: QA Autonomous Cycle
  version: 0.31.0
  description: >
    Autonomous QA pipeline using only hKask infrastructure: runs contract and
    property tests, classifies failures via Gemma 4 26B, branches on confidence,
    and retries flaky tests. No external fuzzers required.
  editor: system
  visibility: Public

gas:
  cap: 50000
  hard_limit: true

steps:
  # Step 1: Run full contract test suite across priority crates
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-cns -p hkask-types -p hkask-storage -p hkask-keystore -p hkask-capability 2>&1 | tail -30"
    description: "Run contract and property tests across priority crates"
    branching:
      success: 2
      failure: 2

  # Step 2: Classify test output
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Test suite: hKask priority crates (cns, types, storage, keystore, capability). Property-based tests use proptest for randomized input generation. Classify any failures by type (panic, assertion, logic error, flake) and confidence."
    branching:
      high_confidence: 3
      medium_confidence: 4
      low_confidence: 5
      flake: 6
      unparseable: 5
      classifier_unavailable: 7

  # Step 3: High confidence → report for auto-repair review
  - ordinal: 3
    action: run_command
    command: "echo '[QA:autonomous] High-confidence failure detected — review proposed fix in classifier output'"
    description: "High-confidence classification — candidate for auto-repair"

  # Step 4: Medium confidence → escalate
  - ordinal: 4
    action: run_command
    command: "echo '[QA:autonomous] Medium-confidence failure — escalate for human review'"
    description: "Medium-confidence failure needs human judgment"

  # Step 5: Low confidence → investigate
  - ordinal: 5
    action: run_command
    command: "echo '[QA:autonomous] Low-confidence or unparseable — flag for investigation'"
    description: "Low-confidence failure requires developer investigation"
    terminal: true

  # Step 6: Flake → retry
  - ordinal: 6
    action: loop
    command: "echo 'retry_flake'"
    description: "Retry flaky test"
    max_iterations: 3
    branching:
      success: 1
      loop_exhausted: 5

  # Step 7: Classifier unavailable → report
  - ordinal: 7
    action: run_command
    command: "echo '[QA:autonomous] Classifier unavailable — raw test output available for manual review'"
    description: "Classifier unavailable, manual review needed"
    terminal: true

cns:
  emit_spans: true
