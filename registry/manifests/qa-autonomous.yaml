# QA Autonomous Cycle — v0.31.0
#
# Classifier-driven autonomous QA pipeline: fuzz → classify → branch on confidence.
# High confidence → auto-repair. Medium → escalate. Low → investigate.
# Loop actions retry until condition met or max iterations exhausted.
#
# Pre-requisites:
#   - cargo-bolero must be installed (cargo install bolero)
#   - QaScriptRunner with classify + loop support
#
# Runner readiness: NEEDS TOOLING — requires bolero installation
#   and QaScriptRunner with classify + loop support.

manifest:
  id: qa-autonomous
  name: QA Autonomous Cycle
  version: 0.31.0
  description: >
    Autonomous QA pipeline that runs bolero fuzz tests, classifies failures
    with the LLM classifier, and branches on confidence. Requires
    cargo-bolero and QaScriptRunner with classify + loop support.
  editor: system
  visibility: Public

gas:
  cap: 50000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: workspace_root
    type: string
    description: Path to the Cargo workspace root
    required: false
  - name: fuzz_timeout_secs
    type: integer
    description: Maximum seconds to run fuzz tests per iteration
    required: false

steps:
  # Step 1: Run bolero fuzz tests
  - ordinal: 1
    action: run_command
    command: "cargo bolero test --all-features --timeout 30s 2>&1 | tee /tmp/hkask-fuzz-output.txt && echo 'fuzz_complete'"
    description: "Run bolero fuzz tests and capture output"
    branching:
      success: 2
      failure: 7

  # Step 2: Classify failures with LLM
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Parse bolero output at /tmp/hkask-fuzz-output.txt, classify each failure"
    branching:
      high_confidence: 3
      medium_confidence: 4
      low_confidence: 5
      flake: 6
      unparseable: 5

  # Step 3: High confidence → auto-repair
  - ordinal: 3
    action: run_command
    command: "echo '[QA] High-confidence failure detected — auto-repair attempted'"
    description: "Auto-repair for high-confidence classification"
    cns_span: cns.qa.autonomous.auto_repair

  # Step 4: Medium confidence → escalate
  - ordinal: 4
    action: run_command
    command: "echo '[QA] Medium-confidence failure — escalate to human'"
    description: "Escalate medium-confidence failures for human review"
    cns_span: cns.qa.autonomous.escalate

  # Step 5: Low confidence → investigation needed
  - ordinal: 5
    action: run_command
    command: "echo '[QA] Low-confidence failure — flag for investigation'"
    description: "Flag low-confidence failures for developer investigation"
    cns_span: cns.qa.autonomous.investigate

  # Step 6: Flake → retry loop
  - ordinal: 6
    action: loop
    command: "echo 'retry_cycle'"
    description: "Retry loop for flaky failures"
    max_iterations: 3
    iteration_delay_secs: 5
    branching:
      success: 2
    cns_span: cns.qa.autonomous.retry_loop

  # Step 7: Fuzz failure → log and exit
  - ordinal: 7
    action: run_command
    command: "echo '[QA] Fuzz execution failed — check cargo bolero installation: cargo install bolero'"
    description: "Log fuzz execution failure"
    cns_span: cns.qa.autonomous.fuzz_failed

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1

cns:
  emit_spans: true
  span_namespace: cns.qa.autonomous

audit:
  enabled: true
  log_level: info
