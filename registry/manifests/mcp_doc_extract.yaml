# MCP Document Knowledge — Document Extraction Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: mcp/doc_extract
  name: MCP Document Extractor
  description: >
  functional_role: flowdef
    Extract structured content from documents (PDF, DOCX, HTML, etc.).
    Supports custom extraction schemas and metadata capture.
  version: 0.23.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 6000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render extraction template with document content and schema.
    renderer: minijinja
    template_ref: mcp/doc_extract
    model_tier: null
    mcp: null
    gas_cap: 1000
    timeout_seconds: 10
    output_schema:
      rendered_prompt: string

  - ordinal: 2
    action: execute
    description: >
      Execute extraction via inference.
      Parse document and extract structured content.
    renderer: null
    template_ref: null
    model_tier: reasoning_local
    mcp: hkask-mcp-doc-knowledge
    gas_cap: 6000
    timeout_seconds: 90
    output_schema:
      extracted_content: object
      metadata: object
      confidence: float

  - ordinal: 3
    action: feedback
    description: >
      Emit extraction outcome to CNS.
      Track extraction quality and completeness.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-cns
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      extraction_confidence: float
    output_schema:
      cns_event_id: string
      outcome_recorded: boolean

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_capability_denied: escalate
  on_parse_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: mcp/doc_extract
      gas_budget: 2000
    - resource: document
      action: extract
      template_id: mcp/doc_extract
      gas_budget: 8000
    - resource: cns
      action: emit
      template_id: mcp/doc_extract
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.doc.extract
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
  include_extraction_metrics: true
