# Goal Analysis Process Manifest
# ℏKask v0.30.0 — Goal lifecycle as convergent PDCA

manifest:
  id: goal-analysis
  name: Goal Analysis
  description: >
    Convergent goal lifecycle process. Extracts structured goals,
    judges completion, computes convergence, and iterates until
    goal status is confidently resolved (done, continue, or blocked).
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 14000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: user_intent
    type: string
    required: true
  - name: context
    type: object
    required: false
  - name: outcome_summary
    type: string
    required: false
  - name: artifacts
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Extract structured goal from user intent.
    renderer: minijinja
    template_ref: goal-analysis/create
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      user_intent: "{{ user_intent }}"
      context: "{{ context | default({}) }}"

  - ordinal: 2
    action: select
    description: Judge completion against extracted goal and outcomes.
    renderer: minijinja
    template_ref: goal-analysis/judge
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      goal_text: "{{ step_1_result.goal_text | default(user_intent) }}"
      outcome_summary: "{{ outcome_summary | default('') }}"
      artifacts: "{{ artifacts | default([]) }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for goal cycle.
    renderer: minijinja
    template_ref: goal-analysis/goal-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      created_goal: "{{ step_1_result }}"
      judge_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter goal cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: goal-analysis/create
      gas_budget: 5000
    - resource: template
      action: render
      template_id: goal-analysis/judge
      gas_budget: 5000
    - resource: template
      action: render
      template_id: goal-analysis/goal-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: goal-analysis
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
