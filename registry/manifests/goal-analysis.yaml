# Goal Analysis Process Manifest
# ℏKask v0.31.0 — Goal lifecycle as convergent PDCA
# Consolidates: goal_lifecycle.yaml (Regulation, storage, matryoshka)
#               goal_verification.yaml (error handling, human review)
# Both superseded manifests are now deprecated — this is canonical.

manifest:
  id: goal-analysis
  category: skill
  name: Goal Analysis
  description: >
    Convergent goal lifecycle process. Extracts structured goals from user intent,
    activates them with Regulation tracking, judges completion against explicit criteria,
    computes convergence, and iterates until goal status is confidently resolved
    (done, continue, or blocked). Includes storage integration, Regulation variety tracking,
    matryoshka depth enforcement, and human-review escalation on low confidence.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: user_intent
    type: string
    required: true
  - name: context
    type: object
    required: false
  - name: outcome_summary
    type: string
    required: false
  - name: artifacts
    type: array
    required: false

# matryoshka: (removed — documentation-only field not parsed by Rust; deny_unknown_fields enforces schema)
#   max_depth: 7
#   enforce: true
#   depth_counter:
#     enabled: true
#     inherit_from_parent: true
#     default: 0
#     increment_on_dispatch: true
#   reg_monitoring:
#     span_namespace: reg.goal
#     alert_if_exceeds: 6
#     rationale: "Warning before hard limit at 7"

ledger:
  spans:
    - reg.goal.create
    - reg.goal.transition
    - reg.goal.verify
    - reg.goal.complete
    - reg.goal.block
    - reg.goal.alert.escalate
    - reg.goal.alert.storage_failure
  variety_monitoring:
    metric: active_goals_per_user
    threshold: 10
    alert: "User has >10 concurrent active goals — consider delegation or abandonment"

steps:
  - ordinal: 1
    action: select
    description: Extract structured goal from user intent with explicit completion criteria.
    renderer: minijinja
    template_ref: goal-analysis/create
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      user_intent: "{{ user_intent }}"
      context: "{{ context | default({}) }}"

  - ordinal: 2
    action: select
    description: Emit Regulation span for goal creation and attach criteria. Tracks goal in storage.
    renderer: minijinja
    template_ref: goal-analysis/goal-activate
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      goal: "{{ step_1_result }}"
    reg_spans:
      - reg.goal.create

  - ordinal: 3
    action: select
    description: Judge goal completion against explicit criteria, outcome summary, and artifacts.
    renderer: minijinja
    template_ref: goal-analysis/judge
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      goal_text: "{{ step_1_result.goal_text | default(user_intent) }}"
      criteria: "{{ step_1_result.criteria | default([]) }}"
      outcome_summary: "{{ outcome_summary | default('') }}"
      artifacts: "{{ artifacts | default([]) }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for goal cycle.
    renderer: minijinja
    template_ref: goal-analysis/goal-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      created_goal: "{{ step_1_result }}"
      judge_result: "{{ step_3_result }}"

  - ordinal: 5
    action: select
    description: Resolve goal state and emit Regulation spans based on verdict.
    renderer: minijinja
    template_ref: goal-analysis/goal-resolve
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      verdict: "{{ step_3_result.verdict }}"
      confidence: "{{ step_3_result.confidence }}"
      reason: "{{ step_3_result.reason }}"
      goal: "{{ step_1_result }}"
    reg_spans:
      - reg.goal.verify
      - reg.goal.complete
      - reg.goal.block
      - reg.goal.transition

  - ordinal: 6
    action: loop
    description: Re-enter goal cycle if convergence is not met or verdict is continue.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort
  on_confidence_low:
    threshold: 0.7
    action: escalate
    span: reg.goal.alert.escalate
    description: "Confidence below 0.7 — escalate to human review regardless of verdict"
  fallback:
    - error_type: template_error
      fallback_template: goal-analysis/create
      action: retry_with_simpler_template
    - error_type: llm_timeout
      fallback_template: goal-analysis/judge_simple
      action: use_simple_verification
      max_fallback_retries: 2
      on_fallback_exhausted: escalate
      escalate_span: reg.goal.alert.storage_failure
      description: "After 2 fallback retries with judge_simple, escalate to human rather than looping indefinitely"
    - error_type: storage_error
      action: emit_reg_alert
      span: reg.goal.alert.storage_failure

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: goal-analysis/create
      gas_budget: 5000
    - resource: template
      action: render
      template_id: goal-analysis/goal-activate
      gas_budget: 2000
    - resource: template
      action: render
      template_id: goal-analysis/judge
      gas_budget: 5000
    - resource: template
      action: render
      template_id: goal-analysis/goal-convergence-check
      gas_budget: 2000
    - resource: template
      action: render
      template_id: goal-analysis/goal-resolve
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: goal-analysis
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
