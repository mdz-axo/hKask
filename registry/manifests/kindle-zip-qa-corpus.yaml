# Kindle-Zip QA — Honest Pipeline Validation
# ℏKask v0.30.0
#
# Tests what can be tested via cargo test. Extraction (kindle_extract)
# cannot be tested by the QA runner — it requires MCP tool invocation
# with browser + credentials. Inference uses hKask's central service.

manifest:
  id: kindle-zip-qa
  name: Kindle-Zip QA Corpus
  version: 0.30.0
  visibility: Private
  description: >
    QA for kindle-zip. Code tests: unit, integration, format generation.
    Extraction (kindle_extract) is untestable via QA runner — requires
    interactive MCP tool invocation with Chrome + Amazon credentials.
    Inference/OCR uses hKask-inference (central service, no API key needed).

gas:
  cap: 20000
  gas_per_function: 500
  alert_threshold: 0.8
  hard_limit: false
  monthly_subscriptions_urj: 0

cns:
  emit_spans: true
  alert: cns.qa.kindle-zip

steps:
  - ordinal: 1
    action: run_command
    description: "Run kindle-zip unit tests"
    command: |
      cd /home/mdz-axolotl/Clones/hKask && \
      cargo test -p hkask-mcp-docproc --lib -- kindle 2>&1 | \
      tee /tmp/kz-unit.log && \
      grep -q "test result: ok" /tmp/kz-unit.log && \
      echo "UNIT_PASS" || { echo "UNIT_FAIL"; exit 1; }
    retries: 1
    branching:
      success: 2
      failure: 20

  - ordinal: 2
    action: run_command
    description: "Run kindle-zip integration tests"
    command: |
      cd /home/mdz-axolotl/Clones/hKask && \
      cargo test -p hkask-mcp-docproc --test kindle_zip_integration 2>&1 | \
      tee /tmp/kz-integration.log && \
      grep -q "test result: ok" /tmp/kz-integration.log && \
      echo "INTEGRATION_PASS" || { echo "INTEGRATION_FAIL"; exit 1; }
    retries: 1
    branching:
      success: 3
      failure: 21

  - ordinal: 3
    action: run_command
    description: "Run format generation and edge case tests"
    command: |
      cd /home/mdz-axolotl/Clones/hKask && \
      cargo test -p hkask-mcp-docproc --lib -- \
        "export_formats_all|empty_toc|export_txt|single_page|multi_page|nav_uses_real|valid_pdf_header|epub_has_correct|export_markdown_has" 2>&1 | \
      tee /tmp/kz-format.log && \
      grep -q "test result: ok" /tmp/kz-format.log && \
      echo "FORMAT_PASS" || { echo "FORMAT_FAIL"; exit 1; }
    retries: 2
    branching:
      success: 10
      failure: 22

  - ordinal: 10
    action: run_command
    description: "All code tests passed"
    terminal: true
    command: |
      echo ""
      echo "=============================================="
      echo "  Kindle-Zip QA: CODE TESTS PASSED"
      echo "=============================================="
      echo "  Unit:        $(grep 'test result' /tmp/kz-unit.log 2>/dev/null)"
      echo "  Integration: $(grep 'test result' /tmp/kz-integration.log 2>/dev/null)"
      echo "  Format:      $(grep 'test result' /tmp/kz-format.log 2>/dev/null)"
      echo "=============================================="
      echo ""
      echo "UNTESTED: kindle_extract (browser + credentials required)"
      echo "  The QA runner cannot invoke MCP tools. To test extraction:"
      echo "    kask docproc kindle_extract --asin B0XXXXXXXXX --amazon_email ... --amazon_password ..."
      echo ""
      echo "UNTESTED: kindle_transcribe (OCR — requires extracted pages)"
      echo "  Once pages are extracted, transcription uses hKask-inference"
      echo "  (central inference service, no API key needed)."
      echo ""
      echo "UNTESTED: kindle_export (requires transcribed content)"
      echo "  Format generation logic IS tested by the tests above."
      echo "  PDF/EPUB/MD/TXT generation works correctly."
    retries: 0

  - ordinal: 20
    action: run_command
    description: "FAILED: Unit tests broken"
    command: |
      echo "[QA-FAILED] Unit tests failed."
      tail -30 /tmp/kz-unit.log 2>/dev/null
      exit 1
    retries: 0
    terminal: true

  - ordinal: 21
    action: run_command
    description: "FAILED: Integration tests broken"
    command: |
      echo "[QA-FAILED] Integration tests failed."
      tail -30 /tmp/kz-integration.log 2>/dev/null
      exit 1
    retries: 0
    terminal: true

  - ordinal: 22
    action: run_command
    description: "FAILED: Format generation broken"
    command: |
      echo "[QA-FAILED] Format generation tests failed."
      tail -30 /tmp/kz-format.log 2>/dev/null
      exit 1
    retries: 0
    terminal: true
