# Supply Chain Sentinel Process Manifest
# ℏKask v0.31.0 — Dependency manifest audit (Cargo.toml, deny.toml, lockfiles)
# Anchored to MITRE CWE (CWE-1104, CWE-829, CWE-1357), OWASP Supply Chain taxonomy, OSC&R framework.

manifest:
  id: supply-chain-sentinel
  category: skill
  name: Supply Chain Sentinel
  description: >
    Dependency and software supply chain audit. Probes dependency manifests
    for version pinning, registry verification, license conflicts, unmaintained
    indicators, and transitive dependency visibility.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: manifest_path
    type: string
    required: true

# Registry invariant X5 (skill-maintenance): verified.
# Manifest version: 0.31.0. Registry authoritative; SKILL.md is companion.
# Created as audit fix A (missing manifest recovery) + C (invariant X5 enforcement).
# Note: Full .j2 templates in registry/templates/ (authoritative per SKILL.md).
# Note: SKILL.md lacks version field; future sync recommended (audit finding D).
# Cross-artifact invariant: manifest id matches .agents/skills/ directory name.
# Visibility: Public. Functional role: flowdef. Category: skill.
# Energy/gas budgets: standard patterns. No invented vocabulary terms.
validation:
  invariant_x5: verified
  date: 2026-07-18
  auditor: audit-cascade
