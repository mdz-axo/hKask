# Zoom Out Process Manifest
# ℏKask v0.30.0 — Context expansion as convergent PDCA

manifest:
  id: zoom-out
  name: Zoom Out
  description: >
    Convergent context-expansion process. Produces module maps and boundary
    summaries, computes convergence, and iterates until architectural context
    is sufficiently stable for downstream action.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: focus_module
    type: string
    required: true
  - name: focus_crate
    type: string
    required: false
  - name: depth
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Generate architectural context map around current focus.
    renderer: minijinja
    template_ref: zoom-out/zoom-out-context
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      focus_module: "{{ focus_module }}"
      focus_crate: "{{ focus_crate | default('') }}"
      depth: "{{ depth | default('immediate-neighbors') }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for zoom-out cycle.
    renderer: minijinja
    template_ref: zoom-out/zoom-out-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter context cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: zoom-out/zoom-out-context
      gas_budget: 6000
    - resource: template
      action: render
      template_id: zoom-out/zoom-out-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: zoom-out
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
