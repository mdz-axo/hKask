# Scenario Planning Process Manifest
# ℏKask v0.30.0 — Schwartz scenario planning as convergent PDCA

manifest:
  id: scenario-planning
  name: Scenario Planning
  description: >
    Convergent scenario planning process. Refines focal questions, maps forces,
    constructs scenario narratives, extracts implications, computes convergence,
    and iterates until scenario set and indicators are decision-ready.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: focal_question
    type: string
    required: true
  - name: planning_horizon
    type: string
    required: false
  - name: domain
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Refine and bound focal question.
    renderer: minijinja
    template_ref: scenario-builder/focal-question
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      focal_question: "{{ focal_question }}"
      planning_horizon: "{{ planning_horizon | default('5 years') }}"
      domain: "{{ domain | default('general') }}"

  - ordinal: 2
    action: select
    description: Enumerate key microenvironment forces.
    renderer: minijinja
    template_ref: scenario-builder/key-forces
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      refined_question: "{{ step_1_result.refined_question | default(focal_question) }}"
      planning_horizon: "{{ planning_horizon | default('5 years') }}"
      domain: "{{ domain | default('general') }}"

  - ordinal: 3
    action: select
    description: Map macro driving forces and identify critical uncertainties.
    renderer: minijinja
    template_ref: scenario-builder/driving-forces
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      refined_question: "{{ step_1_result.refined_question | default(focal_question) }}"
      key_forces: "{{ step_2_result.key_forces | default([]) }}"

  - ordinal: 4
    action: select
    description: Generate 2x2 axes and scenario narratives.
    renderer: minijinja
    template_ref: scenario-builder/axes-and-narratives
    gas_cap: 8000
    timeout_seconds: 120
    input_mapping:
      refined_question: "{{ step_1_result.refined_question | default(focal_question) }}"
      critical_uncertainties: "{{ step_3_result.critical_uncertainties | default([]) }}"
      planning_horizon: "{{ planning_horizon | default('5 years') }}"

  - ordinal: 5
    action: select
    description: Extract implications, robust strategies, and indicators.
    renderer: minijinja
    template_ref: scenario-builder/implications-indicators
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      refined_question: "{{ step_1_result.refined_question | default(focal_question) }}"
      scenarios: "{{ step_4_result.scenarios | default([]) }}"

  - ordinal: 6
    action: select
    description: Compute normalized convergence metric for scenario cycle.
    renderer: minijinja
    template_ref: scenario-builder/scenario-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      narratives_result: "{{ step_4_result }}"
      implications_result: "{{ step_5_result }}"

  - ordinal: 7
    action: loop
    description: Re-enter scenario cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: scenario-builder/focal-question
      gas_budget: 3000
    - resource: template
      action: render
      template_id: scenario-builder/key-forces
      gas_budget: 5000
    - resource: template
      action: render
      template_id: scenario-builder/driving-forces
      gas_budget: 5000
    - resource: template
      action: render
      template_id: scenario-builder/axes-and-narratives
      gas_budget: 8000
    - resource: template
      action: render
      template_id: scenario-builder/implications-indicators
      gas_budget: 5000
    - resource: template
      action: render
      template_id: scenario-builder/scenario-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: scenario-planning
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
