# Condenser Continuation Process Manifest
# ℏKask v0.30.0 — Session continuation as convergent PDCA

manifest:
  id: condenser-continuation
  name: Condenser Continuation
  description: >
    Convergent continuation process for condenser work. Restores session context,
    prioritizes remaining tasks, builds verification plans, composes continuation
    output, computes convergence, and iterates until continuation state is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: session_context
    type: object
    required: true
  - name: next_focus
    type: string
    required: false
  - name: known_blockers
    type: array
    required: false
  - name: target_crates
    type: array
    required: false
  - name: check_commands
    type: array
    required: false
  - name: handshake_command
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Restore essential continuation context from prior session.
    renderer: minijinja
    template_ref: condenser-continuation/condenser-continuation-restore
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      session_context: "{{ session_context }}"
      next_focus: "{{ next_focus | default('') }}"

  - ordinal: 2
    action: select
    description: Prioritize remaining condenser work and next action.
    renderer: minijinja
    template_ref: condenser-continuation/condenser-continuation-prioritize
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      accomplishments: "{{ step_1_result.accomplishments | default([]) }}"
      condenser_status: "{{ step_1_result.condenser_status | default('in_progress') }}"
      inference_engine: "{{ step_1_result.inference_engine | default('none') }}"
      known_blockers: "{{ known_blockers | default([]) }}"

  - ordinal: 3
    action: select
    description: Produce a structured verification plan for continuation health checks.
    renderer: minijinja
    template_ref: condenser-continuation/condenser-continuation-verify
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      target_crates: "{{ target_crates | default(['hkask-mcp-condenser']) }}"
      check_commands: "{{ check_commands | default(['cargo check -p hkask-mcp-condenser']) }}"
      handshake_command: "{{ handshake_command | default('') }}"

  - ordinal: 4
    action: select
    description: Compose final continuation document.
    renderer: minijinja
    template_ref: condenser-continuation/condenser-continuation-compose
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      restored_context: "{{ step_1_result }}"
      prioritized_tasks: "{{ step_2_result.prioritized_tasks | default([]) }}"
      verification_results: "{{ step_3_result }}"
      immediate_next_action: "{{ step_2_result.immediate_next_action | default('') }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for continuation cycle.
    renderer: minijinja
    template_ref: condenser-continuation/condenser-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      restore_result: "{{ step_1_result }}"
      prioritize_result: "{{ step_2_result }}"
      verify_result: "{{ step_3_result }}"
      compose_result: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    description: Re-enter continuation cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: condenser-continuation/condenser-continuation-restore
      gas_budget: 5000
    - resource: template
      action: render
      template_id: condenser-continuation/condenser-continuation-prioritize
      gas_budget: 5000
    - resource: template
      action: render
      template_id: condenser-continuation/condenser-continuation-verify
      gas_budget: 4000
    - resource: template
      action: render
      template_id: condenser-continuation/condenser-continuation-compose
      gas_budget: 4000
    - resource: template
      action: render
      template_id: condenser-continuation/condenser-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: condenser-continuation
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
