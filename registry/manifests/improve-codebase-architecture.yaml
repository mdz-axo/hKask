# Improve Codebase Architecture Process Manifest
# ℏKask v0.31.0 — Deepening analysis as convergent PDCA
# EXTENDED: Added grilling loop (arch-deepen), decision routing, and refactor delegation.
# The full 4-phase process from SKILL.md is now represented in the flow.

manifest:
  id: improve-codebase-architecture
  name: Improve Codebase Architecture
  description: >
    Convergent architecture-improvement process. Explores architectural friction,
    ranks deepening candidates, walks the design tree with human-in-the-loop
    grilling, routes decisions to appropriate follow-up (refactor/diagnose/defer),
    computes convergence, and iterates until recommendation quality and stability
    are sufficient for action.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 5
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: focus_area
    type: string
    required: true
  - name: code_context
    type: object
    required: false
  - name: known_adrs
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Explore architecture friction and shallow-module patterns.
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-explore
    gas_cap: 7000
    timeout_seconds: 60
    input_mapping:
      focus_area: "{{ focus_area }}"
      code_context: "{{ code_context | default({}) }}"
      known_adrs: "{{ known_adrs | default([]) }}"

  - ordinal: 2
    action: select
    description: Rank deepening candidates from exploration findings.
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-candidates
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      friction_points: "{{ step_1_result.friction_points | default([]) }}"
      shallow_modules: "{{ step_1_result.shallow_modules | default([]) }}"
      focus_area: "{{ focus_area }}"
      known_adrs: "{{ known_adrs | default([]) }}"

  # Phase 3: Grilling loop — walk the design tree for the selected candidate.
  # Human-in-the-loop: presents findings, awaits user pick, then deepens.

  - ordinal: 3
    action: select
    description: Walk the design tree for the user-selected candidate — define deepened module shape, identify seams, confirm test surface. Human-in-the-loop grilling.
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-deepen
    gas_cap: 8000
    timeout_seconds: 120
    condition: "step_2_result.candidates | default([]) | length > 0"
    input_mapping:
      selected_candidate: "{{ step_2_result.selected_candidate | default(step_2_result.candidates[0] | default({})) }}"
      friction_points: "{{ step_1_result.friction_points | default([]) }}"
      focus_area: "{{ focus_area }}"
      known_adrs: "{{ known_adrs | default([]) }}"

  # Phase 4: Decision routing — one of three outcomes.
  # Uses arch-route.j2 with hardcoded decision values for routing logic.
  # Each conditional step passes a different `decision` input to route behavior:
  # proceed_to_refactor → delegate to strangler-fig or refactor-service-layer
  # need_more_data → delegate to diagnose for feedback-loop measurement
  # (defer/reject is implicit — the grilling loop surfaces it at Step 3)

  - ordinal: 4
    action: select
    description: Route the deepened design to refactoring execution (strangler-fig or refactor-service-layer).
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-route
    gas_cap: 4000
    timeout_seconds: 60
    condition: "step_3_result.decision == 'proceed_to_refactor'"
    input_mapping:
      decision: "proceed_to_refactor"
      deepened_design: "{{ step_3_result }}"

  - ordinal: 5
    action: select
    description: Route to diagnosis when more runtime data is needed before refactoring.
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-route
    gas_cap: 4000
    timeout_seconds: 60
    condition: "step_3_result.decision == 'need_more_data'"
    input_mapping:
      decision: "need_more_data"
      deepened_design: "{{ step_3_result }}"

  - ordinal: 6
    action: select
    description: Compute normalized convergence metric for architecture cycle.
    renderer: minijinja
    template_ref: improve-codebase-architecture/arch-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      exploration_result: "{{ step_1_result }}"
      candidate_result: "{{ step_2_result }}"
      deepen_result: "{{ step_3_result | default({}) }}"

  - ordinal: 7
    action: loop
    description: Re-enter architecture cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: improve-codebase-architecture/arch-explore
      gas_budget: 7000
    - resource: template
      action: render
      template_id: improve-codebase-architecture/arch-candidates
      gas_budget: 6000
    - resource: template
      action: render
      template_id: improve-codebase-architecture/arch-deepen
      gas_budget: 8000
    - resource: template
      action: render
      template_id: improve-codebase-architecture/arch-route
      gas_budget: 4000
    - resource: template
      action: render
      template_id: improve-codebase-architecture/arch-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: improve-codebase-architecture
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.arch
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  spans:
    - cns.arch.friction.detected
    - cns.arch.candidate.ranked
    - cns.arch.design.deepened

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
