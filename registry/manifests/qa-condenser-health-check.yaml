# QA Condenser Health Check — v0.30.0
#
# Verifies hkask-mcp-condenser compression invariants by running the
# existing condenser_contract.rs test suite and classifying failures.
#
# Open questions addressed:
#   8.1  — Condenser completion (regression protection)
#   4.2  — Context window channel capacity SLA enforcement
#         (compressed_bytes <= original_bytes, ratio ≥ 2:1)
#
# Cybernetic feedback loop:
#   Sensor → cargo test output for condenser_contract
#   Comparator → classify step evaluates SLA violation patterns
#   Actuator → terminal step reports health status
#
# SLA invariants verified by condenser_contract.rs:
#   1. compress_reduces_size         — compressed_bytes <= original_bytes
#   2. compress_empty_input          — handles empty input gracefully
#   3. compress_with_explicit_category — category passthrough
#   4. repeated_compression_increments_stats — cumulative stats
#   5. classify_*                   — tool→category mapping
#   6. profile_switching             — heavy/normal/soft/light profiles
#   7. thread_summary                — LLM summarization output
#   8. health_signals                — negative_compression, low_signal detection
#
# Runner readiness: FULLY EXECUTABLE TODAY (all steps are run_command).

manifest:
  id: qa-condenser-health-check
  name: QA Condenser Health Check
  version: 0.30.0
  visibility: Private
  description: >
    Verifies hkask-mcp-condenser compression engine invariants through
    the condenser_contract.rs test suite. Classifies failures for
    regressions in compression SLA, health signals, or profile handling.

gas:
  cap: 30000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Run condenser contract tests
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-mcp-condenser --test condenser_contract -- --nocapture 2>&1 | tail -30"
    description: "Run condenser engine contract tests: compression SLA, health signals, classification, profiles, thread summary"
    retries: 0
    branching:
      success: 2
      failure: 5

  # Step 2: Classify the test output
  # Classifier evaluates the description text (per current runner limitation —
  # test output is not piped to the classifier). On high/medium confidence,
  # proceed to fuzz tests.
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Test suite: hkask-mcp-condenser contract tests. Verify compression engine invariants: compressed_bytes <= original_bytes for all inputs, empty input handling, category passthrough, cumulative statistics, profile switching (heavy/normal/soft/light), thread summarization via inference router, and health signal detection (negative_compression, low_signal, budget_shortfall). All contract tests passing indicates condenser SLA compliance."
    retries: 0
    branching:
      high_confidence: 3
      medium_confidence: 3
      low_confidence: 7
      flake: 2
      unparseable: 7

  # Step 3: Run condenser fuzz tests
  - ordinal: 3
    action: run_command
    command: "cargo test -p hkask-mcp-condenser-fuzz -- --nocapture 2>&1 | tail -20"
    description: "Run condenser fuzz tests for edge-case input resilience"
    retries: 0
    branching:
      success: 4
      failure: 6

  # Step 4: PASS — all condenser invariants hold
  - ordinal: 4
    action: run_command
    command: "echo '[QA:condenser] PASS — compression SLA, health signals, fuzz resilience verified'"
    description: "All condenser tests pass: compression invariants, health signal detection, fuzz resilience"
    retries: 0
    terminal: true

  # Step 5: Contract test failure — SLA violation
  - ordinal: 5
    action: run_command
    command: "echo '[QA:condenser] FAIL — condenser contract tests failed. Possible SLA violation: negative_compression, low_signal, or broken profile switching.'"
    description: "Condenser contract test failure — compression engine SLA may be violated"
    retries: 0
    terminal: true

  # Step 6: Fuzz test failure
  - ordinal: 6
    action: run_command
    command: "echo '[QA:condenser] WARN — fuzz tests failed. Condenser may not handle edge-case inputs correctly.'"
    description: "Fuzz test failure — edge-case input handling may be broken"
    retries: 0
    terminal: true

  # Step 7: Classification low confidence / unparseable
  - ordinal: 7
    action: run_command
    command: "echo '[QA:condenser] WARN — classifier could not evaluate test output with confidence. Manual review recommended.'"
    description: "Classifier returned low confidence or unparseable result for condenser test output"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.condenser.health
