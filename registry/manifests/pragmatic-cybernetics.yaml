# Pragmatic Cybernetics Process Manifest
# ℏKask v0.30.0 — Loop diagnostics as convergent PDCA
# EXTENDED: Wired variety-check and vsm-map templates (previously orphaned).

manifest:
  id: pragmatic-cybernetics
  name: Pragmatic Cybernetics
  description: >
    Convergent cybernetic-analysis process. Analyzes feedback-loop properties,
    evaluates variety balance via Ashby's Law, maps system to VSM S1–S5,
    computes convergence, and iterates until diagnostic recommendations are
    stable for intervention design.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: loop_description
    type: string
    required: true
  - name: system_context
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Analyze loop properties and failure modes on 5 properties.
    renderer: minijinja
    template_ref: pragmatic-cybernetics/cybernetics-analyze-loop
    gas_cap: 5000
    timeout_seconds: 45
    input_mapping:
      loop_description: "{{ loop_description }}"
      system_context: "{{ system_context | default('') }}"

  - ordinal: 2
    action: select
    description: Evaluate variety balance using Ashby's Law of Requisite Variety.
    renderer: minijinja
    template_ref: pragmatic-cybernetics/cybernetics-variety-check
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      loop_analysis: "{{ step_1_result }}"
      system_context: "{{ system_context | default('') }}"

  - ordinal: 3
    action: select
    description: Map components to VSM S1–S5 and assess system viability.
    renderer: minijinja
    template_ref: pragmatic-cybernetics/cybernetics-vsm-map
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      loop_analysis: "{{ step_1_result }}"
      variety_result: "{{ step_2_result | default({}) }}"
      system_context: "{{ system_context | default('') }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for cybernetics cycle.
    renderer: minijinja
    template_ref: shared/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"
      convergence_description: "loop diagnostics are stable for intervention"
      include_blockers: false

  - ordinal: 5
    action: loop
    description: Re-enter cybernetics cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: pragmatic-cybernetics/cybernetics-analyze-loop
      gas_budget: 5000
    - resource: template
      action: render
      template_id: pragmatic-cybernetics/cybernetics-variety-check
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-cybernetics/cybernetics-vsm-map
      gas_budget: 4000
    - resource: template
      action: render
      template_id: shared/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: pragmatic-cybernetics
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
