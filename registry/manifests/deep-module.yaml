# Deep Module Process Manifest
# ℏKask v0.30.0 — Module depth evaluation as convergent PDCA

manifest:
  id: deep-module
  name: Deep Module
  description: >
    Convergent module-depth process. Assesses module depth, computes convergence,
    and iterates until depth recommendations are stable for action.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 5
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: module_path
    type: string
    required: true
  - name: module_source
    type: string
    required: true
  - name: caller_paths
    type: array
    required: false
  - name: codebase_context
    type: object
    required: false

steps:
  - ordinal: 1
    action: select
    description: Assess module depth and deletion-test indicators.
    renderer: minijinja
    template_ref: deep-module/deep-module-assess
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      module_path: "{{ module_path }}"
      module_source: "{{ module_source }}"
      caller_paths: "{{ caller_paths | default([]) }}"
      codebase_context: "{{ codebase_context | default({}) }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for depth cycle.
    renderer: minijinja
    template_ref: deep-module/deep-module-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter depth cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: deep-module/deep-module-assess
      gas_budget: 6000
    - resource: template
      action: render
      template_id: deep-module/deep-module-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: deep-module
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
