# Multi-Okapi Configuration
# ℏKask v0.21.2

instances:
  - id: okapi-primary
    endpoint: http://localhost:8080
    capabilities: [inference, embedding]
    priority: 1
  - id: okapi-secondary
    endpoint: http://localhost:8081
    capabilities: [inference]
    priority: 2

routing:
  strategy: priority
  load_balance: false

health_check:
  enabled: true
  interval_seconds: 30

failover:
  enabled: true
  max_retries: 3
