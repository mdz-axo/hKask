# Superforecasting Process Manifest
# ℏKask v0.30.0 — Tetlock pipeline as convergent PDCA

manifest:
  id: superforecasting
  name: Superforecasting
  description: >
    Convergent eight-stage forecasting process. Runs triage, decomposition,
    outside/inside view, Bayesian evidence update, synthesis, calibration,
    and forecast recording, then computes convergence for iterative refinement.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_9_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 5
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: forecasting_question
    type: string
    required: true
  - name: domain
    type: string
    required: false
  - name: time_horizon
    type: string
    required: false
  - name: resolution_criteria
    type: string
    required: false
  - name: expiration_date
    type: string
    required: false
  - name: new_evidence
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Triage forecasting question difficulty and tractability.
    renderer: minijinja
    template_ref: superforecasting/stage_0_triage
    gas_cap: 2500
    timeout_seconds: 30
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      domain: "{{ domain | default(null) }}"
      time_horizon: "{{ time_horizon | default(null) }}"

  - ordinal: 2
    action: select
    description: Fermi-decompose forecasting question into sub-questions.
    renderer: minijinja
    template_ref: superforecasting/stage_1_fermi_decompose
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      triage_output: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: Build outside-view base-rate anchor.
    renderer: minijinja
    template_ref: superforecasting/stage_2_outside_view
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      sub_questions: "{{ step_2_result.sub_questions | default([]) }}"
      knowns: "{{ step_2_result.knowns | default([]) }}"

  - ordinal: 4
    action: select
    description: Build inside-view hypothesis model.
    renderer: minijinja
    template_ref: superforecasting/stage_3_inside_view
    gas_cap: 4500
    timeout_seconds: 75
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      sub_questions: "{{ step_2_result.sub_questions | default([]) }}"
      starting_probability: "{{ step_3_result.starting_probability | default(0.5) }}"
      outside_view_output: "{{ step_3_result }}"

  - ordinal: 5
    action: select
    description: Apply Bayesian updates from incoming evidence.
    renderer: minijinja
    template_ref: superforecasting/stage_4_evidence_update
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      prior_probability: "{{ step_4_result.hypothesis_probabilities.combined_probability | default(step_3_result.starting_probability | default(0.5)) }}"
      hypothesis_analysis: "{{ step_4_result.hypothesis_probabilities | default({}) }}"
      new_evidence: "{{ new_evidence | default([]) }}"

  - ordinal: 6
    action: select
    description: Synthesize multi-model dragonfly-eye view.
    renderer: minijinja
    template_ref: superforecasting/stage_5_synthesis
    gas_cap: 4500
    timeout_seconds: 75
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      updated_probability: "{{ step_5_result.updated_probability | default(0.5) }}"
      hypothesis_analysis: "{{ step_4_result.hypothesis_probabilities | default({}) }}"
      inside_view_output: "{{ step_4_result }}"

  - ordinal: 7
    action: select
    description: Calibrate final probability and confidence level.
    renderer: minijinja
    template_ref: superforecasting/stage_6_calibration
    gas_cap: 3500
    timeout_seconds: 45
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      synthesized_probability: "{{ step_6_result.synthesized_probability | default(step_5_result.updated_probability | default(0.5)) }}"
      synthesis_output: "{{ step_6_result }}"
      pipeline_outputs: "{{ {'triage': step_1_result, 'outside': step_3_result, 'inside': step_4_result, 'evidence': step_5_result, 'synthesis': step_6_result} }}"

  - ordinal: 8
    action: select
    description: Record structured forecast for later scoring/post-mortem.
    renderer: minijinja
    template_ref: superforecasting/stage_7_record
    gas_cap: 3000
    timeout_seconds: 45
    input_mapping:
      forecasting_question: "{{ forecasting_question }}"
      final_probability: "{{ step_7_result.final_probability | default(step_6_result.synthesized_probability | default(0.5)) }}"
      confidence_level: "{{ step_7_result.confidence_level | default('medium') }}"
      pipeline_summary: "{{ {'triage_difficulty': step_1_result.difficulty_level | default('unknown'), 'sub_question_count': step_2_result.sub_questions | default([]) | length, 'reference_class_count': step_3_result.reference_classes | default([]) | length, 'hypothesis_count': step_4_result.hypotheses | default([]) | length, 'evidence_count': step_5_result.evidence_items | default([]) | length} }}"
      resolution_criteria: "{{ resolution_criteria | default('Outcome judged against explicit public evidence.') }}"
      expiration_date: "{{ expiration_date | default(null) }}"

  - ordinal: 9
    action: select
    description: Compute normalized convergence metric for forecasting cycle.
    renderer: minijinja
    template_ref: superforecasting/superforecasting-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      triage_result: "{{ step_1_result }}"
      calibration_result: "{{ step_7_result }}"
      record_result: "{{ step_8_result }}"

  - ordinal: 10
    action: loop
    description: Re-enter forecasting refinement cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: superforecasting/stage_0_triage
      gas_budget: 2500
    - resource: template
      action: render
      template_id: superforecasting/stage_1_fermi_decompose
      gas_budget: 4000
    - resource: template
      action: render
      template_id: superforecasting/stage_2_outside_view
      gas_budget: 4000
    - resource: template
      action: render
      template_id: superforecasting/stage_3_inside_view
      gas_budget: 4500
    - resource: template
      action: render
      template_id: superforecasting/stage_4_evidence_update
      gas_budget: 4000
    - resource: template
      action: render
      template_id: superforecasting/stage_5_synthesis
      gas_budget: 4500
    - resource: template
      action: render
      template_id: superforecasting/stage_6_calibration
      gas_budget: 3500
    - resource: template
      action: render
      template_id: superforecasting/stage_7_record
      gas_budget: 3000
    - resource: template
      action: render
      template_id: superforecasting/superforecasting-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: superforecasting
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
