# MCDA Process Manifest
# ℏKask v0.31.0 — Multi-criteria analysis as convergent PDCA

manifest:
  id: mcda
  name: MCDA
  description: >
    Convergent MCDA process. Identifies criteria, weights and scores alternatives,
    ranks options, runs sensitivity analysis, computes convergence, and iterates
    until decision robustness is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: decision_question
    type: string
    required: true
  - name: alternatives
    type: array
    required: true
  - name: criteria_hints
    type: array
    required: false
  - name: weighting_method
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Identify and classify decision criteria.
    renderer: minijinja
    template_ref: mcda/identify-criteria
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      decision_question: "{{ decision_question }}"
      alternatives: "{{ alternatives }}"
      criteria_hints: "{{ criteria_hints | default([]) }}"

  - ordinal: 2
    action: select
    description: Assign weights and score alternatives.
    renderer: minijinja
    template_ref: mcda/weight-and-score
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      decision_question: "{{ decision_question }}"
      alternatives: "{{ alternatives }}"
      criteria: "{{ step_1_result.criteria | default([]) }}"
      weighting_method: "{{ weighting_method | default('direct') }}"

  - ordinal: 3
    action: select
    description: Rank alternatives and detect compensation masking.
    renderer: minijinja
    template_ref: mcda/rank-alternatives
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      decision_question: "{{ decision_question }}"
      composite_scores: "{{ step_2_result.composite_scores | default([]) }}"
      normalized_scores: "{{ step_2_result.normalized_scores | default([]) }}"
      criteria: "{{ step_1_result.criteria | default([]) }}"

  - ordinal: 4
    action: select
    description: Perform sensitivity analysis and robustness checks.
    renderer: minijinja
    template_ref: mcda/sensitivity-analysis
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      decision_question: "{{ decision_question }}"
      ranking: "{{ step_3_result.ranking | default([]) }}"
      weights: "{{ step_2_result.weights | default([]) }}"
      normalized_scores: "{{ step_2_result.normalized_scores | default([]) }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for MCDA cycle.
    renderer: minijinja
    template_ref: mcda/mcda-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      ranking_result: "{{ step_3_result }}"
      sensitivity_result: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    description: Re-enter MCDA cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: mcda/identify-criteria
      gas_budget: 4000
    - resource: template
      action: render
      template_id: mcda/weight-and-score
      gas_budget: 5000
    - resource: template
      action: render
      template_id: mcda/rank-alternatives
      gas_budget: 4000
    - resource: template
      action: render
      template_id: mcda/sensitivity-analysis
      gas_budget: 4000
    - resource: template
      action: render
      template_id: mcda/mcda-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: mcda
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
