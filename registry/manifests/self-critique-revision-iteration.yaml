# Self-Critique & Revision Iteration Child Manifest
# ℏKask v0.21.0 — Single critique-revise iteration for convergence loop
# Template type: Process (FlowDef) — conditional child of self-critique-revision
# Invoked by parent when quality_improvement > convergence_threshold

manifest:
  id: self-critique-revision-iteration
  name: Self-Critique & Revision Iteration
  description: >
    Child manifest for a single critique-revise iteration within the self-critique
    convergence loop. Takes the current output and quality state, produces one
    round of critique and revision, and evaluates convergence. Invoked by
    self-critique-revision when quality has not yet converged.
  functional_role: knowact
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared
  parent_manifest: self-critique-revision
  max_iterations: 3

inputs:
  - name: task_prompt
    type: string
    description: "The original task prompt"
    required: true
  - name: current_output
    type: string
    description: "The current (revised) output to critique"
    required: true
  - name: quality_criteria
    type: array
    description: "Criteria to critique against"
    required: false
  - name: previous_quality_score
    type: number
    description: "Quality score from the previous iteration"
    required: true
  - name: iteration
    type: integer
    description: "Current iteration number (1-based)"
    required: true
  - name: convergence_threshold
    type: number
    description: "Minimum quality improvement to continue (default: 0.1)"
    required: false

# Energy Budget Configuration
gas:
  cap: 12000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Critique the current output. Identify weaknesses, gaps, errors,
      and areas for improvement against the quality criteria. Produce
      structured critique with specific, actionable feedback.
    renderer: minijinja
    template_ref: self-critique-revision/critique
    model_tier: reasoning_local
    mcp: hkask-mcp-inference
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      task_prompt: "{{ task_prompt }}"
      current_output: "{{ current_output }}"
      quality_criteria: "{{ quality_criteria | default(['accuracy', 'completeness', 'clarity']) }}"
      draft_number: "{{ iteration }}"
    output_schema:
      type: object
      properties:
        critique:
          type: array
          items:
            type: object
            properties:
              criterion: { type: string }
              issue: { type: string }
              severity: { type: string }
              suggestion: { type: string }
        overall_quality_score:
          type: number
        critical_issues:
          type: integer
        improvement_areas:
          type: array
          items:
            type: string

  - ordinal: 2
    action: populate
    description: >
      Revise the output based on the critique. Address each identified
      weakness, incorporate suggestions, and produce an improved draft.
      The revision should directly respond to specific critique points.
    renderer: minijinja
    template_ref: self-critique-revision/revise
    model_tier: reasoning_local
    mcp: hkask-mcp-inference
    gas_cap: 5000
    timeout_seconds: 90
    input_mapping:
      task_prompt: "{{ task_prompt }}"
      current_output: "{{ current_output }}"
      critique: "{{ ordinal_1.critique }}"
      quality_criteria: "{{ quality_criteria | default(['accuracy', 'completeness', 'clarity']) }}"
      previous_quality_score: "{{ ordinal_1.overall_quality_score }}"
      draft_number: "{{ iteration + 1 }}"
    output_schema:
      type: object
      properties:
        revised_output:
          type: string
        critique_addressed:
          type: array
          items:
            type: object
            properties:
              critique_point: { type: string }
              how_addressed: { type: string }
        revised_quality_score:
          type: number
        quality_improvement:
          type: number
        draft_number:
          type: integer

  - ordinal: 3
    action: validate
    description: >
      Evaluate quality and detect convergence. Compare quality improvement
      between iterations against the convergence threshold. If improvement
      is below threshold, the process has converged and the current output
      is acceptable. Check max_iterations.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-storage
    gas_cap: 1000
    timeout_seconds: 10
    validation_rules:
      - quality_improvement_above_threshold
      - all_criteria_addressed
      - convergence_detection
      - max_iterations_not_exceeded
    output_schema:
      type: object
      properties:
        validated:
          type: boolean
        converged:
          type: boolean
        quality_score:
          type: number
        quality_improvement:
          type: number
        iterations_completed:
          type: integer
        final_output:
          type: string
        should_iterate:
          type: boolean
        error_reason:
          type: string

  - ordinal: 4
    action: feedback
    description: >
      Emit CNS feedback for variety monitoring and revision quality tracking.
      Report iteration count, quality progression, and convergence status.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-cns
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      iteration: integer
      quality_improvement: number
      converged: boolean
    output_schema:
      type: object
      properties:
        variety_counter:
          type: integer
        cns_event_id:
          type: string

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 2
  on_validation_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: self-critique-revision/critique
      gas_budget: 4000
    - resource: template
      action: render
      template_id: self-critique-revision/revise
      gas_budget: 5000
    - resource: manifest
      action: execute
      template_id: self-critique-revision-iteration
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: self-critique-revision-iteration
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt.self-critique-revision.iteration
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  variety_counters:
    - iteration
    - quality_improvement
    - critical_issues_per_iteration

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
