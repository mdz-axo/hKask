# Essentialist Process Manifest
# ℏKask v0.30.0 — 3-gate elimination as convergent PDCA

manifest:
  id: essentialist
  name: Essentialist
  description: >
    Convergent eliminative interrogation process. Runs the G1→G2→G3 gate flow,
    computes convergence, and iterates until no material eliminations or
    contract violations remain.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 16000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: artifact
    type: object
    required: true
  - name: code_context
    type: object
    required: false
  - name: mode
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Run essentialist 3-gate eliminative interrogation loop.
    renderer: minijinja
    template_ref: essentialist/essentialist-flow
    gas_cap: 9000
    timeout_seconds: 70
    input_mapping:
      artifact: "{{ artifact }}"
      code_context: "{{ code_context | default({}) }}"
      mode: "{{ mode | default('advisory') }}"
      max_rounds: "{{ convergence.max_iterations | default(3) }}"
      max_retries_per_gate: 3
      scope: auto

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for essentialist cycle.
    renderer: minijinja
    template_ref: essentialist/essentialist-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter elimination cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: essentialist/essentialist-flow
      gas_budget: 9000
    - resource: template
      action: render
      template_id: essentialist/essentialist-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: essentialist
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
