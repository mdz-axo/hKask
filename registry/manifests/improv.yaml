# Improv Process Manifest
# ℏKask v0.31.0 — Composable interaction grammar as convergent PDCA
# Restructured: separated mode selection (KnowAct) from mode application (WordAct routing).
# Five mode WordActs are now wired into the flow via conditional select steps.

manifest:
  id: improv
  category: skill
  name: Improv
  description: >
    Convergent improv interaction process. Selects an improv mode from
    conversation context via dedicated selector, routes to the appropriate
    mode-specific WordAct template, evaluates convergence quality, and
    iterates until constructive interaction quality is stable.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.12
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_8_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: context
    type: object
    description: Conversation context and intent cues
    required: false
  - name: contribution
    type: string
    description: Active contribution to transform via improv mode
    required: false
  - name: active_mode
    type: string
    description: Optional preferred or currently active mode
    required: false
  - name: previous_contributions
    type: array
    description: Optional prior turns used for mode selection
    required: false

steps:
  - ordinal: 1
    action: select
    description: Select best-fit improv mode for the current context (KnowAct).
    renderer: minijinja
    template_ref: improv/improv-select
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"
      active_mode: "{{ active_mode | default('') }}"
      previous_contributions: "{{ previous_contributions | default([]) }}"
    output_schema:
      type: object
      properties:
        mode:
          type: string
          enum: [plussing, yes-and, yes-but, freestyling, riffing]
        rationale:
          type: string

  # Mode application — conditional routing to the selected mode's WordAct.
  # Only one of Steps 2-6 executes per iteration, based on step_1_result.mode.

  - ordinal: 2
    action: select
    description: Apply Plussing mode — extract agreeable, build constructively.
    renderer: minijinja
    template_ref: improv/improv-plussing
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_1_result.mode == 'plussing'"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  - ordinal: 3
    action: select
    description: Apply Yes And mode — accept whole, extend additively.
    renderer: minijinja
    template_ref: improv/improv-yes-and
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_1_result.mode == 'yes-and'"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  - ordinal: 4
    action: select
    description: Apply Yes But mode — accept whole, constrain scope.
    renderer: minijinja
    template_ref: improv/improv-yes-but
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_1_result.mode == 'yes-but'"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  - ordinal: 5
    action: select
    description: Apply Freestyling mode — rapid collaborative cycling.
    renderer: minijinja
    template_ref: improv/improv-freestyling
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_1_result.mode == 'freestyling'"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  - ordinal: 6
    action: select
    description: Apply Riffing mode — solo divergent exploration.
    renderer: minijinja
    template_ref: improv/improv-riffing
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_1_result.mode == 'riffing'"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  # Fallback: if no mode condition matched, default to Plussing.
  # Prevents silent no-op loop when mode is unrecognized or null.

  - ordinal: 7
    action: select
    description: Fallback — default to Plussing when no specific mode was selected.
    renderer: minijinja
    template_ref: improv/improv-plussing
    gas_cap: 5000
    timeout_seconds: 60
    condition: "step_2_result == null and step_3_result == null and step_4_result == null and step_5_result == null and step_6_result == null"
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"

  - ordinal: 8
    action: select
    description: Compute normalized convergence metric for improv PDCA cycle.
    renderer: minijinja
    template_ref: improv/improv-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      mode_selection_result: "{{ step_1_result }}"
      mode_application_result: "{{ step_2_result | default(step_3_result | default(step_4_result | default(step_5_result | default(step_6_result | default(step_7_result | default({}))))) }}"

  - ordinal: 9
    action: loop
    description: Re-enter improv cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: improv/improv-select
      gas_budget: 4000
    - resource: template
      action: render
      template_id: improv/improv-plussing
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-yes-and
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-yes-but
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-freestyling
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-riffing
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: improv
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

ledger:
  emit_spans: true
  span_namespace: hkask.template.improv
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  spans:
    - hkask.improv.mode.active
    - hkask.improv.plussing.ratio
    - hkask.improv.freestyle.coherence
    - hkask.improv.ensemble.coherence
    - reg.kata.improv.effectiveness

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_reg_events: true
