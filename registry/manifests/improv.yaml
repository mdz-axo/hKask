# Improv Process Manifest
# ℏKask v0.30.0 — Composable interaction grammar as convergent PDCA
# Template type: FlowDef — mode selection + mode application + convergence loop

manifest:
  id: improv
  name: Improv
  description: >
    Convergent improv interaction process. Selects an improv mode from
    conversation context, applies the mode to the active contribution,
    evaluates convergence quality, and iterates until constructive
    interaction quality is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.12
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 12000
  cost_per_token: 0.2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: context
    type: object
    description: Conversation context and intent cues
    required: false
  - name: contribution
    type: string
    description: Active contribution to transform via improv mode
    required: false
  - name: active_mode
    type: string
    description: Optional preferred or currently active mode
    required: false
  - name: previous_contributions
    type: array
    description: Optional prior turns used for mode selection
    required: false

steps:
  - ordinal: 1
    action: select
    description: Select best-fit improv mode for the current context.
    renderer: minijinja
    template_ref: improv/improv-cycle
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"
      active_mode: "{{ active_mode | default('') }}"
      previous_contributions: "{{ previous_contributions | default([]) }}"
    output_schema:
      type: object
      properties:
        mode:
          type: string
          enum: [plussing, yes-and, yes-but, freestyling, riffing]
        rationale:
          type: string

  - ordinal: 2
    action: select
    description: Apply selected improv mode to produce constructive response output.
    renderer: minijinja
    template_ref: improv/improv-cycle
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      mode: "{{ step_1_result.mode }}"
      context: "{{ context | default({}) }}"
      contribution: "{{ contribution | default('') }}"
      active_mode: "{{ step_1_result.mode }}"
      previous_contributions: "{{ previous_contributions | default([]) }}"
    output_schema:
      type: object
      properties:
        mode:
          type: string
        response:
          type: string
        cns_spans:
          type: array
        next_mode_suggestion:
          type: [string, "null"]

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for improv PDCA cycle.
    renderer: minijinja
    template_ref: improv/improv-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      mode_selection_result: "{{ step_1_result }}"
      mode_application_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter improv cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: improv/improv-cycle
      gas_budget: 5000
    - resource: template
      action: render
      template_id: improv/improv-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: improv
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.improv
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  spans:
    - cns.improv.mode.active
    - cns.improv.plussing.ratio
    - cns.improv.freestyle.coherence
    - cns.improv.ensemble.coherence
    - cns.kata.improv.effectiveness

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
