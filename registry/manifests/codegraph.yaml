# Codegraph Process Manifest
# ℏKask v0.31.0 — Code understanding as convergent PDCA
#
# Generalizable: any replicant that needs to understand code structure — for
# debugging, refactoring, impact analysis, onboarding, or context assembly —
# can invoke this skill. The skill orchestrates the hkask-codegraph MCP tools
# (query, traverse, impact, analysis, context, structure, stats, reindex,
# feedback, embed) through a convergent PDCA cycle.

manifest:
  id: codegraph
  category: skill
  name: Codegraph
  description: >
    Convergent code-understanding process. Discovers and maps the target
    codebase area, queries for goal-relevant symbols, traverses the dependency
    graph, runs quality analysis (complexity, dead code, impact), assembles
    token-budgeted context, computes convergence, and iterates until the
    replicant has sufficient code understanding to act. Delegates to the
    hkask-mcp-codegraph MCP server for graph construction, traversal, and
    analysis. Any replicant may invoke this skill.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target
    type: object
    required: true
    description: >
      Target specification. Can be a crate name, file path, symbol name,
      or a structured object with { crate, module, symbol } fields.
  - name: goal
    type: string
    required: true
    description: >
      What the replicant wants to understand. Examples: "impact of changing
      the inference router", "find dead code in hkask-mcp", "understand the
      CNS loop system".
  - name: depth
    type: string
    required: false
    default: "immediate-neighbors"
    description: >
      Traversal depth. `immediate-neighbors` (default), `transitive` (2-hop),
      or `full` (recursive CTE to max_depth).
  - name: analysis_types
    type: array
    required: false
    default: ["complexity", "dead_code"]
    description: >
      Which analyses to run. Options: `complexity`, `dead_code`, `impact`.
  - name: context_budget
    type: string
    required: false
    default: "medium"
    description: >
      Token budget for context assembly. `small` (2048), `medium` (4096),
      `large` (8192). Controls how much context is assembled for downstream use.
  - name: requires_context
    type: boolean
    required: false
    default: true
    description: >
      Whether to assemble token-budgeted context in step 4. Set to false when
      the replicant only needs analysis (not context for an LLM prompt).

steps:
  - ordinal: 1
    action: select
    description: >
      DISCOVER: Index the target codebase (if not already indexed) and get
      a project structure overview. The replicant invokes codegraph_reindex
      (if needed), codegraph_stats, and codegraph_structure to build an
      initial map. The template synthesizes these into a discovery summary
      with relevant crates and entry symbols.
    renderer: minijinja
    template_ref: codegraph/codegraph-discover
    gas_cap: 4096
    timeout_seconds: 120
    input_mapping:
      target: "{{ target }}"
      goal: "{{ goal }}"
      project_stats: "{{ project_stats | default({}) }}"
      structure_overview: "{{ structure_overview | default([]) }}"

  - ordinal: 2
    action: select
    description: >
      QUERY: Search the code graph for symbols relevant to the goal. The
      replicant invokes codegraph_query with keyword/name/semantic queries
      derived from the goal. The template scores results by relevance and
      identifies traversal targets. Gaps are flagged for the next phase.
    renderer: minijinja
    template_ref: codegraph/codegraph-query
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      goal: "{{ goal }}"
      discovery: "{{ step_1_result }}"
      query_results: "{{ query_results | default([]) }}"

  - ordinal: 3
    action: select
    description: >
      ANALYZE: Traverse the dependency graph (forward and reverse) for the
      matched symbols, run quality analysis (complexity, dead code, impact),
      and synthesize findings. The replicant invokes codegraph_traverse,
      codegraph_analysis, and codegraph_impact between this template and
      the convergence check. The template organizes results into dependency
      maps, caller maps, impact analysis, and quality findings.
    renderer: minijinja
    template_ref: codegraph/codegraph-analyze
    gas_cap: 6144
    timeout_seconds: 120
    input_mapping:
      goal: "{{ goal }}"
      discovery: "{{ step_1_result }}"
      query_results: "{{ step_2_result }}"
      traverse_results: "{{ traverse_results | default({}) }}"
      analysis_results: "{{ analysis_results | default({}) }}"

  - ordinal: 4
    action: select
    condition: "{{ requires_context | default(true) }}"
    description: >
      CONTEXT: Assemble token-budgeted context from the gathered analysis
      for downstream use. The replicant invokes codegraph_context with the
      budget from the context_budget input. This step is conditional — it
      runs only when requires_context is true (default). When skipped, the
      flow proceeds directly to convergence.
    renderer: minijinja
    template_ref: codegraph/codegraph-context
    gas_cap: 2048
    timeout_seconds: 60
    input_mapping:
      goal: "{{ goal }}"
      context_result: "{{ context_results | default({}) }}"
      analysis_result: "{{ step_3_result }}"
      budget: "{{ context_budget | default('medium') }}"

  - ordinal: 5
    action: select
    description: >
      Compute normalized convergence metric via coverage saturation detection.
      Assesses whether discovery, query, traversal, analysis, and context
      assembly are sufficiently complete for the replicant's goal. Receives
      all prior step results to score all 6 dimensions.
    renderer: minijinja
    template_ref: codegraph/codegraph-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_3_result | default(step_2_result) }}"
      discovery_result: "{{ step_1_result | default({}) }}"
      query_result: "{{ step_2_result | default({}) }}"
      context_result: "{{ step_4_result | default({}) }}"

  - ordinal: 6
    action: loop
    description: >
      Re-enter codegraph cycle if convergence is not met. Feeds convergence
      blockers back to refine the target for the next iteration.
    input_mapping:
      loop_target: 1
      target: "{{ step_5_result.blockers | default([]) | join('; ') | default(target) }}"

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: codegraph/codegraph-discover
      gas_budget: 4096
    - resource: template
      action: render
      template_id: codegraph/codegraph-query
      gas_budget: 4096
    - resource: template
      action: render
      template_id: codegraph/codegraph-analyze
      gas_budget: 6144
    - resource: template
      action: render
      template_id: codegraph/codegraph-context
      gas_budget: 2048
    - resource: template
      action: render
      template_id: codegraph/codegraph-convergence-check
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_query
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_traverse
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_impact
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_analysis
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_context
      gas_budget: 2000
    - resource: mcp
      action: call
      tool: codegraph_structure
      gas_budget: 1000
    - resource: mcp
      action: call
      tool: codegraph_stats
      gas_budget: 1000
    - resource: mcp
      action: call
      tool: codegraph_reindex
      gas_budget: 4000
    - resource: mcp
      action: call
      tool: codegraph_feedback
      gas_budget: 1000
    - resource: mcp
      action: call
      tool: codegraph_index_embeddings
      gas_budget: 3000
    - resource: manifest
      action: execute
      template_id: codegraph
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true