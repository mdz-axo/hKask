# ACP Runtime Configuration
# ℏKask v0.21.2

manifest:
  id: acp-runtime
  name: ACP Runtime
  description: Agent Capability Protocol runtime configuration
  version: 0.21.2
  functional_role: flowdef
  editor: curator-or-human-admin
  visibility: Shared

root_authority:
  webid: "did:web:hkask.dev#system"
  secret:
    source: environment
    env_var: HKASK_ACP_SECRET

agent_registration:
  requirements:
    require_webid: true
    require_capabilities: true
  validation:
    reject_wildcard_capabilities: true

messaging:
  correlation:
    enabled: true
  routing:
    strategy: template_dispatch
  delivery:
    guarantee: at_least_once
    max_retries: 3

rate_limiting:
  enabled: true
  defaults:
    messages_per_minute: 60
    burst_size: 10

capability_verification:
  required: true
  token_validation:
    check_signature: true
    check_expiry: true
    max_chain_depth: 7

audit:
  enabled: true
  log:
    message_send: true
    message_receive: true
    capability_check: true

cns:
  spans:
    emit_on_message_send: true
    emit_on_capability_denied: true
  namespace: cns.agent.acp

security:
  injection_prevention:
    sanitize_message_content: true
  dos_prevention:
    max_message_size_bytes: 1048576
