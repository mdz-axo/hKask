# Decision Journal Process Manifest
# ℏKask v0.30.0 — Decision journaling as convergent PDCA

manifest:
  id: decision-journal
  name: Decision Journal
  description: >
    Convergent decision-journaling process. Records a decision, defines
    measurable expected outcomes, revisits actual outcomes, computes Brier
    calibration metrics, and iterates until calibration quality is sufficient.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 18000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: decision
    type: string
    required: true
  - name: context
    type: string
    required: true
  - name: alternatives_considered
    type: array
    required: false
  - name: disconfirming_evidence
    type: array
    required: false
  - name: actual_outcomes
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Record the decision with full context and assumptions.
    renderer: minijinja
    template_ref: decision-journal/record-decision
    gas_cap: 4500
    timeout_seconds: 60
    input_mapping:
      decision: "{{ decision }}"
      context: "{{ context }}"
      alternatives_considered: "{{ alternatives_considered | default([]) }}"
      disconfirming_evidence: "{{ disconfirming_evidence | default([]) }}"

  - ordinal: 2
    action: select
    description: Define measurable expected outcomes with calibrated probabilities.
    renderer: minijinja
    template_ref: decision-journal/define-expected-outcomes
    gas_cap: 4500
    timeout_seconds: 60
    input_mapping:
      decision: "{{ decision }}"
      context: "{{ context }}"
      decision_record: "{{ step_1_result.decision_record | default({}) }}"

  - ordinal: 3
    action: select
    description: Revisit and evaluate outcomes against predictions.
    renderer: minijinja
    template_ref: decision-journal/revisit-evaluate
    gas_cap: 4500
    timeout_seconds: 60
    input_mapping:
      decision_record: "{{ step_1_result.decision_record | default({}) }}"
      expected_outcomes: "{{ step_2_result.expected_outcomes | default([]) }}"
      actual_outcomes: "{{ actual_outcomes | default([]) }}"

  - ordinal: 4
    action: select
    description: Compute Brier scores and calibration diagnostics.
    renderer: minijinja
    template_ref: decision-journal/compute-brier
    gas_cap: 2500
    timeout_seconds: 45
    input_mapping:
      outcome_comparisons: "{{ step_3_result.outcome_comparisons | default([]) }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for decision-journal cycle.
    renderer: minijinja
    template_ref: decision-journal/decision-journal-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      revisit_result: "{{ step_3_result }}"
      brier_result: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    description: Re-enter calibration cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: decision-journal/record-decision
      gas_budget: 4500
    - resource: template
      action: render
      template_id: decision-journal/define-expected-outcomes
      gas_budget: 4500
    - resource: template
      action: render
      template_id: decision-journal/revisit-evaluate
      gas_budget: 4500
    - resource: template
      action: render
      template_id: decision-journal/compute-brier
      gas_budget: 2500
    - resource: template
      action: render
      template_id: decision-journal/decision-journal-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: decision-journal
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
