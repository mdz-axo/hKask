# Skill Manager Process Manifest
# ℏKask v0.30.0 — Registry-first skill lifecycle management
# Template type: FlowDef — PDCA loop over validation/analysis

manifest:
  id: skill-manager
  name: Skill Manager
  description: >
    Convergent skill-management process: validate registry crates, analyze
    structure/translation fitness, compute convergence, and iterate until
    critical blockers are resolved or energy is exhausted.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: operation
    type: string
    description: "list|validate|build|translate|reverse|stats"
    required: false
  - name: skill_name
    type: string
    description: "Optional target skill name"
    required: false
  - name: registry_path
    type: string
    description: "Registry root path"
    required: false
  - name: source_skill_content
    type: string
    description: "Optional source skill content for analysis/translation"
    required: false
  - name: source_format_hint
    type: string
    description: "Optional format hint for source analysis"
    required: false

steps:
  - ordinal: 1
    action: select
    description: Validate registry and companion artifacts for the target scope.
    renderer: minijinja
    template_ref: skill-manager/skill-manager-validate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      skill_name: "{{ skill_name | default('') }}"
      registry_path: "{{ registry_path | default('registry/templates') }}"

  - ordinal: 2
    action: select
    description: Analyze source skill structure for translation/build fitness.
    renderer: minijinja
    template_ref: skill-manager/skill-manager-analyze
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      source_skill_content: "{{ source_skill_content | default('') }}"
      source_format_hint: "{{ source_format_hint | default('') }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for this PDCA cycle.
    renderer: minijinja
    template_ref: skill-manager/skill-manager-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      operation: "{{ operation | default('validate') }}"
      validation_result: "{{ step_1_result }}"
      build_result: null
      analyze_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter the cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: skill-manager/skill-manager-validate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-manager/skill-manager-analyze
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-manager/skill-manager-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: skill-manager
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-manager
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
