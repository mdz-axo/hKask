# Magna Carta Verifier Process Manifest
# ℏKask v0.30.0 — Principle verification as convergent PDCA

manifest:
  id: magna-carta-verifier
  name: Magna Carta Verifier
  description: >
    Convergent Magna Carta verification process. Generates assertion procedures,
    synthesizes compliance reports, renders testcase skeletons, computes
    convergence, and iterates until compliance analysis is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  cost_per_token: 0.000002
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: principle
    type: string
    required: true
  - name: version
    type: string
    required: false
  - name: assertions
    type: array
    required: true
  - name: assertion_results
    type: array
    required: false
  - name: crate_name
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Render mechanical verification procedures per assertion.
    renderer: minijinja
    template_ref: magna-carta-verifier/mc-verify-procedure
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      principle: "{{ principle }}"
      version: "{{ version | default('0.30.0') }}"
      assertions: "{{ assertions }}"

  - ordinal: 2
    action: select
    description: Synthesize a structured compliance report.
    renderer: minijinja
    template_ref: magna-carta-verifier/mc-verify-report
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      principle: "{{ principle }}"
      version: "{{ version | default('0.30.0') }}"
      assertion_results: "{{ assertion_results | default([]) }}"

  - ordinal: 3
    action: select
    description: Render Rust testcase skeletons from assertion definitions.
    renderer: minijinja
    template_ref: magna-carta-verifier/mc-verify-testcase
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      principle: "{{ principle }}"
      assertions: "{{ assertions }}"
      crate_name: "{{ crate_name | default('hKask') }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for Magna Carta cycle.
    renderer: minijinja
    template_ref: magna-carta-verifier/mc-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      procedure_result: "{{ step_1_result }}"
      report_result: "{{ step_2_result }}"
      testcase_result: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    description: Re-enter Magna Carta cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: magna-carta-verifier/mc-verify-procedure
      gas_budget: 5000
    - resource: template
      action: render
      template_id: magna-carta-verifier/mc-verify-report
      gas_budget: 5000
    - resource: template
      action: render
      template_id: magna-carta-verifier/mc-verify-testcase
      gas_budget: 4000
    - resource: template
      action: render
      template_id: magna-carta-verifier/mc-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: magna-carta-verifier
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
