# Handoff Process Manifest
# ℏKask v0.31.0 — Session transfer as convergent PDCA

manifest:
  id: handoff
  category: skill
  name: Handoff
  description: >
    Convergent session handoff process. Compacts context, catalogs artifacts,
    recommends skills, composes handoff document, computes convergence, and
    iterates until transfer quality is stable for continuation.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: next_session_focus
    type: string
    required: false
  - name: session_context
    type: object
    required: true
  - name: project_root
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Compact session context into structured handoff primitives.
    renderer: minijinja
    template_ref: handoff/handoff-compact
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      next_session_focus: "{{ next_session_focus | default('') }}"
      session_context: "{{ session_context }}"

  - ordinal: 2
    action: select
    description: Catalog artifacts and detect sensitive data for redaction.
    renderer: minijinja
    template_ref: handoff/handoff-artifacts
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      session_context: "{{ session_context }}"
      project_root: "{{ project_root | default('.') }}"
      key_decisions: "{{ step_1_result.key_decisions | default([]) }}"

  - ordinal: 3
    action: select
    description: Suggest next skills and extract open questions.
    renderer: minijinja
    template_ref: handoff/handoff-skills-suggest
    gas_cap: 3000
    timeout_seconds: 45
    input_mapping:
      next_session_focus: "{{ next_session_focus | default('') }}"
      current_state: "{{ step_1_result.current_state | default('') }}"
      artifacts: "{{ step_2_result.artifacts | default([]) }}"
      key_decisions: "{{ step_1_result.key_decisions | default([]) }}"

  - ordinal: 4
    action: select
    description: Compose final handoff document.
    renderer: minijinja
    template_ref: handoff/handoff-compose
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      session_purpose: "{{ step_1_result.session_purpose | default('') }}"
      progress_summary: "{{ step_1_result.progress_summary | default([]) }}"
      key_decisions: "{{ step_1_result.key_decisions | default([]) }}"
      current_state: "{{ step_1_result.current_state | default('') }}"
      artifacts: "{{ step_2_result.artifacts | default([]) }}"
      redacted_fields: "{{ step_2_result.redacted_fields | default([]) }}"
      suggested_skills: "{{ step_3_result.suggested_skills | default([]) }}"
      open_questions: "{{ step_3_result.open_questions | default([]) }}"
      next_session_focus: "{{ next_session_focus | default('') }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for handoff cycle.
    renderer: minijinja
    template_ref: handoff/handoff-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      compact_result: "{{ step_1_result }}"
      artifacts_result: "{{ step_2_result }}"
      skills_result: "{{ step_3_result }}"
      compose_result: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    description: Re-enter handoff cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: handoff/handoff-compact
      gas_budget: 5000
    - resource: template
      action: render
      template_id: handoff/handoff-artifacts
      gas_budget: 4000
    - resource: template
      action: render
      template_id: handoff/handoff-skills-suggest
      gas_budget: 3000
    - resource: template
      action: render
      template_id: handoff/handoff-compose
      gas_budget: 5000
    - resource: template
      action: render
      template_id: handoff/handoff-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: handoff
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
