# Russell → hKask Mapping Configuration
# ℏKask v0.21.2 — Planck's Constant of Agent Systems
# 
# This manifest defines the mapping rules for transforming Russell skill manifests
# into hKask registry entries. The Rust code is now just a generic YAML processor
# that applies these rules.

mapping:
  version: 0.21.2
  description: Russell skill manifest to hKask registry mapping
  functional_role: flowdef

# Field Mappings
field_mappings:
  russell_id:
    to: hKask_id
    transform: prefix_with_skill_hkask
  
  russell_version:
    to: template_version
    transform: passthrough
  
  russell_authored:
    to: authored_date
    transform: iso8601_parse
  
  russell_symptoms:
    to: template_description
    transform: join_with_newlines
  
  russell_applies_when:
    to: template_constraints
    transform: array_to_yaml
  
  russell_probes:
    to: process_steps
    transform: probes_to_steps
  
  russell_interventions:
    to: process_actions
    transform: interventions_to_actions
  
  russell_safety:
    to: safety_constraints
    transform: safety_to_constraints

# ID Transformation Rules
id_transformation:
  prefix: "skill/hkask/"
  preserve_suffix: true
  examples:
    - from: "skill/russell/semantic"
      to: "skill/hkask/semantic"
    - from: "skill/russell/pragmatic"
      to: "skill/hkask/pragmatic"

# Template Type Inference
template_type_inference:
  rules:
    - if: "probes.length > 0 AND interventions.length > 0"
      then: "Process"
    - if: "probes.length > 0 AND interventions.length = 0"
      then: "Prompt"
    - if: "safety.max_auto_risk = 'high'"
      then: "Cognition"
  default: "Process"

# Model Tier Selection
model_tier_selection:
  rules:
    - if: "interventions.any(risk = 'high')"
      then: "high_quality"
    - if: "probes.any(timeout > '30s')"
      then: "balanced"
    - if: "symptoms.length <= 3"
      then: "fast_local"
  default: "balanced"

# Energy Budget Calculation
energy_budget:
  base_cost: 1000
  per_probe_cost: 200
  per_intervention_cost: 500
  risk_multiplier:
    low: 1.0
    medium: 1.5
    high: 2.0
  formula: "base + (probes * 200) + (interventions * 500) * risk_multiplier"

# CNS Span Configuration
cns_spans:
  emit_on_mapping: true
  span_namespace: "cns.template.russell_mapping"
  phases:
    - mapped
    - validated
    - registered

# Validation Rules
validation:
  required_fields:
    - id
    - version
    - safety
  optional_fields:
    - authored
    - min_harness_version
    - symptoms
    - applies_when
    - probes
    - interventions
    - references
  constraints:
    - "id must start with 'skill/russell/'"
    - "version must be semver format"
    - "safety.max_auto_risk must be low/medium/high"

# Output Configuration
output:
  format: yaml
  include_provenance: true
  provenance_fields:
    - source_path
    - mapping_version
    - mapped_at
    - mapper_webid
