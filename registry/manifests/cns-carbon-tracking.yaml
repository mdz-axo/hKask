# CNS Carbon Tracking Configuration
# ℏKask v0.21.2 — GHG Protocol Scope 2 aligned

cns_carbon:
  framework: GHG-Protocol-Scope-2-2024
  verification_standard: ISO-14064-3
  grid_factors_source: IEA-Emission-Factors-2026

  grid_intensity:
    location_based:
      default: 0.370
      by_region:
        us: 0.370
        eu: 0.255
        fr: 0.050
        de: 0.420
        uk: 0.233
        cn: 0.570
        in: 0.700
        is: 0.030
    market_based: null

  pue: 1.15

  inference_energy:
    source: LLMCO2-AAAI-2026
    model_tiers:
      fast_local: 0.0003
      balanced: 0.0008
      reasoning_local: 0.0015

  uncertainty_range: 0.50

capability_metrics:
  primary:
    - metric_id: task.success_rate
      unit: percent
      collection: automatic
      source: bot_execution_logs
    
    - metric_id: response.latency
      unit: ms_per_token
      collection: automatic
      source: cns_tool_spans
    
    - metric_id: thinking.automaticity
      unit: score_0_to_1
      collection: kata_classifier
      source: habit-automaticity-classifier.j2
  
  secondary:
    - metric_id: coordination.handoff_success
      unit: percent
      collection: on_demand
      source: ensemble_session_logs
    
    - metric_id: energy.efficiency
      unit: wh_per_task
      collection: automatic
      source: cns_carbon_tracking

  target_condition_schema:
    metric_id: string
    baseline: number
    target: number
    achieve_by: YYYY-MM-DD

span_emission:
  required_carbon_spans:
    - cns.prompt.kata
    - cns.prompt.metacognition
    - cns.prompt.outcome

  carbon_schema:
    type: object
    properties:
      tokens:
        type: integer
      energy_wh:
        type: number
      co2e_location_kg:
        type: number
      co2e_market_kg:
        type: number
      methodology_version:
        type: string
      uncertainty_range:
        type: number

variety_counters:
  carbon_counters:
    - counter_id: kata.carbon.cumulative
      unit: kg-CO₂e
      aggregation: sum

    - counter_id: inference.carbon.cumulative
      unit: kg-CO₂e
      aggregation: sum

    - counter_id: system.carbon.cumulative
      unit: kg-CO₂e
      aggregation: sum

  efficiency_counters:
    - counter_id: kata.tokens_per_wh
      unit: tokens/Wh
      aggregation: mean

    - counter_id: inference.wh_per_token
      unit: Wh/token
      aggregation: mean

algedonic_alerts:
  carbon_budget_alerts:
    - name: carbon_budget_warning
      condition: carbon_cumulative > threshold_warning
      threshold_warning: 1.0
      escalate_to: Curator

    - name: carbon_budget_critical
      condition: carbon_cumulative > threshold_critical
      threshold_critical: 5.0
      escalate_to: hKask-Administrator

  efficiency_alerts:
    - name: efficiency_degradation
      condition: wh_per_token > baseline × 1.5
      baseline: 0.0008
      escalate_to: Curator

audit:
  required_disclosures:
    - methodology_version
    - grid_intensity_source
    - pue_assumption
    - model_tier_used
    - uncertainty_range

  retention:
    token_counts: 7_years
    energy_calculations: 7_years
    carbon_calculations: 7_years
    methodology_version: permanent

  verification_readiness:
    iso_14064_3_compliant: true
    audit_trail_enabled: true
    uncertainty_documented: true