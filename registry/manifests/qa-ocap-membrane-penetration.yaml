# QA OCAP Membrane Penetration Test — v0.31.0
#
# Verifies the OCAP (Object Capability) security membrane by running
# the hkask-capability test suite (8 tests) and classifying results.
#
# The capability system is the enforcement substrate for P4 (Clear Boundaries).
# If the OCAP membrane is compromised, unauthorized tool access becomes possible,
# violating the Magna Carta contract.
#
# Capability invariants (8 tests across 1 test file + 4 #[cfg(test)] modules):
#   - Capability token construction and verification
#   - Tool authorization gating (allowed/denied tools)
#   - Delegation token chain validation
#   - Capability membrane rejection of unauthorized calls
#
# Constraint force: PROHIBITION — OCAP is P4 enforcement substrate.
# A failing gate here is a security incident.
#
# Runner readiness: EXECUTABLE — run_command steps work today;
#   classify step gracefully degrades without DI_API_KEY.

manifest:
  id: qa-ocap-membrane-penetration
  category: qa-script
  name: QA OCAP Membrane Penetration
  version: 0.31.0
  visibility: Private
  description: >
    Verifies OCAP security membrane integrity through the hkask-capability
    test suite (8 tests). Ensures capability tokens gate tool access,
    delegation chains validate correctly, and unauthorized calls are
    rejected. PROHIBITION-level — OCAP is P4 enforcement substrate.

gas:
  cap: 15000
  hard_limit: true

steps:
  # Step 1: Run capability test suite
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-capability 2>&1 | tail -15"
    branching:
      success: 2
      failure: 4

  # Step 2: Classify test output
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Security audit: hkask-capability test suite (8 tests, PROHIBITION-level). Verify OCAP membrane: capability token construction and verification, tool authorization gating (allowed vs denied tools), delegation token chain validation, and unauthorized call rejection. The capability system is the P4 enforcement substrate — any failure is a security incident requiring immediate investigation."
    branching:
      high_confidence: 3
      medium_confidence: 3
      low_confidence: 5
      flake: 2
      unparseable: 5
      classifier_unavailable: 5

  # Step 3: PASS — OCAP membrane intact
  - ordinal: 3
    action: run_command
    command: "echo '[QA:ocap] PASS — OCAP membrane intact (8/8 capability tests). P4 boundaries enforced.'"
    terminal: true

  # Step 4: FAIL — OCAP membrane breached
  - ordinal: 4
    action: run_command
    command: "echo '[QA:ocap] FAIL — OCAP membrane test failed. P4 security boundary may be compromised. Immediate investigation required.'"
    terminal: true

  # Step 5: WARN — classifier uncertain
  - ordinal: 5
    action: run_command
    command: "echo '[QA:ocap] WARN — classifier uncertain on capability test output. Manual security review required (PROHIBITION-level).'"
    terminal: true

cns:
  emit_spans: true
  alert: qa.ocap.membrane
