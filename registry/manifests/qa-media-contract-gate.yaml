# QA Media Server Contract Gate — v0.31.0
#
# Verifies hkask-mcp-media tool invariants: builds, runs unit tests,
# and (when QaScriptRunner supports mcp_tool dispatch) verifies
# gallery_status + gallery_organize roundtrip.
#
# Test surface:
#   - 26 unit tests in hkask-mcp-media crate (run_command, works today)
#   - gallery_status + gallery_organize MCP dispatch (mcp_tool, needs runner)
#
# Open questions addressed:
#   36 tools — largest tool surface among MCP servers
#   FUT-004 — OCAP membrane coverage
#
# Runner readiness: PARTIAL — step 1 (cargo test) executable today;
#   steps 2-5 (mcp_tool + classify) require QaScriptRunner with MCP dispatch.

manifest:
  id: qa-media-contract-gate
  name: QA Media Server Contract Gate
  version: 0.31.0
  visibility: Public
  description: >
    Verifies hkask-mcp-media integrity: unit test pass rate (26 tests)
    and gallery roundtrip (gallery_status + gallery_organize via
    MCP dispatch, requires QaScriptRunner).

gas:
  cap: 25000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Run media server unit tests
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-mcp-media 2>&1 | tail -20"
    description: "Run hkask-mcp-media unit tests (26 tests)"
    retries: 0
    branching:
      success: 2
      failure: 5

  # Steps 2-4: Gallery roundtrip (requires QaScriptRunner with mcp_tool dispatch)
  # These steps call gallery_status → gallery_organize → gallery_status
  # to verify the media server gallery subsystem. Not executable until
  # the QA runner supports mcp_tool action dispatch.

  # Step 2: PASS — unit tests pass
  - ordinal: 2
    action: run_command
    command: "echo '[QA:media] PASS — unit tests pass (26/26). Gallery MCP roundtrip not verified (needs runner).'"
    description: "Media server unit tests pass; gallery MCP dispatch deferred"
    retries: 0
    terminal: true

  # Step 3: DEGRADED — unit tests pass but MCP dispatch not available
  - ordinal: 3
    action: run_command
    command: "echo '[QA:media] DEGRADED — unit tests pass but MCP gallery roundtrip could not be verified (runner lacks mcp_tool support).'"
    description: "Partial coverage: unit tests OK, MCP dispatch unavailable"
    retries: 0
    terminal: true

  # Step 4: MCP dispatch failure (placeholder for when runner supports it)
  - ordinal: 4
    action: run_command
    command: "echo '[QA:media] FAIL — MCP gallery dispatch failed. Media server may not be running or gallery subsystem is broken.'"
    description: "MCP dispatch failure — gallery liveness check failed"
    retries: 0
    terminal: true

  # Step 5: Unit test failure
  - ordinal: 5
    action: run_command
    command: "echo '[QA:media] FAIL — unit tests failed. Media server crate has regressions.'"
    description: "Media server unit test failure"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.media.contract
