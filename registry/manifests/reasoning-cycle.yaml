# File: registry/manifests/reasoning-cycle.yaml
# Reasoning Cycle Process Manifest
# ℏKask v0.21.0 — Planck's Constant of Agent Systems

manifest:
  id: reasoning-cycle
  name: Reasoning Cycle
  description: >
    Core reasoning cycle with cybernetic feedback.
    Applies reasoning skills, extracts atomic facts, and validates against constraints.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
energy:
  cap: 15000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render reasoning template with context, evidence, and constraints.
      Apply reasoning skill to derive new knowledge.
    renderer: minijinja
    template_ref: reasoning/reason_constrained
    model_tier: reasoning_local
    mcp: hkask-mcp-inference
    energy_cap: 8192
    timeout_seconds: 60
    output_schema:
      reasoning: string
      key_claims: array
      structured_facts: array

  - ordinal: 2
    action: populate
    description: >
      Render self-critique template to evaluate derived knowledge.
      Identify gaps, contradictions, and unsupported claims.
    renderer: minijinja
    template_ref: review/self_critique
    model_tier: reasoning_local
    mcp: hkask-mcp-inference
    energy_cap: 8192
    timeout_seconds: 60
    output_schema:
      critique: object

  - ordinal: 3
    action: feedback
    description: >
      Emit feedback to CNS for variety monitoring and calibration.
      Trigger algedonic alert on variety deficit >100.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-cns
    energy_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      confidence_delta: float
      trigger_algedonic: boolean
    output_schema:
      variety_counter: integer
      algedonic_triggered: boolean
      calibration_delta: float|null

# Error Handling
error_handling:
  on_energy_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort
  on_capability_denied: escalate

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: reasoning-cycle/step
    - resource: manifest
      action: execute
      template_id: reasoning-cycle
    - resource: cns
      action: emit
      template_id: reasoning-cycle
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_energy_cost: true
  include_cns_events: true
