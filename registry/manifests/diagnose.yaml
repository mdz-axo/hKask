# Diagnose Process Manifest
# ℏKask v0.30.0 — Diagnosis as convergent PDCA

manifest:
  id: diagnose
  name: Diagnose
  description: >
    Convergent diagnosis process. Builds repro loop, computes convergence,
    and iterates until root-cause/fix confidence reaches exit threshold.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 14000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: bug_description
    type: string
    required: true
  - name: crate_scope
    type: string
    required: false
  - name: symptom
    type: string
    required: false
  - name: code_context
    type: object
    required: false

steps:
  - ordinal: 1
    action: select
    description: Build deterministic repro loop for the target bug.
    renderer: minijinja
    template_ref: diagnose/diagnose-loop
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bug_description: "{{ bug_description }}"
      crate_scope: "{{ crate_scope | default('') }}"
      symptom: "{{ symptom | default('') }}"
      code_context: "{{ code_context | default({}) }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for diagnosis cycle.
    renderer: minijinja
    template_ref: diagnose/diagnose-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter diagnosis cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: diagnose/diagnose-loop
      gas_budget: 6000
    - resource: template
      action: render
      template_id: diagnose/diagnose-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: diagnose
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
