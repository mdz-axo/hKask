# Diagnose Process Manifest
# ℏKask v0.31.0 — Diagnosis as convergent PDCA

manifest:
  id: diagnose
  category: skill
  name: Diagnose
  description: >
    Convergent diagnosis process. Anchors the bug to functional requirements
    (MDS categories, FR# references), builds a deterministic feedback loop
    to reproduce the bug, generates ranked falsifiable hypotheses, instruments
    code with targeted probes, applies the fix with regression test, computes
    convergence, and iterates until root cause is confirmed and fix is validated.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: bug_description
    type: string
    required: true
  - name: crate_scope
    type: string
    required: false
  - name: symptom
    type: string
    required: false
  - name: code_context
    type: object
    required: false
  - name: spec_reference
    type: string
    required: false
  - name: fix_description
    type: string
    required: false
  - name: has_correct_seam
    type: boolean
    required: false

steps:
  - ordinal: 1
    action: select
    description: >
      Anchor the bug to functional requirements: classify by MDS category,
      map symptom to FR# references, flag spec gaps.
    renderer: minijinja
    template_ref: diagnose/diagnose-spec-anchor.j2
    gas_cap: 3072
    timeout_seconds: 45
    input_mapping:
      bug_description: "{{ bug_description }}"
      symptom: "{{ symptom | default('') }}"
      code_context: "{{ code_context | default({}) }}"
      spec_reference: "{{ spec_reference | default('') }}"

  - ordinal: 2
    action: select
    description: Build deterministic repro loop for the target bug.
    renderer: minijinja
    template_ref: diagnose/diagnose-loop.j2
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bug_description: "{{ bug_description }}"
      crate_scope: "{{ crate_scope | default('') }}"
      symptom: "{{ symptom | default('') }}"
      code_context: "{{ code_context | default({}) }}"

  - ordinal: 3
    action: select
    description: Generate 3-5 ranked falsifiable hypotheses for the root cause.
    renderer: minijinja
    template_ref: diagnose/diagnose-hypothesise.j2
    gas_cap: 4096
    timeout_seconds: 45
    input_mapping:
      bug_description: "{{ bug_description }}"
      symptom: "{{ symptom | default('') }}"
      repro_confidence: "{{ step_2_result.repro_confidence | default('low') }}"
      code_context: "{{ code_context | default({}) }}"

  - ordinal: 4
    action: select
    description: Instrument code with targeted probes mapped to the top-ranked hypothesis.
    renderer: minijinja
    template_ref: diagnose/diagnose-instrument.j2
    gas_cap: 4096
    timeout_seconds: 45
    input_mapping:
      bug_description: "{{ bug_description }}"
      hypotheses: "{{ step_3_result.hypotheses | default([]) }}"
      selected_hypothesis: "{{ step_3_result.hypotheses[0].hypothesis | default('') }}"
      crate_scope: "{{ crate_scope | default('') }}"

  - ordinal: 5
    action: select
    description: Apply fix with regression test, verify repro no longer reproduces, clean up instrumentation.
    renderer: minijinja
    template_ref: diagnose/diagnose-fix.j2
    gas_cap: 6144
    timeout_seconds: 60
    input_mapping:
      bug_description: "{{ bug_description }}"
      hypothesis: "{{ step_3_result.hypotheses[0].hypothesis | default('') }}"
      fix_description: "{{ fix_description | default('') }}"
      crate_scope: "{{ crate_scope | default('') }}"
      has_correct_seam: "{{ has_correct_seam | default(true) }}"

  - ordinal: 6
    action: select
    description: Compute normalized convergence metric for diagnosis cycle.
    renderer: minijinja
    template_ref: diagnose/diagnose-convergence-check.j2
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_5_result }}"

  - ordinal: 7
    action: loop
    description: Re-enter diagnosis cycle if convergence is not met; re-hypothesise on falsification.
    gas_cap: 1000
    timeout_seconds: 30
    input_mapping:
      loop_target: 3

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: diagnose/diagnose-spec-anchor
      gas_budget: 3072
    - resource: template
      action: render
      template_id: diagnose/diagnose-loop
      gas_budget: 6000
    - resource: template
      action: render
      template_id: diagnose/diagnose-hypothesise
      gas_budget: 4096
    - resource: template
      action: render
      template_id: diagnose/diagnose-instrument
      gas_budget: 4096
    - resource: template
      action: render
      template_id: diagnose/diagnose-fix
      gas_budget: 6144
    - resource: template
      action: render
      template_id: diagnose/diagnose-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: diagnose
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
