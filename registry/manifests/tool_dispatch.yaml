# File: registry/manifests/tool_dispatch.yaml
# Tool dispatch workflow for MCP tool invocation

manifest:
  id: process/dispatch
  name: Tool Dispatch
  description: Dispatches tool calls via ACP/MCP with capability resolution
  functional_role: flowdef
  version: 0.27.0
  editor: curator-or-human-admin
  visibility: Shared

steps:
  - ordinal: 1
    action: select
    description: Select target tool based on request
    template_ref: process/dispatch
    renderer: minijinja

  - ordinal: 2
    action: populate
    description: Bind tool arguments to dispatch template
    template_ref: "{{selected_template_id}}"
    renderer: minijinja

  - ordinal: 3
    action: execute
    description: Invoke tool via MCP runtime
    template_ref: ""
    mcp: from_template_contract
