# File: registry/manifests/tool_dispatch.yaml
# Tool dispatch workflow for MCP tool invocation

manifest:
  id: process/dispatch
  name: Tool Dispatch
  description: Dispatches tool calls via ACP/MCP with capability resolution
  functional_role: flowdef
  version: 0.28.0
  editor: curator-or-human-admin
  visibility: Public

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  - ordinal: 1
    action: select
    description: Select target tool based on request
    template_ref: process/dispatch
    renderer: minijinja

  - ordinal: 2
    action: populate
    description: Bind tool arguments to dispatch template
    template_ref: "{{selected_template_id}}"
    renderer: minijinja

  - ordinal: 3
    action: execute
    description: Invoke tool via MCP runtime
    template_ref: ""
    mcp: from_template_contract

cns:
  emit_spans: true
  span_namespace: cns.prompt.tool_dispatch
  variety_monitoring: true
  algedonic_threshold: 100
  spans:
    - cns.tool.invocation
    - cns.prompt.outcome
    - cns.prompt.tool_dispatch.resolved_template
  instrumentation:
    log_dynamic_template_id: true
    rationale: >
      Enabled because tool_dispatch.yaml step 2 uses {{selected_template_id}}
      for dynamic template resolution.
