# File: registry/manifests/memory_remember.yaml
# Memory encoding workflow — extracts hMems from agent operations using
# the algo / no-judge fusion path for epistemic integrity.
#
# P3.1 Social Generativity: memory extraction uses the algo judge (judge: "algo")
# which runs the fusion panel in parallel and merges the panelists' JSON outputs
# algorithmically — no LLM judge call. Both viewpoints are preserved: agreed
# items unified, divergent items annotated [A:... B:...].

manifest:
  id: process/memory/remember
  category: pipeline
  name: Memory Remember
  description: Extracts episodic and semantic hMems from agent operations using the algo / no-judge fusion path
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

gas:
  cap: 20000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

fusion:
  judge: algo
  panel:
    - KC/qwen/qwen3-235b-a22b-2507
    - DI/google/gemma-4-31B-it-turbo
  mode: synthesis
  skills: []
  max_rounds: 5

steps:
  - ordinal: 1
    action: select
    description: Classify operation and route to episodic or semantic extraction
    template_ref: process/memory/operation-selector
    renderer: minijinja
    fusion: true

  - ordinal: 2
    action: select
    description: Extract episodic hMems (first-person, agent perspective)
    template_ref: process/memory/remember-episodic
    renderer: minijinja
    fusion: true

  - ordinal: 3
    action: select
    description: Extract semantic hMems (third-person, perspective-free)
    template_ref: process/memory/remember-semantic
    renderer: minijinja
    fusion: true