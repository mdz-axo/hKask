# File: registry/manifests/memory_remember.yaml
# Memory encoding workflow — extracts hMems from agent operations using dual-model classification.
#
# P3.1 Social Generativity: memory extraction requires two peer models from
# different jurisdictions. Single-model extraction is not permitted.

manifest:
  id: process/memory/remember
  category: pipeline
  name: Memory Remember
  description: Extracts episodic and semantic hMems from agent operations with dual-model epistemic integrity
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

gas:
  cap: 20000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

steps:
  - ordinal: 1
    action: select
    description: Classify operation and route to episodic or semantic extraction
    template_ref: process/memory/operation-selector
    renderer: minijinja
    # This step uses dual-model rendering when configured.
    # Both peer models receive the same prompt; outputs are integrated.
    dual_model: true

  - ordinal: 2
    action: select
    description: Extract episodic hMems (first-person, agent perspective)
    template_ref: process/memory/remember-episodic
    renderer: minijinja
    dual_model: true

  - ordinal: 3
    action: select
    description: Extract semantic hMems (third-person, perspective-free)
    template_ref: process/memory/remember-semantic
    renderer: minijinja
    dual_model: true
