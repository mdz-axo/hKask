# Platform DX Analyzer
# ℏKask v0.31.0 — DORA & SPACE: Skill delivery performance measurement
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: compute_dora_metrics, compute_space_dimensions, detect_regressions, generate_recommendations, convergence_check

manifest:
  id: platform-dx-analyzer
  category: infrastructure
  name: Platform DX Analyzer
  description: >
    Convergent developer experience analysis. Computes DORA metrics
    (Deployment Frequency, Lead Time, Change Failure Rate, MTTR) and
    SPACE dimensions (Satisfaction, Performance, Activity, Communication,
    Efficiency) for skill authors from CNS span data. Classifies authors
    into DORA performance clusters, detects regressions, and generates
    human-readable recommendations.

    Operationalizes the Forsgren principle: what you don't measure,
    you can't improve. DORA and SPACE are the measurement instruments
    that prove the platform is delivering on its loyalty promise.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: window_days
    type: integer
    required: false
    default: 30
  - name: changed_since_days
    type: integer
    required: false
    default: 7
    description: Window for "recently changed" filter on change failure rate.

steps:
  - ordinal: 1
    action: select
    description: >
      Compute DORA metrics from CNS skill lifecycle spans.
      Queries cns.skill (created/updated) and cns.tool.skill_dispatch
      (success/failure) for the window. For each skill author:
      - Deployment Frequency: skills created/updated per day
      - Lead Time: time from skill creation to first successful dispatch
      - Change Failure Rate: % of recently-changed skills with dispatch errors
      - MTTR: time from first error to next successful dispatch per skill

      Classifies each author into DORA clusters: Elite, High, Medium, Low.
      Emits cns.platform.metric.dora.* spans.

    renderer: minijinja
    template_ref: platform-dx-analyzer/compute-dora
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      window_days: "{{ window_days | default(30) }}"
      changed_since_days: "{{ changed_since_days | default(7) }}"

  - ordinal: 2
    action: select
    description: >
      Compute SPACE dimensions for each skill author.
      - Satisfaction: platform NPS survey data (if available)
      - Performance: SLO compliance + skill adoption rate
      - Activity: skills created/updated, dispatches per session
      - Communication: skills shared, composition depth
      - Efficiency: edit-to-dispatch latency, edit-test cycles

      Emits cns.platform.metric.space.* spans.

    renderer: minijinja
    template_ref: platform-dx-analyzer/compute-space
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      window_days: "{{ window_days | default(30) }}"
      dora_results: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: >
      Detect regressions by comparing current DORA clusters and SPACE
      scores to the previous period. Flags:
      - DORA cluster downgrade (Elite → High, High → Medium, etc.)
      - SPACE score drop > 10% in any dimension
      - New authors with low initial scores (onboarding friction)

      Generates alerts for the Curator via CNS.

    renderer: minijinja
    template_ref: platform-dx-analyzer/detect-regressions
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      current_dora: "{{ step_1_result }}"
      current_space: "{{ step_2_result }}"

  - ordinal: 4
    action: select
    description: >
      Generate human-readable recommendations for each regression
      or low-scoring dimension. Frame as questions to skill authors,
      not commands. Respects P2 (Affirmative Consent).

      Example: "Your skill lead time is 3.2 days (Medium cluster).
      The most common bottleneck is template rendering errors on first
      dispatch. Would you like suggestions for faster iteration?"

    renderer: minijinja
    template_ref: platform-dx-analyzer/generate-recommendations
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      regressions: "{{ step_3_result }}"
      space_scores: "{{ step_2_result }}"

  - ordinal: 5
    action: select
    description: >
      Compute convergence metric. Checks all DORA and SPACE dimensions
      covered, regressions flagged, recommendations actionable.
      Outputs convergence_metric in [0,1].

    renderer: minijinja
    template_ref: platform-dx-analyzer/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      recommendations: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-dx-analyzer/compute-dora
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-dx-analyzer/compute-space
      gas_budget: 5000
    - resource: template
      action: render
      template_id: platform-dx-analyzer/detect-regressions
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-dx-analyzer/generate-recommendations
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-dx-analyzer/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-dx-analyzer
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
