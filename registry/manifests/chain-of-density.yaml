# Chain-of-Density Summarization Process Manifest
# ℏKask v0.21.0 — Iterative density-increase summarization (Gao et al. 2024)
# Template type: Process (FlowDef) — multi-step density optimization pipeline

manifest:
  id: chain-of-density
  name: Chain-of-Density Summarization
  description: >
    Process manifest for iterative density-increase summarization based on
    Gao et al. (2024). Produces increasingly dense summaries by identifying
    missing entities from prior summaries, merging them in, and removing
    redundant information. Converges when density improvement falls below
    threshold between passes.
  functional_role: knowact
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Public

# Energy Budget Configuration
gas:
  cap: 16000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: source_text
    type: string
    description: "The source text to summarize"
    required: true
  - name: target_length
    type: integer
    description: "Target summary length in words (default: ~80)"
    required: false
  - name: convergence_threshold
    type: number
    description: "Minimum density improvement to continue (default: 0.05)"
    required: false

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Generate initial summary from source text. Identify key entities and
      produce a baseline summary with moderate density. This is the starting
      point for iterative density optimization.
    renderer: minijinja
    template_ref: chain-of-density/initial-summary
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      source_text: "{{ source_text }}"
      target_length: "{{ target_length | default(80) }}"
    output_schema:
      type: object
      properties:
        summary:
          type: string
        entities:
          type: array
          items:
            type: object
            properties:
              entity: { type: string }
              included: { type: boolean }
        word_count:
          type: integer
        entity_density:
          type: number
        missing_entities:
          type: array
          items:
            type: string

  - ordinal: 2
    action: populate
    description: >
      First density pass. Take the initial summary, identify missing entities,
      and merge them into the summary while removing redundant language.
      Increase entity density while maintaining target length constraint.
    renderer: minijinja
    template_ref: chain-of-density/density-pass
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      source_text: "{{ source_text }}"
      prior_summary: "{{ ordinal_1.summary }}"
      missing_entities: "{{ ordinal_1.missing_entities }}"
      target_length: "{{ target_length | default(80) }}"
      pass_number: 1
    output_schema:
      type: object
      properties:
        summary:
          type: string
        entities:
          type: array
          items:
            type: object
            properties:
              entity: { type: string }
              included: { type: boolean }
        word_count:
          type: integer
        entity_density:
          type: number
        missing_entities:
          type: array
          items:
            type: string
        density_improvement:
          type: number

  - ordinal: 3
    action: populate
    description: >
      Second density pass. Take the density-improved summary from pass 1,
      identify any remaining missing entities, and merge them in. Remove
      further redundancy. Approaching convergence.
    renderer: minijinja
    template_ref: chain-of-density/density-pass
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      source_text: "{{ source_text }}"
      prior_summary: "{{ ordinal_2.summary }}"
      missing_entities: "{{ ordinal_2.missing_entities }}"
      target_length: "{{ target_length | default(80) }}"
      pass_number: 2
    output_schema:
      type: object
      properties:
        summary:
          type: string
        entities:
          type: array
          items:
            type: object
            properties:
              entity: { type: string }
              included: { type: boolean }
        word_count:
          type: integer
        entity_density:
          type: number
        missing_entities:
          type: array
          items:
            type: string }
        density_improvement:
          type: number
        converged:
          type: boolean

  - ordinal: 3b
    action: populate
    description: >
      Third density pass (conditional). Only runs if pass 2 has not
      converged (density_improvement still above threshold). Takes the
      pass-2 summary, identifies any remaining missing entities, and
      performs final density optimization. Gao et al. (2024) typically
      converges in 3-5 passes.
    renderer: minijinja
    template_ref: chain-of-density/density-pass
    gas_cap: 4000
    timeout_seconds: 60
    condition: "{{ ordinal_3.converged == false }}"
    input_mapping:
      source_text: "{{ source_text }}"
      prior_summary: "{{ ordinal_3.summary }}"
      missing_entities: "{{ ordinal_3.missing_entities }}"
      target_length: "{{ target_length | default(80) }}"
      pass_number: 3
    output_schema:
      type: object
      properties:
        summary:
          type: string
        entities:
          type: array
          items:
            type: object
            properties:
              entity: { type: string }
              included: { type: boolean }
        word_count:
          type: integer
        entity_density:
          type: number
        missing_entities:
          type: array
          items:
            type: string }
        density_improvement:
          type: number
        converged:
          type: boolean

  - ordinal: 4
    action: validate
    description: >
      Check convergence: validate that density improvement has plateaued
      (improvement below threshold) and that the final summary meets quality
      criteria (entity coverage, length constraint, no hallucination).
      Uses the best available summary (ordinal 3b if executed, otherwise ordinal 3).
    renderer: null
    template_ref: null
    mcp: hkask-mcp-memory  # was hkask-mcp-storage
    gas_cap: 1000
    timeout_seconds: 10
    validation_rules:
      - density_improvement_below_threshold
      - entity_coverage_above_minimum
      - length_within_bounds
      - no_hallucinated_entities
    output_schema:
      type: object
      properties:
        validated:
          type: boolean
        converged:
          type: boolean
        final_density:
          type: number
        entity_coverage:
          type: number
        quality_score:
          type: number
        convergence_curve:
          type: array
          items:
            type: object
            properties:
              pass: { type: integer }
              entity_density: { type: number }
              density_improvement: { type: number }
        error_reason:
          type: string

  - ordinal: 5
    action: feedback
    description: >
      Emit CNS feedback for variety monitoring and density tracking.
      Report density progression, entity coverage, and convergence status.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-memory  # CNS feedback now via memory server
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      density_progression: array
      entity_coverage: number
      convergence_achieved: boolean
    output_schema:
      type: object
      properties:
        variety_counter:
          type: integer
        cns_event_id:
          type: string

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 2
  on_validation_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: chain-of-density/initial-summary
      gas_budget: 4000
    - resource: template
      action: render
      template_id: chain-of-density/density-pass
      gas_budget: 4000
    - resource: manifest
      action: execute
      template_id: chain-of-density
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: chain-of-density
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt.chain-of-density
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator
  variety_counters:
    - entity_density
    - density_improvement_per_pass
    - convergence_rate

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
