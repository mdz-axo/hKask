# Chain-of-Density Process Manifest
# ℏKask v0.30.0 — Density summarization as convergent PDCA

manifest:
  id: chain-of-density
  name: Chain of Density
  description: >
    Convergent chain-of-density summarization process. Produces an initial
    summary, applies iterative density passes, computes convergence, and
    loops until density gains plateau.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 18000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: source_text
    type: string
    required: true
  - name: target_length
    type: integer
    required: false

steps:
  - ordinal: 1
    action: select
    description: Generate initial summary and baseline density profile.
    renderer: minijinja
    template_ref: chain-of-density/initial-summary
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      source_text: "{{ source_text }}"
      target_length: "{{ target_length | default(80) }}"

  - ordinal: 2
    action: select
    description: Run first density pass over baseline summary.
    renderer: minijinja
    template_ref: chain-of-density/density-pass
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      source_text: "{{ source_text }}"
      prior_summary: "{{ step_1_result.summary | default('') }}"
      missing_entities: "{{ step_1_result.missing_entities | default([]) }}"
      target_length: "{{ target_length | default(80) }}"
      pass_number: 1

  - ordinal: 3
    action: select
    description: Run second density pass and refine entity coverage.
    renderer: minijinja
    template_ref: chain-of-density/density-pass
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      source_text: "{{ source_text }}"
      prior_summary: "{{ step_2_result.summary | default(step_1_result.summary | default('')) }}"
      missing_entities: "{{ step_2_result.missing_entities | default([]) }}"
      target_length: "{{ target_length | default(80) }}"
      pass_number: 2

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for density cycle.
    renderer: minijinja
    template_ref: chain-of-density/cod-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      pass_result: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    description: Re-enter density pass cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: chain-of-density/initial-summary
      gas_budget: 5000
    - resource: template
      action: render
      template_id: chain-of-density/density-pass
      gas_budget: 5000
    - resource: template
      action: render
      template_id: chain-of-density/cod-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: chain-of-density
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
