# Skill Bundler Process Manifest
# ℏKask v0.32.0 — PKO RDF graph synthesis: decimate + fuse + recompose PDCA loops
# Template type: FlowDef — goal → compose → synthesize → validate → converge → evolve → loop
# Dual-axis ontological anchoring per P5.4 (PKO + DC+BIBO)

manifest:
  id: skill-bundler
  category: skill
  name: Skill Bundler
  description: >
    PKO RDF graph synthesis engine. Extracts a structured goal from user intent,
    composes skills into a candidate set, synthesizes them into a single optimized
    composite PKO Procedure through RDF graph decimation and recomposition,
    validates structural and ontological rules, computes convergence, evolves on
    goal delta, and iterates until the composite is optimally formed.
  functional_role: flowdef
  version: 0.32.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: skill_names
    type: array
    description: "Skills to compose"
    required: true
  - name: user_intent
    type: string
    description: "User intent — what the bundle should achieve. Feeds goal extraction."
    required: true
  - name: existing_bundles
    type: array
    description: "Existing bundle manifests for smart matching"
    required: false
  - name: skill_manifests
    type: array
    description: "Pre-loaded skill FlowDef manifests for RDF graph synthesis. Absent when manifests are unavailable (graceful degradation)."
    required: false
  - name: goal_verdict
    type: object
    description: "Previous goal verdict from bundle execution (for recomposition). Absent on initial composition."
    required: false

steps:
  - ordinal: 1
    action: select
    description: Extract structured goal from user intent with explicit completion criteria.
    renderer: minijinja
    template_ref: goal-analysis/create
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      user_intent: "{{ user_intent }}"

  - ordinal: 2
    action: select
    description: Compose a candidate skill set with PKO-anchored ordering from provided skills and goal context. On recomposition iterations, uses the evolved manifest as a base.
    renderer: minijinja
    template_ref: skill-bundler/bundler-compose
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      skill_names: "{{ skill_names }}"
      existing_bundles: "{{ existing_bundles | default([]) }}"
      goal: "{{ step_1_result }}"
      previous_manifest: "{{ step_7_result.evolved_manifest | default(none) }}"

  - ordinal: 3
    action: select
    description: Synthesize the composed skills into a single optimized composite PKO Procedure. Parse each skill's PDCA graph into RDF triples, detect isomorphic substructures, decimate redundant nodes, fuse shared patterns, and generate novel loop structures.
    renderer: minijinja
    template_ref: skill-bundler/bundler-synthesize
    gas_cap: 8192
    timeout_seconds: 90
    input_mapping:
      composed_skills: "{{ step_2_result.bundle_manifest.skills }}"
      goal: "{{ step_1_result }}"
      skill_manifests: "{{ skill_manifests | default([]) }}"

  - ordinal: 4
    action: select
    description: Validate the synthesized composite manifest against composition rules and ontological anchoring requirements.
    renderer: minijinja
    template_ref: skill-bundler/bundler-validate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bundle_manifest: "{{ step_3_result.candidates[0].composite_manifest }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric accounting for structural validity AND goal achievement.
    renderer: minijinja
    template_ref: skill-bundler/bundler-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      compose_result: "{{ step_3_result }}"
      validate_result: "{{ step_4_result }}"
      goal_verdict: "{{ goal_verdict | default({}) }}"

  - ordinal: 6
    action: select
    description: Evolve the composite via goal-delta-driven recomposition when convergence has not been met.
    renderer: minijinja
    template_ref: skill-bundler/bundler-evolve
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bundle_name: "{{ step_3_result.candidates[0].name | default('composite-skill') }}"
      current_manifest: "{{ step_3_result.candidates[0].composite_manifest }}"
      changed_skills: "{{ step_2_result.bundle_manifest.skills }}"
      goal_context: "{{ step_1_result }}"
      goal_delta: "{{ step_5_result.goal_delta | default(1.0) }}"
      convergence_failure_reason: "{{ step_5_result.rationale }}"

  - ordinal: 7
    action: loop
    description: Re-enter composition cycle if convergence threshold was not met after evolution.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: goal-analysis/create
      gas_budget: 5000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-compose
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-synthesize
      gas_budget: 8192
    - resource: template
      action: render
      template_id: skill-bundler/bundler-validate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-convergence-check
      gas_budget: 2000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-evolve
      gas_budget: 6000
    - resource: manifest
      action: execute
      template_id: skill-bundler
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-bundler
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
