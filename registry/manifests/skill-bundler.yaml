# Skill Bundler Process Manifest
# ℏKask v0.31.0 — Goal-anchored bundle composition as PKO-grounded PDCA
# Template type: FlowDef — goal extraction → compose → validate → converge → evolve → loop
# Dual-axis ontological anchoring per P5.4 (PKO + DC+BIBO)

manifest:
  id: skill-bundler
  name: Skill Bundler
  description: >
    Goal-anchored, PKO-grounded bundle-composition process. Extracts a structured
    goal from user intent, composes a bundle manifest from selected skills with
    ontological anchoring (PKO + DC + PROV-O), validates structural and semantic
    rules, computes convergence (structural + goal), evolves the bundle on goal
    delta, and iterates until the bundle is optimally formed to achieve its goal.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: skill_names
    type: array
    description: "Skills to compose"
    required: true
  - name: user_intent
    type: string
    description: "User intent — what the bundle should achieve. Feeds goal extraction."
    required: true
  - name: existing_bundles
    type: array
    description: "Existing bundle manifests for smart matching"
    required: false
  - name: goal_verdict
    type: object
    description: "Previous goal verdict from bundle execution (for recomposition). Absent on initial composition."
    required: false

steps:
  - ordinal: 1
    action: select
    description: Extract structured goal from user intent with explicit completion criteria.
    renderer: minijinja
    template_ref: goal-analysis/create
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      user_intent: "{{ user_intent }}"

  - ordinal: 2
    action: select
    description: Compose a PKO-anchored candidate bundle manifest from provided skills and goal context.
    renderer: minijinja
    template_ref: skill-bundler/bundler-compose
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      skill_names: "{{ skill_names }}"
      existing_bundles: "{{ existing_bundles | default([]) }}"
      goal: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: Validate candidate bundle against composition rules and ontological anchoring requirements.
    renderer: minijinja
    template_ref: skill-bundler/bundler-validate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bundle_manifest: "{{ step_2_result.bundle_manifest }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric accounting for structural validity AND goal achievement.
    renderer: minijinja
    template_ref: skill-bundler/bundler-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      compose_result: "{{ step_2_result }}"
      validate_result: "{{ step_3_result }}"
      goal_verdict: "{{ goal_verdict | default({}) }}"

  - ordinal: 5
    action: select
    description: Evolve the bundle via goal-delta-driven recomposition when convergence has not been met.
    renderer: minijinja
    template_ref: skill-bundler/bundler-evolve
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bundle_name: "{{ step_2_result.bundle_manifest.name | default('composed-bundle') }}"
      current_manifest: "{{ step_2_result.bundle_manifest }}"
      changed_skills: "{{ step_2_result.bundle_manifest.skills }}"
      goal_context: "{{ step_1_result }}"
      goal_delta: "{{ step_4_result.goal_delta | default(1.0) }}"
      convergence_failure_reason: "{{ step_4_result.rationale }}"

  - ordinal: 6
    action: loop
    description: Re-enter composition cycle if convergence threshold was not met after evolution.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: goal-analysis/create
      gas_budget: 5000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-compose
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-validate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-convergence-check
      gas_budget: 2000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-evolve
      gas_budget: 6000
    - resource: manifest
      action: execute
      template_id: skill-bundler
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-bundler
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
