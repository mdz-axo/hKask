# Skill Bundler Process Manifest
# ℏKask v0.30.0 — Bundle composition as convergent PDCA
# Template type: FlowDef — compose + validate + convergence loop

manifest:
  id: skill-bundler
  name: Skill Bundler
  description: >
    Convergent bundle-composition process. Composes a bundle manifest from
    selected skills, validates structural and anti-pattern rules, computes
    convergence, and iterates until blocking violations are eliminated.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: skill_names
    type: array
    description: "Skills to compose"
    required: true
  - name: existing_bundles
    type: array
    description: "Existing bundle manifests for smart matching"
    required: false

steps:
  - ordinal: 1
    action: select
    description: Compose a candidate bundle manifest from provided skills.
    renderer: minijinja
    template_ref: skill-bundler/bundler-compose
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      skill_names: "{{ skill_names }}"
      existing_bundles: "{{ existing_bundles | default([]) }}"

  - ordinal: 2
    action: select
    description: Validate candidate bundle against composition rules.
    renderer: minijinja
    template_ref: skill-bundler/bundler-validate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      bundle_manifest: "{{ step_1_result.bundle_manifest }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for bundling cycle.
    renderer: minijinja
    template_ref: skill-bundler/bundler-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      compose_result: "{{ step_1_result }}"
      validate_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter composition cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: skill-bundler/bundler-compose
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-validate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-bundler/bundler-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: skill-bundler
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-bundler
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
