# Semantic Graph Audit Process Manifest
# hKask v0.31.0 — Domain-agnostic dependency graph health as PDCA
# Template type: FlowDef — graph analysis + convergence loop

manifest:
  id: semantic-graph-audit
  category: skill
  name: Semantic Graph Audit
  description: >
    Domain-agnostic dependency graph analysis. Accepts any directed graph
    (code modules, crates, skills, ADRs, Regulation spans, decision trees, data flows),
    classifies edges by constraint force, detects structural issues (cycles,
    redundancies, gaps, orphans), and evaluates graph health through
    four analytical lenses: pragmatic-cybernetics, essentialist, pragmatic-semantics,
    and grill-me.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 0
  # CAUTION: convergence_field is a manual string-to-ordinal sync. If steps are
  # added/removed/reordered, update this field. The audit (validate_flowdef_refs)
  # catches references to non-output steps (loop/abort/escalate) — see SMELL 8.
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: nodes
    type: array
    description: "Graph nodes with domain metadata"
    required: true
  - name: edges
    type: array
    description: "Directed edges (source, target, label, semantics)"
    required: true
  - name: domain
    type: string
    description: "Domain context — what do the nodes represent?"
    required: true
  - name: workspace_context
    type: object
    description: "Workspace metadata and known references"
    required: false

steps:
  - ordinal: 1
    action: select
    description: Force-classify every edge using pragmatic-semantics constraint hierarchy.
    renderer: minijinja
    template_ref: semantic-graph-audit/semantic-graph-audit-classify
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      nodes: "{{ nodes }}"
      edges: "{{ edges }}"
      domain: "{{ domain }}"

  - ordinal: 2
    action: select
    description: "Analyze through four lenses: cybernetics, essentialist, grill-me, pragmatic-semantics."
    renderer: minijinja
    template_ref: semantic-graph-audit/semantic-graph-audit-analyze
    gas_cap: 8192
    timeout_seconds: 120
    input_mapping:
      nodes: "{{ nodes }}"
      edges: "{{ edges }}"
      classified_edges: "{{ step_1_result }}"
      domain: "{{ domain }}"

  - ordinal: 3
    action: select
    description: Detect structural issues (cycles, redundancies, gaps, orphans, fan-in/out anomalies).
    renderer: minijinja
    template_ref: semantic-graph-audit/semantic-graph-audit-detect
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      nodes: "{{ nodes }}"
      edges: "{{ edges }}"
      classified_edges: "{{ step_1_result }}"
      analysis: "{{ step_2_result }}"

  - ordinal: 4
    action: select
    description: Compute convergence metric and produce graph health report.
    renderer: minijinja
    template_ref: semantic-graph-audit/semantic-graph-audit-report
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      nodes: "{{ nodes }}"
      edges: "{{ edges }}"
      classified_edges: "{{ step_1_result }}"
      analysis: "{{ step_2_result }}"
      structural_issues: "{{ step_3_result }}"
      domain: "{{ domain }}"

  - ordinal: 5
    action: loop
    description: Re-enter analysis cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1
      # Carry convergence context into the next iteration.
      previous_blockers: "{{ step_4_result.blockers | default([]) }}"
      previous_metric: "{{ step_4_result.convergence_metric | default(1.0) }}"

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: semantic-graph-audit/semantic-graph-audit-classify
      gas_budget: 4096
    - resource: template
      action: render
      template_id: semantic-graph-audit/semantic-graph-audit-analyze
      gas_budget: 8192
    - resource: template
      action: render
      template_id: semantic-graph-audit/semantic-graph-audit-detect
      gas_budget: 4096
    - resource: template
      action: render
      template_id: semantic-graph-audit/semantic-graph-audit-report
      gas_budget: 4096
    - resource: manifest
      action: execute
      template_id: semantic-graph-audit
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

ledger:
  emit_spans: true
  span_namespace: reg.prompt.semantic-graph-audit
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
