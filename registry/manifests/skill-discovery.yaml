# Skill Discovery Process Manifest
# ℏKask v0.30.0 — Gap discovery and candidate evaluation as PDCA
# Template type: FlowDef — detect gap + evaluate + convergence loop

manifest:
  id: skill-discovery
  category: skill
  name: Skill Discovery
  description: >
    Convergent discovery process for capability gaps. Detects gaps in the
    existing skill corpus, evaluates candidate skills, computes convergence,
    and iterates until the gap is sufficiently resolved.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: task_patterns
    type: array
    description: "Task patterns requiring coverage"
    required: false
  - name: existing_skills
    type: array
    description: "Current registry skills"
    required: false
  - name: candidate_skill_content
    type: string
    description: "Candidate skill content to evaluate"
    required: false

steps:
  - ordinal: 1
    action: select
    description: Detect and prioritize capability gaps in the corpus.
    renderer: minijinja
    template_ref: skill-discovery/skill-discovery-detect-gap
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      task_patterns: "{{ task_patterns | default([]) }}"
      existing_skills: "{{ existing_skills | default([]) }}"

  - ordinal: 2
    action: select
    description: Evaluate a candidate skill against format/quality/safety gates.
    renderer: minijinja
    template_ref: skill-discovery/skill-discovery-evaluate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      candidate_skill_content: "{{ candidate_skill_content | default('') }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for discovery cycle.
    renderer: minijinja
    template_ref: skill-discovery/skill-discovery-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      gap_detection_result: "{{ step_1_result }}"
      candidate_evaluation_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter discovery cycle if convergence threshold is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: skill-discovery/skill-discovery-detect-gap
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-discovery/skill-discovery-evaluate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: skill-discovery/skill-discovery-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: skill-discovery
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

cns:
  emit_spans: true
  span_namespace: cns.prompt.skill-discovery
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
