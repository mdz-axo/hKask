# Starter Kata Process Manifest
# ℏKask v0.30.0 — Habit drills as convergent PDCA

manifest:
  id: kata-starter
  name: Kata Starter
  description: >
    Convergent starter-kata process. Selects an appropriate foundational drill,
    runs practice routines, computes convergence on habit signal quality, and
    iterates until starter automaticity reaches threshold.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 16000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: learner_profile
    type: object
    required: false
  - name: practice_goal
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Select starter drill based on learner profile.
    renderer: minijinja
    template_ref: kata-starter/starter-selector
    gas_cap: 2500
    timeout_seconds: 30
    input_mapping:
      learner_profile: "{{ learner_profile | default({}) }}"
      practice_goal: "{{ practice_goal | default('foundational scientific thinking') }}"

  - ordinal: 2
    action: select
    description: Run five-questions starter drill.
    renderer: minijinja
    template_ref: kata-starter/starter-five-questions
    gas_cap: 3000
    timeout_seconds: 45
    input_mapping:
      learner_profile: "{{ learner_profile | default({}) }}"
      selector_result: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: Run PDCA-cycle starter drill.
    renderer: minijinja
    template_ref: kata-starter/starter-pdca-cycle
    gas_cap: 3000
    timeout_seconds: 45
    input_mapping:
      learner_profile: "{{ learner_profile | default({}) }}"
      selector_result: "{{ step_1_result }}"

  - ordinal: 4
    action: select
    description: Run observation-drill starter exercise.
    renderer: minijinja
    template_ref: kata-starter/starter-observation-drill
    gas_cap: 3000
    timeout_seconds: 45
    input_mapping:
      learner_profile: "{{ learner_profile | default({}) }}"
      selector_result: "{{ step_1_result }}"

  - ordinal: 5
    action: select
    description: Compute normalized convergence metric for starter cycle.
    renderer: minijinja
    template_ref: kata-starter/kata-starter-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      selector_result: "{{ step_1_result }}"
      drill_results: "{{ [step_2_result, step_3_result, step_4_result] }}"

  - ordinal: 6
    action: loop
    description: Re-enter starter practice cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: kata-starter/starter-selector
      gas_budget: 2500
    - resource: template
      action: render
      template_id: kata-starter/starter-five-questions
      gas_budget: 3000
    - resource: template
      action: render
      template_id: kata-starter/starter-pdca-cycle
      gas_budget: 3000
    - resource: template
      action: render
      template_id: kata-starter/starter-observation-drill
      gas_budget: 3000
    - resource: template
      action: render
      template_id: kata-starter/kata-starter-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: kata-starter
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
