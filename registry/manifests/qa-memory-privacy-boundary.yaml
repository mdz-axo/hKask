# QA Memory Privacy Boundary — v0.31.0
#
# Verifies hkask-mcp-memory privacy invariants through the
# memory_contract.rs test suite. Ensures P1 (User Sovereignty) and
# P11 (Digital Public/Private Sphere) boundaries hold at the MCP level.
#
# Open questions addressed:
#   P1/P11 — privacy boundary verification
#   FUT-004 — OCAP membrane: does memory server gate through GovernedTool?
#
# Cybernetic feedback loop:
#   Sensor → cargo test output for memory_contract
#   Comparator → classify step evaluates privacy boundary violations
#   Actuator → terminal step reports PASS/FAIL
#
# Privacy invariants (from memory_contract.rs, 6 tests):
#   1. store_rejects_public_triple — public triple storage rejected
#   2. store_requires_perspective — perspective is mandatory
#   3. recall_nonexistent_returns_empty — graceful miss
#   4. store_and_recall_episodic_triple — roundtrip integrity
#   5. storage_usage_reports_count — usage tracking
#   6. recall_filters_by_perspective — cross-perspective isolation
#
# Runner readiness: PARTIAL — run_command steps executable today;
#   classify step requires QaScriptRunner.

manifest:
  id: qa-memory-privacy-boundary
  name: QA Memory Privacy Boundary
  version: 0.31.0
  visibility: Private
  description: >
    Verifies hkask-mcp-memory privacy invariants through the
    memory_contract.rs integration tests (6 tests): public triple
    rejection, perspective enforcement, recall filtering, roundtrip
    integrity, and usage reporting. Exercises the MCP memory tool
    surface through contract tests.

gas:
  cap: 20000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Run memory contract tests
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-mcp-memory --test memory_contract -- --nocapture 2>&1 | tail -20"
    description: "Run memory contract tests: privacy boundaries, perspective isolation, roundtrip integrity"
    retries: 0
    branching:
      success: 2
      failure: 4

  # Step 2: Classify the test output
  # Requires QaScriptRunner — receives step 1 stdout.
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Test suite: hkask-mcp-memory contract tests. Verify privacy invariants: store_rejects_public_triple (P1 User Sovereignty), store_requires_perspective (mandatory perspective), recall_nonexistent_returns_empty (graceful miss), store_and_recall_episodic_triple (roundtrip integrity), storage_usage_reports_count (usage tracking), recall_filters_by_perspective (cross-perspective isolation, P11 Public/Private Sphere). All 6 contract tests passing indicates memory privacy boundaries are intact."
    retries: 0
    branching:
      high_confidence: 3
      medium_confidence: 3
      low_confidence: 5
      flake: 2
      unparseable: 5

  # Step 3: PASS — privacy boundaries intact
  - ordinal: 3
    action: run_command
    command: "echo '[QA:memory] PASS — privacy boundaries, perspective isolation verified (6/6)'"
    description: "All memory contract tests pass: P1/P11 privacy boundaries enforced"
    retries: 0
    terminal: true

  # Step 4: Privacy boundary violation
  - ordinal: 4
    action: run_command
    command: "echo '[QA:memory] FAIL — memory contract tests failed. Privacy boundary may be breached: public triple acceptance, perspective bypass, or cross-perspective leak.'"
    description: "Memory contract test failure — P1/P11 privacy boundary may be compromised"
    retries: 0
    terminal: true

  # Step 5: Classification low confidence
  - ordinal: 5
    action: run_command
    command: "echo '[QA:memory] WARN — classifier low confidence on test output. Manual review required for privacy-critical server.'"
    description: "Classifier returned low confidence — memory is privacy-critical"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.memory.privacy
