# QA Memory Privacy Boundary — v0.30.0
#
# Verifies hkask-mcp-memory privacy invariants through the existing
# memory_contract.rs test suite. Ensures P1 (User Sovereignty) and
# P11 (Digital Public/Private Sphere) boundaries hold at the MCP level.
#
# Open questions addressed:
#   P1/P11 — privacy boundary verification
#   FUT-004 — OCAP membrane: does memory server gate through GovernedTool?
#   16 tools — largest tool surface among MCP servers
#
# Cybernetic feedback loop:
#   Sensor → cargo test output for memory_contract
#   Comparator → classify step evaluates privacy boundary violations
#   Actuator → terminal step reports PASS/FAIL
#
# Privacy invariants (from memory_contract.rs):
#   1. Cross-WebID episodic read must be rejected (P1)
#   2. Semantic memory publish requires explicit consent (P2)
#   3. Visibility scoping: private vs shared (P11)
#   4. Salience computation is deterministic
#   5. Memory encode → retrieve roundtrip preserves data
#
# Runner readiness: FULLY EXECUTABLE TODAY (all steps are run_command).

manifest:
  id: qa-memory-privacy-boundary
  name: QA Memory Privacy Boundary
  version: 0.30.0
  visibility: Private
  description: >
    Verifies hkask-mcp-memory privacy invariants: cross-WebID read rejection,
    consent-gated semantic publish, visibility scoping, salience determinism,
    and encode→retrieve roundtrip. Exercises the MCP memory tool surface
    through the existing memory_contract.rs integration tests.

gas:
  cap: 30000
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Run memory contract tests
  - ordinal: 1
    action: run_command
    command: "cargo test -p hkask-mcp-memory --test memory_contract -- --nocapture 2>&1 | tail -30"
    description: "Run memory contract tests: privacy boundaries, consent gating, visibility scoping, salience, roundtrip"
    retries: 0
    branching:
      success: 2
      failure: 5

  # Step 2: Classify the test output
  - ordinal: 2
    action: classify
    classifier: qa-triage
    description: "Test suite: hkask-mcp-memory contract tests. Verify privacy invariants: cross-WebID episodic read is rejected (P1 User Sovereignty), semantic memory publish requires explicit consent (P2 Affirmative Consent), visibility scoping correctly separates private from shared memory (P11 Public/Private Sphere), salience computation is deterministic and bounded, and encode→retrieve roundtrip preserves all triple fields. All contract tests passing indicates memory privacy boundaries are intact."
    retries: 0
    branching:
      high_confidence: 3
      medium_confidence: 3
      low_confidence: 7
      flake: 2
      unparseable: 7

  # Step 3: Run memory fuzz tests
  - ordinal: 3
    action: run_command
    command: "cargo test -p hkask-mcp-memory-fuzz -- --nocapture 2>&1 | tail -20"
    description: "Run memory fuzz tests for adversarial input resilience"
    retries: 0
    branching:
      success: 4
      failure: 6

  # Step 4: PASS — privacy boundaries intact
  - ordinal: 4
    action: run_command
    command: "echo '[QA:memory] PASS — privacy boundaries, consent gating, visibility scoping, and fuzz resilience verified'"
    description: "All memory tests pass: P1/P2/P11 privacy boundaries enforced, fuzz resilience confirmed"
    retries: 0
    terminal: true

  # Step 5: Privacy boundary violation
  - ordinal: 5
    action: run_command
    command: "echo '[QA:memory] FAIL — memory contract tests failed. Privacy boundary may be breached: cross-WebID read, consent bypass, or visibility leak.'"
    description: "Memory contract test failure — P1/P2/P11 privacy boundary may be compromised"
    retries: 0
    terminal: true

  # Step 6: Fuzz test failure
  - ordinal: 6
    action: run_command
    command: "echo '[QA:memory] WARN — fuzz tests failed. Memory server may not handle adversarial inputs correctly.'"
    description: "Fuzz test failure — adversarial input handling may be broken"
    retries: 0
    terminal: true

  # Step 7: Classification low confidence
  - ordinal: 7
    action: run_command
    command: "echo '[QA:memory] WARN — classifier low confidence on test output. Manual review recommended for privacy-critical server.'"
    description: "Classifier returned low confidence — memory is privacy-critical, manual review required"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.memory.privacy
