# Caveman Process Manifest
# ℏKask v0.30.0 — Compression mode as convergent PDCA

manifest:
  id: caveman
  name: Caveman
  description: >
    Convergent compression process. Compresses a draft response into caveman mode,
    computes convergence from compression quality and clarity exceptions, and
    iterates until concise output is stable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 10000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: draft_response
    type: string
    required: true
  - name: context_topic
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Compress draft response into caveman mode.
    renderer: minijinja
    template_ref: caveman/caveman-compress
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      draft_response: "{{ draft_response }}"
      context_topic: "{{ context_topic | default('general') }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for caveman cycle.
    renderer: minijinja
    template_ref: caveman/caveman-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter caveman cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: caveman/caveman-compress
      gas_budget: 3000
    - resource: template
      action: render
      template_id: caveman/caveman-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: caveman
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
