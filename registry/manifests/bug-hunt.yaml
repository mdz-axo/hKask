# Bug Hunt Process Manifest
# ℏKask v0.30.0 — Exploratory bug hunting as phased PDCA
# Decomposed from monolithic expedition into: Charter → Probe → Oracle → Taxonomize → Report

manifest:
  id: bug-hunt
  category: skill
  name: Bug Hunt
  description: >
    Convergent bug-hunting process. Runs a structured, phased expedition against
    a target crate: generates a Hendrickson charter, executes agent-coordinated
    probes with MCP tools, applies Weinberg oracle with pragmatic-semantics
    classification, taxonomizes into Beizer categories, and produces a structured
    JSON report. Computes convergence via saturation detection and iterates until
    critical quality threats are resolved or escalation is required.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  # Rationale: 0.25 is the highest threshold of all hKask skills — intentional.
  # Bug hunting is exploratory, not exhaustive. A 0.25 threshold means
  # findings are directionally stable and critical quality threats are
  # identified, but not every bug class has been exhaustively searched.
  # For exhaustive elimination, chain with `diagnose` on specific findings.
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target
    type: object
    required: true
  - name: quality_criteria
    type: string
    required: true
  - name: probe_depth
    type: string
    required: false
    default: "static"
    description: >
      Probe tool depth. `static` (default — code+clippy+test only),
      `dynamic` (add BugStalker runtime probes for timing/integration/structural
      categories), or `full` (static + dynamic). Dynamic probes require Linux
      x86-64 and debug builds.
  - name: probe_findings
    type: string
    required: false
    description: >
      Raw probe findings from agent-coordinated MCP tool execution.
      Populated by the agent between step 2 (probe) and step 3 (oracle).
      Optional — if not provided, the probe template will output guidance.

steps:
  - ordinal: 1
    action: select
    description: >
      Generate a focused Hendrickson-format bug-hunt charter using Bach's HTSM.
      Selects Beizer categories to target based on the target crate and
      user-defined quality criteria.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-charter
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      target: "{{ target }}"
      quality_criteria: "{{ quality_criteria }}"

  - ordinal: 2
    action: select
    description: >
      PROBE: Agent-coordinated MCP tool execution. Reads target source files,
      searches for bug patterns, runs cargo check/test/clippy. The charter
      from step 1 provides probe_instructions. Collect structured findings
      as text to feed the oracle phase.

      Design note: This phase requires the agent to execute MCP tools between
      template calls. In pure FlowDef execution (kask run), the probe_findings
      input should be pre-populated before invoking the flow. In Zed sessions,
      the agent orchestrates the probe manually between charter and oracle.
      If probe_findings is not provided, the template outputs probe guidance
      instructions and the flow should be re-invoked with populated findings.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-probe
    gas_cap: 2048
    timeout_seconds: 300
    input_mapping:
      charter: "{{ step_1_result }}"
      target: "{{ target }}"
      quality_criteria: "{{ quality_criteria }}"
      probe_depth: "{{ probe_depth | default('static') }}"
      probe_findings: "{{ probe_findings | default('') }}"

  - ordinal: 3
    action: select
    description: >
      Apply Weinberg oracle, pragmatic-semantics IS/OUGHT classification,
      epistemic mode labeling, provenance tracing, and grill-me self-challenge
      to the raw probe findings. Produces tiered verdicts with confidence scores.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-oracle
    gas_cap: 6144
    timeout_seconds: 90
    input_mapping:
      charter: "{{ step_1_result }}"
      probe_findings: "{{ step_2_result.probe_findings | default(probe_findings | default('')) }}"
      quality_criteria: "{{ quality_criteria }}"

  - ordinal: 4
    action: select
    description: >
      Classify evaluated findings into Beizer taxonomy (8 categories) and
      assign severity ratings (CRITICAL/HIGH/MEDIUM/LOW). Produces pattern
      signatures for detecting similar bugs elsewhere.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-taxonomize
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      evaluated_findings: "{{ step_3_result.evaluated_findings | default([]) }}"
      charter: "{{ step_1_result }}"

  - ordinal: 5
    action: select
    description: >
      Compile charter, oracle, and taxonomy results into a structured JSON
      bug report with summary statistics.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-report
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      charter: "{{ step_1_result }}"
      evaluated_findings: "{{ step_3_result.evaluated_findings | default([]) }}"
      classified_findings: "{{ step_4_result.classified_findings | default([]) }}"
      target: "{{ target }}"
      quality_criteria: "{{ quality_criteria }}"
      probes_executed: "{{ step_2_result.probes_executed | default(0) }}"
      files_read: "{{ step_2_result.files_read | default(0) }}"
      tests_run: "{{ step_2_result.tests_run | default(0) }}"
      crates_examined: "{{ step_2_result.crates_examined | default([]) }}"

  - ordinal: 6
    action: select
    description: >
      Compute normalized convergence metric via saturation detection.
      Severity-weighted unresolved findings + stability overlap check +
      Beizer taxonomy coverage.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_5_result.report | default(step_5_result) }}"

  - ordinal: 7
    action: loop
    description: Re-enter bug-hunt cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-charter
      gas_budget: 4096
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-probe
      gas_budget: 2048
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-oracle
      gas_budget: 6144
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-taxonomize
      gas_budget: 4096
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-report
      gas_budget: 4096
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: bug-hunt
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
