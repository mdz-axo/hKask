# Bug Hunt Process Manifest
# ℏKask v0.30.0 — Exploratory bug hunting as convergent PDCA

manifest:
  id: bug-hunt
  name: Bug Hunt
  description: >
    Convergent bug-hunting process. Runs a structured expedition against a
    target crate, classifies findings, computes convergence, and iterates until
    critical quality threats are resolved or escalation is required.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 18000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target
    type: object
    required: true
  - name: quality_criteria
    type: string
    required: true

steps:
  - ordinal: 1
    action: select
    description: Run a bug-hunt expedition and produce structured findings.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-expedition
    gas_cap: 7000
    timeout_seconds: 90
    input_mapping:
      target: "{{ target }}"
      quality_criteria: "{{ quality_criteria }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for bug-hunt cycle.
    renderer: minijinja
    template_ref: bug-hunt/bug-hunt-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter bug-hunt cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-expedition
      gas_budget: 7000
    - resource: template
      action: render
      template_id: bug-hunt/bug-hunt-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: bug-hunt
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
