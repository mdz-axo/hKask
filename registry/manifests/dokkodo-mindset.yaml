# Dokkodo Mindset Process Manifest
# ℏKask v0.30.0 — Perceptual filtering as convergent PDCA

manifest:
  id: dokkodo-mindset
  name: Dokkodo Mindset
  description: >
    Convergent perceptual filtering process based on Musashi's 21 Dokkodo precepts.
    Applies perceptual de-attachment, computes convergence, and iterates until
    the perceptual field is stable enough for downstream reasoning.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: situation
    type: string
    required: true
  - name: domain
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Apply Dokkodo perceptual filtering to the current situation.
    renderer: minijinja
    template_ref: dokkodo-mindset/dokkodo-perceive
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      situation: "{{ situation }}"
      domain: "{{ domain | default('general') }}"
      previous_perception: null
      iteration: 1
      max_iterations: "{{ convergence.max_iterations | default(3) }}"

  - ordinal: 2
    action: select
    description: Compute convergence metric for perceptual stability.
    renderer: minijinja
    template_ref: dokkodo-mindset/dokkodo-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: loop
    description: Re-enter perceptual filter if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: dokkodo-mindset/dokkodo-perceive
      gas_budget: 6000
    - resource: template
      action: render
      template_id: dokkodo-mindset/dokkodo-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: dokkodo-mindset
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
