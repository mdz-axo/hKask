# replica-discovery — Academic author corpus discovery skill
#
# Composes the replica-discovery FlowDef manifest as a reusable skill.
# Orchestration: disambiguate → enumerate works → extract content →
# generate corpus.yaml → Curator confirmation → CNS feedback.
#
# Supports agentic (fully automated) and curated (human-in-the-loop) modes.

manifest:
  id: skill/replica-discovery
  name: replica-discovery
  description: "Discover an academic author's body of work across Semantic Scholar, arXiv, web search, and YouTube transcripts. Generates a corpus.yaml ready for replica_build."
  template_type: FlowDef
  lexicon_terms:
    [
      discover,
      corpus,
      academic,
      author,
      disambiguate,
      enumerate,
      extract,
      transcript,
    ]

steps:
  - ordinal: 1
    action: execute
    description: "Invoke the replica-discovery pipeline manifest"
    renderer: null
    template_ref: null
    mcp: hkask-mcp-memory
    gas_cap: 50000
    timeout_seconds: 600
    output_schema:
      corpus_yaml: string
      works_discovered: integer
      sources_used: array

# Consumed by — replica server's replica_discover tool
consumers:
  - hkask-mcp-replica

# References
references:
  - manifests/replica-discovery.yaml
  - templates/replica/discovery-corpus.j2
