# SPDX-License-Identifier: MIT OR Apache-2.0
# pragmatic-laziness — Procedural composition skill for least-action path finding
#
# Orchestrates pragmatic-semantics, pragmatic-cybernetics, essentialist, and grill-me
# through a 3-phase lazy loop: Decompose → Identify Loops → Find Stationary Action.
# Convergence: δS = 0 (no further action reduction on repeat pass). Max 3 iterations.

manifest:
  id: skill/pragmatic-laziness
  name: pragmatic-laziness
  description: "Procedural composition skill. Finds the path of least action through meaning-space by orchestrating decomposition (pragmatic-semantics), feedback-loop identification (pragmatic-cybernetics), eliminative reduction (essentialist), and stress-test verification (grill-me). Constraint-forces runs regulative across all phases."
  template_type: FlowDef
  lexicon_terms:
    [
      decompose,
      identify,
      eliminate,
      verify,
      converge,
      iterate,
      delegate,
      compose,
    ]

steps:
  - ordinal: 1
    action: populate
    description: "Load pragmatic laziness knowledge and composition contract into context"
    renderer: minijinja
    template_ref: skills/pragmatic-laziness/knowledge
    mcp: hkask-mcp-memory
    output_schema:
      knowledge_block: string
    risk_level: none

# Composition contract — declares how this skill composes with others
composition:
  polarity: procedural
  phase: core
  delegates_to:
    - skill: pragmatic-semantics
      phase: pre-core
      polarity: generative
      purpose: "Decompose situation into syntax/semantics/pragmatics (Morris's triad)"
    - skill: pragmatic-cybernetics
      phase: pre-core
      polarity: generative
      purpose: "Identify feedback loops (OODA, cybernetic, REPL) and effort hotspots"
    - skill: essentialist
      phase: core
      polarity: evaluative
      purpose: "Apply deletion test, surface count, abstraction trace — find stationary action"
    - skill: grill-me
      phase: post-core
      polarity: evaluative
      purpose: "Stress-test solution: does it survive perturbation? (δS = 0 check)"
  regulative_across_phases:
    - skill: constraint-forces
      purpose: "Prohibitions and Guardrails never relaxed in pursuit of least action"
  convergence:
    criterion: "δS = 0 — no further action reduction on repeat pass"
    max_iterations: 3
    escalate_on_exhaustion: true

# Trigger symptoms — when the runtime should consider activating this skill
symptoms:
  - design_heaviness
  - approach_conflict
  - essentialist_stuck
  - over_engineering_suspected
  - complexity_without_commensurate_value
  - abstraction_proliferation
  - feedback_loop_obscurity
  - syntax_semantics_confusion

safety:
  max_auto_risk: low

references:
  - skills/pragmatic-laziness/SKILL.md
  - docs/architecture/PRINCIPLES.md
  - https://en.wikipedia.org/wiki/Principle_of_least_action
  - https://en.wikipedia.org/wiki/Pragmatics
