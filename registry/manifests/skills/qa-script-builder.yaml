# QA Script Builder Process Manifest
# ℏKask v0.31.0 — Autonomous QA pipeline manifest design
# Registry authoritative; SKILL.md in .agents/skills/qa-script-builder/ is companion.

manifest:
  id: qa-script-builder
  category: skill
  name: QA Script Builder
  description: >
    Design autonomous QA pipeline manifests. Generates scenario branching,
    command execution paths, and validation gates from user intent + persona.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: persona
    type: object
    required: true
  - name: goal

steps:
  - ordinal: 1
    action: select
    description: >
      Generate diverse testing scenarios from persona + goal using Bloom's taxonomy.
    renderer: minijinja
    template_ref: qa-script-builder/qa-persona
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 2
    action: select
    description: >
      Discover the QA system's capabilities and map testing intent to run_command,
      mcp_tool, classify, and loop actions.
    renderer: minijinja
    template_ref: qa-script-builder/qa-discover
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 3
    action: select
    description: >
      Design the branching state machine from the testing scenarios and capabilities.
    renderer: minijinja
    template_ref: qa-script-builder/qa-design
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 4
    action: select
    description: >
      Generate the YAML manifest for kask qa run from the designed state machine.
    renderer: minijinja
    template_ref: qa-script-builder/qa-generate
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 5
    action: check
    description: >
      Validate the generated manifest against the schema and verify coverage.
    renderer: minijinja
    template_ref: qa-script-builder/qa-validate
    gas_cap: 1024
    timeout_seconds: 30

