# web-search — Web search capability knowledge base
#
# Migrated from legacy skill manifest (origin: russell/skills/web-search/manifest.yaml)
# Migration timestamp: 2026-05-20

manifest:
  id: skill/web-search
  name: web-search-knowledge
  description: "Web search, fetch, and browse capabilities for knowledge retrieval"
  template_type: FlowDef
  lexicon_terms: [search, fetch, browse, discover]

steps:
  - ordinal: 1
    action: populate
    description: "Load web search knowledge into context"
    renderer: minijinja
    template_ref: skills/web-search/knowledge
    mcp: hkask-mcp-memory
    output_schema:
      knowledge_block: string
    risk_level: none

  - ordinal: 2
    action: execute
    description: "Append to replicant system prompt"
    renderer: minijinja
    template_ref: skills/web-search/prompt_append
    mcp: hkask-mcp-memory
    output_schema:
      assembled_prompt: string
    risk_level: none

# Migration provenance
migration_origin:
  id: web-search
  version: 1.0.0
  authored: 2026-05-13
  min_harness_version: 0.1.0
  symptoms:
    - search_capability_needed
    - web_knowledge_gap
    - skill_source_unknown
    - external_reference_needed
    - documentation_outdated
    - upstream_version_check_needed
    - api_status_check_needed
    - package_metadata_stale
    - security_advisory_relevant
  safety:
    max_auto_risk: none
  references:
    - https://api.search.brave.com/app/documentation/web-search/overview
    - https://docs.firecrawl.dev/
    - https://browserbase.com/
    - https://github.com/marketplace/kask
    - https://kask.ai/docs/arsenal
