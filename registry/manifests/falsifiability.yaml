# Falsifiability Process Manifest
# ℏKask v0.31.0 — Eliminative inference as convergent PDCA
# Popper (admissibility) → Chamberlin (multiple hypotheses) → Pearl/Halpern
# (counterfactuals) → Platt (discriminating tests) → eliminate → converge.

manifest:
  id: falsifiability
  category: skill
  name: Falsifiability
  description: >
    Domain-agnostic eliminative inference process. Admits the target through
    a Popper falsifiability gate, generates multiple working hypotheses
    (Chamberlin), constructs minimal counterfactuals (Pearl do-operator),
    designs discriminating tests (Platt), eliminates the hypotheses whose
    falsifiable predictions fail, and converges when one corroborated survivor
    remains with all alternatives eliminated — or when the irreducible
    remainder is honestly reported. A delegation target for diagnose,
    hypothesis-framer, superforecasting, and sequential-inquiry.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target
    type: string
    required: true
  - name: domain
    type: string
    required: false
  - name: context
    type: object
    required: false
  - name: observations
    type: array
    required: false
  - name: prior_metric
    type: number
    required: false

fusion:
  judge: deepseek-v4-pro
  panel:
    - Kimi2.7
    - Qwen3.7 Max
    - GLM5.2
  mode: critique
  skills:
    - pragmatic-semantics
  max_rounds: 3

steps:
  - ordinal: 1
    action: select
    description: >
      Popper admissibility gate. Test whether the target claim or question is
      testable at all — state the concrete observation that would contradict
      it. Rule out tautologies, pure OUGHTs, and unfalsifiable-by-construction
      claims; propose a refined testable reformulation if salvageable.
    renderer: minijinja
    template_ref: falsifiability/falsifiability-admit
    gas_cap: 3072
    timeout_seconds: 45
    input_mapping:
      target: "{{ target }}"
      domain: "{{ domain | default('') }}"
      context: "{{ context | default({}) }}"

  - ordinal: 2
    action: select
    description: >
      Chamberlin multiple working hypotheses. Generate 3–7 ranked candidate
      explanations with forced diversity, each carrying a Platt-form prediction
      and a falsifier; discard vibes at generation. Uses the admitted target
      (refined reformulation if the admit gate produced one, else the original).
    renderer: minijinja
    template_ref: falsifiability/falsifiability-hypothesize
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      admitted_target: "{{ step_1_result.refined_target | default(target, true) }}"
      domain: "{{ domain | default('') }}"
      context: "{{ context | default({}) }}"

  - ordinal: 3
    action: select
    description: >
      Pearl/Halpern counterfactual generation. For each surviving hypothesis
      construct the minimal do(not X) counterfactual, hold confounders fixed,
      derive the testable consequence, flag irreducible causes.
    renderer: minijinja
    template_ref: falsifiability/falsifiability-counterfactual
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      hypotheses: "{{ step_2_result.hypotheses | default([]) }}"
      admitted_target: "{{ step_1_result.refined_target | default(target, true) }}"
      domain: "{{ domain | default('') }}"

  - ordinal: 4
    action: select
    description: >
      Platt discriminating-test design. Design tests that rule out at least one
      hypothesis; build the coverage matrix; flag irreducible pairs. Each
      surviving hypothesis must be falsifiable by at least one designed test.
    renderer: minijinja
    template_ref: falsifiability/falsifiability-discriminate
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      hypotheses: "{{ step_2_result.hypotheses | default([]) }}"
      counterfactuals: "{{ step_3_result.counterfactuals | default([]) }}"
      domain: "{{ domain | default('') }}"

  - ordinal: 5
    action: select
    description: >
      Apply evidence and eliminate. Hypotheses whose falsifiable predictions
      are contradicted by observations are ruled out (hard, not probabilistic).
      Survivors are corroborated, never confirmed. If no observations are
      supplied, returns the discriminating-test design with verdict
      tests_pending.
    renderer: minijinja
    template_ref: falsifiability/falsifiability-eliminate
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      hypotheses: "{{ step_2_result.hypotheses | default([]) }}"
      discriminating_tests: "{{ step_4_result.discriminating_tests | default([]) }}"
      observations: "{{ observations | default([]) }}"

  - ordinal: 6
    action: select
    description: >
      Compute normalized convergence metric. 0 = one corroborated survivor
      with all alternatives eliminated; 1 = nothing ruled out. Materiality
      guard forces convergence when elimination plateaus.
    renderer: minijinja
    template_ref: falsifiability/falsifiability-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      eliminate_result: "{{ step_5_result }}"
      prior_metric: "{{ prior_metric | default(null) }}"
    fusion: false

  - ordinal: 7
    action: loop
    description: >
      Re-enter the elimination cycle if convergence is not met. On re-entry,
      carry the prior iteration's eliminated set so elimination is cumulative
      and the materiality guard can detect a plateau.
    gas_cap: 1000
    timeout_seconds: 30
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-admit
      gas_budget: 3072
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-hypothesize
      gas_budget: 4096
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-counterfactual
      gas_budget: 4096
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-discriminate
      gas_budget: 4096
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-eliminate
      gas_budget: 4096
    - resource: template
      action: render
      template_id: falsifiability/falsifiability-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: falsifiability
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true