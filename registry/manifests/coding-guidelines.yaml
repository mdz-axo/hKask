# Coding Guidelines Process Manifest
# ℏKask v0.23.0 — Behavioral guardrails for LLM coding (Karpathy principles)
# Template type: Process (FlowDef) — enforce think-first, simplicity, surgical changes, goal-driven execution

manifest:
  id: coding-guidelines
  name: Coding Guidelines
  description: >
    Enforce Andrej Karpathy's four coding behavioral principles as a pipeline:
    (1) Think Before Coding — surface assumptions and tradeoffs explicitly,
    (2) Simplicity First — minimum code that solves the problem, no speculation,
    (3) Surgical Changes — touch only what you must, match existing style,
    (4) Goal-Driven Execution — define success criteria, loop until verified.
    An Encoded Preference skill: the agent already knows how to code;
    this constrains HOW it codes.
  functional_role: knowact
  version: 0.23.0
  editor: curator-or-human-admin
  visibility: Public

gas:
  cap: 18000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: task_description
    type: string
    description: "The coding task to assess and constrain"
    required: true
  - name: code_context
    type: object
    description: "Relevant code snippets, file paths, and existing implementation"
    required: false
  - name: diff_preview
    type: string
    description: "Proposed diff or implementation to verify against guidelines"
    required: false

# The four Karpathy principles as enforceable checks
principles:
  - id: think-before-coding
    name: "Think Before Coding"
    description: >
      Don't assume. Don't hide confusion. Surface tradeoffs. Before implementing:
      state assumptions explicitly; if multiple interpretations exist, present them;
      if a simpler approach exists, say so; if something is unclear, stop and ask.
    cns_span: "cns.prompt.coding-guidelines.think-before-coding"
    severity: critical

  - id: simplicity-first
    name: "Simplicity First"
    description: >
      Minimum code that solves the problem. Nothing speculative. No features beyond
      what was asked. No abstractions for single-use code. No error handling for
      impossible scenarios. If 200 lines could be 50, rewrite it.
    cns_span: "cns.prompt.coding-guidelines.simplicity-first"
    severity: critical

  - id: surgical-changes
    name: "Surgical Changes"
    description: >
      Touch only what you must. Don't improve adjacent code, comments, or formatting.
      Don't refactor things that aren't broken. Match existing style, even if you'd
      do it differently. If you notice unrelated dead code, mention it — don't delete
      it. Every changed line must trace directly to the user's request.
    cns_span: "cns.prompt.coding-guidelines.surgical-changes"
    severity: high

  - id: goal-driven-execution
    name: "Goal-Driven Execution"
    description: >
      Define success criteria and loop until verified. Transform tasks into
      verifiable goals: "Add validation" → "Write tests for invalid inputs, then
      make them pass." For multi-step tasks, state a brief plan with verification
      checkpoints. Strong criteria enable independent looping.
    cns_span: "cns.prompt.coding-guidelines.goal-driven-execution"
    severity: high

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Assess the coding task against all four principles. Surface hidden
      assumptions, identify simplicity risks, flag potential scope creep,
      and define success criteria before any implementation begins.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-assess
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      task_description: "{{ task_description }}"
      code_context: "{{ code_context | default({}) }}"
    output_schema:
      type: object
      properties:
        assumptions:
          type: array
          items:
            type: object
            properties:
              assumption: { type: string }
              confidence: { type: string }
              alternative: { type: string }
        simplicity_risks:
          type: array
          items:
            type: object
            properties:
              risk: { type: string }
              severity: { type: string }
              simplification: { type: string }
        scope_creep_warnings:
          type: array
          items:
            type: string
        success_criteria:
          type: array
          items:
            type: object
            properties:
              goal: { type: string }
              verification: { type: string }
        plan:
          type: array
          items:
            type: object
            properties:
              step: { type: string }
              verify: { type: string }

  - ordinal: 2
    action: populate
    description: >
      Generate implementation directives constrained by the assessment.
      Apply the four principles to produce a focused implementation plan
      with explicit guardrails against over-engineering and scope creep.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-apply
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      task_description: "{{ task_description }}"
      assumptions: "{{ ordinal_1.assumptions }}"
      simplicity_risks: "{{ ordinal_1.simplicity_risks }}"
      scope_creep_warnings: "{{ ordinal_1.scope_creep_warnings }}"
      success_criteria: "{{ ordinal_1.success_criteria }}"
      plan: "{{ ordinal_1.plan }}"
    output_schema:
      type: object
      properties:
        constrained_plan:
          type: array
          items:
            type: object
            properties:
              step: { type: string }
              files_to_touch: { type: array }
              files_not_to_touch: { type: array }
              lines_estimate: { type: integer }
              verify: { type: string }
        guardrails:
          type: object
          properties:
            max_scope: { type: string }
            forbidden_patterns: { type: array }
            style_matching: { type: string }
        assumption_log:
          type: array
          items: { type: string }

  - ordinal: 3
    action: populate
    description: >
      Verify the implementation (or proposed diff) against all four principles.
      Check for assumption violations, over-engineering, scope creep beyond
      the task, and whether success criteria are met. Produce a violations
      report and corrective recommendations.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-verify
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      task_description: "{{ task_description }}"
      assumptions: "{{ ordinal_1.assumptions }}"
      success_criteria: "{{ ordinal_1.success_criteria }}"
      constrained_plan: "{{ ordinal_2.constrained_plan }}"
      diff_preview: "{{ diff_preview | default('') }}"
    output_schema:
      type: object
      properties:
        violations:
          type: array
          items:
            type: object
            properties:
              principle: { type: string }
              severity: { type: string }
              description: { type: string }
              location: { type: string }
              correction: { type: string }
        compliance_score:
          type: object
          properties:
            think_before_coding: { type: float }
            simplicity_first: { type: float }
            surgical_changes: { type: float }
            goal_driven_execution: { type: float }
            overall: { type: float }
        passed:
          type: boolean
        recommendations:
          type: array
          items: { type: string }

  - ordinal: 4
    action: feedback
    description: >
      Emit CNS feedback for guideline compliance monitoring. Track principle
      adherence rates, common violation patterns, and scope creep frequency.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-memory  # CNS feedback now via memory server
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      principle_compliance: object
      violations_count: integer
    output_schema:
      type: object
      properties:
        variety_counter: { type: integer }
        cns_event_id: { type: string }

# Violation severity classification
violation_severity:
  critical: "Must fix before proceeding — will produce incorrect or misleading output"
  high: "Should fix — violates core principle, risks over-engineering or scope creep"
  medium: "Worth fixing — deviates from guidelines but not blocking"
  low: "Nit — style preference, not a principle violation"

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-assess
      gas_budget: 5000
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-apply
      gas_budget: 4000
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-verify
      gas_budget: 5000
    - resource: manifest
      action: execute
      template_id: coding-guidelines
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: coding-guidelines
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt.coding-guidelines
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
