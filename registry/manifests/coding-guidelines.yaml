# Coding Guidelines Process Manifest
# ℏKask v0.30.0 — Coding discipline as convergent PDCA

manifest:
  id: coding-guidelines
  category: skill
  name: Coding Guidelines
  description: >
    Convergent coding-discipline process. Assesses a task against Karpathy-style
    constraints, applies guardrails, verifies proposed implementation quality,
    computes convergence, and iterates until violations are reduced.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: task_description
    type: string
    required: true
  - name: code_context
    type: object
    required: false
  - name: diff_preview
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Assess the task against coding principles before implementation.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-assess
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      task_description: "{{ task_description }}"
      code_context: "{{ code_context | default({}) }}"

  - ordinal: 2
    action: select
    description: Apply guardrails and generate constrained implementation directives.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-apply
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      task_description: "{{ task_description }}"
      assumptions: "{{ step_1_result.assumptions | default([]) }}"
      simplicity_risks: "{{ step_1_result.simplicity_risks | default([]) }}"
      scope_creep_warnings: "{{ step_1_result.scope_creep_warnings | default([]) }}"
      success_criteria: "{{ step_1_result.success_criteria | default([]) }}"
      plan: "{{ step_1_result.plan | default([]) }}"

  - ordinal: 3
    action: select
    description: Verify the implementation plan/diff against coding principles.
    renderer: minijinja
    template_ref: coding-guidelines/guidelines-verify
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      task_description: "{{ task_description }}"
      assumptions: "{{ step_1_result.assumptions | default([]) }}"
      success_criteria: "{{ step_1_result.success_criteria | default([]) }}"
      constrained_plan: "{{ step_2_result.constrained_plan | default([]) }}"
      diff_preview: "{{ diff_preview | default('') }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for coding-guidelines cycle.
    renderer: minijinja
    template_ref: shared/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_3_result }}"
      convergence_description: "code quality is verified and violations are resolved"
      include_blockers: true

  - ordinal: 5
    action: loop
    description: Re-enter coding-guidelines cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-assess
      gas_budget: 5000
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-apply
      gas_budget: 4000
    - resource: template
      action: render
      template_id: coding-guidelines/guidelines-verify
      gas_budget: 5000
    - resource: template
      action: render
      template_id: shared/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: coding-guidelines
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
