# Curator Metacognition Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: curator-metacognition
  name: Curator Metacognition
  description: >
  functional_role: knowact
  functional_role: knowact
    Metacognitive reasoning for system sense-making, performance monitoring,
    and coordination with hKask Administrator on system evolution.
  version: 0.21.0
  editor: hKask-Administrator
  visibility: Primary

# Metacognition Template Reference
metacognition_template: registry/templates/curator-metacognition.yaml

# Energy Budget Configuration
energy:
  cap: 25000
  cost_per_token: 0.25
  alert_threshold: 0.7
  hard_limit: true
  dynamic_adjustment:
    enabled: true
    max_adjustment_percent: 10
    requires_cns_justification: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Gather system state from bot reports and CNS spans.
      Synthesize variety counters, alert states, and performance metrics.
    renderer: minijinja
    template_ref: curator/system_state_gather.j2
    model_tier: fast_local
    mcp: hkask-mcp-storage
    energy_cap: 3000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        system_health:
          type: string
          enum: [healthy, degraded, critical]
        variety_deficit:
          type: number
        active_alerts:
          type: array
        bot_status:
          type: object

  - ordinal: 2
    action: select
    description: >
      Select appropriate metacognitive operation based on system state.
    renderer: minijinja
    template_ref: curator/metacognition-selector.j2
    model_tier: reasoning_local
    mcp: hkask-mcp-inference
    energy_cap: 4000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        operation:
          type: string
          enum: [calibrate, diagnose, escalate, maintain]
        rationale:
          type: string
        confidence:
          type: number

  - ordinal: 3
    action: populate
    description: >
      Execute selected metacognitive operation.
      Calibrate thresholds, diagnose issues, or prepare escalation.
    renderer: minijinja
    template_ref: curator/metacognition-${operation}.j2
    model_tier: balanced
    mcp: hkask-mcp-cns
    energy_cap: 6000
    timeout_seconds: 60
    output_schema:
      type: object
      properties:
        action_taken:
          type: string
        parameters_adjusted:
          type: object
        administrator_notification:
          type: boolean

  - ordinal: 4
    action: execute
    description: >
      Emit metacognition outcome to CNS and prepare administrator report.
    renderer: null
    template_ref: null
    target: emit_metacognition_outcome
    mcp: hkask-mcp-cns
    tool: cns_emit
    energy_cap: 2000
    timeout_seconds: 10
    output_schema:
      type: object
      properties:
        cns_event_id:
          type: string
        administrator_report:
          type: string

  - ordinal: 5
    action: populate
    description: >
      Render Kata coaching directives when capability gaps are detected.
      Uses the curator-metacognition template kata_directives section.
    renderer: minijinja
    template_ref: curator/curator-metacognition.yaml#kata_directives
    model_tier: balanced
    mcp: hkask-mcp-inference
    energy_cap: 3000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        kata_directives:
          type: array
          description: Array of Kata coaching directives for bots with capability gaps
        recommended_kata_type:
          type: string
          enum: [improvement, coaching, starter]
        target_bots:
          type: array

# Error Handling
error_handling:
  on_energy_exceeded: abort_and_escalate
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_synthesis_failure: degrade_gracefully
  on_escalation_required: notify_administrator_immediately

# OCAP Configuration
ocap:
  delegation_chain:
    Curator:
      can_delegate_to: [all_bots]
      can_access: [own_episodic, all_public_semantic]
      requires_consent: false
    bots:
      can_delegate_to: []
      can_access: [own_episodic, all_public_semantic]
      requires_consent: true
    Administrator:
      can_delegate_to: [Curator]
      can_access: [all]
      requires_consent: false
  required_capabilities:
    - resource: cns
      action: emit
      energy_budget: 2000
    - resource: memory
      action: recall
      energy_budget: 3000
    - resource: inference
      action: call
      energy_budget: 6000
    - resource: ensemble
      action: coordinate
      energy_budget: 4000
  delegation_chain_required: true
  max_delegation_depth: 7
  signature_algorithm: HMAC-SHA256
  capability_expiry_seconds: 7200
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt.metacognition
  rate_limit:
    per_bot_per_minute: 100
    per_session_per_minute: 500
    burst_allowance: 50
    on_exceed: queue_not_drop
  aggregation:
    enabled: true
    interval_minutes: 5
    repetitive_span_threshold: 10
  priority_queue:
    enabled: true
    order: [alert, outcome, invocation, production]
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: hKask-Administrator

# Bot Report Integration
bot_reporting:
  ingest_from:
    - cns-curator-bot
    - memory-curator-bot
    - inference-curator-bot
    - mcp-dispatch-bot
    - ensemble-curator-bot
    - git-curator-bot
    - registry-dispatch-bot
  synthesis_interval: hourly
  alert_triggers:
    - variety_deficit_gt_100
    - bot_coordination_failure
    - system_degradation_detected
    - energy_budget_critical

# Administrator Coordination
administrator:
  notification_channels:
    - kask_chat
    - system_log
  report_format: markdown_synthesis
  include:
    - system_health_summary
    - active_alerts
    - bot_status
    - calibration_changes
    - evolution_recommendations

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_energy_cost: true
  include_cns_events: true
  include_bot_reports: true
