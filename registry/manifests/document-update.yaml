# Document Update Process Manifest
# ℏKask v0.31.0 — Documentation maintenance as convergent PDCA

manifest:
  id: document-update
  name: Document Update
  description: >
    Convergent documentation-maintenance process. Audits the docs/ corpus,
    identifies consolidation candidates (MERGE/ARCHIVE/KEEP/DELETE), produces
    structured merge plans, archive instructions, and portal refresh guidance,
    computes convergence, and iterates until consolidation recommendations are stable.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_6_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: context
    type: object
    required: false
  - name: corpus_snapshot
    type: object
    required: false
  - name: target_docs
    type: array
    required: false

steps:
  - ordinal: 1
    action: populate
    description: Render document-audit guidance for current corpus context.
    renderer: minijinja
    template_ref: document-update/doc-audit
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      context: "{{ context | default({}) }}"

  - ordinal: 2
    action: select
    description: Classify each document as KEEP, MERGE, ARCHIVE, or DELETE.
    renderer: minijinja
    template_ref: document-update/doc-identify
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      audit_guidance: "{{ step_1_populated }}"
      corpus_snapshot: "{{ corpus_snapshot | default({}) }}"
      context: "{{ context | default({}) }}"

  - ordinal: 3
    action: select
    description: >
      Produce structured merge plan: extract unique content from children, map to consolidation targets.
    renderer: minijinja
    template_ref: document-update/doc-merge
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      dispositions: "{{ step_2_result.dispositions | default([]) }}"
      target_docs: "{{ target_docs | default([]) }}"
      context: "{{ context | default({}) }}"

  - ordinal: 4
    action: select
    description: >
      Produce archive instructions: git rm merged docs, fix cross-references, verify links.
    renderer: minijinja
    template_ref: document-update/doc-archive
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      merge_plan: "{{ step_3_result }}"
      dispositions: "{{ step_2_result.dispositions | default([]) }}"
      context: "{{ context | default({}) }}"

  - ordinal: 5
    action: select
    description: >
      Produce portal refresh instructions: update navigation indexes, remove stale entries, update counts.
    renderer: minijinja
    template_ref: document-update/doc-refresh-portal
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      archive_result: "{{ step_4_result }}"
      merge_plan: "{{ step_3_result }}"
      context: "{{ context | default({}) }}"

  - ordinal: 6
    action: select
    description: Compute normalized convergence metric for document cycle.
    renderer: minijinja
    template_ref: document-update/doc-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_5_result }}"

  - ordinal: 7
    action: loop
    description: Re-enter documentation cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: document-update/doc-audit
      gas_budget: 2000
    - resource: template
      action: render
      template_id: document-update/doc-identify
      gas_budget: 4000
    - resource: template
      action: render
      template_id: document-update/doc-merge
      gas_budget: 5000
    - resource: template
      action: render
      template_id: document-update/doc-archive
      gas_budget: 4000
    - resource: template
      action: render
      template_id: document-update/doc-refresh-portal
      gas_budget: 3000
    - resource: template
      action: render
      template_id: document-update/doc-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: document-update
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
