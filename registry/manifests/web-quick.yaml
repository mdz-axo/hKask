# Web Quick Search Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for UserPods

manifest:
  id: mcp/web-quick
  category: pipeline
  name: Web Quick Search
  description: >
    Fast single-provider keyword search. Returns ranked results with title, URL, description.
    Use for simple lookups where speed matters more than coverage.
  version: 0.21.0
  functional_role: flowdef
  editor: curator-or-human-admin
  visibility: Public

gas:
  cap: 2048
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 0
  alert_threshold: 0.8
  hard_limit: true

steps:
  - ordinal: 1
    action: execute
    description: >
      Quick search via single keyword provider (Brave). RRF-ranked results.
    renderer: null
    template_ref: null
    mcp: hkask-mcp-research
    tool: web_search
    arguments:
      query: "${input.query}"
      strategy: "quick"
      num_results: "${input.num_results | default(5)}"
    gas_cap: 2048
    timeout_seconds: 15
    output_schema:
      results: array
      strategy: string

  - ordinal: 2
    action: feedback
    description: >
      Emit search outcome to Regulation.
    renderer: null
    template_ref: null
    mcp: null # Regulation is ambient (RegulationRuntime)
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      result_count: integer
    output_schema:
      reg_event_id: string

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_search_failure: fallback

ledger:
  emit_spans: true
  span_namespace: reg.web.search_quick
  variety_monitoring: true
  algedonic_threshold: 100

audit:
  enabled: true
  log_level: info
  include_input: false
  include_output: true
