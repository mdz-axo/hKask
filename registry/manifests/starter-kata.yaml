# Starter Kata Manifest
# ℏKask v0.21.0 — Deliberate practice routines for scientific thinking

manifest:
  id: starter-kata
  name: Starter Kata
  kata_type: starter
  description: >
    Simple practice routines to internalize scientific thinking patterns.
    Used by Curator for daily capability practice with 7R7 bots.
    Goal: Make scientific thinking habitual, not the Kata themselves.
    Starter Kata for building foundational capability habits.
    3 practice routines for bots with low success rates or basic gaps.
  editor: Curator
  visibility: public

gas:
  cap: 8000
  cost_per_token: 0.25
  alert_threshold: 0.7
  hard_limit: true

practices:
  - name: daily_cns_report
    description: "Practice routine: Submit accurate CNS status reports"
    frequency: "hourly"
    duration_minutes: 5
    cns_spans:
      - "cns.prompt.kata.starter.report"
    steps:
      - "Collect current variety counters"
      - "Check for algedonic alerts"
      - "Submit status report to standing session"
    success_criteria:
      - "Report submitted within 1 minute of schedule"
      - "All span categories covered"
      - "No sovereignty violations"

  - name: span_emission_practice
    description: "Practice routine: Emit correct CNS spans for each operation"
    frequency: "per_operation"
    duration_minutes: 1
    cns_spans:
      - "cns.prompt.kata.starter.emit"
    steps:
      - "Identify the span category for the current operation"
      - "Emit Observe phase span before operation"
      - "Emit Outcome phase span after operation"
      - "Verify no sovereignty boundary violations"
    success_criteria:
      - "Correct span category used"
      - "Both Observe and Outcome phases emitted"
      - "Confidence score > 0.8"

  - name: energy_awareness
    description: "Practice routine: Track and report energy consumption"
    frequency: "hourly"
    duration_minutes: 3
    cns_spans:
      - "cns.prompt.kata.starter.energy"
    steps:
      - "Check current energy budget"
      - "Calculate energy utilization ratio"
      - "Report energy status to standing session"
      - "Flag if utilization > 80%"
    success_criteria:
      - "Energy report accuracy > 95%"
      - "Budget overruns flagged correctly"
      - "No unreported energy consumption"

starter_outcomes:
  - name: habits_formed
    condition: "success_rate >= 0.9 for 3 consecutive cycles"
    action: "Graduate to coaching kata"
  - name: improving
    condition: "success_rate improving over 3 cycles"
    action: "Continue starter kata"
  - name: not_progressing
    condition: "success_rate not improving after 5 cycles"
    action: "Escalate to Curator for intervention"

steps:
  - ordinal: 1
    action: select
    description: >
      Select which Starter Kata practice routine to run.
      Based on current capability development needs.
    renderer: minijinja
    template_ref: kata/starter-selector.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    gas_cap: 1500
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        kata_type:
          type: string
          enum: [five_questions, pdca_cycle, observation_drill]
        rationale:
          type: string
        confidence:
          type: number

  - ordinal: 2
    action: populate
    description: >
      Execute the selected Starter Kata practice routine.
      Render the practice template with current context.
    renderer: minijinja
    template_ref: kata/starter-${kata_type}.j2
    model_tier: fast_local
    mcp: hkask-mcp-inference
    gas_cap: 4000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        practice_outcome:
          type: string
        learner_reflection:
          type: string
        habit_signal:
          type: string

  - ordinal: 3
    action: execute
    description: >
      Record practice to episodic memory and emit CNS span.
      Track practice frequency and habit formation progress.
    renderer: null
    template_ref: null
    target: record_practice
    mcp: hkask-mcp-memory
    tool: memory_remember
    gas_cap: 2500
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        memory_id:
          type: string
        cns_event_id:
          type: string
        practice_streak:
          type: number

error_handling:
  on_gas_exceeded: abort_and_escalate
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1

cns:
  emit_spans: true
  span_namespace: cns.prompt.kata.starter
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: hKask-Administrator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
  include_practice_progress: true
