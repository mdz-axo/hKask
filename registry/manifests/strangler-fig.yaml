# Strangler Fig Process Manifest
# ℏKask v0.30.0 — Incremental migration as convergent PDCA

manifest:
  id: strangler-fig
  category: skill
  name: Strangler Fig
  description: >
    Convergent migration process for incremental architecture replacement.
    Plans migration domains, executes bounded steps, verifies safety,
    computes convergence, and iterates until migration risk is acceptable.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 5
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: migration_target
    type: string
    required: true
  - name: current_architecture
    type: string
    required: true
  - name: codebase_context
    type: object
    required: false
  - name: constraint_classification
    type: object
    required: false
  - name: current_step
    type: object
    required: false
  - name: current_state
    type: object
    required: false
  - name: verification_command_output
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Plan migration domains and sequence using Strangler Fig pattern.
    renderer: minijinja
    template_ref: strangler-fig/strangler-fig-plan
    gas_cap: 7000
    timeout_seconds: 60
    input_mapping:
      migration_target: "{{ migration_target }}"
      current_architecture: "{{ current_architecture }}"
      codebase_context: "{{ codebase_context | default({}) }}"
      constraint_classification: "{{ constraint_classification | default({}) }}"

  - ordinal: 2
    action: select
    description: Execute one bounded migration step from the plan.
    renderer: minijinja
    template_ref: strangler-fig/strangler-fig-execute
    gas_cap: 7000
    timeout_seconds: 60
    input_mapping:
      migration_plan: "{{ step_1_result }}"
      current_step: "{{ current_step | default({}) }}"
      codebase_context: "{{ codebase_context | default({}) }}"
      constraint_classification: "{{ constraint_classification | default({}) }}"

  - ordinal: 3
    action: select
    description: Verify migration state integrity and reversibility.
    renderer: minijinja
    template_ref: strangler-fig/strangler-fig-verify
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      migration_plan: "{{ step_1_result }}"
      current_state: "{{ current_state | default(step_2_result) }}"
      verification_command_output: "{{ verification_command_output | default('') }}"
      codebase_context: "{{ codebase_context | default({}) }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for migration cycle.
    renderer: minijinja
    template_ref: strangler-fig/strangler-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      plan_result: "{{ step_1_result }}"
      execute_result: "{{ step_2_result }}"
      verify_result: "{{ step_3_result }}"

  - ordinal: 5
    action: loop
    description: Re-enter migration cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: strangler-fig/strangler-fig-plan
      gas_budget: 7000
    - resource: template
      action: render
      template_id: strangler-fig/strangler-fig-execute
      gas_budget: 7000
    - resource: template
      action: render
      template_id: strangler-fig/strangler-fig-verify
      gas_budget: 5000
    - resource: template
      action: render
      template_id: strangler-fig/strangler-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: strangler-fig
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
