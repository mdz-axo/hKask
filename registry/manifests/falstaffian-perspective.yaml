# Falstaffian Perspective Engine Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: falstaffian-perspective
  name: Falstaffian Perspective Engine
  description: >
    Multi-iteration perspective generation through semantic shape transforms.
    Applies calibrated experience and affirmed spirit through Falstaffian
    rotation vectors (predicate hollow, subject expansion, counterfeit inversion,
    object inversion, direction reversal) to carry tension without breaking.
  functional_role: knowact
  version: 0.21.0
  editor: curator
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 12000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
# The 5 metacognitive steps map to 4 manifest ordinals:
#   1. Calibrate experience dimension, affirm spirit (select)
#   2. Generate multi-iteration perspective output (populate)
#   3. Verify tension was carried through and shapes are diverse (validate)
#   4. Emit CNS span for variety tracking (feedback)
steps:
  - ordinal: 1
    action: select
    description: >
      Calibrate experience dimension and affirm spirit.
      Render the Falstaffian perspective template with calibration inputs:
      identify criticism, context, and desired outcome.
      This corresponds to metacognitive steps 1 (calibrate) and 2 (affirm).
    renderer: minijinja
    template_ref: cognition/falstaffian-perspective
    model_tier: reasoning_local
    mcp: hkask-mcp-inference  # inference is now internal via InferencePort
    gas_cap: 4000
    timeout_seconds: 60
    input_mapping:
      input_criticism: "{{ input_criticism }}"
      context: "{{ context }}"
      desired_outcome: "{{ desired_outcome }}"
      iteration_count: "{{ iteration_count | default(4) }}"
      base_seed: "{{ base_seed | default(42) }}"
    output_schema:
      type: object
      properties:
        calibrated_criticism:
          type: string
        affirmed_spirit:
          type: string
        shape_sequence:
          type: array
          items:
            type: string

  - ordinal: 2
    action: populate
    description: >
      Generate multi-iteration perspective output through Falstaffian shape vectors.
      Each iteration applies a different semantic rotation (predicate hollow,
      subject expansion, counterfeit inversion, object inversion, direction reversal)
      with varied voice emphasis and temperature.
      This corresponds to metacognitive steps 3 (select shape) and 4 (execute through play).
    renderer: minijinja
    template_ref: cognition/falstaffian-perspective
    model_tier: balanced
    mcp: hkask-mcp-inference  # inference is now internal via InferencePort
    gas_cap: 8000
    timeout_seconds: 90
    input_mapping:
      input_criticism: "{{ ordinal_1.calibrated_criticism }}"
      context: "{{ context }}"
      desired_outcome: "{{ desired_outcome }}"
      iteration_count: "{{ iteration_count | default(4) }}"
      base_seed: "{{ base_seed | default(42) }}"
    output_schema:
      type: object
      properties:
        perspective:
          type: string
        variance_report:
          type: object
          properties:
            iteration_count:
              type: integer
            shape_variety:
              type: integer
            agreement_level:
              type: string
            agreement_score:
              type: number
            shape_distribution:
              type: array
              items:
                type: object
                properties:
                  iteration:
                    type: integer
                  shape:
                    type: string
                  voice:
                    type: string

  - ordinal: 3
    action: validate
    description: >
      Verify tension was carried through and shapes are diverse.
      Check that neither bitterness (experience without spirit) nor
      naivety (spirit without experience) emerged in the output.
      This corresponds to metacognitive step 5 (verify tension carried).
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-storage
    gas_cap: 500
    timeout_seconds: 10
    validation_rules:
      - shape_diversity_check
      - tension_preserved_check
      - no_bitterness_detected
      - no_naivety_detected
      - iteration_count_within_bounds
    output_schema:
      type: object
      properties:
        validated:
          type: boolean
        tension_quality:
          type: string
        shape_diversity_score:
          type: number
        error_reason:
          type: string

  - ordinal: 4
    action: feedback
    description: >
      Emit feedback to CNS for variety monitoring.
      Track shape selection patterns and perspective diversity.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-cns
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      shapes_used: array
      agreement_score: number
    output_schema:
      type: object
      properties:
        variety_counter:
          type: integer
        cns_event_id:
          type: string

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort
  on_shape_diversity_low: retry_with_higher_iteration_count

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: cognition/falstaffian-perspective
      gas_budget: 8000
    - resource: manifest
      action: execute
      template_id: falstaffian-perspective
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: falstaffian-perspective
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.agent_pod
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
