# Falstaffian Perspective Process Manifest
# ℏKask v0.30.0 — Perspective generation as convergent PDCA

manifest:
  id: falstaffian-perspective
  name: Falstaffian Perspective
  description: >
    Convergent multi-angle perspective process. Generates Falstaffian semantic
    rotations with configurable enrichment, computes convergence on diversity
    and tension quality, and iterates until perspective set is robust.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_3_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 18000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: text
    type: string
    required: true
  - name: context
    type: object
    required: false
  - name: perspective_vectors
    type: array
    required: false
  - name: enrichment_depth
    type: string
    required: false
  - name: base_seed
    type: integer
    required: false

steps:
  - ordinal: 1
    action: select
    description: Configure perspective vectors and enrichment settings.
    renderer: minijinja
    template_ref: falstaffian-perspective/falstaffian-perspective
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      input_criticism: "{{ text }}"
      text: "{{ text }}"
      context: "{{ context | default({}) }}"
      perspective_vectors: "{{ perspective_vectors | default([]) }}"
      enrichment_depth: "{{ enrichment_depth | default('medium') }}"
      base_seed: "{{ base_seed | default(42) }}"

  - ordinal: 2
    action: select
    description: Generate enriched Falstaffian perspective set.
    renderer: minijinja
    template_ref: falstaffian-perspective/falstaffian-perspective
    gas_cap: 9000
    timeout_seconds: 120
    input_mapping:
      input_criticism: "{{ text }}"
      text: "{{ text }}"
      context: "{{ context | default({}) }}"
      perspective_vectors: "{{ step_1_result.active_shapes | default(perspective_vectors | default([])) }}"
      enrichment_depth: "{{ step_1_result.enrichment_depth | default(enrichment_depth | default('medium')) }}"
      base_seed: "{{ base_seed | default(42) }}"

  - ordinal: 3
    action: select
    description: Compute normalized convergence metric for perspective cycle.
    renderer: minijinja
    template_ref: falstaffian-perspective/falstaffian-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      perspective_result: "{{ step_2_result }}"

  - ordinal: 4
    action: loop
    description: Re-enter perspective cycle if convergence is not met.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: falstaffian-perspective/falstaffian-perspective
      gas_budget: 9000
    - resource: template
      action: render
      template_id: falstaffian-perspective/falstaffian-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: falstaffian-perspective
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
