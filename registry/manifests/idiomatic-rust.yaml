# Idiomatic Rust Process Manifest
# hKask v0.31.0 — Convergent inquiry into Rust design quality
# Graydon Hoare's principles as the operating system

manifest:
  id: idiomatic-rust
  category: skill
  name: Idiomatic Rust
  description: >
    Convergent inquiry into Rust design quality through Graydon Hoare's lens.
    Anchors design problems against Hoare's principles, proposes type-driven
    solutions with code examples, challenges and refines through adversarial
    review, and iterates until the design converges toward deeper idiomaticity.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 120000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 3
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: design_problem
    type: string
    description: "The Rust design problem to solve"
    required: true
  - name: existing_code
    type: string
    description: "Existing Rust code to evaluate or refactor"
    required: false
  - name: design_constraints
    type: object
    description: "Performance, safety, or API constraints"
    required: false
  - name: iteration_focus
    type: string
    description: "Specific aspect to focus on from previous challenge critique"
    required: false

fusion:
  judge: deepseek-v4-pro
  panel:
    - Kimi2.7
    - Qwen3.7 Max
    - GLM5.2
  mode: critique
  skills:
    - coding-guidelines
    - deep-module
  max_rounds: 3

steps:
  - ordinal: 1
    action: select
    description: >
      Anchor the design problem against Graydon Hoare's principles.
      Identify invariants, invalid states, ownership graphs, error domains.
      Produce scored assessment with improvement targets.
    renderer: minijinja
    template_ref: idiomatic-rust/idiomatic-rust-inquiry
    gas_cap: 8192
    timeout_seconds: 60
    input_mapping:
      design_problem: "{{ design_problem }}"
      existing_code: "{{ existing_code | default('') }}"
      design_constraints: "{{ design_constraints | default({}) }}"

  - ordinal: 2
    action: select
    description: >
      Propose type-driven Rust solutions with code examples. Apply algebraic
      types, ownership patterns, error propagation, trait design.
      Reference std patterns, crate ecosystem, and RFCs.
    renderer: minijinja
    template_ref: idiomatic-rust/idiomatic-rust-design
    gas_cap: 8192
    timeout_seconds: 60
    input_mapping:
      design_problem: "{{ design_problem }}"
      existing_code: "{{ existing_code | default('') }}"
      assessment: "{{ step_1_result }}"
      iteration_focus: "{{ iteration_focus | default('') }}"

  - ordinal: 3
    action: select
    description: >
      Adversarial review: find gaps, test edge cases, challenge assumptions,
      identify deeper connections. Produce scored critique with specific
      refinement directives for potential re-design.
    renderer: minijinja
    template_ref: idiomatic-rust/idiomatic-rust-challenge
    gas_cap: 8192
    timeout_seconds: 60
    input_mapping:
      design_problem: "{{ design_problem }}"
      design_proposal: "{{ step_2_result }}"
      assessment: "{{ step_1_result }}"
      design_constraints: "{{ design_constraints | default({}) }}"

  - ordinal: 4
    action: select
    description: >
      Compute convergence metric: synthesize design quality, critique depth,
      and connection richness. Score in [0,1] where 0 = maximally idiomatic.
    renderer: minijinja
    template_ref: idiomatic-rust/idiomatic-rust-convergence
    gas_cap: 4096
    timeout_seconds: 30
    input_mapping:
      assessment: "{{ step_1_result }}"
      design_proposal: "{{ step_2_result }}"
      critique: "{{ step_3_result }}"
    fusion: false

  - ordinal: 5
    action: loop
    description: >
      If convergence is not met and the critique identified concrete
      refinement targets, loop back to design (step 2) with those targets.
    input_mapping:
      loop_target: 2

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: idiomatic-rust/idiomatic-rust-inquiry
      gas_budget: 8192
    - resource: template
      action: render
      template_id: idiomatic-rust/idiomatic-rust-design
      gas_budget: 8192
    - resource: template
      action: render
      template_id: idiomatic-rust/idiomatic-rust-challenge
      gas_budget: 8192
    - resource: template
      action: render
      template_id: idiomatic-rust/idiomatic-rust-convergence
      gas_budget: 4096
    - resource: manifest
      action: execute
      template_id: idiomatic-rust
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

ledger:
  emit_spans: true
  span_namespace: reg.prompt.idiomatic-rust
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_reg_events: true
