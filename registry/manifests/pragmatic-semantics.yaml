# Pragmatic Semantics Process Manifest
# ℏKask v0.30.0 — Epistemic classification as convergent PDCA
# EXTENDED: Wired provenance-trace and conflict-resolve templates (previously orphaned).

manifest:
  id: pragmatic-semantics
  category: skill
  name: Pragmatic Semantics
  description: >
    Convergent epistemic-classification process. Classifies statement semantics,
    traces provenance, resolves conflicts via OT ranking, computes convergence,
    and iterates until certainty/provenance classification is stable for decision
    support.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.25
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: statement
    type: string
    required: true
  - name: system_context
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: Classify ontological/epistemic mode and provenance.
    renderer: minijinja
    template_ref: pragmatic-semantics/semantics-classify-statement
    gas_cap: 5000
    timeout_seconds: 45
    input_mapping:
      statement: "{{ statement }}"
      system_context: "{{ system_context | default('') }}"

  - ordinal: 2
    action: select
    description: Trace provenance of the classified claim through hKask's data layers.
    renderer: minijinja
    template_ref: pragmatic-semantics/semantics-provenance-trace
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      classification_result: "{{ step_1_result }}"
      statement: "{{ statement }}"
      system_context: "{{ system_context | default('') }}"

  - ordinal: 3
    action: select
    description: Resolve conflicts between statements using OT ranking.
    renderer: minijinja
    template_ref: pragmatic-semantics/semantics-conflict-resolve
    gas_cap: 4000
    timeout_seconds: 45
    condition: "step_2_result.conflicts_detected | default(false) == true"
    input_mapping:
      provenance_result: "{{ step_2_result }}"
      classification_result: "{{ step_1_result }}"

  - ordinal: 4
    action: select
    description: Compute normalized convergence metric for semantics cycle.
    renderer: minijinja
    template_ref: shared/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"
      convergence_description: "classification is stable for action"
      include_blockers: false

  - ordinal: 5
    action: loop
    description: Re-enter semantics cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: pragmatic-semantics/semantics-classify-statement
      gas_budget: 5000
    - resource: template
      action: render
      template_id: pragmatic-semantics/semantics-provenance-trace
      gas_budget: 4000
    - resource: template
      action: render
      template_id: pragmatic-semantics/semantics-conflict-resolve
      gas_budget: 4000
    - resource: template
      action: render
      template_id: shared/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: pragmatic-semantics
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
