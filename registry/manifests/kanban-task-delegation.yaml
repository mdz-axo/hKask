# Kanban Task Delegation Skill
# ℏKask v0.27.0 — Agent coordination via kanban boards
#
# Handles the initial handoff of kanban tasks to sub-replicants:
# configure spawn parameters and execute the task. Ongoing
# coordination (verification, feedback, board management) is
# handled by the kanban-task-management skill.
#
# This is NOT a generic spawn skill — it is scoped to kanban
# board task delegation. Every operation is anchored to a kanban
# task with its acceptance criteria, deliverable links, and
# comment thread for agent↔coordinator communication.

manifest:
  id: kanban-task-delegation
  name: Kanban Task Delegation
  version: "0.2.0"
  description: >
    Delegate kanban tasks to sub-replicants. Configure spawn
    parameters (delegation level, skills, memory scope, tool
    servers, gas budget, timeout) and execute the task. The
    spawned agent works on the task, producing deliverables
    and appending progress notes to the comment thread.
    Ongoing coordination (verification, feedback, board flow)
    is handled by kanban-task-management.
  editor: Curator
  visibility: Public

gas:
  cap: 12000
  alert_threshold: 0.7
  hard_limit: true

steps:
  - ordinal: 1
    action: populate
    description: >
      Configure spawn for a task. Determine delegation level (minimal,
      standard, maximal), skills to delegate, memory scope, tool servers,
      gas budget, and timeout. The replicant chooses what to delegate
      — spawning is consent-mediated (P1).
    renderer: minijinja
    template_ref: kanban-task-delegation/configure-spawn
    classifier: true
    gas_cap: 3000
    timeout_seconds: 30
    output_schema:
      type: object
      properties:
        delegation_level:
          type: string
          enum: [minimal, standard, maximal]
        delegated_skills:
          type: array
          items:
            type: string
        memory_scope:
          type: string
          enum: [none, episodic, full]
        tool_servers:
          type: array
          items:
            type: string
        gas_budget:
          type: integer
        timeout_seconds:
          type: integer

  - ordinal: 2
    action: populate
    description: >
      Execute the spawned task. The replicant works on the task,
      producing deliverables and appending progress notes to the
      task's comment thread. The coordinator monitors progress
      through the kanban-task-management skill.
    renderer: minijinja
    template_ref: kanban-task-delegation/execute-task
    gas_cap: 5000
    timeout_seconds: 120

cns:
  emit_spans: true
  span_namespace: cns.kanban.delegation
  variety_monitoring: true
  algedonic_threshold: 3

outcomes:
  - name: task_spawned
    condition: "spawn configured successfully"
    action: "Replicant spawned for task execution"
  - name: task_executing
    condition: "agent working on task"
    action: "Task execution in progress"

metrics:
  - name: delegation_level
    description: "Delegation level used for spawn"
    span: cns.kanban.delegation.level
  - name: spawn_count
    description: "Number of tasks delegated"
    span: cns.kanban.delegation.count

audit:
  enabled: true
  include_input: true
  include_output: true
  include_gas_cost: true
