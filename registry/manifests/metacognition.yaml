# File: registry/manifests/metacognition.yaml
# Metacognition Process Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: metacognition
  name: Metacognition
  description: >
  functional_role: knowact
  functional_role: knowact
    Metacognitive reasoning with goal decomposition and strategy reflection.
    Enables cross-cycle adaptation and effort calibration.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 12000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render goal decomposition template.
      Break high-level goal into subgoals with dependencies and effort estimates.
    renderer: minijinja
    template_ref: metacognition/meta_decompose
    model_tier: reasoning_local
    gas_cap: 6000
    timeout_seconds: 60
    output_schema:
      root: object
      strategy: string
      estimated_effort: float

  - ordinal: 2
    action: validate
    description: >
      Validate decomposition output.
      Check dependency graph is acyclic and effort estimates sum to ~1.0.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-memory  # was hkask-mcp-storage
    gas_cap: 500
    timeout_seconds: 10
    validation_rules:
      - acyclic_dependency_graph
      - effort_sum_validation
      - strategy_enum_check
    output_schema:
      validated: boolean
      error_reason: string|null

  - ordinal: 3
    action: feedback
    description: >
      Emit feedback to CNS for variety monitoring.
      Track decomposition quality and strategy selection patterns.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: null  # CNS is ambient (CnsRuntime)
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      strategy_used: string
    output_schema:
      variety_counter: integer
      cns_event_id: string

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: metacognition/self_check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: metacognition
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: metacognition
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
