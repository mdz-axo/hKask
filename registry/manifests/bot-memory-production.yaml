# Bot Memory Production Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: bot-memory-production
  name: Bot Memory Production
  description: >
  functional_role: flowdef
    Automatic memory production for all bot operations.
    Records episodic memory of operations and extracts semantic triples.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Memory Production Configuration
memory:
  episodic:
    enabled: true
    default_visibility: private
    perspective: agent_owned
    retention: permanent
    batch_writes:
      enabled: true
      max_batch_size: 100
      max_batch_age_minutes: 5
      flush_on_shutdown: true
    deduplication:
      enabled: true
      strategy: entity_attribute_value_hash
      on_duplicate: update_confidence_bayesian
    
  semantic:
    enabled: true
    default_visibility: public
    extraction: from_operation_outcomes
    bayesian_confidence: true
    deduplication:
      enabled: true
      strategy: triple_hash
      on_duplicate: bayesian_join

# Bayesian Confidence Configuration
bayesian_confidence:
  decay_lambda: 0.01
  half_life_hours: 69.3
  minimum_confidence: 0.1
  refresh_on_recall: true
  combination_rules:
    corroborating: c1 + c2 - c1*c2
    contradicting: c1 - c2
    averaging: (c1 + c2) / 2
    decay: c * exp(-lambda * t)

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render operation record template with bot operation data.
    renderer: minijinja
    template_ref: memory/templates/agent_operation_memory.j2
    mcp: hkask-mcp-memory
    gas_cap: 2000
    timeout_seconds: 10
    bindings:
      agent_name: "${bot_name}"
      operation_type: "${operation_type}"
      input: "${operation_input}"
      output: "${operation_output}"
      gas_used: "${gas_used}"
      latency_ms: "${latency_ms}"
      cns_spans: "${cns_spans}"
      confidence: "${operation_confidence}"
      matroshka_depth: "${matroshka_depth}"
    output_schema:
      type: object
      properties:
        operation_id:
          type: string
        timestamp:
          type: string
        episodic_record:
          type: object
        extracted_triples:
          type: array

  - ordinal: 2
    action: execute
    description: >
      Store episodic memory record via Memory MCP.
    renderer: null
    template_ref: null
    target: store_episodic_memory
    mcp: hkask-mcp-memory
    tool: memory_remember
    gas_cap: 3000
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        triple_ids:
          type: array
        storage_status:
          type: string

  - ordinal: 3
    action: execute
    description: >
      Extract and store semantic triples from operation outcome.
    renderer: null
    template_ref: null
    target: extract_semantic_triples
    mcp: hkask-mcp-memory
    tool: memory_remember
    gas_cap: 3000
    timeout_seconds: 15
    output_schema:
      type: object
      properties:
        semantic_triple_ids:
          type: array
        confidence_combined:
          type: number

# Error Handling
error_handling:
  on_memory_full: degrade_gracefully
  on_gas_exceeded: skip_semantic_keep_episodic
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_storage_failure: emit_cns_alert

# OCAP Configuration
ocap:
  memory_production:
    required: true
    attenuation: per_operation_type
    exempt_operations:
      - internal_housekeeping
      - status_polling
      - health_check
  required_capabilities:
    - resource: memory
      action: write
      scope: own_episodic
      gas_budget: 3000
    - resource: memory
      action: write
      scope: public_semantic
      gas_budget: 3000
  delegation_chain_required: false
  signature_algorithm: HMAC-SHA256
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.memory.production
  rate_limit:
    per_bot_per_minute: 100
    per_session_per_minute: 500
    burst_allowance: 50
    on_exceed: queue_not_drop
  aggregation:
    enabled: true
    interval_minutes: 5
    repetitive_span_threshold: 10
  priority_queue:
    enabled: true
    order: [alert, outcome, invocation, production]
  spans:
    - cns.memory.production.episodic_recorded
    - cns.memory.production.semantic_extracted
    - cns.memory.production.storage_complete

# Bot Integration
bot_integration:
  auto_invoke: true
  invoke_after: every_operation
  skip_for:
    - trivial_operations
    - internal_housekeeping
  include_in_standing_session: true
  matroshka:
    skip_if_depth_gt: 5
    rationale: "Prevents infinite memory-of-memory recursion"

# Standing Session Integration
standing_session:
  report_memory_production: true
  report_interval: hourly
  metrics:
    - episodic_records_count
    - semantic_triples_count
    - storage_success_rate
    - gas_used_for_memory

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
  include_memory_refs: true

# Security
security:
  injection_prevention:
    sanitize_template_inputs: true
    jinja2_sandbox: true
    validate_triple_values: true
    reject_executable_content: true
  ocap_verification:
    hmac_sha256_signatures: true
    verify_on_every_access: true
    reject_expired_tokens: true
  audit_integrity:
    spans_signed_by_webid: true
    immutable_once_written: true
    git_backed: true