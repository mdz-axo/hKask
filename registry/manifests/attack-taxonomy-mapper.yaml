# Attack Taxonomy Mapper Process Manifest
# ℏKask v0.31.0 — Supply chain finding taxonomy mapping
# Consumes findings from supply-chain-sentinel and kali-audit; maps to OSC&R taxonomy.

manifest:
  id: attack-taxonomy-mapper
  category: skill
  name: Attack Taxonomy Mapper
  description: >
    Maps supply chain findings to OSC&R attack taxonomy. Consumes findings
    from supply-chain-sentinel (CWE-mapped manifest evidence) and kali-audit
    (OWASP/ATLAS-mapped findings). Adds taxonomy_mapping field to regression YAML.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: findings
    type: array
    required: true

steps:
  - ordinal: 1
    action: select
    description: >
      Select evidence sources and discover findings to map from supply-chain-sentinel
      and kali-audit outputs. Reads regression library for existing taxonomy mappings.
    renderer: minijinja
    template_ref: attack-taxonomy-mapper/select-evidence
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 2
    action: select
    description: >
      Map each finding to OSC&R tactic + technique (verified against OSCAR matrix).
    renderer: minijinja
    template_ref: attack-taxonomy-mapper/map-taxonomy
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 3
    action: select
    description: >
      Taxonomize findings, emit cns.taxonomy.* spans, and produce the report.
    renderer: minijinja
    template_ref: attack-taxonomy-mapper/taxonomize
    gas_cap: 2048
    timeout_seconds: 60
  - ordinal: 4
    action: check
    description: >
      Convergence check — evaluate taxonomy mapping quality and completeness.
    renderer: minijinja
    template_ref: attack-taxonomy-mapper/convergence-check
    gas_cap: 1024
    timeout_seconds: 30

