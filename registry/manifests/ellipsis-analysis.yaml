# File: registry/manifests/ellipsis-analysis.yaml
# Ellipsis Analysis Process Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents

manifest:
  id: ellipsis-analysis
  name: Ellipsis Analysis
  description: >
    Bloom-inspired cognition method for detecting meaning in gaps and omissions.
    Differentiates ellipsis (deliberate, meaningful omission) from leak (unintentional
    information loss). Applies Harold Bloom's five-step method: read deeply, mind the gaps,
    differentiate ellipsis from leak, see past yourself, find what is not inferno.
  functional_role: knowact
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 12000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: select
    description: >
      Select analysis domain and establish baseline expectations.
      Determine what elements, metrics, or topics should be present in the text,
      creating the reference set against which gaps will be detected.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-storage
    gas_cap: 2000
    timeout_seconds: 15
    output_schema:
      domain: string
      expectations: array
      baseline: object

  - ordinal: 2
    action: populate
    description: >
      Render the ellipsis analysis template with input text and domain expectations.
      Apply Bloom's five-step method: read deeply, mind the gaps,
      differentiate ellipsis from leak, see past yourself, find what is not inferno.
    renderer: minijinja
    template_ref: cognition/ellipsis-analysis
    model_tier: reasoning_local
    mcp: hkask-mcp-inference  # inference is now internal via InferencePort
    gas_cap: 6000
    timeout_seconds: 60
    output_schema:
      analysis: object
      ellipses: array
      leaks: array
      gaps: array

  - ordinal: 3
    action: validate
    description: >
      Validate that gaps were correctly classified as ellipsis or leak.
      Apply the decision tree: does adding it diminish (ellipsis) or fix (leak)?
      Ensure each omission has a classification with supporting reasoning.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-storage
    gas_cap: 1000
    timeout_seconds: 15
    validation_rules:
      - all_gaps_classified
      - ellipsis_leak_discrimination
      - domain_baseline_coverage
    output_schema:
      validated: boolean
      error_reason: string|null

  - ordinal: 4
    action: feedback
    description: >
      Emit CNS span for variety tracking.
      Report gap classification distribution, domain coverage, and
      ellipsis-to-leak ratio for variety monitoring.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: hkask-cns
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      ellipsis_count: integer
      leak_count: integer
      domain: string
    output_schema:
      variety_counter: integer
      cns_event_id: string

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: cognition/ellipsis-analysis
      gas_budget: 6000
    - resource: manifest
      action: execute
      template_id: ellipsis-analysis
      gas_budget: 500
    - resource: cns
      action: emit
      template_id: ellipsis-analysis
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.agent_pod
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
