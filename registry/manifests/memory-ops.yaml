# Dispatch manifest for memory-curator-bot
# Handles semantic/episodic memory operations with Bayesian confidence

manifest:
  id: memory-ops
  name: memory-ops
  version: "0.1.0"
  description: Memory operations with visibility gating and Bayesian confidence
  functional_role: flowdef
  visibility: Public

steps:
  - ordinal: 1
    action: select
    template_ref: memory/selectors/operation-selector.j2
    renderer: minijinja
    output_schema:
      type: object
      properties:
        operation:
          type: string
          enum: [remember, recall, query]
        memory_type:
          type: string
          enum: [semantic, episodic]

  - ordinal: 2
    action: populate
    template_ref: memory/templates/remember-{{memory_type}}.j2
    renderer: minijinja
    bindings:
      operation:
        $ref: step_1_result.operation
      memory_type:
        $ref: step_1_result.memory_type
      entity:
        $ref: input.entity
      attribute:
        $ref: input.attribute
      value:
        $ref: input.value
      confidence:
        $ref: input.confidence
      visibility:
        $ref: input.visibility

  - ordinal: 3
    action: execute
    target: memory_operation
    mcp: hkask-mcp-memory/{{operation}}
    input_mapping:
      memory_type:
        $ref: step_1_result.memory_type
    output_schema:
      type: object
      properties:
        triple_id:
          type: string
        confidence_combined:
          type: number

matroshka:
  max_depth: 5
  enforce: true

cns:
  spans:
    - cns.tool.invocation
    - cns.tool.result
bayesian:
  ops: [combine, subtract, join, decay]
