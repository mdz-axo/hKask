# MCP Scholar — Academic Research Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents
#
# DEPRECATED: The hkask-mcp-scholar server has been removed from the workspace.
# This manifest is retained for reference only. The server was an empty
# stub (fn main() {}) and has been superseded by the web server's
# search capabilities. Do not activate this manifest.

manifest:
  id: mcp/scholar_extract
  name: MCP Scholar Extractor
  description: >
  functional_role: flowdef
    Search and extract academic papers from scholarly databases.
    Supports database selection, year filtering, and citation tracking.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 6000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

# Process Steps
steps:
  - ordinal: 1
    action: populate
    description: >
      Render scholar extraction template with query and parameters.
    renderer: minijinja
    template_ref: mcp/scholar_extract
    model_tier: null
    mcp: null
    gas_cap: 1000
    timeout_seconds: 10
    output_schema:
      rendered_prompt: string

  - ordinal: 2
    action: execute
    description: >
      Execute academic search and extraction via MCP.
      Call scholarly APIs (arXiv, PubMed, etc.).
    renderer: null
    template_ref: null
    model_tier: reasoning_local
    mcp: null  # was hkask-mcp-scholar (never existed)
    gas_cap: 6000
    timeout_seconds: 60
    output_schema:
      papers: array
      total_found: integer
      search_metadata: object

  - ordinal: 3
    action: feedback
    description: >
      Emit search outcome to CNS.
      Track paper quality and database coverage.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: null  # CNS is ambient (CnsRuntime)
    gas_cap: 500
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      paper_count: integer
    output_schema:
      cns_event_id: string
      outcome_recorded: boolean

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_capability_denied: escalate
  on_database_unavailable: fallback

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: mcp/scholar_extract
      gas_budget: 2000
    - resource: scholar
      action: search
      template_id: mcp/scholar_extract
      gas_budget: 4000
    - resource: cns
      action: emit
      template_id: mcp/scholar_extract
      gas_budget: 500
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.scholar.search
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
  include_search_metrics: true
