# Training Manifest — Capabilities Researcher LoRA
#
# Declarative operator recipe. Agents map this intent into the typed
# training_submit parameters; AxolotlHarness renders the runtime YAML from
# that typed boundary. The skills framework can audit and evolve this recipe
# without creating a second Rust configuration loader.
#
# Lesson propagation (2026-07-19): PiSSA (pissa_niter_4) is non-portable across
# transformers/torch library versions — the residual base mismatch produces
# garbage output (see docs/how-to/runpod-lora-training-guide.md Lesson 6).
# Switched to EVA (activation-vector SVD) which produces standard portable
# LoRA adapters. Previous results block was corrupt and has been deleted.

name: capabilities-researcher
version: 3
description: >
  EVA-initialized LoRA adapter for the Capabilities Researcher persona
  (John Brooks). Trained on ChatML QA pairs generated from curated
  research literature on organizational capabilities.

# ── Dataset ──────────────────────────────────────────────────────────────
dataset:
  huggingface_repo: mdz-axo/capabilities-researcher-qa
  file: train_chat_full.jsonl
  format: chatml
  examples: 229520

# ── Base model ───────────────────────────────────────────────────────────
base_model: unsloth/Qwen3.6-27B
# Together AI may require: Qwen/Qwen3.6-27B (official namespace)

# ── LoRA config ──────────────────────────────────────────────────────────
lora:
  r: 32
  alpha: 64
  dropout: 0  # recommended 0 for EVA (activation components must not be dropped)
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  init: eva  # EVA activation-vector SVD — standard portable LoRA (B=0)

# ── Training hyperparameters ─────────────────────────────────────────────
training:
  epochs: 3
  learning_rate: 0.0001
  warmup_steps: 100
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  lr_scheduler: cosine
  weight_decay: 0.01
  max_grad_norm: 0.3
  optim: adamw_8bit
  sequence_len: 4096

# ── Eval + early stopping ────────────────────────────────────────────────
eval:
  val_set_size: 0.0012  # canonical held-out split for the 229,520-example corpus
  eval_steps: 200
  save_steps: 200
  save_total_limit: 5
  early_stopping_patience: 25  # not 7 — cosine LR needs runway

# ── Optimizations ────────────────────────────────────────────────────────
optimizations:
  liger_kernel: true
  flash_attention: false  # SDPA (no flash-attn compile needed)
  cut_cross_entropy: true
  gradient_checkpointing: true
  bf16: true

# ── Host selection ───────────────────────────────────────────────────────
host: runpod
harness: axolotl

# ── RunPod deployment contract ───────────────────────────────────────────
runpod:
  template_id: f4wac8wrhz
  image: winglian/axolotl-cloud:main-latest
  gpu_type: NVIDIA H100 80GB HBM3
  container_disk_gb: 200
  min_memory_gb: 80
  min_vcpu_count: 8
  volume_mount: /workspace
