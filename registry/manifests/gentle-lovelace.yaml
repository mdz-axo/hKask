# Gentle Lovelace Process Manifest
# ℏKask v0.31.0 — Writing-quality evaluation as convergent PDCA

manifest:
  id: gentle-lovelace
  name: Gentle Lovelace
  description: >
    Convergent writing-quality diagnostic report generator. Consumes pre-computed
    per-dimension cosine distance scores (from an upstream embedding comparison
    step such as replica_compare), produces structured diagnostics with actionable
    recommendations, computes convergence until weakest-dimension recommendations
    are clear, and emits CNS spans for variety tracking. This skill is a downstream
    report formatter — it does NOT compute dimension scores internally. Input
    dimension_scores must be produced by an upstream step or composed skill.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.15
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_2_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

cns:
  spans:
    - cns.gentle_lovelace
  variety_monitoring:
    metric: writing_quality_scores
    description: "Per-dimension writing quality scores tracked for document corpus health"

inputs:
  - name: document_content
    type: string
    required: true
  - name: dimension_scores
    type: object
    required: true
    description: >
      Pre-computed per-dimension cosine distance scores from an upstream embedding
      comparison step. Expected keys: gentle (agent-correctness), schriver (findability),
      hopper (accessibility), lovelace (precision), composite (weighted). This skill
      does NOT compute these scores — they must be provided by the caller or a
      composed upstream skill.
  - name: document_type
    type: string
    required: false
  - name: exemplar_context
    type: array
    required: false

steps:
  - ordinal: 1
    action: select
    description: Generate structured writing-quality diagnostics.
    renderer: minijinja
    template_ref: gentle-lovelace/replica-report
    gas_cap: 5000
    timeout_seconds: 60
    input_mapping:
      document_content: "{{ document_content }}"
      dimension_scores: "{{ dimension_scores }}"
      document_type: "{{ document_type | default('unspecified') }}"
      exemplar_context: "{{ exemplar_context | default([]) }}"

  - ordinal: 2
    action: select
    description: Compute normalized convergence metric for quality-evaluation cycle.
    renderer: minijinja
    template_ref: gentle-lovelace/gentle-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      primary_result: "{{ step_1_result }}"

  - ordinal: 3
    action: select
    description: Emit CNS span with per-dimension scores and composite for variety tracking.
    renderer: minijinja
    template_ref: gentle-lovelace/gentle-cns-emit
    gas_cap: 1000
    timeout_seconds: 15
    input_mapping:
      diagnostic_output: "{{ step_1_result }}"
      convergence_metric: "{{ step_2_result.convergence_metric }}"

  - ordinal: 4
    action: loop
    description: Re-enter quality-evaluation cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: gentle-lovelace/replica-report
      gas_budget: 5000
    - resource: template
      action: render
      template_id: gentle-lovelace/gentle-convergence-check
      gas_budget: 2000
    - resource: template
      action: render
      template_id: gentle-lovelace/gentle-cns-emit
      gas_budget: 1000
    - resource: manifest
      action: execute
      template_id: gentle-lovelace
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
