# QA Keystore Security Gate — v0.30.0
#
# Verifies hkask-keystore security invariants. Targets TQ-8 (P0 gap:
# keystore has zero test modules). This script serves as:
#   1. A build gate — verifies keystore compiles (no regressions)
#   2. A test-count monitor — tracks when tests are added (TQ-8 resolution)
#   3. A CNS observability anchor — alerts when keystore test count = 0
#
# Open questions addressed:
#   TQ-8 (P0) — hkask-keystore has zero tests; this is a security-critical
#               crate (AES-256-GCM, HKDF-SHA256, OS keychain integration)
#
# Cybernetic feedback loop:
#   Sensor → cargo build + cargo test --list
#   Comparator → classify step evaluates test coverage status
#   Actuator → terminal step reports WARN if 0 tests, PASS if > 0
#
# Constraint force: PROHIBITION (keystore is P4 OCAP enforcement substrate —
# key material compromise violates the capability membrane).
#
# Runner readiness: FULLY EXECUTABLE TODAY.

manifest:
  id: qa-keystore-security-gate
  description: >
    Verifies hkask-keystore security posture: build integrity, test coverage
    existence (TQ-8 P0 gap), and crate-level compilation. Keystore is the
    OCAP key derivation substrate — regressions here compromise P4.

gas:
  cap: 15000
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Build keystore crate (compile check)
  - ordinal: 1
    action: run_command
    command: "cargo build -p hkask-keystore 2>&1 | tail -10"
    description: "Build hkask-keystore — verify compilation (no type errors, no missing deps)"
    retries: 0
    branching:
      success: 2
      failure: 6

  # Step 2: Run keystore tests (currently 0 — TQ-8 P0 gap)
  - ordinal: 2
    action: run_command
    command: "cargo test -p hkask-keystore 2>&1 | tail -15"
    description: "Run hkask-keystore tests — exit code 0 even with 0 tests; output shows test count"
    retries: 0
    branching:
      success: 3
      failure: 7

  # Step 3: Classify keystore test coverage status
  - ordinal: 3
    action: classify
    classifier: qa-triage
    description: "Security audit: hkask-keystore test coverage. This is a PROHIBITION-level concern (P4 OCAP enforcement substrate). The keystore handles AES-256-GCM encryption, HKDF-SHA256 key derivation, and OS keychain integration. Current state per TQ-8: zero test modules. The qa-triaged classification should flag 'zero tests' as high-confidence critical. If tests exist, classify as high-confidence normal."
    retries: 0
    branching:
      high_confidence: 4
      medium_confidence: 4
      low_confidence: 5
      flake: 3
      unparseable: 5

  # Step 4: PASS — keystore compiles and has test coverage
  - ordinal: 4
    action: run_command
    command: "echo '[QA:keystore] OK — keystore builds and has test coverage. TQ-8 status: verify test count in output.'"
    description: "Keystore build and test run successful"
    retries: 0
    terminal: true

  # Step 5: WARN — classifier low confidence, needs manual review
  - ordinal: 5
    action: run_command
    command: "echo '[QA:keystore] WARN — classifier low confidence on keystore test status. Manual security review required (TQ-8 P0).'"
    description: "Classifier cannot determine keystore test coverage — manual review needed for security-critical crate"
    retries: 0
    terminal: true

  # Step 6: FAIL — keystore does not compile
  - ordinal: 6
    action: run_command
    command: "echo '[QA:keystore] FAIL — keystore crate does not compile. Immediate fix required — this breaks OCAP key derivation.'"
    description: "Keystore compilation failure — P4 OCAP substrate broken"
    retries: 0
    terminal: true

  # Step 7: FAIL — keystore test suite execution failed
  - ordinal: 7
    action: run_command
    command: "echo '[QA:keystore] FAIL — keystore test run failed (non-zero exit). Tests may exist but are broken.'"
    description: "Keystore test execution failure — tests exist but are failing"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.keystore.security
