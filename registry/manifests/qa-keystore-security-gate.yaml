# QA Keystore Security Gate — v0.31.0
#
# Verifies hkask-keystore security invariants: build integrity + test coverage.
# TQ-8 (P0) is RESOLVED — keystore has 16 passing tests covering:
#   - encrypt/decrypt roundtrip (empty, binary, tampered, truncated)
#   - key derivation (deterministic, salt-dependent, wrong-key rejection)
#   - version file and keychain operations
#
# Constraint force: PROHIBITION (keystore is P4 OCAP enforcement substrate —
# key material compromise violates the capability membrane).
#
# Cybernetic feedback loop:
#   Sensor → cargo build + cargo test
#   Comparator → classify step evaluates test coverage status
#   Actuator → terminal step reports PASS if 16+ tests pass, DEGRADED otherwise
#
# Runner readiness: PARTIAL — run_command steps executable today;
#   classify step requires QaScriptRunner.

manifest:
  id: qa-keystore-security-gate
  name: QA Keystore Security Gate
  version: 0.31.0
  visibility: Private
  description: >
    Verifies hkask-keystore security posture: build integrity and test
    coverage (16 tests: encrypt/decrypt roundtrip, key derivation, OS
    keychain). TQ-8 resolved. Keystore is the OCAP key derivation
    substrate — regressions here compromise P4.

gas:
  cap: 15000
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1
  alert_threshold: 0.8
  hard_limit: true

steps:
  # Step 1: Build keystore crate (compile check)
  - ordinal: 1
    action: run_command
    command: "cargo build -p hkask-keystore 2>&1 | tail -5"
    description: "Build hkask-keystore — verify compilation"
    retries: 0
    branching:
      success: 2
      failure: 5

  # Step 2: Run keystore tests (16 tests covering crypto invariants)
  - ordinal: 2
    action: run_command
    command: "cargo test -p hkask-keystore 2>&1 | tail -15"
    description: "Run hkask-keystore tests — 16 tests: encrypt/decrypt roundtrip, key derivation, tamper detection, keychain ops"
    retries: 0
    branching:
      success: 3
      failure: 6

  # Step 3: Classify keystore test coverage status
  # Requires QaScriptRunner — receives step 2 stdout.
  - ordinal: 3
    action: classify
    classifier: qa-triage
    description: "Security audit: hkask-keystore test coverage (PROHIBITION-level, P4 OCAP enforcement substrate). Current state: 16 tests pass covering AES-256-GCM encrypt/decrypt roundtrip, HKDF-SHA256 key derivation determinism and salt-dependence, ciphertext tampering detection, truncated ciphertext rejection, wrong-key rejection, empty plaintext handling, binary data roundtrip, version file integrity, and keychain operations. Classify as high-confidence normal if all 16 pass. Flag any failure as critical."
    retries: 0
    branching:
      high_confidence: 4
      medium_confidence: 4
      low_confidence: 7
      flake: 3
      unparseable: 7

  # Step 4: PASS — keystore compiles and all crypto tests pass
  - ordinal: 4
    action: run_command
    command: "echo '[QA:keystore] PASS — keystore builds, 16/16 crypto tests pass. TQ-8 resolved.'"
    description: "Keystore build and test run successful"
    retries: 0
    terminal: true

  # Step 5: FAIL — keystore does not compile
  - ordinal: 5
    action: run_command
    command: "echo '[QA:keystore] FAIL — keystore crate does not compile. Immediate fix required — OCAP key derivation broken.'"
    description: "Keystore compilation failure — P4 OCAP substrate broken"
    retries: 0
    terminal: true

  # Step 6: FAIL — keystore test suite execution failed
  - ordinal: 6
    action: run_command
    command: "echo '[QA:keystore] FAIL — keystore test run failed (non-zero exit). Crypto invariants may be broken.'"
    description: "Keystore test execution failure — crypto invariants compromised"
    retries: 0
    terminal: true

  # Step 7: WARN — classifier low confidence, needs manual review
  - ordinal: 7
    action: run_command
    command: "echo '[QA:keystore] WARN — classifier low confidence on keystore test status. Manual security review required.'"
    description: "Classifier cannot determine keystore test coverage — manual review needed for security-critical crate"
    retries: 0
    terminal: true

cns:
  emit_spans: true
  alert: qa.keystore.security
