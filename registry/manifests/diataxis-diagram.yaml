# Diataxis Diagram Process Manifest
# hKask v0.31.0 — Convergent Mermaid diagram generation
# Anchored in https://diataxis.fr/ methodology and https://mermaid.js.org/ syntax
#
# PDCA cycle:
#   1. CLASSIFY — determine diagram type and Diataxis quadrant
#   2. EXTRACT  — agent-coordinated source reading (entities, relationships)
#   3. GENERATE — render into Mermaid syntax with type-specific conventions
#   4. EVALUATE — score against six Diataxis quality criteria
#   5. CONVERGE — check threshold; loop to GENERATE with directives if needed
#   6. WRITE    — finalize into docs/diagrams/ markdown file
#   7. LOOP     — PDCA re-entry if unconverged

manifest:
  id: diataxis-diagram
  category: skill
  name: Diataxis Diagram
  description: >
    Generate Mermaid diagrams from code using Diataxis methodology. Convergent
    PDCA loop: classify target and diagram type, extract entities from source
    (agent-coordinated), generate Mermaid syntax with type-specific conventions,
    evaluate against six weighted Diataxis quality criteria, and iterate until
    convergence (threshold 0.15). Three core diagram types: ERD (from SQL),
    flowchart (from code paths), state (from enums/lifecycles). Two extended:
    sequence (from message flows), class (from traits/structs). Outputs to
    docs/diagrams/ with Diataxis-appropriate prose descriptions.
  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  # Rationale: 0.15 threshold — same as idiomatic-rust. The diagram should be
  # structurally sound and complete. A score below 0.15 means: all entities
  # present, relationships accurate, labels readable, type appropriate, voice
  # matching the quadrant, cross-links present. Minor cosmetic issues (label
  # phrasing, marginal clarity) can survive convergence — they're taste, not
  # correctness.
  threshold: 0.15
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 60000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 1.5
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: target
    type: string
    description: "The target to diagram — a crate path, file path, module name, or description"
    required: true
  - name: hint
    type: string
    description: "Optional hint: preferred diagram type, audience, or context"
    required: false
  - name: extracted_entities
    type: string
    description: >
      Pre-extracted entities and relationships from source files.
      Populated by the agent between step 2 (extract) and step 3 (generate).
      Optional — if not provided, the extract template outputs guidance for
      the agent to perform extraction.
    required: false
  - name: related_docs
    type: array
    description: "Paths to related documentation files for cross-linking"
    required: false

steps:
  - ordinal: 1
    action: select
    description: >
      CLASSIFY the target. Determine which Mermaid diagram type to use
      (ERD, flowchart, state, sequence, or class), which Diataxis quadrant
      the diagram will serve (reference, explanation, how-to, or tutorial),
      and which source files to read. Produces a classification verdict
      with rationale.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-classify
    gas_cap: 4096
    timeout_seconds: 60
    input_mapping:
      target: "{{ target }}"
      hint: "{{ hint | default('') }}"

  - ordinal: 2
    action: select
    description: >
      EXTRACT entities and relationships from source files. Agent-coordinated
      probe phase: the template provides type-specific extraction guidance
      (what to look for in SQL schemas, Rust enums, control flow, message
      passing). The agent reads source files between template calls and
      populates extracted_entities.

      Design note: Like bug-hunt's probe phase, actual file I/O is agent-
      coordinated. The template provides guidance; the agent executes file
      reads. If extracted_entities is pre-populated, the template validates
      the existing data.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-extract
    gas_cap: 6144
    timeout_seconds: 120
    input_mapping:
      diagram_type: "{{ step_1_result.diagram_type }}"
      target: "{{ target }}"
      source_files: "{{ step_1_result.source_files | default([]) }}"
      extracted_entities: "{{ extracted_entities | default('') }}"

  - ordinal: 3
    action: select
    description: >
      GENERATE Mermaid syntax from extracted entities and relationships.
      Applies type-specific conventions: Crow's Foot notation for ERD,
      node shapes for flowcharts, transition labels for state diagrams,
      block constructs for sequences, interface markers for class diagrams.
      Accepts refinement directives from the evaluate step for iterative
      improvement.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-generate
    gas_cap: 8192
    timeout_seconds: 60
    input_mapping:
      diagram_type: "{{ step_1_result.diagram_type }}"
      entities: "{{ step_2_result.entities | default([]) }}"
      relationships: "{{ step_2_result.relationships | default([]) }}"
      refinement_directives: "{{ step_4_result.refinement_directives | default([]) }}"
      extraction_notes: "{{ step_2_result.extraction_notes | default('') }}"

  - ordinal: 4
    action: select
    description: >
      EVALUATE the diagram against six weighted Diataxis quality criteria:
      entity completeness (0.30), relationship accuracy (0.25), label
      readability (0.15), type appropriateness (0.15), Diataxis voice
      (0.10), and cross-linking (0.05). Produces scored evaluation with
      specific refinement directives for criteria above threshold.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-evaluate
    gas_cap: 6144
    timeout_seconds: 60
    input_mapping:
      diagram_type: "{{ step_1_result.diagram_type }}"
      diataxis_quadrant: "{{ step_1_result.diataxis_quadrant }}"
      mermaid_source: "{{ step_3_result.mermaid_source }}"
      entities: "{{ step_2_result.entities | default([]) }}"
      relationships: "{{ step_2_result.relationships | default([]) }}"
      extraction_notes: "{{ step_2_result.extraction_notes | default('') }}"

  - ordinal: 5
    action: select
    description: >
      CONVERGE — compute normalized metric from evaluation scores.
      Weighted sum across six criteria, normalized to [0,1] where 0 = perfect.
      Threshold 0.15: below means diagram is structurally sound.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-convergence
    gas_cap: 2048
    timeout_seconds: 30
    input_mapping:
      evaluation_result: "{{ step_4_result }}"
      iteration: "{{ loop_context.iteration | default(1) }}"

  - ordinal: 6
    action: select
    description: >
      WRITE the diagram to docs/diagrams/{type}-{target}.md. Wraps the
      Mermaid source in a code block, adds a Diataxis-appropriate description
      paragraph, includes cross-links, and produces the final markdown.
    renderer: minijinja
    template_ref: diataxis-diagram/diataxis-diagram-write
    gas_cap: 4096
    timeout_seconds: 30
    input_mapping:
      diagram_type: "{{ step_1_result.diagram_type }}"
      diataxis_quadrant: "{{ step_1_result.diataxis_quadrant }}"
      mermaid_source: "{{ step_3_result.mermaid_source }}"
      target: "{{ target }}"
      entity_count: "{{ step_3_result.entity_count | default(0) }}"
      relationship_count: "{{ step_3_result.relationship_count | default(0) }}"
      evaluation_result: "{{ step_4_result }}"
      related_docs: "{{ related_docs | default([]) }}"

  - ordinal: 7
    action: loop
    description: >
      If convergence not met (metric > 0.15) and refinement directives
      exist, loop back to GENERATE (step 3) with those directives as
      focused improvement targets. Each iteration narrows the gap.
    input_mapping:
      loop_target: 3

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-classify
      gas_budget: 4096
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-extract
      gas_budget: 6144
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-generate
      gas_budget: 8192
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-evaluate
      gas_budget: 6144
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-convergence
      gas_budget: 2048
    - resource: template
      action: render
      template_id: diataxis-diagram/diataxis-diagram-write
      gas_budget: 4096
    - resource: manifest
      action: execute
      template_id: diataxis-diagram
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true

ledger:
  emit_spans: true
  span_namespace: hkask.template.diataxis-diagram
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_reg_events: true
