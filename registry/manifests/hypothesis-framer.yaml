# Hypothesis Framer Process Manifest
# ℏKask v0.30.0 — FINER + PICO research framing as convergent PDCA

manifest:
  id: hypothesis-framer
  name: Hypothesis Framer
  description: >
    Convergent research framing process. Evaluates broad topics against FINER
    criteria (Feasible, Interesting, Novel, Ethical, Relevant), structures
    questions via PICO (Population, Intervention, Comparison, Outcome),
    formulates testable hypotheses with null hypothesis derivation, develops
    aligned research aims and objectives, computes convergence, and iterates
    until the question-hypothesis-aims chain is coherent and decision-ready.
  functional_role: flowdef
  version: 0.30.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.05
  improvement_ratio: 0.10
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_5_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 100000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 28000
  cost_per_token: 0.25
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: broad_topic
    type: string
    required: true
  - name: domain
    type: string
    required: true
  - name: research_context
    type: string
    required: false
  - name: question_hint
    type: string
    required: false
  - name: population_hints
    type: string
    required: false

steps:
  - ordinal: 1
    action: select
    description: >
      Apply FINER criteria to evaluate and refine the broad research topic
      into a well-formed research question. Assess feasibility, interest,
      novelty, ethics, and relevance. Produce per-dimension scores with
      rationale and refinement suggestions.
    renderer: minijinja
    template_ref: hypothesis-framer/finer-evaluate
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      broad_topic: "{{ broad_topic }}"
      domain: "{{ domain }}"
      research_context: "{{ research_context | default('') }}"
      question_hint: "{{ question_hint | default('') }}"

  - ordinal: 2
    action: select
    description: >
      Apply PICO framework to structure the refined research question.
      Identify Population characteristics, Intervention/exposure,
      Comparison/control, and Outcome measures. Produce a structured
      question and completeness assessment.
    renderer: minijinja
    template_ref: hypothesis-framer/pico-structure
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      research_question: "{{ step_1_result.research_question | default('') }}"
      domain: "{{ domain }}"
      finer_result: "{{ step_1_result | default({}) }}"
      population_hints: "{{ population_hints | default('') }}"

  - ordinal: 3
    action: select
    description: >
      Derive testable research hypothesis and null hypothesis from the
      PICO-structured question. Classify hypothesis type (difference,
      association, superiority, etc.) and assess testability.
    renderer: minijinja
    template_ref: hypothesis-framer/hypothesis-formulate
    gas_cap: 5000
    timeout_seconds: 45
    input_mapping:
      structured_question: "{{ step_2_result.structured_question | default('') }}"
      pico_elements: "{{ step_2_result | default({}) }}"
      domain: "{{ domain }}"
      finer_result: "{{ step_1_result | default({}) }}"

  - ordinal: 4
    action: select
    description: >
      Develop primary and secondary research aims with specific, measurable
      objectives. Verify alignment between the question, hypothesis, PICO
      elements, and aims. Recheck feasibility in light of operational detail.
    renderer: minijinja
    template_ref: hypothesis-framer/aims-objectives
    gas_cap: 6000
    timeout_seconds: 60
    input_mapping:
      research_question: "{{ step_1_result.research_question | default('') }}"
      research_hypothesis: "{{ step_3_result.research_hypothesis | default('') }}"
      null_hypothesis: "{{ step_3_result.null_hypothesis | default('') }}"
      pico_elements: "{{ step_2_result | default({}) }}"
      finer_result: "{{ step_1_result | default({}) }}"
      domain: "{{ domain }}"

  - ordinal: 5
    action: select
    description: >
      Compute normalized convergence metric for hypothesis-framer cycle.
      Evaluates FINER compliance, PICO completeness, hypothesis coherence,
      and aims alignment. Returns convergence_metric plus blockers.
    renderer: minijinja
    template_ref: hypothesis-framer/hypothesis-framer-convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      finer_result: "{{ step_1_result }}"
      pico_result: "{{ step_2_result }}"
      hypothesis_result: "{{ step_3_result }}"
      aims_result: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    description: Re-enter hypothesis-framer cycle if convergence is not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 1
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: hypothesis-framer/finer-evaluate
      gas_budget: 6000
    - resource: template
      action: render
      template_id: hypothesis-framer/pico-structure
      gas_budget: 6000
    - resource: template
      action: render
      template_id: hypothesis-framer/hypothesis-formulate
      gas_budget: 5000
    - resource: template
      action: render
      template_id: hypothesis-framer/aims-objectives
      gas_budget: 6000
    - resource: template
      action: render
      template_id: hypothesis-framer/hypothesis-framer-convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: hypothesis-framer
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
