# GML Allosteric Reasoning Cascade
#
# Type: FlowDef
# Version: 0.1.0

manifest:
  id: gml-dispatch
  name: gml-dispatch
  version: "0.1.0"
  description: Apply GML to shift conceptual interpretation under contextual pressure
  functional_role: flowdef

inputs:
  - name: target_concept
    type: Concept
    description: "The concept to analyze allosterically"
    required: true
    schema: "gml/schema.json"
  - name: contextual_effectors
    type: List[Effector]
    description: "Contextual ligands that bind and shift interpretation"
    required: true
  - name: mwc_parameters
    type: MwcParameters
    description: "MWC parameters (L, c, n, α) for the concept"
    required: false
  - name: network_context
    type: Optional[Network]
    description: "Surrounding concept network for coherence assessment"
    required: false
  - name: capability
    type: Capability
    description: "OCAP capability token for authorization"
    required: false

steps:
  - ordinal: 1
    action: populate
    description: Parse concept into states and ports
    renderer: minijinja
    template_ref: gml/recognize-ensemble.j2
    output_schema:
      type: object
      properties:
        concept_analysis:
          type: object

  - ordinal: 2
    action: populate
    description: Apply effector, infer state-shift
    renderer: minijinja
    template_ref: gml/bind-effector.j2
    output_schema:
      type: object
      properties:
        shifted_concept:
          type: object

  - ordinal: 3
    action: populate
    description: Calculate R̄, n_H, distribution
    renderer: minijinja
    template_ref: gml/compute-equilibrium.j2
    output_schema:
      type: object
      properties:
        equilibrium_shift:
          type: object

  - ordinal: 4
    action: populate
    description: Evaluate network homeostasis
    renderer: minijinja
    template_ref: gml/assess-coherence.j2
    output_schema:
      type: object
      properties:
        coherence_analysis:
          type: object

  - ordinal: 5
    action: populate
    description: Generate alternative frames
    renderer: minijinja
    template_ref: gml/reframe-concept.j2
    output_schema:
      type: object
      properties:
        reframed_concept:
          type: object

cns:
  spans:
    - cns.gml.recognize
    - cns.gml.bind
    - cns.gml.equilibrate
    - cns.gml.assess
    - cns.gml.reframe
