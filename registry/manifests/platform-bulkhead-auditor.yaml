# Platform Bulkhead Auditor
# ℏKask v0.31.0 — Resilience: blast radius analysis
# Functional Role: FlowDef (process orchestration)
# Implementation: YAML manifest
# Steps: map_failure_domains, compute_blast_radius, detect_single_points, synthesize_report, convergence_check

manifest:
  id: platform-bulkhead-auditor
  category: infrastructure
  name: Platform Bulkhead Auditor
  description: >
    Convergent bulkhead audit process. Maps failure domains across the
    platform (agent pods, skills, MCP servers, crate boundaries), computes
    blast radius for each component, detects single points of failure where
    blast radius exceeds acceptable threshold, and produces a structured
    audit report with recommendations for bulkhead isolation.

    Per Nygard's stability patterns, bulkheads prevent cascading failures.
    If one agent pod crashes, what else breaks? The answer should be:
    nothing else. This skill verifies that property.

  functional_role: flowdef
  version: 0.31.0
  editor: curator-or-human-admin
  visibility: Public

convergence:
  threshold: 0.10
  improvement_ratio: 0.05
  improvement_gate: threshold_only
  max_iterations: 3
  min_iterations: 1
  convergence_field: step_4_result.convergence_metric
  on_not_reached: escalate

gas:
  cap: 50000
  cost_per_iteration: 100
  alert_threshold: 0.8
  hard_limit: true

rjoule:
  cap: 2
  alert_threshold: 0.8
  hard_limit: true

inputs:
  - name: dependency_graph
    type: string
    required: false
    description: >
      Pre-computed crate dependency graph (JSON). From semantic-graph-audit.
      If not provided, the skill queries the graph via MCP.
  - name: blast_radius_threshold
    type: integer
    required: false
    default: 3
    description: >
      Maximum acceptable blast radius. Components affecting more than
      this many downstream dependents are flagged.

steps:
  - ordinal: 1
    action: select
    description: >
      Map failure domains from the crate dependency graph and CNS span data.
      Identify each component (crate, MCP server, agent pod, skill) as a
      node in the failure graph. Edges represent dependency: A → B means
      "A depends on B; if B fails, A is affected."

    renderer: minijinja
    template_ref: platform-bulkhead-auditor/map-domains
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      dependency_graph: "{{ dependency_graph | default('') }}"

  - ordinal: 2
    action: select
    description: >
      Compute blast radius for each component. The blast radius is the
      number of downstream components that would be affected if this
      component fails. A component with blast radius 0 affects nothing
      else (ideal). A component with blast radius > N is a single
      point of failure.

      Also scores by severity: Critical (blast radius > threshold),
      Warning (blast radius > threshold/2), Info (blast radius ≤ threshold/2).

    renderer: minijinja
    template_ref: platform-bulkhead-auditor/compute-radius
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      failure_domains: "{{ step_1_result }}"
      blast_radius_threshold: "{{ blast_radius_threshold | default(3) }}"

  - ordinal: 3
    action: select
    description: >
      Detect single points of failure and recommend bulkheads.
      For each component with blast radius > threshold, recommend
      isolation strategies: circuit breakers, graceful degradation,
      timeout boundaries, or architectural decomposition.

    renderer: minijinja
    template_ref: platform-bulkhead-auditor/detect-spof
    gas_cap: 4000
    timeout_seconds: 45
    input_mapping:
      blast_radii: "{{ step_2_result }}"

  - ordinal: 4
    action: select
    description: >
      Synthesize audit report: total components, blast radius distribution,
      single points of failure identified, recommendations with severity.
      Outputs structured JSON report.

    renderer: minijinja
    template_ref: platform-bulkhead-auditor/synthesize-report
    gas_cap: 3000
    timeout_seconds: 30
    input_mapping:
      spof_findings: "{{ step_3_result }}"
      blast_radii: "{{ step_2_result }}"

  - ordinal: 5
    action: select
    description: >
      Compute convergence metric. Checks all components mapped,
      blast radii computed, SPOFs identified, recommendations actionable.
      Outputs convergence_metric in [0,1].

    renderer: minijinja
    template_ref: platform-bulkhead-auditor/convergence-check
    gas_cap: 2000
    timeout_seconds: 30
    input_mapping:
      report: "{{ step_4_result }}"

  - ordinal: 6
    action: loop
    gas_cap: 200
    timeout_seconds: 10
    description: Re-enter cycle if convergence not met.
    input_mapping:
      loop_target: 1

error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 1
  retry_backoff_seconds: 2
  on_validation_failure: abort

ocap:
  required_capabilities:
    - resource: template
      action: render
      template_id: platform-bulkhead-auditor/map-domains
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-bulkhead-auditor/compute-radius
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-bulkhead-auditor/detect-spof
      gas_budget: 4000
    - resource: template
      action: render
      template_id: platform-bulkhead-auditor/synthesize-report
      gas_budget: 3000
    - resource: template
      action: render
      template_id: platform-bulkhead-auditor/convergence-check
      gas_budget: 2000
    - resource: manifest
      action: execute
      template_id: platform-bulkhead-auditor
      gas_budget: 1000
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600
  template_scoped: true
