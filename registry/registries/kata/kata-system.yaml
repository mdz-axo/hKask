# Kata System Registry Entry
# ℏKask v0.21.0 — Toyota Kata templates for 7R7 capability development

registry_entry:
  id: kata-system
  name: Toyota Kata System
  description: >
    Scientific capability development system based on Toyota Kata.
    Three Kata patterns: Starter (practice routines), Improvement
    (4-step scientific pattern), Coaching (5-question dialogue).
  editor: Curator
  visibility: public

templates:
  - id: improvement-step1-direction
    type: Prompt
    lexicon_terms: [challenge, capability, goal]
    path: registry/templates/kata/improvement-step1-direction.j2

  - id: improvement-step2-current
    type: Prompt
    lexicon_terms: [observe, measure, current-condition]
    path: registry/templates/kata/improvement-step2-current.j2

  - id: improvement-step3-target
    type: Prompt
    lexicon_terms: [target-condition, metrics, achieve-by]
    path: registry/templates/kata/improvement-step3-target.j2

  - id: improvement-step4-experiment
    type: Prompt
    lexicon_terms: [obstacle, experiment, prediction]
    path: registry/templates/kata/improvement-step4-experiment.j2

  - id: coaching-q1-target
    type: Prompt
    lexicon_terms: [target-condition, coaching]
    path: registry/templates/kata/coaching-q1-target.j2

  - id: coaching-q2-actual
    type: Prompt
    lexicon_terms: [actual-condition, observation]
    path: registry/templates/kata/coaching-q2-actual.j2

  - id: coaching-q3-obstacles
    type: Prompt
    lexicon_terms: [obstacle, focus]
    path: registry/templates/kata/coaching-q3-obstacles.j2

  - id: coaching-q4-experiment
    type: Prompt
    lexicon_terms: [experiment, prediction, expectation]
    path: registry/templates/kata/coaching-q4-experiment.j2

  - id: coaching-q5-learn
    type: Prompt
    lexicon_terms: [learning, feedback, measurement]
    path: registry/templates/kata/coaching-q5-learn.j2

  - id: starter-selector
    type: Cognition
    lexicon_terms: [practice, habit, routine]
    path: registry/templates/kata/starter-selector.j2

  - id: starter-five-questions
    type: Process
    lexicon_terms: [coaching-questions, scientific-thinking]
    path: registry/templates/kata/starter-five-questions.j2

  - id: starter-pdca-cycle
    type: Process
    lexicon_terms: [pdca, experimentation]
    path: registry/templates/kata/starter-pdca-cycle.j2

  - id: starter-observation-drill
    type: Process
    lexicon_terms: [observation, fact, interpretation]
    path: registry/templates/kata/starter-observation-drill.j2

  - id: kata-selector
    type: Cognition
    lexicon_terms: [kata, capability-development, selection]
    path: registry/templates/kata/kata-selector.j2

manifests:
  - id: improvement-kata
    path: registry/manifests/improvement-kata.yaml

  - id: coaching-kata
    path: registry/manifests/coaching-kata.yaml

  - id: starter-kata
    path: registry/manifests/starter-kata.yaml

bots:
  - id: Kata-Bot
    path: registry/bots/kata-bot.yaml

hlexicon:
  - term: challenge
    domain: FlowDef
    definition: A capability gap or performance issue to address

  - term: target-condition
    domain: FlowDef
    definition: A specific, measurable performance state to achieve

  - term: actual-condition
    domain: FlowDef
    definition: The current observable performance state

  - term: obstacle
    domain: FlowDef
    definition: A barrier preventing achievement of target condition

  - term: experiment
    domain: WordAct
    definition: A testable action with a prediction and expected outcome

  - term: coaching-cycle
    domain: FlowDef
    definition: A ~20 minute dialogue using 5 Coaching Kata questions

  - term: starter-kata
    domain: KnowAct
    definition: Deliberate practice routines to internalize scientific thinking

  - term: habit-signal
    domain: KnowAct
    definition: Indicator of whether scientific thinking is becoming automatic

cns:
  span_namespace: cns.prompt.kata
  sub_spans:
    - cns.prompt.kata.improvement
    - cns.prompt.kata.coaching
    - cns.prompt.kata.starter
  variety_monitoring: true
  algedonic_threshold: 100
