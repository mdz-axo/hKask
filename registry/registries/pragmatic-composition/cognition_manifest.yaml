# Pragmatic Composition — Cognition Manifest
# ℏKask v0.21.0 — Planck's Constant of Agent Systems
# Reasoning Patterns with ReAct Loops and Cybernetic Feedback

manifest:
  id: pragmatic-composition/cognition
  name: Pragmatic Composition Cognition
  description: >
    Cognition manifest for reasoning patterns with ReAct loops.
    Implements cybernetic feedback for template/manifest calibration.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared
  template_type: Cognition

# ReAct Loop Configuration
react_loop:
  enabled: true
  max_iterations: 7  # Miller's law + energy budget
  phases:
    - reason
    - act
    - observe
    - reflect
  termination_conditions:
    - confidence_threshold: 0.9
    - max_iterations_reached
    - variety_deficit_detected
    - energy_exhausted

# Energy Budget
energy:
  cap: 8000
  cost_per_iteration: 500
  opportunity_cost_tracking: true
  deficit_threshold: 100

# Reasoning Pattern: Template Calibration
reasoning_patterns:
  - id: template_calibration
    name: Template Calibration
    description: >
      Calibrate template selection based on CNS outcome feedback.
      Adjusts lexicon bindings and variable injection strategies.
    pattern_type: KnowAct
    lexicon_terms: [calibrate, baseline, adjust, drift]
    phases:
      - phase: reason
        description: Analyze outcome confidence and variety metrics
        template_ref: cognition/detect
        output_schema:
          drift_detected: boolean
          drift_magnitude: float
          affected_terms: array

      - phase: act
        description: Apply calibration adjustments to template
        template_ref: cognition/calibrate
        output_schema:
          calibration_delta: float
          adjusted_terms: array
          new_baseline: object

      - phase: observe
        description: Monitor CNS variety counters post-calibration
        cns_span: cns.prompt.outcome
        output_schema:
          variety_delta: integer
          confidence_improvement: float

      - phase: reflect
        description: Update calibration model for future selections
        template_ref: cognition/reflect
        output_schema:
          learning_delta: float
          model_updated: boolean

  - id: manifest_optimization
    name: Manifest Optimization
    description: >
      Optimize manifest step sequence based on energy cost analysis.
      Identifies inefficient steps and suggests reordering.
    pattern_type: KnowAct
    lexicon_terms: [optimize, efficiency, reorder, energy]
    phases:
      - phase: reason
        description: Analyze energy cost per manifest step
        output_schema:
          step_costs: object
          inefficient_steps: array

      - phase: act
        description: Propose step reordering for efficiency
        output_schema:
          proposed_order: array
          estimated_savings: integer

      - phase: observe
        description: Validate proposed optimization against constraints
        output_schema:
          constraints_violated: array
          optimization_valid: boolean

      - phase: reflect
        description: Update manifest with validated optimization
        output_schema:
          manifest_updated: boolean
          energy_saved: integer

  - id: composition_feedback
    name: Composition Feedback
    description: >
      Feedback loop for template/manifest composition quality.
      Emits CNS spans for cybernetic monitoring.
    pattern_type: KnowAct
    lexicon_terms: [compose, feedback, quality, monitor]
    phases:
      - phase: reason
        description: Evaluate composition quality metrics
        output_schema:
          quality_score: float
          quality_dimensions: object

      - phase: act
        description: Emit feedback to CNS for variety tracking
        cns_span: cns.prompt.outcome
        output_schema:
          feedback_emitted: boolean
          variety_delta: integer

      - phase: observe
        description: Monitor algedonic alert status
        output_schema:
          algedonic_active: boolean
          alert_severity: string|null

      - phase: reflect
        description: Adjust composition strategy based on feedback
        output_schema:
          strategy_adjusted: boolean
          adjustment_type: string

# Cybernetic Feedback Configuration
cybernetic_feedback:
  enabled: true
  variety_counters:
    - entity_type: template
      metric: selection_diversity
      threshold: 100
    - entity_type: manifest
      metric: execution_diversity
      threshold: 100
    - entity_type: lexicon
      metric: term_usage_diversity
      threshold: 100
  algedonic_alerts:
    enabled: true
    threshold: 100
    severity_levels:
      - low
      - medium
      - high
      - critical
    escalation_target: Curator
  calibration_prompts:
    enabled: true
    trigger_on: variety_deficit
    adjustment_magnitude: 0.1

# CNS Integration
cns:
  emit_spans: true
  span_types:
    - cns.prompt.select
    - cns.prompt.render
    - cns.prompt.outcome
    - cns.energy.allocate
    - cns.energy.consume
    - cns.energy.opportunity
    - cns.energy.deficit
  variety_monitoring: true
  algedonic_threshold: 100

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: cognition
      action: reason
    - resource: cns
      action: emit
    - resource: template
      action: calibrate
  delegation_chain_required: true
  capability_attenuation: true

# Audit Trail
audit:
  enabled: true
  log_reasoning_phases: true
  log_energy_costs: true
  log_cns_events: true
