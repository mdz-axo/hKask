# Pragmatic Composition — Process Manifest
# ℏKask v0.21.0 - A Minimal Viable Container for Agents
# YAML Process Manifest with Energy Caps and OCAP Enforcement

manifest:
  id: pragmatic-composition/process
  name: Pragmatic Composition Process
  description: >
    Multi-stage process for pragmatic composition of templates and manifests.
    Implements YAML/Jinja2 templating with cybernetic feedback and energy tracking.
  version: 0.21.0
  editor: curator-or-human-admin
  visibility: Shared

# Energy Budget Configuration
gas:
  cap: 10000  # Maximum token budget (4 tokens = 1 energy unit)
  cost_per_token: 0.25  # Energy cost per token
  alert_threshold: 0.8  # Alert at 80% budget usage
  hard_limit: true  # Enforce hard limit vs. soft warning

# Process Steps
steps:
  - ordinal: 1
    action: select
    description: >
      Select best-fit template from registry based on input context.
      Uses fast local model for template discrimination.
    renderer: minijinja
    template_ref: prompt/selector
    model_tier: fast_local
    gas_cap: 500
    timeout_seconds: 30
    output_schema:
      selected_template_id: string
      rationale: string
      confidence: float
      energy_cost: integer

  - ordinal: 2
    action: validate
    description: >
      Validate selected template exists and is accessible via OCAP.
      Check visibility and capability requirements.
    renderer: none
    template_ref: null
    model_tier: null
    mcp: hkask-mcp-memory  # was hkask-mcp-storage
    gas_cap: 100
    timeout_seconds: 5
    validation_rules:
      - template_exists
      - capability_check
      - visibility_gate
    output_schema:
      validated: boolean
      capability_token: string|null
      error_reason: string|null

  - ordinal: 3
    action: populate
    description: >
      Bind input variables to selected template's Jinja2 fields.
      Render template with sandboxed minijinja execution.
    renderer: minijinja
    template_ref: "{{ selected_template_id }}"
    model_tier: null
    mcp: null
    gas_cap: 1000
    timeout_seconds: 10
    sandbox:
      allow_filesystem: false
      allow_network: false
      allow_python: false
      max_recursion_depth: 7
    output_schema:
      rendered_document: string
      variable_count: integer
      lexicon_validated: boolean
      energy_cost: integer

  - ordinal: 4
    action: execute
    description: >
      Execute rendered template via model or tool per template contract.
      Emit CNS spans for cybernetic monitoring.
    renderer: null
    template_ref: null
    model_tier: from_template_contract
    mcp: from_template_contract
    gas_cap: 5000
    timeout_seconds: 60
    cns_spans:
      - cns.prompt.select
      - cns.prompt.render
      - cns.prompt.outcome
      - cns.gas.consume
    output_schema:
      result: any
      energy_cost: integer
      cns_event_id: string

  - ordinal: 5
    action: feedback
    description: >
      Emit feedback to CNS for variety monitoring and calibration.
      Trigger algedonic alert on variety deficit >100.
    renderer: null
    template_ref: null
    model_tier: null
    mcp: null  # CNS is ambient (CnsRuntime)
    gas_cap: 200
    timeout_seconds: 5
    feedback:
      variety_delta: integer
      confidence_delta: float
      trigger_algedonic: boolean
    output_schema:
      variety_counter: integer
      algedonic_triggered: boolean
      calibration_delta: float|null

# Error Handling
error_handling:
  on_gas_exceeded: abort
  on_timeout: retry
  max_retries: 2
  retry_backoff_seconds: 1
  on_validation_failure: abort
  on_capability_denied: escalate

# OCAP Configuration
ocap:
  required_capabilities:
    - resource: template
      action: render
    - resource: manifest
      action: execute
    - resource: cns
      action: emit
  delegation_chain_required: true
  signature_algorithm: ed25519
  capability_expiry_seconds: 3600

# CNS Monitoring
cns:
  emit_spans: true
  span_namespace: cns.prompt
  variety_monitoring: true
  algedonic_threshold: 100
  escalation_target: Curator

# Audit Trail
audit:
  enabled: true
  log_level: info
  include_input: true
  include_output: true
  include_gas_cost: true
  include_cns_events: true
