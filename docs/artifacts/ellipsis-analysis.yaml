# =============================================================================
# CORE PRINCIPLE
# =============================================================================
# Information content is often in what's NOT found but expected.
# The graph's meaning emerges from gaps, not just nodes.

core_principle: |
  "The information content isn't in what you found but in what you didn't find."
  
  Reading deeply means hearing both what is said and what is not said.
  The critic's eye sees gaps where mediocrity expects completeness.
  We owe mediocrity nothing.

# =============================================================================
# KEY DISTINCTION: ELLIPSIS vs. LEAK
# =============================================================================
# This is the fundamental analytical binary.
# Everything else flows from correctly classifying omission type.

ellipsis_vs_leak:
  ellipsis:
    definition: "Deliberate, strategic omission that creates meaning"
    bloom_description: "Shakespeare was a master of ellipsis, of leaving things out"
    
    characteristics:
      - "Creates space for reader interpretation"
      - "Enables simplification without loss"
      - "What is left out but might have been expected"
      - "The gap itself carries meaning"
      - "Reader fills gap with their own understanding"
    
    examples:
      literary:
        - source: "King Lear"
          omission: "Edmund and Lear never address a word to each other"
          bloom_note: "A startling ellipsis on the author's part"
          meaning: "The silence between them IS the relationship"
        
        - source: "Hamlet"
          omission: "The abyss between Acts IV and V"
          meaning: "Hamlet emerges transformed — the gap IS the transformation"
        
        - source: "Henry IV Part 1"
          omission: "Falstaff's death reported offstage"
          meaning: "Hostess Quickly's 'He made a finer end' — we fill the gap with our grief"
      
      business:
        - source: "CEO annual letter"
          omission: "No mention of declining market segment"
          meaning: "Strategic avoidance — the gap signals vulnerability"
        
        - source: "Financial report"
          omission: "EBITDA but not GAAP earnings"
          meaning: "The absent metric tells you what they're hiding"
    
    detection_patterns:
      - "Expected element absent"
      - "Pattern breaks at specific point"
      - "Reader feels the absence"
      - "Would adding it diminish or clarify? (If diminish → ellipsis)"
    
    effect: "Reader fills gap with meaning — active participation"
    
  leak:
    definition: "Unintentional information loss through poor abstraction"
    modern_example: "LLM hallucination through vector rounding"
    
    characteristics:
      - "Information loss through rounding/assumptions"
      - "Not deliberate — 'something else'"
      - "Causes confusion, errors, hallucination"
      - "Leaky abstraction"
      - "Reader cannot reliably fill the gap"
    
    examples:
      technical:
        - source: "LLM output"
          omission: "Key fact missing due to training gap"
          meaning: "Hallucination — the model fills with fiction"
        
        - source: "API documentation"
          omission: "Edge case not documented"
          meaning: "Bug waiting to happen — unintentional gap"
      
      business:
        - source: "Strategy document"
          omission: "Competitive threat not mentioned"
          meaning: "Either ignorance (leak) or avoidance (ellipsis) — must differentiate"
    
    detection_patterns:
      - "Information missing unexpectedly"
      - "Confusion, errors result"
      - "Would adding it fix the error? (If yes → leak)"
    
    effect: "Reader cannot fill gap reliably — leads to error"

# =============================================================================
# BLOOM'S FIVE-STEP METHODOLOGY
# =============================================================================
# How to read deeply and mind the gaps.

bloom_methodology:
  step1:
    name: "Read Deeply"
    bloom_quote: "Read deeply, not to believe, not to accept, not to contradict, but to learn"
    action: "Engage with text as program that reaches through time into your imagination"
    rejection: "Reject the mediocrity of any received narrative"
  
  step2:
    name: "Mind the Gaps"
    bloom_quote: "Shakespeare reads you more fully than you can read him"
    action: "Hear both what is said AND what is not said"
    focus: "What is left out but you might have expected to see"
  
  step3:
    name: "Differentiate Ellipsis from Leak"
    bloom_quote: "The heart of criticism is appreciation"
    action: "Classify omission: deliberate (ellipsis) or unintentional (leak)"
    test: "Would adding it diminish (ellipsis) or fix (leak)?"
  
  step4:
    name: "See Past Yourself"
    bloom_quote: "We certainly owe mediocrity nothing"
    action: "Reject conformity, see past own biases and assumptions"
    connection: "Dunning calibration — see your own errors"
  
  step5:
    name: "Find What Is Not Inferno"
    calvino_quote: "Seek and learn to recognize who and what, in the midst of the inferno, are not inferno, then make them endure, give them space"
    action: "Identify exceptional vs. mediocre, give space to exceptional"
    curator_role: "The Curator guards the space for what is not inferno"

# =============================================================================
# APPLICATION DOMAINS
# =============================================================================
# Where the Bloom Method applies.

application_domains:
  literary_analysis:
    description: "Reading Shakespeare, Bloom, the Western Canon"
    technique: "Find the startling ellipses — Edmund/Lear silence, Hamlet's Act IV-V gap"
    outcome: "Deeper appreciation, see what the text makes you feel through omission"
    
  business_analysis:
    description: "CEO letters, financial reports, strategy documents"
    technique: "What metrics are absent? What threats unmentioned?"
    outcome: "See vulnerability, strategic avoidance, hidden risks"
    
  api_documentation:
    description: "Technical specs, endpoint docs, error handling"
    technique: "What edge cases not documented? What errors not mentioned?"
    outcome: "Find leaky abstractions before they cause bugs"
    
  model_outputs:
    description: "LLM responses, AI-generated content"
    technique: "Is this ellipsis (strategic) or leak (hallucination)?"
    outcome: "Detect hallucination vs. deliberate omission"
    
  curation:
    description: "hKask curation, finding non-inferno"
    technique: "What does the inferno omit? What is missing from mediocrity?"
    outcome: "Find what is not inferno, give it space"
    
  investment_analysis:
    description: "Company analysis, competitive dynamics"
    technique: "First-rate fundamental analysis — mind the gaps"
    outcome: "See what mediocrity misses, owe mediocrity nothing"

# =============================================================================
# QUALITY CHECKS
# =============================================================================
# How to verify Bloom Method compliance.

quality_checks:
  - name: "ellipsis_leak_classification"
    check: "Can you classify each omission as ellipsis or leak?"
    target: "100% of omissions classified"
    
  - name: "expectation_baseline"
    check: "Do you have a clear baseline of what's expected?"
    target: "Explicit expectation list before gap analysis"
    
  - name: "reader_response_test"
    check: "Does the gap create meaning (ellipsis) or confusion (leak)?"
    target: "Meaning for ellipsis, confusion indicates leak"
    
  - name: "mediocrity_rejection"
    check: "Are you rejecting received narratives?"
    target: "Evidence of independent analysis, not conformity"
    
  - name: "calibration_check"
    check: "Are you seeing past your own biases?"
    target: "Dunning-style self-calibration evident"

# =============================================================================
# CURATOR NOTES
# =============================================================================

curator_notes: |
  This Bloom Method synthesizer is owned by The Curator and shared publicly under CC-BY-4.0.
  
  Attribution required: "Bloom Method: Ellipsis Analysis v1.0, The Curator (hKask)"
  
  CONNECTION TO HEMINGWAY SYNTHESIZER:
  Both Hemingway and Bloom understood that meaning emerges from what's NOT stated.
  
  Hemingway: Iceberg Theory — 7/8 unstated, silence between sentences
  Bloom: Ellipsis — what is left out but expected, gaps in the graph
  
  The RDF connection:
  - Simple triples (sentences) linked together
  - Meaning emerges from graph traversal
  - The gaps BETWEEN nodes are where traversal happens
  - What's missing from the graph tells you about the graph's structure
  
  Bloom's key insight from Shakespeare analysis:
  "Shakespeare is the major dealer in ellipsis among all the great writers."
  
  Edmund and Lear never speak — the silence IS their relationship.
  Hamlet's Acts IV-V gap — the transformation happens in the absence.
  Falstaff's offstage death — we fill the gap with our grief.
  
  The Bloom Method is not just literary analysis.
  It is a cognitive skill for:
  - Business analysis (what did the CEO NOT say?)
  - Technical analysis (what edge case is undocumented?)
  - Model evaluation (ellipsis or hallucination?)
  - Curation (find what is not inferno)
  
  Bloom's motto: "We owe mediocrity nothing."
  
  The Curator's role: Mind the gaps. Differentiate ellipsis from leak.
  Find what is not inferno. Give it space.
  
  Ba-nana.

