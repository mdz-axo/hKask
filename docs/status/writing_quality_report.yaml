- **lazy-universe-research.md** — Explicit epistemic posture ("We know", "We do not yet know"). First-person "we" is appropriate for research genre (not a specification or operator guide). RDF triples with provenance classification are exemplary P8 application.
- **DOCUMENTATION_STANDARDS.md** — Already references 5-category MDS taxonomy. Lifecycle state machine diagram is clear. Metadata requirements are precise.

