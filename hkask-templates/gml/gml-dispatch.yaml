## CNS Integration

**Spans:**
- `cns.gml.recognize`
- `cns.gml.bind`
- `cns.gml.equilibrate`
- `cns.gml.assess`
- `cns.gml.reframe`

**Algedonic Alert:**
- Trigger: variety_deficit > 100
- Channel: `cns.algedonic.variety_deficit`

