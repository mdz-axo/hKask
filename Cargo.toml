[workspace]
resolver = "2"
members = [
    # Core crates (11 — ≤35k lines total)
    "crates/hkask-types",
    "crates/hkask-storage",
    "crates/hkask-memory",
    "crates/hkask-cns",
    "crates/hkask-templates",
    "crates/hkask-agents",
    "crates/hkask-ensemble",
    "crates/hkask-keystore",
    "crates/hkask-mcp",
    "crates/hkask-cli",
    "crates/hkask-api",
    # MCP servers
    "mcp-servers/hkask-mcp-inference",
    "mcp-servers/hkask-mcp-condenser",
    "mcp-servers/hkask-mcp-web",
    "mcp-servers/hkask-mcp-ocap",
    "mcp-servers/hkask-mcp-keystore",
    "mcp-servers/hkask-mcp-cns",
    "mcp-servers/hkask-mcp-git",
    "mcp-servers/hkask-mcp-registry",
    "mcp-servers/hkask-mcp-spec",
    "mcp-servers/hkask-mcp-github",
    "mcp-servers/hkask-mcp-fmp",
    "mcp-servers/hkask-mcp-telnyx",
    "mcp-servers/hkask-mcp-fal",
    "mcp-servers/hkask-mcp-rss-reader",
    "mcp-servers/hkask-mcp-goal",
    "mcp-servers/hkask-mcp-ensemble",
    "mcp-servers/hkask-mcp-episodic",
    "mcp-servers/hkask-mcp-semantic",
    "mcp-servers/hkask-mcp-replicant",
    "mcp-servers/hkask-mcp-doc-knowledge",
    "mcp-servers/hkask-mcp-markitdown",
]

[workspace.package]
version = "0.22.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/mdz-axo/hKask"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.51", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }

# HTTP / API
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
utoipa = { version = "5.5", features = ["axum_extras", "uuid", "chrono"] }
utoipa-axum = "0.2"

# MCP protocol (tool protocol)
rmcp = "1"

# Storage
rusqlite = { version = "0.39", features = ["bundled-sqlcipher-vendored-openssl", "blob"] }
sqlite-vec = "0.1"

# Cryptography / Hashing
blake3 = "1"
aes-gcm = "0.10"
argon2 = "0.5"
sha2 = "0.10"
hmac = "0.12"
ed25519-dalek = "2"
secrecy = "0.10"
zeroize = { version = "1", features = ["zeroize_derive"] }
hex = "0.4"
subtle = "2"
password-hash = "0.5"

# Git
gix = "0.81"

# Templating
minijinja = { version = "2", features = ["loader", "serde", "json", "internal_safe_search"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
schemars = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging / Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Utilities
uuid = { version = "1", features = ["v4", "v5", "serde", "fast-rng"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
rand = "0.9"
base64 = "0.22"

# Keychain / Secrets
keyring = { version = "3", features = ["linux-native-sync-persistent", "crypto-rust"] }

# HTTP client (for MCP servers)
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

tempfile = "3"
async-trait = "0.1"

# Pattern matching (for migration)
regex = "1"
regex-lite = "0.1"

# Futures utilities
futures-util = "0.3"
async-stream = "0.3"

# URL parsing
url = "2"
urlencoding = "2"
