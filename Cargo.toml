[workspace]
resolver = "2"
members = [
    # Core crates (11 — ≤30k lines total)
    "crates/hkask-types",
    "crates/hkask-storage",
    "crates/hkask-memory",
    "crates/hkask-cns",
    "crates/hkask-templates",
    "crates/hkask-agents",
    "crates/hkask-ensemble",
    "crates/hkask-keystore",
    "crates/hkask-mcp",
    "crates/hkask-cli",
    "crates/hkask-api",
    # MCP servers (excluded from budget)
    # Original 10 (subset - some not yet implemented)
    # "mcp-servers/hkask-mcp-inference",  # Not implemented
    # "mcp-servers/hkask-mcp-storage",    # Not implemented
    # "mcp-servers/hkask-mcp-memory",     # Not implemented
    "mcp-servers/hkask-mcp-embedding",
    "mcp-servers/hkask-mcp-condenser",
    # "mcp-servers/hkask-mcp-ensemble",   # Not implemented
    "mcp-servers/hkask-mcp-web",
    "mcp-servers/hkask-mcp-scholar",
    # "mcp-servers/hkask-mcp-spandrel",  # Converted to templates (Action 1)
    # "mcp-servers/hkask-mcp-doc-knowledge", # Converted to templates (Action 1)
    # New: Core infrastructure (5)
    "mcp-servers/hkask-mcp-ocap",
    "mcp-servers/hkask-mcp-keystore",
    "mcp-servers/hkask-mcp-cns",
    "mcp-servers/hkask-mcp-git",
    "mcp-servers/hkask-mcp-registry",
    "mcp-servers/hkask-mcp-gml",
    # New: External integrations (5)
    "mcp-servers/hkask-mcp-github",
    "mcp-servers/hkask-mcp-fmp",
    "mcp-servers/hkask-mcp-telnyx",
    "mcp-servers/hkask-mcp-fal",
    "mcp-servers/hkask-mcp-rss-reader",
    # Test crate (excluded from LOC budget)
    "hkask-testing",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/mdz-axolotl/hKask"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.51", features = ["full"] }
tokio-util = "0.7"

# HTTP / API
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
utoipa = { version = "5.5", features = ["axum_extras", "uuid", "chrono"] }
utoipa-axum = "0.2"

# ACP protocol (agent communication)
acp-runtime = "0.1"

# MCP protocol (tool protocol)
rmcp = "1"

# Storage
rusqlite = { version = "0.39", features = ["bundled-sqlcipher-vendored-openssl", "blob"] }
sqlite-vec = "0.1"

# Cryptography / Hashing
blake3 = "1"
aes-gcm = "0.10"
argon2 = "0.5"
sha2 = "0.10"
hmac = "0.12"
ed25519-dalek = "2"
secrecy = "0.10"
zeroize = "1"
hex = "0.4"

# Git
gix = "0.81"

# Templating
minijinja = { version = "2", features = ["loader", "serde", "json", "internal_safe_search"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
schemars = "1"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging / Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Utilities
uuid = { version = "1", features = ["v4", "serde", "fast-rng"] }
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1"
parking_lot = "0.12"
base64 = "0.22"
rand = "0.9"

# Keychain / Secrets
secret-service = "4"
keyring = "3"

# HTTP client (for MCP servers)
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
url = "2"

# Embeddings / Vector ops
ndarray = "0.16"
nalgebra = "0.33"

# Testing
tempfile = "3"
async-trait = "0.1"
pretty_assertions = "1.4"
insta = { version = "1.42", features = ["yaml", "json"] }
proptest = "1.6"

# Pattern matching (for migration)
regex = "1"
